function normalize(s) {
  return s.toLowerCase()
    .replace(/[åä]/g, 'a').replace(/[øö]/g, 'o').replace(/[æ]/g, 'ae')
    .replace(/[éè]/g, 'e');
}

function search(query) {
  if (!query || query.length < 2) return [];
  const q = normalize(query);
  return entries.filter(e =>
    normalize(e.title).includes(q) || normalize(e.page).includes(q)
  );
}

function render(results, query) {
  const el = document.getElementById('sok-results');
  if (!query || query.length < 2) { el.innerHTML = ''; return; }
  if (results.length === 0) {
    el.innerHTML = '<p style="font-size:14px; color:var(--text3); padding:0.5rem 0;">Ingen treff.</p>';
    return;
  }
  el.innerHTML = results.map(r => `
    <a href="${r.file}#${r.id}" style="display:block; padding:0.7rem 0; border-bottom:1px solid var(--border2); text-decoration:none;">
      <span style="font-size:14px; font-weight:700; color:var(--text);">${r.title}</span>
      <span style="display:block; font-size:12px; color:var(--text3); margin-top:2px;">
        ${r.num} — ${r.page}
      </span>
    </a>
  `).join('');
}

const input = document.getElementById('sok-input');
input.addEventListener('input', () => {
  const q = input.value.trim();
  render(search(q), q);
});

input.focus();
</script>
