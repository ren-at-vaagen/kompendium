itle": "Produksjon", "page": "Produksjon", "num": "05", "text": "øver Bidra til realisering innenfor tilgjengelige rammer Rekvisitter Vis Ha oversikt over alle rekvisitter i produksjonen Innhenting, produksjon og organisering Sikre presis bruk i prøver og forestilling Kostyme Vis Utvikle kostymekonsept i dialog med regi og ensemble Bidra praktisk i prøver — testing, justering, funksjon i bevegelse Sikre at kostyme støtter karakter og scenisk uttrykk Sminke og hår Vis Utvikle sminke- og håruttrykk i tråd med karakter og helhet Teste og justere uttrykk i prøver Bidra til realisering før forestilling Lys Vis Utvikle lysidé i samspill med scenografi og regi Teste stemning, fokus og overganger i prøver Tilpasse løsninger til rom og tilgjengelig utstyr Lyd og musikk Vis Utvikle lydlig konsept — musikk, lyder, stillhet Teste timing og samspill med handling og bevegelse Samarbeide tett med ensemble og regi Bevegelseinstruktør / koreograf Vis Utvikle bevegelsesstruktur i samarbeid med regi og ensemble Arbeide med rombruk, dynamikk og samspill Sikre at bevegelse støtter dramaturgi og uttrykk Markedsføring Vis Utvikle markedsføringsidé i tråd med forestillingens uttrykk og målgruppe Samarbeide med ensemble om innhold og gjennomføring Starter arbeidet når kostyme, rekvisitt og regi er på plass Regnskap Vis Ha oversikt over produksjonens økonomi Følge opp budsjett og faktiske utgifter underveis Sikre at produksjonen holder seg innenfor tilgjengelige rammer I profesjonelle produksjoner faller regnskap under produsenten → Skyggeregnskap-eksempel Publikumsansvarlig Vis Organisere billetter, program og velkomst Håndtere publikumsflyt og sitteplassering Sikre tilgjengelighet for alle tilskuere Koordinere med inspisient om timing for forestillingens start Skjul ↑ Post mortem Vis En strukturert gjennomgang av produksjonsprosessen etter endt forestilling — ikke for å kritisere, men for å lære. 1 Hvordan fungerte organisasjonsmodellen? 2 Hvor tydelig var dere med etiske retningslinjer og rutiner for samarbeid? 3 Hvor effektiv var deres oppvarmingsøvelser og ritualer? Bruk av stemmeøvelser? 4 Hvordan fungerte formidling av regikonseptet i forhold til ensemblets forståelse under prosessen? 5 Hvordan fungerte de dramaturgiske valgene? 6 Hvordan fungerte de sceniske virkemidlene i forhold til regikonseptet? Drøft hver for seg: tekst, lys, scenografi, kostyme, sminke osv. 7 Hadde produktet et helhetlig estetisk uttrykk? 8 Hvordan fungerte publikumskontrakten , samspill og spillestil i forhold til regikonseptet? 9 Hvordan oppfattet publikum forestillingens regikonsept? 10 Hvordan fungerte den økonomiske modellen? Hva hadde dette å si for produktet? 11 Hvordan fungerte markedsføringsplanen? Skjul ↑ Tilleggsmateriale Åpne videosamling — Kostymer, hår, dukker osv. ↗ Åpne videosamling — Inspirasjon til iscenesettelsen ↗ ← Analyse Skuespillteknikker → © 2026 · Redaktør: Ren Powell"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "ser og ritualer? Bruk av stemmeøvelser? 4 Hvordan fungerte formidling av regikonseptet i forhold til ensemblets forståelse under prosessen? 5 Hvordan fungerte de dramaturgiske valgene? 6 Hvordan fungerte de sceniske virkemidlene i forhold til regikonseptet? Drøft hver for seg: tekst, lys, scenografi, kostyme, sminke osv. 7 Hadde produktet et helhetlig estetisk uttrykk? 8 Hvordan fungerte publikumskontrakten , samspill og spillestil i forhold til regikonseptet? 9 Hvordan oppfattet publikum forestillingens regikonsept? 10 Hvordan fungerte den økonomiske modellen? Hva hadde dette å si for produktet? 11 Hvordan fungerte markedsføringsplanen? Skjul ↑ Tilleggsmateriale Åpne videosamling — Kostymer, hår, dukker osv. ↗ Åpne videosamling — Inspirasjon til iscenesettelsen ↗ ← Analyse Skuespillteknikker → © 2026 · Redaktør: Ren Powell"}, {"file": "produksjon.html", "id": "ps-skuespillerens-rolle", "title": "Skuespillerens rolle", "page": "Produksjon", "num": "05", "text": "Skuespillerens rolle Vis Å spille teater handler ikke primært om å lære seg replikker. Det handler om tilstedeværelse og ekte kontakt — med de andre på scenen, den fiktive verden, og av og til publikum. Samspill er ikke én teknikk blant andre — det er selve grunnlaget for alt scenisk arbeid. En skuespiller bruker skuespillteknikk for å oppnå en bestemt skuespillstil . Stilen springer ut av sjangeren og regissørens visjon — en naturalistisk forestilling krever en annen stil enn commedia dell'arte eller episk teater, og dermed andre teknikker. Graden av autonomi en skuespiller har i prosessen varierer etter arbeidsmodellen for produksjonen. I noen modeller er skuespilleren medskaper — i andre er rollen å utføre en visjon som allerede er ferdig tenkt. Skjul ↑"}, {"file": "produksjon.html", "id": "ps-etikk", "title": "Etikk i prøverommet", "page": "Produksjon", "num": "05", "text": "Etikk i prøverommet Vis Et trygt prøverom er en forutsetning for godt kunstnerisk arbeid. Når folk føler seg trygge, tar de større kunstneriske risiko. Etiske rammer bør etableres tidlig i prosessen. Basert på allment anerkjent praksis i teaterpedagogikk. Arbeidsregler Møt presis og forberedt — andres tid er like verdifull som din Telefonen er borte under prøve Si ifra i god tid hvis du ikke kan møte Kle deg passende for fysisk arbeid Gi konstruktive tilbakemeldinger — kun om det er etterspurt Det som skjer i prøverommet, blir i prøverommet Deling av bilder og video fra prøverommet krever samtykke fra alle involverte 1 Samtykke og grenser Alle fysiske og emosjonelle krav i produksjonen kommuniseres tydelig før arbeidet begynner. Ingen skal overraskes av hva som forventes av dem. 2 Maktforh"}, {"file": "produksjon.html", "id": "ps-auteur", "title": "Auteur-teater og totalt teater", "page": "Produksjon", "num": "05", "text": "Auteur-teater og totalt teater Vis I samtidsteateret finnes regissører som aktivt streber etter å skape totalt teater — regissører som selv skaper verket de setter opp, koreograferer bevegelsene, designer scenografien og planlegger lyset. Disse kalles gjerne auteur -regissører, et begrep hentet fra nybølge-filmteorien: en regissør som dominerer hele skapelsesprosessen slik at sluttproduktet er et personlig uttrykk. Mange auteur-regissører er også billedkunstnere. Auteur-regissøren dominerer hele skapelsesprosessen — tekst, kropp, rom, lys og lyd er likestilte elementer under én kunstnerisk visjon. De mest fremtredende auteurene er fra samtidsteateret: Robert Wilson, Richard Foreman og Robert Lepage er tydelige eksempler — men begrunnelsen for denne graden av regikontroll har røtter tilbake"}, {"file": "produksjon.html", "id": "ps-devising", "title": "Devising", "page": "Produksjon", "num": "05", "text": "Devising Vis En arbeidsmodell der ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd. Forestillingen skapes gjennom utforsking, improvisasjon og kollektive beslutninger underveis i prosessen — heller enn å realisere en forhåndsbestemt plan. Devising skiller seg fra tradisjonell regi ved at tekst, form og uttrykk oppstår i prosessen — ikke før den. Devising bruker ofte en flat organisasjonsmodell — alle i ensemblet bidrar likeverdig til skapelsen, uten en fast hierarkisk struktur. Kilde: Oddey, A. (1994). Devising Theatre: A Practical and Theoretical Handbook . Routledge. Skjul ↑"}, {"file": "produksjon.html", "id": "ps-sceneformer", "title": "Sceneformer og rom", "page": "Produksjon", "num": "05", "text": "Sceneformer og rom Vis Forholdet mellom scene og sal former publikumsopplevelsen fundamentalt — før en eneste replikk er sagt. Valget av sceneform er alltid et kunstnerisk og dramaturgisk valg. Titteskapsscene Publikum sitter foran og ser inn i en bilderamme. Scenen er adskilt fra salen. Gir naturlig fjerde vegg og illusjonsteatrets konvensjoner. Brukes i de fleste etablerte teaterbygninger. Arenascene Publikum omringer scenen på alle fire sider. Skuespillerne er alltid synlige fra alle vinkler. Krever bevisst arrangement/blokkering slik at ingen del av publikum alltid ser ryggen. Skaper intimitet, men gjør scenografi komplisert. Thrust-scene Scenen stikker ut i salen og omringes av publikum på tre sider — som The Globe Theatre i England. Kombinerer intimitet med muligheten for bakvegg og "}, {"file": "produksjon.html", "id": "kvCard", "title": "Kunstnerisk valg", "page": "Produksjon", "num": "05", "text": "Kunstnerisk valg Vis Når vi tar beslutninger i prosessen med å skape scenekunst, er noen av dem helt basert på praktiske hensyn: Ta valg av rom som eksempel. Rommet kan forme kunstverket på en betydelig måte — men selve valget av rom er ofte styrt av tilgjengelighet og økonomi, ikke kunstnerisk intensjon. På samme måte kan rollebesetting være et rent kunstnerisk valg, men det kan like gjerne handle om hvem som er i klassen, i et amatørteater, eller på institusjonens lønningsliste. Oftest er mange beslutninger litt praktisk og litt kunstnerisk, avhengig av omstendigheter. Merk: Diagrammet er én tolkningsmodell, ikke en fasit."}, {"file": "produksjon.html", "id": "ps-tidslinje", "title": "Tradisjonell produksjonstidslinje", "page": "Produksjon", "num": "05", "text": "Tradisjonell produksjonstidslinje Vis Tradisjonelle produksjoner har en hierarkisk organisasjonsmodell — med regissøren, kunstnerisk leder eller produsent på toppen, og ulike fagroller under. 14 uker · 5 timer per uke · ca. 70 timer totalt — omtrent det samme som en amatørproduksjon. Rekkefølgen varierer: noen regissører starter med improvisasjon, andre med tekst eller arrangement. Uke 1–2 Oppstart Auditions og casting Lesing og research Sette datoer — individuelle frister og avtaler Uke 3–5 Utforsking Improvisasjon / tekstarbeid / devising Research og referanser Scenografiske idéer under utvikling Uke 6–9 Forming Arrangement og sceniske valg Kostyme og rekvisitt under utvikling Scenografi konkretiseres Uke 10–11 Konsolidering Kostyme, rekvisitt og regi på plass Gjennomkjøringer Uke 12–13 "}, {"file": "produksjon.html", "id": "ps-regi", "title": "Del 1 — Regikonsept", "page": "Produksjon", "num": "05", "text": "Del 1 — Regikonsept Vis Dette er ikke en fasit, men én måte å organisere tankene om hvilke valg som skaper den endelige dramaturgiske formen. Gjelder ikke devising-teater, der de kunstneriske valgene tas underveis i prosessen. 1 Visjon Hva er din overordnede idé og hensikt med denne oppsetningen? Hvorfor nå? Hva ønsker du at publikum skal sitte igjen med? 2 Tema og lesemåte Hvordan leser og tolker du materialet? Hvilke hovedtemaer ønsker du å belyse? 3 Tekst og materiale Hvilken rolle spiller teksten i oppsetningen? Hva beholdes, endres eller legges til, og hvorfor? 4 Teaterform Hvilken teatertradisjon ligger til grunn? Realistisk, episk, poetisk, fysisk teater, postdramatisk, dokumentarisk? 5 Publikumskontrakt Åpen eller lukket teatermodell? Skal publikum observere, delta, konfronteres el"}, {"file": "produksjon.html", "id": "ps-produksjon", "title": "Del 2 — Produksjonskonsept", "page": "Produksjon", "num": "05", "text": "Del 2 — Produksjonskonsept Vis 1 Spillested og produksjonsrom Hvilket fysisk rom skal forestillingen spilles i? Hvilke muligheter og begrensninger gir det for produksjonen? Arena, black box, utescene, site-specific? Vurder også tilgjengelighet: rullestoltilgang, akustikk, sitteplasser og sansemessige hensyn — er lokalet tilgjengelig for alle? 2 Organisasjonsmodell Hvordan er produksjonen organisert? Streng hierarki eller flat organisasjon? 3 Praktisk gjennomføring og logistikk Hva må være på plass for at produksjonen skal fungere under prøver og forestillinger? 4 HMS og sikkerhet Scenekamp, løft, strøm, rigging — hvilke sikkerhetshensyn gjelder? Hvem har ansvar? 5 Markedsføring og publikum Målgruppe, kanaler (plakat, sosiale medier, skolekanaler, lokalpresse), samarbeid mellom produksjonss"}, {"file": "produksjon.html", "id": "ps-roller", "title": "Hvem gjør", "page": "Produksjon", "num": "05", "text": "Hvem gjør hva? Vis"}, {"file": "produksjon.html", "id": "rolle-produsent", "title": "Produsent", "page": "Produksjon", "num": "05", "text": "Produsent Vis Overordnet ansvar for at produksjonen gjennomføres innenfor budsjett og tidsplan Koordinerer mellom de ulike faggruppene Håndterer praktiske og administrative oppgaver — kontrakter, økonomi, markedsføring og lokaler I profesjonelle produksjoner er produsenten ofte den som initierer prosjektet og engasjerer regissøren"}, {"file": "produksjon.html", "id": "rolle-regissør", "title": "Regissør", "page": "Produksjon", "num": "05", "text": "Regissør Vis Ansvar for det kunstneriske arbeidet og ensemblets samarbeid Samarbeide med inspisient om planlegging og struktur Koordinere ensemblet på en demokratisk og rettferdig måte Ta kunstneriske beslutninger og ha siste ord Gi korte, jevnlige notater til ensemblet Utvikle felles visjon og regi-/produksjonskonsept Læreren fungerer som mentor og acting coach."}, {"file": "produksjon.html", "id": "rolle-regiass", "title": "Regiassistent", "page": "Produksjon", "num": "05", "text": "Regiassistent Vis Føre arrangementsnotater Planlegge og lede oppvarming for ensemblet Holde løpende oversikt over endringer i tekst og struktur Følge opp avtaler og praktiske behov i prøveprosessen Samarbeide med inspisient og bidra til sceniske valg"}, {"file": "produksjon.html", "id": "rolle-dramaturg", "title": "Dramaturg", "page": "Produksjon", "num": "05", "text": "Dramaturg Vis Arbeider med tekstgrunnlaget og forestillingens dramaturgiske struktur Analyserer manus, gir tilbakemelding på fremdrift og spenningskurve Fungerer som kritisk samtalepartner for regissøren I devising-prosesser hjelper dramaturgen ensemblet med å finne form og struktur i materialet som oppstår"}, {"file": "produksjon.html", "id": "rolle-inspisient", "title": "Inspisient", "page": "Produksjon", "num": "05", "text": "Inspisient Vis Lede produksjonsmøter og skrive referat Følge opp avtaler, tidsplaner og praktisk gjennomføring Sikre flyt og oversikt i prøve- og produksjonsarbeidet Være bindeledd mellom regi, ensemble og øvrige funksjoner"}, {"file": "produksjon.html", "id": "rolle-scenografi", "title": "Scenografi", "page": "Produksjon", "num": "05", "text": "Scenografi Vis Utvikle scenografisk idé i samarbeid med regi og ensemble Teste rom, plassering og bruk av elementer i prøver Bidra til realisering innenfor tilgjengelige rammer"}, {"file": "produksjon.html", "id": "rolle-rekvisitt", "title": "Rekvisitter", "page": "Produksjon", "num": "05", "text": "Rekvisitter Vis Ha oversikt over alle rekvisitter i produksjonen Innhenting, produksjon og organisering Sikre presis bruk i prøver og forestilling"}, {"file": "produksjon.html", "id": "rolle-kostyme", "title": "Kostyme", "page": "Produksjon", "num": "05", "text": "Kostyme Vis Utvikle kostymekonsept i dialog med regi og ensemble Bidra praktisk i prøver — testing, justering, funksjon i bevegelse Sikre at kostyme støtter karakter og scenisk uttrykk"}, {"file": "produksjon.html", "id": "rolle-sminke", "title": "Sminke og hår", "page": "Produksjon", "num": "05", "text": "Sminke og hår Vis Utvikle sminke- og håruttrykk i tråd med karakter og helhet Teste og justere uttrykk i prøver Bidra til realisering før forestilling"}, {"file": "produksjon.html", "id": "rolle-lys", "title": "Lys", "page": "Produksjon", "num": "05", "text": "Lys Vis Utvikle lysidé i samspill med scenografi og regi Teste stemning, fokus og overganger i prøver Tilpasse løsninger til rom og tilgjengelig utstyr"}, {"file": "produksjon.html", "id": "rolle-lyd", "title": "Lyd og musikk", "page": "Produksjon", "num": "05", "text": "Lyd og musikk Vis Utvikle lydlig konsept — musikk, lyder, stillhet Teste timing og samspill med handling og bevegelse Samarbeide tett med ensemble og regi"}, {"file": "produksjon.html", "id": "rolle-koreografi", "title": "Bevegelseinstruktør / koreograf", "page": "Produksjon", "num": "05", "text": "Bevegelseinstruktør / koreograf Vis Utvikle bevegelsesstruktur i samarbeid med regi og ensemble Arbeide med rombruk, dynamikk og samspill Sikre at bevegelse støtter dramaturgi og uttrykk"}, {"file": "produksjon.html", "id": "rolle-marked", "title": "Markedsføring", "page": "Produksjon", "num": "05", "text": "Markedsføring Vis Utvikle markedsføringsidé i tråd med forestillingens uttrykk og målgruppe Samarbeide med ensemble om innhold og gjennomføring Starter arbeidet når kostyme, rekvisitt og regi er på plass"}, {"file": "produksjon.html", "id": "rolle-regnskap", "title": "Regnskap", "page": "Produksjon", "num": "05", "text": "Regnskap Vis Ha oversikt over produksjonens økonomi Følge opp budsjett og faktiske utgifter underveis Sikre at produksjonen holder seg innenfor tilgjengelige rammer I profesjonelle produksjoner faller regnskap under produsenten → Skyggeregnskap-eksempel"}, {"file": "produksjon.html", "id": "rolle-publikum", "title": "Publikumsansvarlig", "page": "Produksjon", "num": "05", "text": "Publikumsansvarlig Vis Organisere billetter, program og velkomst Håndtere publikumsflyt og sitteplassering Sikre tilgjengelighet for alle tilskuere Koordinere med inspisient om timing for forestillingens start Skjul ↑"}, {"file": "produksjon.html", "id": "ps-postmortem", "title": "Post mortem", "page": "Produksjon", "num": "05", "text": "Post mortem Vis En strukturert gjennomgang av produksjonsprosessen etter endt forestilling — ikke for å kritisere, men for å lære. 1 Hvordan fungerte organisasjonsmodellen? 2 Hvor tydelig var dere med etiske retningslinjer og rutiner for samarbeid? 3 Hvor effektiv var deres oppvarmingsøvelser og ritualer? Bruk av stemmeøvelser? 4 Hvordan fungerte formidling av regikonseptet i forhold til ensemblets forståelse under prosessen? 5 Hvordan fungerte de dramaturgiske valgene? 6 Hvordan fungerte de sceniske virkemidlene i forhold til regikonseptet? Drøft hver for seg: tekst, lys, scenografi, kostyme, sminke osv. 7 Hadde produktet et helhetlig estetisk uttrykk? 8 Hvordan fungerte publikumskontrakten , samspill og spillestil i forhold til regikonseptet? 9 Hvordan oppfattet publikum forestillingens "}, {"file": "skuespill.html", "id": "", "title": "Skuespillteknikker", "page": "Skuespillteknikker", "num": "06", "text": "Skuespillteknikker — Teaterfag kompendium ← Kompendium Skuespillteknikker ☀︎ ⌕ Søk 06 SKUESPILLTEKNIKKER Skuespillerens verktøykasse — teknikker og metoder. Disse teknikkene er verktøy, ikke regler. Fagfolk er ofte uenige om hva som er «riktig» innenfor hver tradisjon — og det er greit. Plukk og miks det som fungerer for deg og det sceniske arbeidet du gjør. Åpne videosamling — Oppvarming og stemme ↗ Stanislavski-systemet Konstantin Stanislavski Vis Indre motivasjon — hva vil karakteren? Emosjonell hukommelse som verktøy — senere forlot han dette til fordel for fysiske handlinger Fysiske handlinger — enkle, konkrete handlinger som utgangspunkt for emosjon, ikke omvendt Gitte omstendigheter — hvem, hva, hvor, når Magisk hvis — hva om jeg var i denne situasjonen? Spill handlingen, ikke emosjonen Rudolf Penkas fem spørsmål Vis En videreutvikling av Stanislavskis system. Bruk disse spørsmålene til å analysere karakteren din ut fra teksten — svar med verb og konkrete handlinger, ikke følelsesord. Hvem er jeg? Hva gjør jeg? (bruk verb) Hvorfor gjør jeg det? (mål) Hvor? (de gitte omstendigheter) Når? (de ytterligere omstendigheter) Rudolf Penka — Tell Forlag (PDF) ↗ Øvelse 2 — Enkel handling Vis Velg én fysisk handling (helle vann, skrive et brev, lete etter noe). Gjør den med full konsentrasjon. La omgivelsene og situasjonen forme handlingen — ikke tankene om rollen. → Stanislavski-profil Skjul ↑ Meisner-teknikk Sanford Meisner Vis «Leve sant under imaginære omstendigheter» Repetisjonsøvelse — total oppmerksomhet på partneren Reaksjon er viktigere enn planlagt handling Ikke forbered — vær tilstede Øvelse 1 — Repetisjonsøvelse Vis To spillere. A observerer B og sier hva de ser: «Du ser til høyre.» B gjentar det tilbake: «Jeg ser til høyre.» Bytt. Ikke tenk — reager. Øvelsen varer til noe ekte skjer mellom dere. → Meisner-profil Skjul ↑ Uta Hagen-metoden Uta Hagen Vis Substitusjon — bytt ut fiksjon med eget liv De ni spørsmålene som karakteranalyseverktøy Fysiske handlinger forankrer karakteren Objektøvelser — ekte gjenstander, ekte handlinger De ni spørsmålene Vis Hvem er jeg? Hva er tidspunktet? Hvor er jeg? Hva omgir meg? Hva er mitt forhold til de andre? Hva vil jeg? Hva er hindringen? Hva gjør jeg for å få det jeg vil? (bruk verb) Hva er den forutgående handlingen? Øvelse 1 — Objektøvelse Vis Velg tre ekte gjenstander fra din hverdag. Lag en scene på 2–3 minutter der du bruker dem med full konsentrasjon. Ingen publikum — bare deg og gjenstandene. Handlingen avslører karakteren. → Uta Hagen-profil Skjul ↑ Gestus Bertolt Brecht Vis Gestus = holdning som viser sosial relasjon og makt Kroppen viser klassetilhørighet, ikke bare følelse Skuespilleren kommenterer rollen — forsvinner ikke inn i den Tydelig, lesbar bevegelse uten psykologisk tvetydighet Øvelse 1 — Status og kropp Vis Gå gjennom rommet. Tenk: hva er din karakter sin sosiale posisjon? Høy status, lav status? La kroppen vise det — ikke ansiktet. Bytt status midt i bevegelsen. Hva endrer seg? → "}, {"file": "skuespill.html", "id": "", "title": "Skuespillteknikker", "page": "Skuespillteknikker", "num": "06", "text": " forankrer karakteren Objektøvelser — ekte gjenstander, ekte handlinger De ni spørsmålene Vis Hvem er jeg? Hva er tidspunktet? Hvor er jeg? Hva omgir meg? Hva er mitt forhold til de andre? Hva vil jeg? Hva er hindringen? Hva gjør jeg for å få det jeg vil? (bruk verb) Hva er den forutgående handlingen? Øvelse 1 — Objektøvelse Vis Velg tre ekte gjenstander fra din hverdag. Lag en scene på 2–3 minutter der du bruker dem med full konsentrasjon. Ingen publikum — bare deg og gjenstandene. Handlingen avslører karakteren. → Uta Hagen-profil Skjul ↑ Gestus Bertolt Brecht Vis Gestus = holdning som viser sosial relasjon og makt Kroppen viser klassetilhørighet, ikke bare følelse Skuespilleren kommenterer rollen — forsvinner ikke inn i den Tydelig, lesbar bevegelse uten psykologisk tvetydighet Øvelse 1 — Status og kropp Vis Gå gjennom rommet. Tenk: hva er din karakter sin sosiale posisjon? Høy status, lav status? La kroppen vise det — ikke ansiktet. Bytt status midt i bevegelsen. Hva endrer seg? → Brecht-profil Skjul ↑ Psykofysisk trening Grotowski / Barba · Odin Teatret Vis Kropp og psyke er uatskillelige — trening er alltid begge deler Via negativa — fjern hindringer, ikke legg til teknikker Langsom, presis bevegelse som kilde til nærvær Øvelser fra Odin Teatret: energiarbeid, tempo, rom Basert på Grotowski, videreutviklet av Barba og Odin Teatret Øvelse 1 — Slow walk Vis Gå ekstremt langsomt gjennom rommet. Hvert steg tar 10 sekunder. Kjenn vekten flytte seg fra hæl til tå. Stopp plutselig. Vent. Fortsett. Målet er fullstendig nærvær — ikke prestasjon. → Grotowski-profil Skjul ↑ Lecoq-metoder Jacques Lecoq Vis Nøytral maske — nullpunkt, ingen karakter Dyranalyse — observer og legemliggjør dyrenes bevegelse og energi Le jeu (spillet) — oppdagelse gjennom lek og improvisasjon Melodrama, klovn, commedia — ulike spilleregistre Øvelse 1 — Dyranalyse Vis Velg et dyr. Observer det (video eller irl) i 10 minutter. Fokuser på: rytme, vekt, hvordan hodet beveger seg, tempo. Begynn med kroppen — ikke hodet. Gå gradvis fra dyr mot menneskelig figur. Øvelse 2 — Nøytral maske Vis Sett på nøytral maske (eller lukk øynene og forestill deg det). Gå inn i rommet som om du ser det for første gang. Ingen følelser, ingen karakter. Bare tilstedeværelse og oppdagelse. → Lecoq-profil Skjul ↑ Michael Chekhov-teknikk Michael Chekhov Vis Imaginasjonsbasert — bruker fantasi og bilder fremfor personlig hukommelse Psykologisk gest (Psychological Gesture) — rollefigurens indre drivkraft uttrykkes gjennom en ekstern, fysisk gest som internaliseres i kroppen Atmosfære — rommet og situasjonen har en stemning som skuespilleren lever i og reagerer på Tempo staccato/legato — bevisst variasjon av rytme og flyt i bevegelse og tale «The body and its psychology are inseparable» Øvelse 1 — Psykologisk gest Vis Tenk på hva rollefiguren din ønsker dypest sett. Finn en enkel, stor kroppsbevegelse som uttrykker dette — strekk mot noe, lukk deg inn, skyv noe vekk. Gjør bevegelsen fullt ut flere ganger."}, {"file": "skuespill.html", "id": "", "title": "Skuespillteknikker", "page": "Skuespillteknikker", "num": "06", "text": "kroppen — ikke hodet. Gå gradvis fra dyr mot menneskelig figur. Øvelse 2 — Nøytral maske Vis Sett på nøytral maske (eller lukk øynene og forestill deg det). Gå inn i rommet som om du ser det for første gang. Ingen følelser, ingen karakter. Bare tilstedeværelse og oppdagelse. → Lecoq-profil Skjul ↑ Michael Chekhov-teknikk Michael Chekhov Vis Imaginasjonsbasert — bruker fantasi og bilder fremfor personlig hukommelse Psykologisk gest (Psychological Gesture) — rollefigurens indre drivkraft uttrykkes gjennom en ekstern, fysisk gest som internaliseres i kroppen Atmosfære — rommet og situasjonen har en stemning som skuespilleren lever i og reagerer på Tempo staccato/legato — bevisst variasjon av rytme og flyt i bevegelse og tale «The body and its psychology are inseparable» Øvelse 1 — Psykologisk gest Vis Tenk på hva rollefiguren din ønsker dypest sett. Finn en enkel, stor kroppsbevegelse som uttrykker dette — strekk mot noe, lukk deg inn, skyv noe vekk. Gjør bevegelsen fullt ut flere ganger. La den bli liten, intern. Spill scenen med den interne gesten som drivkraft. Øvelse 2 — Atmosfære Vis Velg to svært ulike atmosfærer for samme scene — for eksempel «tung, stille sorg» og «skjør, lysende glede». Spill scenen fullt ut i hver atmosfære. Legg merke til hvordan karakterens valg og tempo endres av rommet de lever i. → Michael Chekhov-profil Skjul ↑ GOTEsheet og beats Robert Cohen Vis G oal — hva vil jeg egentlig ha, og når? O ther — hvem vil jeg ha det fra? Hvem hjelper, hvem hindrer? T actics — hvordan får jeg det jeg vil ha? Bruk verb, ikke følelsesord: true, lokke, sjarmere, ignorere — ikke være sint eller føle kjærlighet E xpectation — hvorfor forventer jeg å få det? Hva gjør jeg når jeg får det? Øvelse 1 — GOTEsheet Vis Fyll ut bakgrunnsinformasjonen ved hjelp av Stanislavskis gitte omstendigheter eller Uta Hagens ni spørsmål (se disse teknikkene). Svar levende og konkret — bruk verb! Ikke følelsesord, ikke akademisk språk. Last ned GOTEsheet (PDF) ↗ Øvelse 2 — Beats og taktikkskifter Vis Analyser en scene i beats — enheter der skuespilleren bruker én taktikk. Når taktikken lykkes, trenger du et nytt mål. Når den mislykkes, trenger du en ny taktikk. Marker skiftene tydelig: nytt taktikk, nytt mål, ny følelse: nytt scenebilde. Cohen, Robert. Acting One , 2. utg. Mayfield Publishing Company, 1992, s. 54–55, 191–199. Skjul ↑ Improvisasjon Keith Johnstone · Viola Spolin Vis Ja, og — aksepter det partneren tilbyr og bygg videre. Blokkering dreper scenen; aksept holder den i live Tilbud og blokkering — et tilbud er alt partneren gjør eller sier. Du kan akseptere, bygge, eller blokkere. Bevisst blokkering kan brukes — ukontrollert blokkering ødelegger Status — alle karakterer spiller høy eller lav status, og statusforhold endres konstant. Kroppen, blikket og tempoet viser status — ikke bare ordene Historien driver seg selv — ikke planlegg. La neste handling følge logisk av det som nettopp skjedde Spolin: teater som lek — «spill» ikke «arbeid». Tilstedevære"}, {"file": "skuespill.html", "id": "", "title": "Skuespillteknikker", "page": "Skuespillteknikker", "num": "06", "text": "g taktikkskifter Vis Analyser en scene i beats — enheter der skuespilleren bruker én taktikk. Når taktikken lykkes, trenger du et nytt mål. Når den mislykkes, trenger du en ny taktikk. Marker skiftene tydelig: nytt taktikk, nytt mål, ny følelse: nytt scenebilde. Cohen, Robert. Acting One , 2. utg. Mayfield Publishing Company, 1992, s. 54–55, 191–199. Skjul ↑ Improvisasjon Keith Johnstone · Viola Spolin Vis Ja, og — aksepter det partneren tilbyr og bygg videre. Blokkering dreper scenen; aksept holder den i live Tilbud og blokkering — et tilbud er alt partneren gjør eller sier. Du kan akseptere, bygge, eller blokkere. Bevisst blokkering kan brukes — ukontrollert blokkering ødelegger Status — alle karakterer spiller høy eller lav status, og statusforhold endres konstant. Kroppen, blikket og tempoet viser status — ikke bare ordene Historien driver seg selv — ikke planlegg. La neste handling følge logisk av det som nettopp skjedde Spolin: teater som lek — «spill» ikke «arbeid». Tilstedeværelse og problemløsning i øyeblikket Øvelse 1 — Ja, og Vis To spillere bygger en scene bare ved å akseptere og legge til. A: «Vi er på månen.» B: «Ja, og sanden er blå her.» A: «Ja, og den lukter sjokolade.» Ingen avvisning, ingen korreksjon — bare aksept og tillegg. Kjenn hvordan scenen lever av seg selv. Øvelse 2 — Statusspill Vis To spillere, én situasjon (f.eks. jobbintervju). A spiller høy status: langsom bevegelse, direkte blikk, pauser. B spiller lav status: hurtig, unngår blikk, avbryter seg selv. Bytt. Spill deretter en scene der statusene skifter midt i — hva utløser skiftet? Øvelse 3 — Tilbud og blokkering Vis Spill en kort scene der én spiller bevisst blokkerer alle tilbud: «Vi burde dra.» — «Nei.» / «Se, det er en ku!» — «Det er ikke en ku.» Kjenn frustrasjonen. Spill deretter samme scene med full aksept. Diskuter: hva skaper energi, hva dreper den? Skjul ↑ Det finnes mange andre teknikker og tilnærminger — blant annet Alba Technique, Practical Aesthetics, Jeff Coreys Method-baserte teknikker og Stella Adlers metode (fysiske handlinger). Utforsk, eksperimenter og finn din egen kombinasjon. → Mer om skuespillteknikk — blogg ↗ Ressurser Åpne videosamling — Råd til skuespilleren ↗ Finner ikke det du trenger? Søk i tilleggsmateriale — blogg ↗ ← Produksjon Kropp, stemme og bevegelse → © 2026 · Redaktør: Ren Powell"}, {"file": "skuespill.html", "id": "", "title": "Skuespillteknikker", "page": "Skuespillteknikker", "num": "06", "text": "-baserte teknikker og Stella Adlers metode (fysiske handlinger). Utforsk, eksperimenter og finn din egen kombinasjon. → Mer om skuespillteknikk — blogg ↗ Ressurser Åpne videosamling — Råd til skuespilleren ↗ Finner ikke det du trenger? Søk i tilleggsmateriale — blogg ↗ ← Produksjon Kropp, stemme og bevegelse → © 2026 · Redaktør: Ren Powell"}, {"file": "skuespill.html", "id": "stanislavski", "title": "Stanislavski-systemet", "page": "Skuespillteknikker", "num": "06", "text": "Stanislavski-systemet Konstantin Stanislavski Vis Indre motivasjon — hva vil karakteren? Emosjonell hukommelse som verktøy — senere forlot han dette til fordel for fysiske handlinger Fysiske handlinger — enkle, konkrete handlinger som utgangspunkt for emosjon, ikke omvendt Gitte omstendigheter — hvem, hva, hvor, når Magisk hvis — hva om jeg var i denne situasjonen? Spill handlingen, ikke emosjonen"}, {"file": "skuespill.html", "id": "ex-stan-penka", "title": "Rudolf Penkas fem spørsmål", "page": "Skuespillteknikker", "num": "06", "text": "Rudolf Penkas fem spørsmål Vis En videreutvikling av Stanislavskis system. Bruk disse spørsmålene til å analysere karakteren din ut fra teksten — svar med verb og konkrete handlinger, ikke følelsesord. Hvem er jeg? Hva gjør jeg? (bruk verb) Hvorfor gjør jeg det? (mål) Hvor? (de gitte omstendigheter) Når? (de ytterligere omstendigheter) Rudolf Penka — Tell Forlag (PDF) ↗"}, {"file": "skuespill.html", "id": "ex-stan-2", "title": "Øvelse 2 — Enkel handling", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 2 — Enkel handling Vis Velg én fysisk handling (helle vann, skrive et brev, lete etter noe). Gjør den med full konsentrasjon. La omgivelsene og situasjonen forme handlingen — ikke tankene om rollen. → Stanislavski-profil Skjul ↑"}, {"file": "skuespill.html", "id": "meisner", "title": "Meisner-teknikk", "page": "Skuespillteknikker", "num": "06", "text": "Meisner-teknikk Sanford Meisner Vis «Leve sant under imaginære omstendigheter» Repetisjonsøvelse — total oppmerksomhet på partneren Reaksjon er viktigere enn planlagt handling Ikke forbered — vær tilstede"}, {"file": "skuespill.html", "id": "ex-meis-1", "title": "Øvelse 1 — Repetisjonsøvelse", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Repetisjonsøvelse Vis To spillere. A observerer B og sier hva de ser: «Du ser til høyre.» B gjentar det tilbake: «Jeg ser til høyre.» Bytt. Ikke tenk — reager. Øvelsen varer til noe ekte skjer mellom dere. → Meisner-profil Skjul ↑"}, {"file": "skuespill.html", "id": "utahagen", "title": "Uta Hagen-metoden", "page": "Skuespillteknikker", "num": "06", "text": "Uta Hagen-metoden Uta Hagen Vis Substitusjon — bytt ut fiksjon med eget liv De ni spørsmålene som karakteranalyseverktøy Fysiske handlinger forankrer karakteren Objektøvelser — ekte gjenstander, ekte handlinger"}, {"file": "skuespill.html", "id": "ex-uta-ni", "title": "De ni spørsmålene", "page": "Skuespillteknikker", "num": "06", "text": "De ni spørsmålene Vis Hvem er jeg? Hva er tidspunktet? Hvor er jeg? Hva omgir meg? Hva er mitt forhold til de andre? Hva vil jeg? Hva er hindringen? Hva gjør jeg for å få det jeg vil? (bruk verb) Hva er den forutgående handlingen?"}, {"file": "skuespill.html", "id": "ex-uta-1", "title": "Øvelse 1 — Objektøvelse", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Objektøvelse Vis Velg tre ekte gjenstander fra din hverdag. Lag en scene på 2–3 minutter der du bruker dem med full konsentrasjon. Ingen publikum — bare deg og gjenstandene. Handlingen avslører karakteren. → Uta Hagen-profil Skjul ↑"}, {"file": "skuespill.html", "id": "brecht", "title": "Gestus", "page": "Skuespillteknikker", "num": "06", "text": "Gestus Bertolt Brecht Vis Gestus = holdning som viser sosial relasjon og makt Kroppen viser klassetilhørighet, ikke bare følelse Skuespilleren kommenterer rollen — forsvinner ikke inn i den Tydelig, lesbar bevegelse uten psykologisk tvetydighet"}, {"file": "skuespill.html", "id": "ex-brecht-1", "title": "Øvelse 1 — Status og kropp", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Status og kropp Vis Gå gjennom rommet. Tenk: hva er din karakter sin sosiale posisjon? Høy status, lav status? La kroppen vise det — ikke ansiktet. Bytt status midt i bevegelsen. Hva endrer seg? → Brecht-profil Skjul ↑"}, {"file": "skuespill.html", "id": "grotowski", "title": "Psykofysisk trening", "page": "Skuespillteknikker", "num": "06", "text": "Psykofysisk trening Grotowski / Barba · Odin Teatret Vis Kropp og psyke er uatskillelige — trening er alltid begge deler Via negativa — fjern hindringer, ikke legg til teknikker Langsom, presis bevegelse som kilde til nærvær Øvelser fra Odin Teatret: energiarbeid, tempo, rom Basert på Grotowski, videreutviklet av Barba og Odin Teatret"}, {"file": "skuespill.html", "id": "ex-grot-1", "title": "Øvelse 1 — Slow walk", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Slow walk Vis Gå ekstremt langsomt gjennom rommet. Hvert steg tar 10 sekunder. Kjenn vekten flytte seg fra hæl til tå. Stopp plutselig. Vent. Fortsett. Målet er fullstendig nærvær — ikke prestasjon. → Grotowski-profil Skjul ↑"}, {"file": "skuespill.html", "id": "lecoq", "title": "Lecoq-metoder", "page": "Skuespillteknikker", "num": "06", "text": "Lecoq-metoder Jacques Lecoq Vis Nøytral maske — nullpunkt, ingen karakter Dyranalyse — observer og legemliggjør dyrenes bevegelse og energi Le jeu (spillet) — oppdagelse gjennom lek og improvisasjon Melodrama, klovn, commedia — ulike spilleregistre"}, {"file": "skuespill.html", "id": "ex-lecoq-1", "title": "Øvelse 1 — Dyranalyse", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Dyranalyse Vis Velg et dyr. Observer det (video eller irl) i 10 minutter. Fokuser på: rytme, vekt, hvordan hodet beveger seg, tempo. Begynn med kroppen — ikke hodet. Gå gradvis fra dyr mot menneskelig figur."}, {"file": "skuespill.html", "id": "ex-lecoq-2", "title": "Øvelse 2 — Nøytral maske", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 2 — Nøytral maske Vis Sett på nøytral maske (eller lukk øynene og forestill deg det). Gå inn i rommet som om du ser det for første gang. Ingen følelser, ingen karakter. Bare tilstedeværelse og oppdagelse. → Lecoq-profil Skjul ↑"}, {"file": "skuespill.html", "id": "mchekhov", "title": "Michael Chekhov-teknikk", "page": "Skuespillteknikker", "num": "06", "text": "Michael Chekhov-teknikk Michael Chekhov Vis Imaginasjonsbasert — bruker fantasi og bilder fremfor personlig hukommelse Psykologisk gest (Psychological Gesture) — rollefigurens indre drivkraft uttrykkes gjennom en ekstern, fysisk gest som internaliseres i kroppen Atmosfære — rommet og situasjonen har en stemning som skuespilleren lever i og reagerer på Tempo staccato/legato — bevisst variasjon av rytme og flyt i bevegelse og tale «The body and its psychology are inseparable»"}, {"file": "skuespill.html", "id": "ex-mch-1", "title": "Øvelse 1 — Psykologisk gest", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Psykologisk gest Vis Tenk på hva rollefiguren din ønsker dypest sett. Finn en enkel, stor kroppsbevegelse som uttrykker dette — strekk mot noe, lukk deg inn, skyv noe vekk. Gjør bevegelsen fullt ut flere ganger. La den bli liten, intern. Spill scenen med den interne gesten som drivkraft."}, {"file": "skuespill.html", "id": "ex-mch-2", "title": "Øvelse 2 — Atmosfære", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 2 — Atmosfære Vis Velg to svært ulike atmosfærer for samme scene — for eksempel «tung, stille sorg» og «skjør, lysende glede». Spill scenen fullt ut i hver atmosfære. Legg merke til hvordan karakterens valg og tempo endres av rommet de lever i. → Michael Chekhov-profil Skjul ↑"}, {"file": "skuespill.html", "id": "gotesheet", "title": "GOTEsheet og beats", "page": "Skuespillteknikker", "num": "06", "text": "GOTEsheet og beats Robert Cohen Vis G oal — hva vil jeg egentlig ha, og når? O ther — hvem vil jeg ha det fra? Hvem hjelper, hvem hindrer? T actics — hvordan får jeg det jeg vil ha? Bruk verb, ikke følelsesord: true, lokke, sjarmere, ignorere — ikke være sint eller føle kjærlighet E xpectation — hvorfor forventer jeg å få det? Hva gjør jeg når jeg får det?"}, {"file": "skuespill.html", "id": "ex-gote-1", "title": "Øvelse 1 — GOTEsheet", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — GOTEsheet Vis Fyll ut bakgrunnsinformasjonen ved hjelp av Stanislavskis gitte omstendigheter eller Uta Hagens ni spørsmål (se disse teknikkene). Svar levende og konkret — bruk verb! Ikke følelsesord, ikke akademisk språk. Last ned GOTEsheet (PDF) ↗"}, {"file": "skuespill.html", "id": "ex-gote-2", "title": "Øvelse 2 — Beats og taktikkskifter", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 2 — Beats og taktikkskifter Vis Analyser en scene i beats — enheter der skuespilleren bruker én taktikk. Når taktikken lykkes, trenger du et nytt mål. Når den mislykkes, trenger du en ny taktikk. Marker skiftene tydelig: nytt taktikk, nytt mål, ny følelse: nytt scenebilde. Cohen, Robert. Acting One , 2. utg. Mayfield Publishing Company, 1992, s. 54–55, 191–199. Skjul ↑"}, {"file": "skuespill.html", "id": "impro", "title": "Improvisasjon", "page": "Skuespillteknikker", "num": "06", "text": "Improvisasjon Keith Johnstone · Viola Spolin Vis Ja, og — aksepter det partneren tilbyr og bygg videre. Blokkering dreper scenen; aksept holder den i live Tilbud og blokkering — et tilbud er alt partneren gjør eller sier. Du kan akseptere, bygge, eller blokkere. Bevisst blokkering kan brukes — ukontrollert blokkering ødelegger Status — alle karakterer spiller høy eller lav status, og statusforhold endres konstant. Kroppen, blikket og tempoet viser status — ikke bare ordene Historien driver seg selv — ikke planlegg. La neste handling følge logisk av det som nettopp skjedde Spolin: teater som lek — «spill» ikke «arbeid». Tilstedeværelse og problemløsning i øyeblikket"}, {"file": "skuespill.html", "id": "ex-impro-1", "title": "Øvelse 1 — Ja, og", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 1 — Ja, og Vis To spillere bygger en scene bare ved å akseptere og legge til. A: «Vi er på månen.» B: «Ja, og sanden er blå her.» A: «Ja, og den lukter sjokolade.» Ingen avvisning, ingen korreksjon — bare aksept og tillegg. Kjenn hvordan scenen lever av seg selv."}, {"file": "skuespill.html", "id": "ex-impro-2", "title": "Øvelse 2 — Statusspill", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 2 — Statusspill Vis To spillere, én situasjon (f.eks. jobbintervju). A spiller høy status: langsom bevegelse, direkte blikk, pauser. B spiller lav status: hurtig, unngår blikk, avbryter seg selv. Bytt. Spill deretter en scene der statusene skifter midt i — hva utløser skiftet?"}, {"file": "skuespill.html", "id": "ex-impro-3", "title": "Øvelse 3 — Tilbud og blokkering", "page": "Skuespillteknikker", "num": "06", "text": "Øvelse 3 — Tilbud og blokkering Vis Spill en kort scene der én spiller bevisst blokkerer alle tilbud: «Vi burde dra.» — «Nei.» / «Se, det er en ku!» — «Det er ikke en ku.» Kjenn frustrasjonen. Spill deretter samme scene med full aksept. Diskuter: hva skaper energi, hva dreper den? Skjul ↑ Det finnes mange andre teknikker og tilnærminger — blant annet Alba Technique, Practical Aesthetics, Jeff Coreys Method-baserte teknikker og Stella Adlers metode (fysiske handlinger). Utforsk, eksperimenter og finn din egen kombinasjon. → Mer om skuespillteknikk — blogg ↗ Ressurser Åpne videosamling — Råd til skuespilleren ↗ Finner ikke det du trenger? Søk i tilleggsmateriale — blogg ↗ ← Produksjon Kropp, stemme og bevegelse → © 2026 · Redaktør: Ren Powell function toggleTech(id, btn) { const el = documen"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Kropp, stemme og bevegelse — Teaterfag kompendium ← Kompendium Kropp, stemme og bevegelse ☀︎ ⌕ Søk 07 KROPP, STEMME OG BEVEGELSE Skuespillerens instrument i utvikling Til timene — bekledning og utstyr Vis Bevegelsesklassen er et praktisk fag der kroppen er redskapet. For at du skal kunne arbeide trygt, presist og fritt — og for at de rundt deg skal kunne gjøre det samme — er det noen enkle krav til hva du har på deg. Klær: løstsittende og uten harde detaljer. Glidelåser, knapper og knuter kan skade deg selv og andre under gulvarbeid og kroppskontakt — unngå disse. Ingen hettegenser eller løst vevde gensere — fingrene kan sette seg fast i stoffet og forårsake skader. Velg noe du faktisk kan bevege deg fritt i. Fottøy: barfot eller sklisokker. Du trenger direkte kontakt med underlaget for balanse, plassering og teknikk. Vanlige sokker glir. Sko begrenser. Bh: sports-bh uten spenne i ryggen. En spenne mot gulvet eller mot en annen person gjør vondt. Smykker: ingen. Ringer, øredobber, armbånd og kjeder hekter seg fast og lager skader — på deg selv og på andre. Hår: samlet og enkelt. Løst hår reduserer sikt og forstyrrer arbeidet. Dette er obligatorisk. Ikke fordi det er en regel for regelens skyld, men fordi bevegelsesarbeid krever det. Studenter som møter uforberedt kan ikke delta i timen. Begreper i teater og bevegelse Vis Kilde: Brustad, M. (2009). Teater og bevegelse . Oslo: Thalia Publishing, s. 128–129. Gest Vis En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen. Dynamikk Vis Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet. Komponere Vis Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere. Koreografi Vis Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi. Fra gest til koreografi Vis En bevegelsesfrase kan sammenlignes med en setning i språket — kort eller lang, med egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi . Grunnlag Vis Trening Fysisk og mental forberedelse Vis En skuespiller er sitt eget instrument. Ulike teatertradisjoner stiller ulike krav til kroppen — men alle forutsetter utholdenhet, kontroll og tilstedeværelse. Regelmessig trening gjør kroppen til et mer lydhørt og presist verktøy for scenisk uttrykk. Kondisjon (cardio) Vis Utholdenhet til å opprettholde energi og nærvær gjennom hele forestillinge"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "s, snakker vi også om å komponere. Koreografi Vis Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi. Fra gest til koreografi Vis En bevegelsesfrase kan sammenlignes med en setning i språket — kort eller lang, med egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi . Grunnlag Vis Trening Fysisk og mental forberedelse Vis En skuespiller er sitt eget instrument. Ulike teatertradisjoner stiller ulike krav til kroppen — men alle forutsetter utholdenhet, kontroll og tilstedeværelse. Regelmessig trening gjør kroppen til et mer lydhørt og presist verktøy for scenisk uttrykk. Kondisjon (cardio) Vis Utholdenhet til å opprettholde energi og nærvær gjennom hele forestillingen. Løping, sykling, svømming og dans er alle effektive. Mål: minst 150 min moderat kardio per uke. Styrke Vis Kjernemuskulatur, bein og overkropp. Styrke gir kontroll over kroppen som uttrykksverktøy — ikke for å se sterk ut, men for å kunne bære, løfte, falle og stå stødig under press. Pilates og kroppsvektøvelser er særlig relevante. Mobilitet Vis Bevegelsesutslag i ledd — ikke bare fleksibilitet (passiv), men aktiv kontroll gjennom hele bevegelsesrekkevidden. Yoga, dynamisk tøying og leddmobilisering er nyttig. Direkte knyttet til Feldenkrais og Lecoq-arbeid. Balanse Vis Evnen til å kontrollere kroppens tyngdepunkt. Sentralt i biomekanikk, Lecoq og kontaktimprovisasjon. Trenes gjennom énbensøvelser, ustabile underlag og langsomme bevegelser med full kontroll. Koordinasjon Vis Evnen til å koordinere ulike kroppsdeler presist og rytmisk. Trenes gjennom dans, slagverk og biomekanikk-etuder. Dissociasjon — uavhengig koordinasjon Vis Evnen til å bevege kroppsdeler uavhengig av hverandre — for eksempel at armene gjør forskjellige ting samtidig, eller at overkroppen beveger seg i en annen rytme enn underkroppen. Sentralt i biomekanikk og bevegelsesscore. Trenes gjennom polyrhythmiske øvelser og isolasjonsøvelser. Oppgaver og dokumentasjon av egentrening legges ut på Teams. Skjul ↑ Anatomi Skjelettet · Muskler · Diafragma Vis For å bruke kroppen bevisst som uttrykksverktøy må du forstå hvordan den faktisk fungerer. Kunnskap om anatomi gjør oppvarming, avspenning og teknikk mer meningsfull. Skjelettet Kroppens bærende struktur. Ledd er møtepunktene mellom bein — det er her bevegelse skjer. Nakke, skulder, hofte, kne og ankel er spesielt viktige for scenisk bevegelse. Bevisst bruk av leddene gir frihet og presisjon. Muskler og antagonister Skjelettmuskler jobber i par — når én trekker seg sammen (kontraksjon), må den motsatte slappe av. Denne motmuskelen kalles en antagonist . Kronisk spenning i én muskel hemmer antagonisten og begrenser bevegelsesfriheten i hele kroppen. "}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "— for eksempel at armene gjør forskjellige ting samtidig, eller at overkroppen beveger seg i en annen rytme enn underkroppen. Sentralt i biomekanikk og bevegelsesscore. Trenes gjennom polyrhythmiske øvelser og isolasjonsøvelser. Oppgaver og dokumentasjon av egentrening legges ut på Teams. Skjul ↑ Anatomi Skjelettet · Muskler · Diafragma Vis For å bruke kroppen bevisst som uttrykksverktøy må du forstå hvordan den faktisk fungerer. Kunnskap om anatomi gjør oppvarming, avspenning og teknikk mer meningsfull. Skjelettet Kroppens bærende struktur. Ledd er møtepunktene mellom bein — det er her bevegelse skjer. Nakke, skulder, hofte, kne og ankel er spesielt viktige for scenisk bevegelse. Bevisst bruk av leddene gir frihet og presisjon. Muskler og antagonister Skjelettmuskler jobber i par — når én trekker seg sammen (kontraksjon), må den motsatte slappe av. Denne motmuskelen kalles en antagonist . Kronisk spenning i én muskel hemmer antagonisten og begrenser bevegelsesfriheten i hele kroppen. Diafragma (mellomgulvet) En horisontal muskel som danner et skille mellom brystkasse og bukhule — som et kuppelformet gulv under ribbeina. I hvile hviler den i en kuppelform. Når den trekker seg sammen, flater den ut og trekker seg nedover. Dette skaper lavere lufttrykk i lungene, som trekker luft inn. Utpust er passivt — diafragma slapper av og kuppelformen gjenopprettes. Du kan ikke kjenne diafragma direkte, men du kan observere dens arbeid: magen og nedre ribben utvider seg utover når diafragma trekker seg ned og lager plass. Diafragma er både en frivillig og ufrivillig muskel — den arbeider automatisk, som hjertet. I teorien kan den påvirkes bevisst, men i praksis klarer svært få dette direkte. Det vi gjør i stedet er å spenne musklene i nedre del av magen for å «nudge» diafragma til å holde sin tonus og regulere utpusten. Spenning i diafragma er direkte knyttet til emosjonell spenning. Fascia Bindevevet som omslutter alle muskler og organer. Fascia overfører spenning gjennom hele kroppen — spenning i foten kan påvirke nakken. Langsom, bevisst bevegelse og avspenning løser opp fascia og gir dypere frihet. Viktige skjelettmuskler Vis Overkropp Muskel ↔ Antagonist Pectoralis major (brystmuskelen) ↔ Rhomboids (romboideus) Fører armen framover og innover Trekker skulderbladene inn mot ryggraden — viktig for holdning Deltoid (skuldermuskelen) ↔ Latissimus dorsi (brede ryggmuskelen) Løfter armen til siden, frem og bakover Fører armen bakover og nedover Trapezius (kappemuskelen) ↔ Levator scapulae Beveger skulderbladene opp, ned og bakover Hever skulderbladet, bøyer nakken til siden — ofte kronisk spent Rectus abdominis (rette magemuskelen) ↔ Erector spinae (ryggstrekkerne) Bøyer overkroppen framover Holder ryggraden oppreist — fundamentalt for all stående bevegelse Obliques (skrå magemuskler) ↔ Obliques — sin egen antagonist Bøyer og roterer overkroppen Ytre og indre obliques på motsatt side motvirker hverandre ved rotasjon Intercostales ytre (mellomribbemusklene) ↔ I"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "kroppen — spenning i foten kan påvirke nakken. Langsom, bevisst bevegelse og avspenning løser opp fascia og gir dypere frihet. Viktige skjelettmuskler Vis Overkropp Muskel ↔ Antagonist Pectoralis major (brystmuskelen) ↔ Rhomboids (romboideus) Fører armen framover og innover Trekker skulderbladene inn mot ryggraden — viktig for holdning Deltoid (skuldermuskelen) ↔ Latissimus dorsi (brede ryggmuskelen) Løfter armen til siden, frem og bakover Fører armen bakover og nedover Trapezius (kappemuskelen) ↔ Levator scapulae Beveger skulderbladene opp, ned og bakover Hever skulderbladet, bøyer nakken til siden — ofte kronisk spent Rectus abdominis (rette magemuskelen) ↔ Erector spinae (ryg ker stressnivået. Bruk dette rett før du går på scenen — eller når konsentrasjonen svikter i prøveprosessen. Energiregulering — hold etter innpust / utpust Vis Pust inn i 4 sekunder, hold i 8, pust ut i 4 — forleng holdet etter innpust for å øke energi og fokus. Aktiverende, bruk før du trenger å være skarp og tilstede. Omvendt: pust inn i 4, pust ut i 4, hold på tom i 8 — forleng holdet etter utpust for å roe ned og senke aktivering. Bruk når du er for spent eller overveldet. Vekselpust (Nadi Shodhana) Vis Lukk høyre nesebor med tommelen, pust inn gjennom venstre. Lukk venstre nesebor med ringfingeren, pust ut gjennom høyre. Pust inn gjennom høyre. Lukk høyre, pust ut gjennom venstre. Det er én runde. Gjenta 5–8 ganger. Balanserer nervesystemet og gir ro og konsentrasjon — god forberedelse til prøve eller forestilling. Skjul ↑ Mentale teknikker Psykisk utholdenhet · Prestasjonsforberedelse Vis Scenisk arbeid krever ikke bare fysisk beredskap — det krever mental tilstedeværelse, konsentrasjon og evnen til å håndtere press. Mentale teknikker er verktøy for å forberede seg psykisk, bygge opp igjen etter feil og opprettholde fokus gjennom hele prosessen. Visualisering Vis Gå gjennom forestillingen eller scenen i hodet før du går på scenen — se deg selv utføre handlingene presist og med energi. Idrettsutøvere bruker dette systematisk. For skuespillere kan det brukes til å forberede fysiske sekvenser, overganger og krevende øyeblikk. "}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": " for spent eller overveldet. Vekselpust (Nadi Shodhana) Vis Lukk høyre nesebor med tommelen, pust inn gjennom venstre. Lukk venstre nesebor med ringfingeren, pust ut gjennom høyre. Pust inn gjennom høyre. Lukk høyre, pust ut gjennom venstre. Det er én runde. Gjenta 5–8 ganger. Balanserer nervesystemet og gir ro og konsentrasjon — god forberedelse til prøve eller forestilling. Skjul ↑ Mentale teknikker Psykisk utholdenhet · Prestasjonsforberedelse Vis Scenisk arbeid krever ikke bare fysisk beredskap — det krever mental tilstedeværelse, konsentrasjon og evnen til å håndtere press. Mentale teknikker er verktøy for å forberede seg psykisk, bygge opp igjen etter feil og opprettholde fokus gjennom hele prosessen. Visualisering Vis Gå gjennom forestillingen eller scenen i hodet før du går på scenen — se deg selv utføre handlingene presist og med energi. Idrettsutøvere bruker dette systematisk. For skuespillere kan det brukes til å forberede fysiske sekvenser, overganger og krevende øyeblikk. Pre-performance ritual Vis Et fast ritual før fremføring — en bestemt rekkefølge av bevegelser, pust eller fokusøvelser som signaliserer til nervesystemet at nå begynner noe annet. Ritualet trenger ikke være langt — 2–3 minutter er nok. Det viktige er at det er konsistent og ditt eget. Reset etter feil Vis Alle gjør feil på scenen. Det avgjørende er ikke å unngå feil — det er å komme seg tilbake til tilstedeværelse raskt. Teknikk: pust ut fully, slipp skuldrene, returner fokus til partneren eller neste handling. Øv på reset i prøvene, ikke bare i forestillingen. Skjul ↑ Oppvarming og avspenning Smør leddene · Frigjør spenning Vis Hvorfor vi varmer opp Vis Vi varmer opp for å samle oss i øyeblikket — rette oppmerksomheten mot det sceniske arbeidet eller den sceniske leken vi skal utføre, og gjøre det uten å skade oss selv eller hverandre. Når adrenalinet er høyt er sjansen stor for at vi skader en muskel eller slår en medspiller med en ukontrollert bevegelse. Her er noen mål og eksempler på øvelser: Avspenning — eks: shakeroppvarming eller pusteøvelse Smøre leddene — eks: isolasjonsøvelse Gi bevissthet om spenninger, bevegelsesutslag, balanse og koordinasjon — eks: solhilsen Samle fokus og oppmerksomhet her og nå — eks: rytmeøvelse Kontakt og samspill — eks: vektdeling Øke pulsen — eks: corners Få opp energi — eks: dødende kakerlakke Stemmeoppvarming — eks: Rrmptiken Utforsk øvelser som passer til det sceniske arbeidet dere skal gjøre. → Videosamling — Oppvarming ↗ Noen andre øvelser Øvelse 1 — Leddoppvarming (10 min) Vis Stå med føttene i hoftebredde. Sirkulær bevegelse i anklene (begge retninger) → knær → hofter → ryggrad (bølge nedenfra og opp) → skuldre (frem og tilbake) → nakke (langsomt, unngå bakover). Avslutt med å riste kroppen løs fra topp til bunn. 8 ganger per ledd, begge retninger. Øvelse 2 — Gulvavspenning Vis Ligg på ryggen. Lukk øynene. Pust inn — spenn hele kroppen i 5 sekunder. Pust ut — slipp alt. Gjenta tre ganger. Deretter: gå gjennom kroppen fra"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "r på øvelser: Avspenning — eks: shakeroppvarming eller pusteøvelse Smøre leddene — eks: isolasjonsøvelse Gi bevissthet om spenninger, bevegelsesutslag, balanse og koordinasjon — eks: solhilsen Samle fokus og oppmerksomhet her og nå — eks: rytmeøvelse Kontakt og samspill — eks: vektdeling Øke pulsen — eks: corners Få opp energi — eks: dødende kakerlakke Stemmeoppvarming — eks: Rrmptiken Utforsk øvelser som passer til det sceniske arbeidet dere skal gjøre. → Videosamling — Oppvarming ↗ Noen andre øvelser Øvelse 1 — Leddoppvarming (10 min) Vis Stå med føttene i hoftebredde. Sirkulær bevegelse i anklene (begge retninger) → knær → hofter → ryggrad (bølge nedenfra og opp) → skuldre (frem og tilbake) → nakke (langsomt, unngå bakover). Avslutt med å riste kroppen løs fra topp til bunn. 8 ganger per ledd, begge retninger. Øvelse 2 — Gulvavspenning Vis Ligg på ryggen. Lukk øynene. Pust inn — spenn hele kroppen i 5 sekunder. Pust ut — slipp alt. Gjenta tre ganger. Deretter: gå gjennom kroppen fra føttene opp, bevisst slipp spenning i hvert område. Bli liggende i 2 minutter og kjenn vekten av kroppen mot gulvet. Øvelse 3 — Shakeroppvarming Vis Stå lett bøyd i knærne. Begynn å riste én fot raskt og lett mot gulvet. La ristingen spre seg opp gjennom legg, kne, lår, hofte, mage, bryst, armer, hender, nakke og hode. Hele kroppen rister. Hold i 60 sekunder. Stopp plutselig — stå stille og kjenn ettervirkningen. → Videosamling — Flere oppvarmingsøvelser ↗ Skjul ↑ Stemme Pust · Resonans · Artikulasjon Vis Stemmen er et fysisk instrument — ikke bare et kommunikasjonsverktøy. Den sitter i kroppen: støttet av pusten, formet av resonansrommene og kontrollert av muskler som kan trenes. En frigjort stemme er ikke nødvendigvis en høy stemme — det er en stemme uten unødvendig spenning. Pust og støtte Stemmen drives av luft. Diafragmatisk pust — der magen utvider seg utover ved innpust — gir mer luftvolum og kontroll enn brystpust. «Støtte» betyr at musklene i kjernen regulerer utpusten jevnt, slik at stemmen ikke mister kraft midt i en setning. Resonans Lyden lages i stemmebåndene, men formes av resonansrommene: brystet (dyp, varm klang), munnen og nakken (mellomregister), og masken — nesen og kinnbeina (lys, bærende klang). Ulike resonansrom gir ulike stemmefarger og brukes bevisst til karakterarbeid. Artikulasjon Tydelig uttale handler om aktiv bruk av lepper, tunge og kjeve — ikke om å snakke saktere. En slapp kjeve og en lat tunge gjør tekst uklar selv ved høyt volum. God artikulasjon er muskelarbeid. Projeksjon Projeksjon er ikke å skrike — det er å sende stemmen mot et punkt i rommet med støtte og resonans. Tenk «ut» heller enn «høyt». En projisert stemme når bakre rad uten å miste klang eller kontroll. Øvelse 1 — Pust og støtte Vis Ligg på ryggen med én hånd på magen. Pust inn gjennom nesen — magen skal løfte hånden, ikke brystet. Pust ut på en lang «ssss». Kjenn at magen synker jevnt mens du holder spenning i kjernen. Gjenta 5 ganger. Stå opp og prøv det samme ståe"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": " slik at stemmen ikke mister kraft midt i en setning. Resonans Lyden lages i stemmebåndene, men formes av resonansrommene: brystet (dyp, varm klang), munnen og nakken (mellomregister), og masken — nesen og kinnbeina (lys, bærende klang). Ulike resonansrom gir ulike stemmefarger og brukes bevisst til karakterarbeid. Artikulasjon Tydelig uttale handler om aktiv bruk av lepper, tunge og kjeve — ikke om å snakke saktere. En slapp kjeve og en lat tunge gjør tekst uklar selv ved høyt volum. God artikulasjon er muskelarbeid. Projeksjon Projeksjon er ikke å skrike — det er å sende stemmen mot et punkt i rommet med støtte og resonans. Tenk «ut» heller enn «høyt». En projisert stemme når bakre rad uten å miste klang eller kontroll. Øvelse 1 — Pust og støtte Vis Ligg på ryggen med én hånd på magen. Pust inn gjennom nesen — magen skal løfte hånden, ikke brystet. Pust ut på en lang «ssss». Kjenn at magen synker jevnt mens du holder spenning i kjernen. Gjenta 5 ganger. Stå opp og prøv det samme stående — magen ut ved innpust, kontrollert inn ved utpust på «ssss». Øvelse 2 — Utforsk resonansrommene Vis Begynn med å nynne (mmm) med munnen lukket. Kjenn vibrasjonen i leppene og nesen — dette er «masken». Åpne munnen sakte til en «maaah» og kjenn lyden flytte seg ned i munnen og nakken. Legg hånden på brystet og synk ned til en dyp «mmmm» — kjenn vibrasjonen i brystkassen. Gå opp og ned mellom disse tre registrene. Hvilket register kjenner du minst? Øvelse 3 — Artikulasjon Vis Tunge-twisters trener presisjon under press. Start sakte — tydlighet er viktigere enn hastighet. Øk tempoet gradvis. Eksempel: «Røde biler kjører raskt forbi røde porter». Prøv med overdrevet store lepper og tungebevegelser. Kjenn hvilke muskler som faktisk jobber. Gjenta med en tekst fra en scene du jobber med. Øvelse 4 — Projeksjon uten å skrike Vis Stå i den ene enden av rommet. Velg et punkt på den andre veggen — ikke et menneske, men et konkret punkt. Si en setning og «send» den til det punktet. Flytt deg gradvis lenger unna. Ikke hev stemmen — tenk at du øker støtten nedenfra. Hvis du begynner å spenne nakke og kjeve, er det et tegn på at du presser heller enn projiserer. Slipp kjeven og prøv igjen. Øvelse 5 — Stemme og følelse Vis Velg tre linjer fra en monolog. Si dem tre ganger: (1) med brystresonnans — tung, sakte, lav. (2) med maskeresonnans — lett, fremover, nesten syngende. (3) med ditt naturlige register. Hva forandrer seg i karakterens tilstand? Resonans er ikke bare teknikk — det er en inngangsdør til følelse. Stemmeoppvarming — videoer Selv om du bruker mikrofon på scenen, er stemmeoppvarming like viktig — mikrofonen forsterker stemmen din, men erstatter ikke bæreevne, resonans og kontroll. Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Skjul ↑ Feldenkrais-metoden Moshe Feldenkrais · 1904–1984 Vis Feldenkrais utviklet en metode basert på nevrologisk læring — ideen om at nervesystemet kan lære nye bevegelsesvaner gjennom langsom, leken utforskning. Metoden br"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "gradvis lenger unna. Ikke hev stemmen — tenk at du øker støtten nedenfra. Hvis du begynner å spenne nakke og kjeve, er det et tegn på at du presser heller enn projiserer. Slipp kjeven og prøv igjen. Øvelse 5 — Stemme og følelse Vis Velg tre linjer fra en monolog. Si dem tre ganger: (1) med brystresonnans — tung, sakte, lav. (2) med maskeresonnans — lett, fremover, nesten syngende. (3) med ditt naturlige register. Hva forandrer seg i karakterens tilstand? Resonans er ikke bare teknikk — det er en inngangsdør til følelse. Stemmeoppvarming — videoer Selv om du bruker mikrofon på scenen, er stemmeoppvarming like viktig — mikrofonen forsterker stemmen din, men erstatter ikke bæreevne, resonans og kontroll. Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Skjul ↑ Feldenkrais-metoden Moshe Feldenkrais · 1904–1984 Vis Feldenkrais utviklet en metode basert på nevrologisk læring — ideen om at nervesystemet kan lære nye bevegelsesvaner gjennom langsom, leken utforskning. Metoden brukes av skuespillere, dansere og musikere for å frigjøre kronisk spenning og oppdage nye bevegelsesmuligheter. Bevissthet gjennom bevegelse — gruppetimer der man utforsker bevegelse langsomt og uten anstrengelse Funksjonell integrasjon — individuell berøringsbasert arbeid Bevegelser gjøres så lett og lite som mulig — ikke så mye som mulig Spørsmålet er alltid: hva gjør du unødvendig? Hva kan du slippe? Direkte forbindelse til Lecoq og nøytral maske — nullstilling av kroppslige vaner Øvelse 1 — Minimal bevegelse Vis Sitt på en stol. Drei hodet sakte til høyre så langt det går — merk grensen. Kom tilbake til midten. Gjenta nå ti ganger, men gjør bevegelsen bare 10% av det du klarer — ekstremt lite. Etter ti ganger: drei til høyre igjen med full bevegelse. Hva har endret seg? Øvelse 2 — Gulvutforskning Vis Ligg på ryggen. Bøy knærne, føttene flat mot gulvet. Vipp bekkenet sakte bakover (korsryggen løfter seg litt) og fremover (korsryggen presses mot gulvet). Finn den mykeste, minste versjonen av denne bevegelsen. La den bli som en pust. 2 minutter. Ingen anstrengelse. Kilde: Feldenkrais, M. (1972). Awareness Through Movement . Harper & Row. Skjul ↑ Skapende metoder Vis Laban bevegelsesanalyse Rudolf Laban · 1879–1958 Vis Laban utviklet et system for å beskrive, analysere og variere bevegelse på tvers av alle stilarter og teknikker. Det er ikke en spillestil — det er et språk og et analyseverktøy som kan brukes på alt fra biomekanikk til kontaktimprovisasjon. Effort — Vekt Sterk (stor kraft, tyngde) ↔ Lett (minimal kraft, svevende) Effort — Tid Plutselig (akselerert, øyeblikkelig) ↔ Vedvarende (deselerert, flytende) Effort — Rom Direkte (rett mot målet, fokusert) ↔ Indirekte (buet, fleksibel rombruk) Effort — Flyt Bundet (kontrollert, kan stoppes) ↔ Fri (ukontrollert, vanskelig å stoppe) Kombinasjoner Sterk + plutselig + direkte = slag. Lett + vedvarende + indirekte = drømmende. Kombinasjonene gir karakterens kvalitet og kan brukes som bevegelsesscore. Øvelse 1 — Effort"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "onen av denne bevegelsen. La den bli som en pust. 2 minutter. Ingen anstrengelse. Kilde: Feldenkrais, M. (1972). Awareness Through Movement . Harper & Row. Skjul ↑ Skapende metoder Vis Laban bevegelsesanalyse Rudolf Laban · 1879–1958 Vis Laban utviklet et system for å beskrive, analysere og variere bevegelse på tvers av alle stilarter og teknikker. Det er ikke en spillestil — det er et språk og et analyseverktøy som kan brukes på alt fra biomekanikk til kontaktimprovisasjon. Effort — Vekt Sterk (stor kraft, tyngde) ↔ Lett (minimal kraft, svevende) Effort — Tid Plutselig (akselerert, øyeblikkelig) ↔ Vedvarende (deselerert, flytende) Effort — Rom Direkte (rett mot målet, fokusert) ↔ Indirekte (buet, fleksibel rombruk) Effort — Flyt Bundet (kontrollert, kan stoppes) ↔ Fri (ukontrollert, vanskelig å stoppe) Kombinasjoner Sterk + plutselig + direkte = slag. Lett + vedvarende + indirekte = drømmende. Kombinasjonene gir karakterens kvalitet og kan brukes som bevegelsesscore. Øvelse 1 — Effort-kontraster Vis Gå gjennom rommet med sterk vekt. Bytt til lett. Bytt til plutselig tid. Bytt til vedvarende. Kombiner: sterk + plutselig. Lett + vedvarende. Direkte + bundet. Indirekte + fri. Hva forteller hver kombinasjon om en karakter? Øvelse 2 — Karakteranalyse med Effort Vis Velg en rollefigur. Gi figuren to Effort-kvaliteter — f.eks. «sterk + direkte». Improviser en kort scene der du holder disse kvalitetene konsekvent. Bytt så til det motsatte (lett + indirekte). Hva endrer seg i karakteren? → Laban-profil i Teaterfornyere Kilde: Laban, R. & Lawrence, F.C. (1947). Effort . Macdonald & Evans. Skjul ↑ Lecoq-metoder Jacques Lecoq · 1921–1999 Vis Lecoq utviklet en pedagogikk basert på lek, observasjon og kroppslig oppdagelse. Utgangspunktet er alltid kroppen — ikke teksten. Sentralt er ideen om le jeu (spillet): en tilstand av åpen, leken tilstedeværelse der alt er mulig. Nøytral maske — nullpunktet. Ingen karakter, ingen historie. Kroppen er til stede i rommet uten agenda. Utgangspunktet for all bevegelse. Dyranalyse — observer et dyr i detalj: rytme, vekt, hvordan hodet beveger seg. Legemliggjør det gradvis — fra dyr mot menneskelig figur. Elementene — ild, vann, jord, luft. Hver har sin bevegelseskvalitet. Kroppen blir elementet. Melodrama, klovn, commedia — ulike spilleregistre med distinkte kroppslige logikker. Spenningsnivåer — Lecoq identifiserte sju nivåer av kroppslig spenning, fra total avslapning til maksimal intensitet. Hvert nivå gir en distinkt scenisk kvalitet og karaktertype. 20 bevegelser — Lecoq identifiserte 20 grunnleggende menneskelige bevegelser som all dramatisk handling springer ut av. Øvelse 1 — Nøytral maske Vis Lukk øynene. Forestill deg at du tar på en nøytral maske — ingen uttrykk, ingen karakter. Gå inn i rommet som om du ser det for første gang. Ingen mål, ingen karakter. Bare kroppen i rommet. Når noe fanger oppmerksomheten din — stopp. Se. Gå videre. Øvelse 2 — Elementene Vis Velg ett element: ild, vann, jord eller luft. Begynn m"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "punktet for all bevegelse. Dyranalyse — observer et dyr i detalj: rytme, vekt, hvordan hodet beveger seg. Legemliggjør det gradvis — fra dyr mot menneskelig figur. Elementene — ild, vann, jord, luft. Hver har sin bevegelseskvalitet. Kroppen blir elementet. Melodrama, klovn, commedia — ulike spilleregistre med distinkte kroppslige logikker. Spenningsnivåer — Lecoq identifiserte sju nivåer av kroppslig spenning, fra total avslapning til maksimal intensitet. Hvert nivå gir en distinkt scenisk kvalitet og karaktertype. 20 bevegelser — Lecoq identifiserte 20 grunnleggende menneskelige bevegelser som all dramatisk handling springer ut av. Øvelse 1 — Nøytral maske Vis Lukk øynene. Forestill deg at du tar på en nøytral maske — ingen uttrykk, ingen karakter. Gå inn i rommet som om du ser det for første gang. Ingen mål, ingen karakter. Bare kroppen i rommet. Når noe fanger oppmerksomheten din — stopp. Se. Gå videre. Øvelse 2 — Elementene Vis Velg ett element: ild, vann, jord eller luft. Begynn med å observere det i fantasien. Hvordan beveger det seg? Langsomt la kroppen begynne å adoptere elementets kvalitet — ikke illustrer det, bli det. 3 minutter per element. Øvelse 3 — Dyranalyse Vis Velg et dyr. Observer det på video i 10 minutter — fokuser på rytme, vekt, hodet, tempoet. Begynn med kroppen, ikke ansiktet. Gå gradvis fra dyr mot menneskelig figur. Hvem er dette mennesket som bærer dyrets kvalitet? Sju spenningsnivåer Vis Nivå 1 — Utmattet Total avslapning. Kroppen er nesten uten liv. Søvngjenger, halvdød. Nivå 2 — Økonomisk Minimal energi. Hverdagslig, nøytral tilstand. Ingen overdrivelse. Nivå 3 — Nøytral Den nøytrale maskens tilstand — åpen, til stede, klar for handling. Utgangspunktet. Nivå 4 — Besluttsom Besluttsomhet og fokus. Klar til å handle. Realistisk teater opererer ofte her. Nivå 5 — Overrasket Alarmert, intenst til stede. Klar til kamp eller flukt. Melodrama begynner her. Nivå 6 — Passionert Ekstrem spenning og intensitet. Tragedie og høydramatisk teater. Nivå 7 — Stivnet Total spenning — kroppen er frosset. Krise, sjokk, ekstase eller dødsfrykt. Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama. De 20 bevegelsene Vis Å balansere Å gå Å løpe Å hoppe Å klatre Å ligge ned Å sitte Å knele Å bøye seg Å trekke Å skyve Å løfte Å bære Å slå Å kaste Å fange Å snurre Å falle Å svinge Å stoppe Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama. → Lecoq-profil i Teaterfornyere Skjul ↑ Biomekanikk Vsevolod Meyerhold · 1874–1940 Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Utgangspunktet var taylorisme — vitenskapelig effektivisering av bevegelse — overført til skuespillerkunsten. Bevegelsen er organisert i en syklus av fire elementer som gjentas i enhver handling. Otkaz Forberedende motbevegelse. For å gå fremover lener du deg først bakover. For å slå ned løfter du armen først. Signaliserer intensjonen og samler energi. Posyl Selve utførelsen. «Støtet» — oppfyllelsen av bevegelsen som otkaz initierte. Tochka"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "vå 7 — Stivnet Total spenning — kroppen er frosset. Krise, sjokk, ekstase eller dødsfrykt. Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama. De 20 bevegelsene Vis Å balansere Å gå Å løpe Å hoppe Å klatre Å ligge ned Å sitte Å knele Å bøye seg Å trekke Å skyve Å løfte Å bære Å slå Å kaste Å fange Å snurre Å falle Å svinge Å stoppe Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama. → Lecoq-profil i Teaterfornyere Skjul ↑ Biomekanikk Vsevolod Meyerhold · 1874–1940 Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Utgangspunktet var taylorisme — vitenskapelig effektivisering av bevegelse — overført til skuespillerkunsten. Bevegelsen er organisert i en syklus av fire elementer som gjentas i enhver handling. Otkaz Forberedende motbevegelse. For å gå fremover lener du deg først bakover. For å slå ned løfter du armen først. Signaliserer intensjonen og samler energi. Posyl Selve utførelsen. «Støtet» — oppfyllelsen av bevegelsen som otkaz initierte. Tochka / Stoika Det endelige stoppet. Øyeblikket der handlingen fryses i en presis positur. Markerer avslutningen mens indre spenning opprettholdes. Tormoz Bevisst kontroll. Regulerer rytmen gjennom hele syklusen, forhindrer uklare bevegelser og sikrer at skuespilleren forblir herre over sin fysiske energi. Øvelse 1 — Motbevegelse Vis Før enhver bevegelse — begynn med en liten motbevegelse. Skal du rekke frem hånden? Trekk den først litt tilbake. Skal du gå fremover? Lent deg litt bakover. Gjør dette med alle handlinger i en hel scene. Legg merke til hvordan bevegelsen får mer energi og tydelighet. Øvelse 2 — Syklusen Vis Velg en enkel handling: å plukke opp noe fra gulvet. Gjør den med full syklus: otkaz (liten motbevegelse opp) → posyl (beveg deg ned) → tochka (stopp presist, hold spenningen) → tormoz (kontroller avslutningen). Gjenta til det sitter i kroppen. → Meyerhold-profil i Teaterfornyere Kilde: Leach, R. (1989). Vsevolod Meyerhold . Cambridge University Press. Skjul ↑ Contact Improvisation Steve Paxton · f. 1939 · USA Vis Contact Improvisation ble utviklet av Steve Paxton i 1972 og springer ut av Judson Dance Theater i New York — den samme tradisjonen som ga oss postmoderne dans og performancekunst. Formen er basert på den fysiske kontakten mellom to kropper og den kontinuerlige dialogen om vekt, balanse og retning. Kontaktpunktet mellom to kropper er utgangspunktet — bevegelsen oppstår der Vekt gis og tas — ingen leder permanent, ingen følger permanent Tyngdekraften er den tredje danseren Ingen forhåndsbestemt koreografi — alt skjer i øyeblikket Grunnleggende ferdigheter: rull, fall, gi vekt, ta imot vekt Krev alltid samtykke og tydelige rammer for fysisk kontakt Øvelse 1 — Vektgiving (intro) Vis To utøvere, rygg mot rygg. Lene seg sakte mot hverandre til begge gir litt vekt. Finn balansepunktet der begge støtter og støttes. Begynn å bevege deg langsomt — oppover, nedover, til sidene — uten å miste kontaktpunktet. 3 minutter stillhet. Øvelse 2 — Rullende kontak"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "visation Steve Paxton · f. 1939 · USA Vis Contact Improvisation ble utviklet av Steve Paxton i 1972 og springer ut av Judson Dance Theater i New York — den samme tradisjonen som ga oss postmoderne dans og performancekunst. Formen er basert på den fysiske kontakten mellom to kropper og den kontinuerlige dialogen om vekt, balanse og retning. Kontaktpunktet mellom to kropper er utgangspunktet — bevegelsen oppstår der Vekt gis og tas — ingen leder permanent, ingen følger permanent Tyngdekraften er den tredje danseren Ingen forhåndsbestemt koreografi — alt skjer i øyeblikket Grunnleggende ferdigheter: rull, fall, gi vekt, ta imot vekt Krev alltid samtykke og tydelige rammer for fysisk kontakt Øvelse 1 — Vektgiving (intro) Vis To utøvere, rygg mot rygg. Lene seg sakte mot hverandre til begge gir litt vekt. Finn balansepunktet der begge støtter og støttes. Begynn å bevege deg langsomt — oppover, nedover, til sidene — uten å miste kontaktpunktet. 3 minutter stillhet. Øvelse 2 — Rullende kontaktpunkt Vis To utøvere. Begynn med hånd mot hånd. La kontaktpunktet langsomt «rulle» fra hånd til underarm, skulder, rygg, hofte. Følg kontaktpunktet med hele kroppen. Bevegelsen oppstår av seg selv når du fokuserer på kontakten fremfor et resultat. Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Kilde: Novack, C.J. (1990). Sharing the Dance: Contact Improvisation and American Culture . University of Wisconsin Press. Skjul ↑ Viewpoints Anne Bogart & Tina Landau · SITI Company Vis Viewpoints er et sett med prinsipper for improvisasjon og komposisjon utviklet av Anne Bogart og Tina Landau, basert på koreograf Mary Overlie sitt arbeid. Systemet gir et felles vokabular for å snakke om og skape scenisk handling — tid, rom og bevegelse analyseres i ni separate «synsvinkler». Tempo Hastigheten på bevegelse og handling. Kan endres plutselig eller gradvis. Varighet Hvor lenge en handling, posisjon eller øyeblikk varer. Kinaestetisk respons Impulsiv, instinktiv reaksjon på det som skjer i rommet — ikke tenkt, men følt. Repetisjon Gjentagelse av en bevegelse, lyd eller handling — egen eller andres. Form Kroppens form i rommet — vinkler, kurver, rette linjer. Gesture Bevegelse som kommuniserer — atferdsbasert (hverdagslig) eller ekspressiv (teatral). Arkitektur Rommets fysiske strukturer — vegger, gulv, møbler, lys — og kroppens respons på dem. Romlig relasjon Avstand mellom kropper og objekter. Nærhet og distanse som dramaturgisk virkemiddel. Topografi Mønstrene bevegelse tegner i rommet — stier, kurver, konsentrasjoner. Øvelse 1 — Viewpoints-improvisasjon Vis Hele gruppen beveger seg i rommet i stillhet. Lærer roper ett viewpoint om gangen: «Tempo» — alle velger ett tempo og holder det. «Romlig relasjon» — legg merke til avstand til andre, juster bevisst. «Repetisjon» — finn én bevegelse og gjenta den. «Arkitektur» — la veggen, gulvet eller taket påvirke deg. Ingen ledelse — bare respons. Øvelse 2 — Kinaestetisk respons Vis To utøvere. A gjør en"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "ksjon på det som skjer i rommet — ikke tenkt, men følt. Repetisjon Gjentagelse av en bevegelse, lyd eller handling — egen eller andres. Form Kroppens form i rommet — vinkler, kurver, rette linjer. Gesture Bevegelse som kommuniserer — atferdsbasert (hverdagslig) eller ekspressiv (teatral). Arkitektur Rommets fysiske strukturer — vegger, gulv, møbler, lys — og kroppens respons på dem. Romlig relasjon Avstand mellom kropper og objekter. Nærhet og distanse som dramaturgisk virkemiddel. Topografi Mønstrene bevegelse tegner i rommet — stier, kurver, konsentrasjoner. Øvelse 1 — Viewpoints-improvisasjon Vis Hele gruppen beveger seg i rommet i stillhet. Lærer roper ett viewpoint om gangen: «Tempo» — alle velger ett tempo og holder det. «Romlig relasjon» — legg merke til avstand til andre, juster bevisst. «Repetisjon» — finn én bevegelse og gjenta den. «Arkitektur» — la veggen, gulvet eller taket påvirke deg. Ingen ledelse — bare respons. Øvelse 2 — Kinaestetisk respons Vis To utøvere. A gjør en bevegelse — B responderer instinktivt med en bevegelse (ikke tenkt, ikke logisk). A responderer på B. Ingen dialog, ingen koreografi. La responsen komme fra kroppen, ikke hodet. 5 minutter. Hva oppstår? Kilde: Bogart, A. & Landau, T. (2005). The Viewpoints Book . Theatre Communications
