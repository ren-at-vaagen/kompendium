 Group. Skjul ↑ Abstraherte handlinger En arbeidsmetode i utvikling av Ren ved Vågen VGS. Vis Alle som snakker, gestikulerer. Ikke fordi de er teatrale — men fordi kroppen er en del av språksystemet. Lingvistisk forskning viser at vi spontant bruker tre typer gester i kommunikasjon: Ikoniske gester Bevegelser som speiler fysiske egenskaper ved det vi beskriver. En liten avstand, en glatt overflate, en rask bevegelse. Metaforiske gester Bevegelser som representerer abstrakte begreper. Å veie to muligheter mot hverandre. Å skyve noe vekk. Å stable lag på lag. Det abstrakte får en kropp i rommet. Emblemer Gester med fast kulturell betydning. Et nikk. Et skuldertrekk. En løftet hånd. Det skjer noe interessant når disse gestene løsrives fra den konkrete situasjonen og gjentas: bevegelsen blir til en form som bærer mening i seg selv gjennom gjentakelse (Harrison & Ladewig, 2021). Det er det samme som skjer i scenisk arbeid. Forskning på kroppens rolle i læring viser dessuten at metaforiske gester lagrer seg annerledes enn ord alene — kroppens hukommelse og den språklige hukommelsen arbeider sammen når vi gjentar og gjenkaller, og bevegelsen forankrer ordet i kroppen, ikke bare i hodet (Repetto, Pedroli og Macedonia, 2017). Abstraherte handlinger bruker dette som utgangspunkt. Et abstrakt ord — «tyngde», «grense», «overgang» — gis som en score. Du møter ordet med alle tre gestetypene: ikonisk respons, metaforisk respons, emblem. Ikke for å illustrere ordet, men for å la kroppen finne sin relasjon til det. Fra dette materialet skapes scenisk bevegelse. Bevegelsen er ikke ordets oversettelse. Den er ordets sceniske partner. Øvelse 1 — Enkel Laban-score Vis Lærer gir en score på to Effort-kvali"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "t når disse gestene løsrives fra den konkrete situasjonen og gjentas: bevegelsen blir til en form som bærer mening i seg selv gjennom gjentakelse (Harrison & Ladewig, 2021). Det er det samme som skjer i scenisk arbeid. Forskning på kroppens rolle i læring viser dessuten at metaforiske gester lagrer seg annerledes enn ord alene — kroppens hukommelse og den språklige hukommelsen arbeider sammen når vi gjentar og gjenkaller, og bevegelsen forankrer ordet i kroppen, ikke bare i hodet (Repetto, Pedroli og Macedonia, 2017). Abstraherte handlinger bruker dette som utgangspunkt. Et abstrakt ord — «tyngde», «grense», «overgang» — gis som en score. Du møter ordet med alle tre gestetypene: ikonisk respons, metaforisk respons, emblem. Ikke for å illustrere ordet, men for å la kroppen finne sin relasjon til det. Fra dette materialet skapes scenisk bevegelse. Bevegelsen er ikke ordets oversettelse. Den er ordets sceniske partner. Øvelse 1 — Enkel Laban-score Vis Lærer gir en score på to Effort-kvaliteter — f.eks. «sterk · plutselig». Utøverne beveger seg gjennom rommet med disse kvalitetene i 2 minutter. Lærer bytter: «lett · vedvarende». Utøverne tilpasser seg umiddelbart. Avslutt med «direkte · bundet». Diskuter: hva «forteller» kroppen? Øvelse 2 — Ord og bevegelse parallelt Vis To utøvere. A beveger seg fritt i rommet. B sier ett ord hvert 10. sekund — abstrakte ord som «tyngde», «avstand», «vente», «horisont». A lar ordene påvirke bevegelsen uten å illustrere dem direkte. Bytt roller. Diskuter: når oppstod det noe mellom ord og bevegelse? Øvelse 3 — Gruppe-score Vis Hele gruppen beveger seg. Én utøver er «dirigent» og gir scoren gjennom sin egen kropp — ikke ord. De andre observerer og tilpasser sin bevegelse til dirigentens kvalitet. Ikke kopi — respons. Dirigenten skifter langsomt. Bytt dirigent hvert 2. minutt. Harrison, S. og Ladewig, S.H. «Recurrent gestures throughout bodies, languages, and cultural practices». Gesture 20:2 (2021), s. 153–179. John Benjamins. · Repetto, C., Pedroli, E. og Macedonia, M. «Enrichment Effects of Gestures and Pictures on Abstract Words in a Second Language». Frontiers in Psychology 8:2136 (2017). DOI: 10.3389/fpsyg.2017.02136 Skjul ↑ Teatralsk biomekanikk Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Biomekanikk for detaljer. Videosamling — Kropp og bevegelse ↗ Tilleggsmateriale — blogg ↗ ← Teaterfag kompendium ← Skuespillteknikker Etikk, grenser og det teatrale i hverdagen → © 2026 · Redaktør: Ren Powell"}, {"file": "bevegelse.html", "id": "", "title": "Kropp, stemme og bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": " C., Pedroli, E. og Macedonia, M. «Enrichment Effects of Gestures and Pictures on Abstract Words in a Second Language». Frontiers in Psychology 8:2136 (2017). DOI: 10.3389/fpsyg.2017.02136 Skjul ↑ Teatralsk biomekanikk Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Biomekanikk for detaljer. Videosamling — Kropp og bevegelse ↗ Tilleggsmateriale — blogg ↗ ← Teaterfag kompendium ← Skuespillteknikker Etikk, grenser og det teatrale i hverdagen → © 2026 · Redaktør: Ren Powell"}, {"file": "bevegelse.html", "id": "bv2-gest", "title": "Gest", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Gest Vis En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen."}, {"file": "bevegelse.html", "id": "bv2-dynamikk", "title": "Dynamikk", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Dynamikk Vis Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet."}, {"file": "bevegelse.html", "id": "bv2-komponere", "title": "Komponere", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Komponere Vis Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere."}, {"file": "bevegelse.html", "id": "bv2-koreografi", "title": "Koreografi", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Koreografi Vis Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi."}, {"file": "bevegelse.html", "id": "bv2-fragest", "title": "Fra gest til koreografi", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Fra gest til koreografi Vis En bevegelsesfrase kan sammenlignes med en setning i språket — kort eller lang, med egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi ."}, {"file": "bevegelse.html", "id": "trening", "title": "Trening", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Trening Fysisk og mental forberedelse Vis En skuespiller er sitt eget instrument. Ulike teatertradisjoner stiller ulike krav til kroppen — men alle forutsetter utholdenhet, kontroll og tilstedeværelse. Regelmessig trening gjør kroppen til et mer lydhørt og presist verktøy for scenisk uttrykk."}, {"file": "bevegelse.html", "id": "ex-tren-kondis", "title": "Kondisjon (cardio)", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Kondisjon (cardio) Vis Utholdenhet til å opprettholde energi og nærvær gjennom hele forestillingen. Løping, sykling, svømming og dans er alle effektive. Mål: minst 150 min moderat kardio per uke."}, {"file": "bevegelse.html", "id": "ex-tren-styrke", "title": "Styrke", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Styrke Vis Kjernemuskulatur, bein og overkropp. Styrke gir kontroll over kroppen som uttrykksverktøy — ikke for å se sterk ut, men for å kunne bære, løfte, falle og stå stødig under press. Pilates og kroppsvektøvelser er særlig relevante."}, {"file": "bevegelse.html", "id": "ex-tren-mobil", "title": "Mobilitet", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Mobilitet Vis Bevegelsesutslag i ledd — ikke bare fleksibilitet (passiv), men aktiv kontroll gjennom hele bevegelsesrekkevidden. Yoga, dynamisk tøying og leddmobilisering er nyttig. Direkte knyttet til Feldenkrais og Lecoq-arbeid."}, {"file": "bevegelse.html", "id": "ex-tren-balanse", "title": "Balanse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Balanse Vis Evnen til å kontrollere kroppens tyngdepunkt. Sentralt i biomekanikk, Lecoq og kontaktimprovisasjon. Trenes gjennom énbensøvelser, ustabile underlag og langsomme bevegelser med full kontroll."}, {"file": "bevegelse.html", "id": "ex-tren-koord", "title": "Koordinasjon", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Koordinasjon Vis Evnen til å koordinere ulike kroppsdeler presist og rytmisk. Trenes gjennom dans, slagverk og biomekanikk-etuder."}, {"file": "bevegelse.html", "id": "ex-tren-dissoc", "title": "Dissociasjon — uavhengig koordinasjon", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Dissociasjon — uavhengig koordinasjon Vis Evnen til å bevege kroppsdeler uavhengig av hverandre — for eksempel at armene gjør forskjellige ting samtidig, eller at overkroppen beveger seg i en annen rytme enn underkroppen. Sentralt i biomekanikk og bevegelsesscore. Trenes gjennom polyrhythmiske øvelser og isolasjonsøvelser. Oppgaver og dokumentasjon av egentrening legges ut på Teams. Skjul ↑"}, {"file": "bevegelse.html", "id": "anatomi", "title": "Anatomi", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Anatomi Skjelettet · Muskler · Diafragma Vis For å bruke kroppen bevisst som uttrykksverktøy må du forstå hvordan den faktisk fungerer. Kunnskap om anatomi gjør oppvarming, avspenning og teknikk mer meningsfull. Skjelettet Kroppens bærende struktur. Ledd er møtepunktene mellom bein — det er her bevegelse skjer. Nakke, skulder, hofte, kne og ankel er spesielt viktige for scenisk bevegelse. Bevisst bruk av leddene gir frihet og presisjon. Muskler og antagonister Skjelettmuskler jobber i par — når én trekker seg sammen (kontraksjon), må den motsatte slappe av. Denne motmuskelen kalles en antagonist . Kronisk spenning i én muskel hemmer antagonisten og begrenser bevegelsesfriheten i hele kroppen. Diafragma (mellomgulvet) En horisontal muskel som danner et skille mellom brystkasse og bukhule — "}, {"file": "bevegelse.html", "id": "muskel-alle", "title": "Viktige skjelettmuskler", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Viktige skjelettmuskler Vis Overkropp Muskel ↔ Antagonist Pectoralis major (brystmuskelen) ↔ Rhomboids (romboideus) Fører armen framover og innover Trekker skulderbladene inn mot ryggraden — viktig for holdning Deltoid (skuldermuskelen) ↔ Latissimus dorsi (brede ryggmuskelen) Løfter armen til siden, frem og bakover Fører armen bakover og nedover Trapezius (kappemuskelen) ↔ Levator scapulae Beveger skulderbladene opp, ned og bakover Hever skulderbladet, bøyer nakken til siden — ofte kronisk spent Rectus abdominis (rette magemuskelen) ↔ Erector spinae (ryggstrekkerne) Bøyer overkroppen framover Holder ryggraden oppreist — fundamentalt for all stående bevegelse Obliques (skrå magemuskler) ↔ Obliques — sin egen antagonist Bøyer og roterer overkroppen Ytre og indre obliques på motsatt side motv"}, {"file": "bevegelse.html", "id": "ex-anat-1", "title": "Øvelse 1 — Kjenn diafragma", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Kjenn diafragma Vis Legg én hånd på magen under navlen. Pust inn gjennom nesen — kjenn at hånden løftes. Pust ut — hånden senkes. Gjenta. Hvis hånden ikke beveger seg, eller brystet løfter seg i stedet, er pusten blokkert. Prøv å puste ned i hånden din."}, {"file": "bevegelse.html", "id": "ex-anat-2", "title": "Øvelse 2 — Kartlegg leddene", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Kartlegg leddene Vis Stå stille. Begynn med tærne og beveg deg langsomt oppover: tær, ankel, kne, hofte, ryggrad (ledd for ledd), skulder, albue, håndledd, fingre, nakke. Beveg hvert ledd isolert — sirkulære bevegelser. Legg merke til hvor det er stivt og hvor det er fritt. Skjul ↑"}, {"file": "bevegelse.html", "id": "pusteteknikker", "title": "Pusteteknikker", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Pusteteknikker Pust · Konsentrasjon · Energiregulering Vis Bevisst kontroll over pusten er et av de mest direkte verktøyene du har som utøver — det regulerer nervesystemet, påvirker energinivå og kobler kropp og tilstedeværelse. Den langsomme utpusten stimulerer vagusnerven — kroppens viktigste «roliggjøringsnerve» — og aktiverer det parasympatiske nervesystemet. Se også Anatomi: Diafragma og Stemme: Pust og støtte ."}, {"file": "bevegelse.html", "id": "ex-pust-diafragma", "title": "Diafragmatisk pust", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Diafragmatisk pust Vis Legg én hånd på magen under navlen. Pust inn gjennom nesen — kjenn at hånden løftes, ikke brystet. Pust ut — hånden senkes. Gjenta 5 ganger. Dette er grunnlaget for all sceneteknikk: stemme, nærvær og stressregulering starter her."}, {"file": "bevegelse.html", "id": "ex-pust-448", "title": "4-4-8 pust — beroligende", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "4-4-8 pust — beroligende Vis Pust inn i 4 sekunder, hold i 4, pust ut i 8. Gjenta 4 ganger. Den lange utpusten stimulerer vagusnerven og senker stressnivået. Bruk dette rett før du går på scenen — eller når konsentrasjonen svikter i prøveprosessen."}, {"file": "bevegelse.html", "id": "ex-pust-vishama", "title": "Energiregulering — hold etter innpust / utpust", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Energiregulering — hold etter innpust / utpust Vis Pust inn i 4 sekunder, hold i 8, pust ut i 4 — forleng holdet etter innpust for å øke energi og fokus. Aktiverende, bruk før du trenger å være skarp og tilstede. Omvendt: pust inn i 4, pust ut i 4, hold på tom i 8 — forleng holdet etter utpust for å roe ned og senke aktivering. Bruk når du er for spent eller overveldet."}, {"file": "bevegelse.html", "id": "ex-pust-nostril", "title": "Vekselpust (Nadi Shodhana)", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Vekselpust (Nadi Shodhana) Vis Lukk høyre nesebor med tommelen, pust inn gjennom venstre. Lukk venstre nesebor med ringfingeren, pust ut gjennom høyre. Pust inn gjennom høyre. Lukk høyre, pust ut gjennom venstre. Det er én runde. Gjenta 5–8 ganger. Balanserer nervesystemet og gir ro og konsentrasjon — god forberedelse til prøve eller forestilling. Skjul ↑"}, {"file": "bevegelse.html", "id": "mentale", "title": "Mentale teknikker", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Mentale teknikker Psykisk utholdenhet · Prestasjonsforberedelse Vis Scenisk arbeid krever ikke bare fysisk beredskap — det krever mental tilstedeværelse, konsentrasjon og evnen til å håndtere press. Mentale teknikker er verktøy for å forberede seg psykisk, bygge opp igjen etter feil og opprettholde fokus gjennom hele prosessen."}, {"file": "bevegelse.html", "id": "ex-ment-visual", "title": "Visualisering", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Visualisering Vis Gå gjennom forestillingen eller scenen i hodet før du går på scenen — se deg selv utføre handlingene presist og med energi. Idrettsutøvere bruker dette systematisk. For skuespillere kan det brukes til å forberede fysiske sekvenser, overganger og krevende øyeblikk."}, {"file": "bevegelse.html", "id": "ex-ment-ritual", "title": "Pre-performance ritual", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Pre-performance ritual Vis Et fast ritual før fremføring — en bestemt rekkefølge av bevegelser, pust eller fokusøvelser som signaliserer til nervesystemet at nå begynner noe annet. Ritualet trenger ikke være langt — 2–3 minutter er nok. Det viktige er at det er konsistent og ditt eget."}, {"file": "bevegelse.html", "id": "ex-ment-reset", "title": "Reset etter feil", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Reset etter feil Vis Alle gjør feil på scenen. Det avgjørende er ikke å unngå feil — det er å komme seg tilbake til tilstedeværelse raskt. Teknikk: pust ut fully, slipp skuldrene, returner fokus til partneren eller neste handling. Øv på reset i prøvene, ikke bare i forestillingen. Skjul ↑"}, {"file": "bevegelse.html", "id": "oppvarming", "title": "Oppvarming og avspenning", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Oppvarming og avspenning Smør leddene · Frigjør spenning Vis"}, {"file": "bevegelse.html", "id": "ex-opp-hvorfor", "title": "Hvorfor vi varmer opp", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Hvorfor vi varmer opp Vis Vi varmer opp for å samle oss i øyeblikket — rette oppmerksomheten mot det sceniske arbeidet eller den sceniske leken vi skal utføre, og gjøre det uten å skade oss selv eller hverandre. Når adrenalinet er høyt er sjansen stor for at vi skader en muskel eller slår en medspiller med en ukontrollert bevegelse. Her er noen mål og eksempler på øvelser: Avspenning — eks: shakeroppvarming eller pusteøvelse Smøre leddene — eks: isolasjonsøvelse Gi bevissthet om spenninger, bevegelsesutslag, balanse og koordinasjon — eks: solhilsen Samle fokus og oppmerksomhet her og nå — eks: rytmeøvelse Kontakt og samspill — eks: vektdeling Øke pulsen — eks: corners Få opp energi — eks: dødende kakerlakke Stemmeoppvarming — eks: Rrmptiken Utforsk øvelser som passer til det sceniske arbei"}, {"file": "bevegelse.html", "id": "ex-opp-1", "title": "Øvelse 1 — Leddoppvarming (10 min)", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Leddoppvarming (10 min) Vis Stå med føttene i hoftebredde. Sirkulær bevegelse i anklene (begge retninger) → knær → hofter → ryggrad (bølge nedenfra og opp) → skuldre (frem og tilbake) → nakke (langsomt, unngå bakover). Avslutt med å riste kroppen løs fra topp til bunn. 8 ganger per ledd, begge retninger."}, {"file": "bevegelse.html", "id": "ex-opp-2", "title": "Øvelse 2 — Gulvavspenning", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Gulvavspenning Vis Ligg på ryggen. Lukk øynene. Pust inn — spenn hele kroppen i 5 sekunder. Pust ut — slipp alt. Gjenta tre ganger. Deretter: gå gjennom kroppen fra føttene opp, bevisst slipp spenning i hvert område. Bli liggende i 2 minutter og kjenn vekten av kroppen mot gulvet."}, {"file": "bevegelse.html", "id": "ex-opp-3", "title": "Øvelse 3 — Shakeroppvarming", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 3 — Shakeroppvarming Vis Stå lett bøyd i knærne. Begynn å riste én fot raskt og lett mot gulvet. La ristingen spre seg opp gjennom legg, kne, lår, hofte, mage, bryst, armer, hender, nakke og hode. Hele kroppen rister. Hold i 60 sekunder. Stopp plutselig — stå stille og kjenn ettervirkningen. → Videosamling — Flere oppvarmingsøvelser ↗ Skjul ↑"}, {"file": "bevegelse.html", "id": "stemme", "title": "Stemme", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Stemme Pust · Resonans · Artikulasjon Vis Stemmen er et fysisk instrument — ikke bare et kommunikasjonsverktøy. Den sitter i kroppen: støttet av pusten, formet av resonansrommene og kontrollert av muskler som kan trenes. En frigjort stemme er ikke nødvendigvis en høy stemme — det er en stemme uten unødvendig spenning. Pust og støtte Stemmen drives av luft. Diafragmatisk pust — der magen utvider seg utover ved innpust — gir mer luftvolum og kontroll enn brystpust. «Støtte» betyr at musklene i kjernen regulerer utpusten jevnt, slik at stemmen ikke mister kraft midt i en setning. Resonans Lyden lages i stemmebåndene, men formes av resonansrommene: brystet (dyp, varm klang), munnen og nakken (mellomregister), og masken — nesen og kinnbeina (lys, bærende klang). Ulike resonansrom gir ulike stem"}, {"file": "bevegelse.html", "id": "ex-stemme-pust", "title": "Øvelse 1 — Pust og støtte", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Pust og støtte Vis Ligg på ryggen med én hånd på magen. Pust inn gjennom nesen — magen skal løfte hånden, ikke brystet. Pust ut på en lang «ssss». Kjenn at magen synker jevnt mens du holder spenning i kjernen. Gjenta 5 ganger. Stå opp og prøv det samme stående — magen ut ved innpust, kontrollert inn ved utpust på «ssss»."}, {"file": "bevegelse.html", "id": "ex-stemme-resonans", "title": "Øvelse 2 — Utforsk resonansrommene", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Utforsk resonansrommene Vis Begynn med å nynne (mmm) med munnen lukket. Kjenn vibrasjonen i leppene og nesen — dette er «masken». Åpne munnen sakte til en «maaah» og kjenn lyden flytte seg ned i munnen og nakken. Legg hånden på brystet og synk ned til en dyp «mmmm» — kjenn vibrasjonen i brystkassen. Gå opp og ned mellom disse tre registrene. Hvilket register kjenner du minst?"}, {"file": "bevegelse.html", "id": "ex-stemme-artikulasjon", "title": "Øvelse 3 — Artikulasjon", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 3 — Artikulasjon Vis Tunge-twisters trener presisjon under press. Start sakte — tydlighet er viktigere enn hastighet. Øk tempoet gradvis. Eksempel: «Røde biler kjører raskt forbi røde porter». Prøv med overdrevet store lepper og tungebevegelser. Kjenn hvilke muskler som faktisk jobber. Gjenta med en tekst fra en scene du jobber med."}, {"file": "bevegelse.html", "id": "ex-stemme-projeksjon", "title": "Øvelse 4 — Projeksjon uten å skrike", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 4 — Projeksjon uten å skrike Vis Stå i den ene enden av rommet. Velg et punkt på den andre veggen — ikke et menneske, men et konkret punkt. Si en setning og «send» den til det punktet. Flytt deg gradvis lenger unna. Ikke hev stemmen — tenk at du øker støtten nedenfra. Hvis du begynner å spenne nakke og kjeve, er det et tegn på at du presser heller enn projiserer. Slipp kjeven og prøv igjen."}, {"file": "bevegelse.html", "id": "ex-stemme-tekst", "title": "Øvelse 5 — Stemme og følelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 5 — Stemme og følelse Vis Velg tre linjer fra en monolog. Si dem tre ganger: (1) med brystresonnans — tung, sakte, lav. (2) med maskeresonnans — lett, fremover, nesten syngende. (3) med ditt naturlige register. Hva forandrer seg i karakterens tilstand? Resonans er ikke bare teknikk — det er en inngangsdør til følelse. Stemmeoppvarming — videoer Selv om du bruker mikrofon på scenen, er stemmeoppvarming like viktig — mikrofonen forsterker stemmen din, men erstatter ikke bæreevne, resonans og kontroll. Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Skjul ↑"}, {"file": "bevegelse.html", "id": "feldenkrais", "title": "Feldenkrais-metoden", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Feldenkrais-metoden Moshe Feldenkrais · 1904–1984 Vis Feldenkrais utviklet en metode basert på nevrologisk læring — ideen om at nervesystemet kan lære nye bevegelsesvaner gjennom langsom, leken utforskning. Metoden brukes av skuespillere, dansere og musikere for å frigjøre kronisk spenning og oppdage nye bevegelsesmuligheter. Bevissthet gjennom bevegelse — gruppetimer der man utforsker bevegelse langsomt og uten anstrengelse Funksjonell integrasjon — individuell berøringsbasert arbeid Bevegelser gjøres så lett og lite som mulig — ikke så mye som mulig Spørsmålet er alltid: hva gjør du unødvendig? Hva kan du slippe? Direkte forbindelse til Lecoq og nøytral maske — nullstilling av kroppslige vaner"}, {"file": "bevegelse.html", "id": "ex-feld-1", "title": "Øvelse 1 — Minimal bevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Minimal bevegelse Vis Sitt på en stol. Drei hodet sakte til høyre så langt det går — merk grensen. Kom tilbake til midten. Gjenta nå ti ganger, men gjør bevegelsen bare 10% av det du klarer — ekstremt lite. Etter ti ganger: drei til høyre igjen med full bevegelse. Hva har endret seg?"}, {"file": "bevegelse.html", "id": "ex-feld-2", "title": "Øvelse 2 — Gulvutforskning", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Gulvutforskning Vis Ligg på ryggen. Bøy knærne, føttene flat mot gulvet. Vipp bekkenet sakte bakover (korsryggen løfter seg litt) og fremover (korsryggen presses mot gulvet). Finn den mykeste, minste versjonen av denne bevegelsen. La den bli som en pust. 2 minutter. Ingen anstrengelse. Kilde: Feldenkrais, M. (1972). Awareness Through Movement . Harper & Row. Skjul ↑"}, {"file": "bevegelse.html", "id": "laban", "title": "Laban bevegelsesanalyse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Laban bevegelsesanalyse Rudolf Laban · 1879–1958 Vis Laban utviklet et system for å beskrive, analysere og variere bevegelse på tvers av alle stilarter og teknikker. Det er ikke en spillestil — det er et språk og et analyseverktøy som kan brukes på alt fra biomekanikk til kontaktimprovisasjon. Effort — Vekt Sterk (stor kraft, tyngde) ↔ Lett (minimal kraft, svevende) Effort — Tid Plutselig (akselerert, øyeblikkelig) ↔ Vedvarende (deselerert, flytende) Effort — Rom Direkte (rett mot målet, fokusert) ↔ Indirekte (buet, fleksibel rombruk) Effort — Flyt Bundet (kontrollert, kan stoppes) ↔ Fri (ukontrollert, vanskelig å stoppe) Kombinasjoner Sterk + plutselig + direkte = slag. Lett + vedvarende + indirekte = drømmende. Kombinasjonene gir karakterens kvalitet og kan brukes som bevegelsesscore."}, {"file": "bevegelse.html", "id": "ex-lab-1", "title": "Øvelse 1 — Effort-kontraster", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Effort-kontraster Vis Gå gjennom rommet med sterk vekt. Bytt til lett. Bytt til plutselig tid. Bytt til vedvarende. Kombiner: sterk + plutselig. Lett + vedvarende. Direkte + bundet. Indirekte + fri. Hva forteller hver kombinasjon om en karakter?"}, {"file": "bevegelse.html", "id": "ex-lab-2", "title": "Øvelse 2 — Karakteranalyse med Effort", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Karakteranalyse med Effort Vis Velg en rollefigur. Gi figuren to Effort-kvaliteter — f.eks. «sterk + direkte». Improviser en kort scene der du holder disse kvalitetene konsekvent. Bytt så til det motsatte (lett + indirekte). Hva endrer seg i karakteren? → Laban-profil i Teaterfornyere Kilde: Laban, R. & Lawrence, F.C. (1947). Effort . Macdonald & Evans. Skjul ↑"}, {"file": "bevegelse.html", "id": "lecoq", "title": "Lecoq-metoder", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Lecoq-metoder Jacques Lecoq · 1921–1999 Vis Lecoq utviklet en pedagogikk basert på lek, observasjon og kroppslig oppdagelse. Utgangspunktet er alltid kroppen — ikke teksten. Sentralt er ideen om le jeu (spillet): en tilstand av åpen, leken tilstedeværelse der alt er mulig. Nøytral maske — nullpunktet. Ingen karakter, ingen historie. Kroppen er til stede i rommet uten agenda. Utgangspunktet for all bevegelse. Dyranalyse — observer et dyr i detalj: rytme, vekt, hvordan hodet beveger seg. Legemliggjør det gradvis — fra dyr mot menneskelig figur. Elementene — ild, vann, jord, luft. Hver har sin bevegelseskvalitet. Kroppen blir elementet. Melodrama, klovn, commedia — ulike spilleregistre med distinkte kroppslige logikker. Spenningsnivåer — Lecoq identifiserte sju nivåer av kroppslig spenning, f"}, {"file": "bevegelse.html", "id": "ex-lecoq-1", "title": "Øvelse 1 — Nøytral maske", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Nøytral maske Vis Lukk øynene. Forestill deg at du tar på en nøytral maske — ingen uttrykk, ingen karakter. Gå inn i rommet som om du ser det for første gang. Ingen mål, ingen karakter. Bare kroppen i rommet. Når noe fanger oppmerksomheten din — stopp. Se. Gå videre."}, {"file": "bevegelse.html", "id": "ex-lecoq-2", "title": "Øvelse 2 — Elementene", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Elementene Vis Velg ett element: ild, vann, jord eller luft. Begynn med å observere det i fantasien. Hvordan beveger det seg? Langsomt la kroppen begynne å adoptere elementets kvalitet — ikke illustrer det, bli det. 3 minutter per element."}, {"file": "bevegelse.html", "id": "ex-lecoq-3", "title": "Øvelse 3 — Dyranalyse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 3 — Dyranalyse Vis Velg et dyr. Observer det på video i 10 minutter — fokuser på rytme, vekt, hodet, tempoet. Begynn med kroppen, ikke ansiktet. Gå gradvis fra dyr mot menneskelig figur. Hvem er dette mennesket som bærer dyrets kvalitet?"}, {"file": "bevegelse.html", "id": "ex-lecoq-tension", "title": "Sju spenningsnivåer", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Sju spenningsnivåer Vis Nivå 1 — Utmattet Total avslapning. Kroppen er nesten uten liv. Søvngjenger, halvdød. Nivå 2 — Økonomisk Minimal energi. Hverdagslig, nøytral tilstand. Ingen overdrivelse. Nivå 3 — Nøytral Den nøytrale maskens tilstand — åpen, til stede, klar for handling. Utgangspunktet. Nivå 4 — Besluttsom Besluttsomhet og fokus. Klar til å handle. Realistisk teater opererer ofte her. Nivå 5 — Overrasket Alarmert, intenst til stede. Klar til kamp eller flukt. Melodrama begynner her. Nivå 6 — Passionert Ekstrem spenning og intensitet. Tragedie og høydramatisk teater. Nivå 7 — Stivnet Total spenning — kroppen er frosset. Krise, sjokk, ekstase eller dødsfrykt. Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama."}, {"file": "bevegelse.html", "id": "ex-lecoq-20", "title": "De 20 bevegelsene", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "De 20 bevegelsene Vis Å balansere Å gå Å løpe Å hoppe Å klatre Å ligge ned Å sitte Å knele Å bøye seg Å trekke Å skyve Å løfte Å bære Å slå Å kaste Å fange Å snurre Å falle Å svinge Å stoppe Kilde: Lecoq, J. (2000). The Moving Body . Methuen Drama. → Lecoq-profil i Teaterfornyere Skjul ↑"}, {"file": "bevegelse.html", "id": "biomekanikk", "title": "Biomekanikk", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Biomekanikk Vsevolod Meyerhold · 1874–1940 Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Utgangspunktet var taylorisme — vitenskapelig effektivisering av bevegelse — overført til skuespillerkunsten. Bevegelsen er organisert i en syklus av fire elementer som gjentas i enhver handling. Otkaz Forberedende motbevegelse. For å gå fremover lener du deg først bakover. For å slå ned løfter du armen først. Signaliserer intensjonen og samler energi. Posyl Selve utførelsen. «Støtet» — oppfyllelsen av bevegelsen som otkaz initierte. Tochka / Stoika Det endelige stoppet. Øyeblikket der handlingen fryses i en presis positur. Markerer avslutningen mens indre spenning opprettholdes. Tormoz Bevisst kontroll. Regulerer rytmen gjennom hele syklusen, forhindrer uklare bevegelser o"}, {"file": "bevegelse.html", "id": "ex-bio-1", "title": "Øvelse 1 — Motbevegelse", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Motbevegelse Vis Før enhver bevegelse — begynn med en liten motbevegelse. Skal du rekke frem hånden? Trekk den først litt tilbake. Skal du gå fremover? Lent deg litt bakover. Gjør dette med alle handlinger i en hel scene. Legg merke til hvordan bevegelsen får mer energi og tydelighet."}, {"file": "bevegelse.html", "id": "ex-bio-2", "title": "Øvelse 2 — Syklusen", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Syklusen Vis Velg en enkel handling: å plukke opp noe fra gulvet. Gjør den med full syklus: otkaz (liten motbevegelse opp) → posyl (beveg deg ned) → tochka (stopp presist, hold spenningen) → tormoz (kontroller avslutningen). Gjenta til det sitter i kroppen. → Meyerhold-profil i Teaterfornyere Kilde: Leach, R. (1989). Vsevolod Meyerhold . Cambridge University Press. Skjul ↑"}, {"file": "bevegelse.html", "id": "contactimprov", "title": "Contact Improvisation", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Contact Improvisation Steve Paxton · f. 1939 · USA Vis Contact Improvisation ble utviklet av Steve Paxton i 1972 og springer ut av Judson Dance Theater i New York — den samme tradisjonen som ga oss postmoderne dans og performancekunst. Formen er basert på den fysiske kontakten mellom to kropper og den kontinuerlige dialogen om vekt, balanse og retning. Kontaktpunktet mellom to kropper er utgangspunktet — bevegelsen oppstår der Vekt gis og tas — ingen leder permanent, ingen følger permanent Tyngdekraften er den tredje danseren Ingen forhåndsbestemt koreografi — alt skjer i øyeblikket Grunnleggende ferdigheter: rull, fall, gi vekt, ta imot vekt Krev alltid samtykke og tydelige rammer for fysisk kontakt"}, {"file": "bevegelse.html", "id": "ex-ci-1", "title": "Øvelse 1 — Vektgiving (intro)", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Vektgiving (intro) Vis To utøvere, rygg mot rygg. Lene seg sakte mot hverandre til begge gir litt vekt. Finn balansepunktet der begge støtter og støttes. Begynn å bevege deg langsomt — oppover, nedover, til sidene — uten å miste kontaktpunktet. 3 minutter stillhet."}, {"file": "bevegelse.html", "id": "ex-ci-2", "title": "Øvelse 2 — Rullende kontaktpunkt", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Rullende kontaktpunkt Vis To utøvere. Begynn med hånd mot hånd. La kontaktpunktet langsomt «rulle» fra hånd til underarm, skulder, rygg, hofte. Følg kontaktpunktet med hele kroppen. Bevegelsen oppstår av seg selv når du fokuserer på kontakten fremfor et resultat. Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Se på YouTube ↗ Kilde: Novack, C.J. (1990). Sharing the Dance: Contact Improvisation and American Culture . University of Wisconsin Press. Skjul ↑"}, {"file": "bevegelse.html", "id": "viewpoints", "title": "Viewpoints", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Viewpoints Anne Bogart & Tina Landau · SITI Company Vis Viewpoints er et sett med prinsipper for improvisasjon og komposisjon utviklet av Anne Bogart og Tina Landau, basert på koreograf Mary Overlie sitt arbeid. Systemet gir et felles vokabular for å snakke om og skape scenisk handling — tid, rom og bevegelse analyseres i ni separate «synsvinkler». Tempo Hastigheten på bevegelse og handling. Kan endres plutselig eller gradvis. Varighet Hvor lenge en handling, posisjon eller øyeblikk varer. Kinaestetisk respons Impulsiv, instinktiv reaksjon på det som skjer i rommet — ikke tenkt, men følt. Repetisjon Gjentagelse av en bevegelse, lyd eller handling — egen eller andres. Form Kroppens form i rommet — vinkler, kurver, rette linjer. Gesture Bevegelse som kommuniserer — atferdsbasert (hverdagslig"}, {"file": "bevegelse.html", "id": "ex-vp-1", "title": "Øvelse 1 — Viewpoints-improvisasjon", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Viewpoints-improvisasjon Vis Hele gruppen beveger seg i rommet i stillhet. Lærer roper ett viewpoint om gangen: «Tempo» — alle velger ett tempo og holder det. «Romlig relasjon» — legg merke til avstand til andre, juster bevisst. «Repetisjon» — finn én bevegelse og gjenta den. «Arkitektur» — la veggen, gulvet eller taket påvirke deg. Ingen ledelse — bare respons."}, {"file": "bevegelse.html", "id": "ex-vp-2", "title": "Øvelse 2 — Kinaestetisk respons", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Kinaestetisk respons Vis To utøvere. A gjør en bevegelse — B responderer instinktivt med en bevegelse (ikke tenkt, ikke logisk). A responderer på B. Ingen dialog, ingen koreografi. La responsen komme fra kroppen, ikke hodet. 5 minutter. Hva oppstår? Kilde: Bogart, A. & Landau, T. (2005). The Viewpoints Book . Theatre Communications Group. Skjul ↑"}, {"file": "bevegelse.html", "id": "bevegelsesscore", "title": "Abstraherte handlinger", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Abstraherte handlinger En arbeidsmetode i utvikling av Ren ved Vågen VGS. Vis Alle som snakker, gestikulerer. Ikke fordi de er teatrale — men fordi kroppen er en del av språksystemet. Lingvistisk forskning viser at vi spontant bruker tre typer gester i kommunikasjon: Ikoniske gester Bevegelser som speiler fysiske egenskaper ved det vi beskriver. En liten avstand, en glatt overflate, en rask bevegelse. Metaforiske gester Bevegelser som representerer abstrakte begreper. Å veie to muligheter mot hverandre. Å skyve noe vekk. Å stable lag på lag. Det abstrakte får en kropp i rommet. Emblemer Gester med fast kulturell betydning. Et nikk. Et skuldertrekk. En løftet hånd. Det skjer noe interessant når disse gestene løsrives fra den konkrete situasjonen og gjentas: bevegelsen blir til en form som b"}, {"file": "bevegelse.html", "id": "ex-score-1", "title": "Øvelse 1 — Enkel Laban-score", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 1 — Enkel Laban-score Vis Lærer gir en score på to Effort-kvaliteter — f.eks. «sterk · plutselig». Utøverne beveger seg gjennom rommet med disse kvalitetene i 2 minutter. Lærer bytter: «lett · vedvarende». Utøverne tilpasser seg umiddelbart. Avslutt med «direkte · bundet». Diskuter: hva «forteller» kroppen?"}, {"file": "bevegelse.html", "id": "ex-score-2", "title": "Øvelse 2 — Ord og bevegelse parallelt", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 2 — Ord og bevegelse parallelt Vis To utøvere. A beveger seg fritt i rommet. B sier ett ord hvert 10. sekund — abstrakte ord som «tyngde», «avstand», «vente», «horisont». A lar ordene påvirke bevegelsen uten å illustrere dem direkte. Bytt roller. Diskuter: når oppstod det noe mellom ord og bevegelse?"}, {"file": "bevegelse.html", "id": "ex-score-3", "title": "Øvelse 3 — Gruppe-score", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Øvelse 3 — Gruppe-score Vis Hele gruppen beveger seg. Én utøver er «dirigent» og gir scoren gjennom sin egen kropp — ikke ord. De andre observerer og tilpasser sin bevegelse til dirigentens kvalitet. Ikke kopi — respons. Dirigenten skifter langsomt. Bytt dirigent hvert 2. minutt. Harrison, S. og Ladewig, S.H. «Recurrent gestures throughout bodies, languages, and cultural practices». Gesture 20:2 (2021), s. 153–179. John Benjamins. · Repetto, C., Pedroli, E. og Macedonia, M. «Enrichment Effects of Gestures and Pictures on Abstract Words in a Second Language». Frontiers in Psychology 8:2136 (2017). DOI: 10.3389/fpsyg.2017.02136 Skjul ↑"}, {"file": "bevegelse.html", "id": "bv2-biomekanikk", "title": "Teatralsk biomekanikk", "page": "Kropp, stemme og bevegelse", "num": "07", "text": "Teatralsk biomekanikk Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Biomekanikk for detaljer. Videosamling — Kropp og bevegelse ↗ Tilleggsmateriale — blogg ↗ ← Teaterfag kompendium ← Skuespillteknikker Etikk, grenser og det teatrale i hverdagen → © 2026 · Redaktør: Ren Powell function toggleGrp(id) { const el = document.getElementById(id); el.classList.toggle('open'); const btn = el.querySelector('.grp-header .vis-btn'); if (btn) btn.textContent = el.classList.contains('open') ? 'Skjul' : 'Vis'; } function toggleBegrep(id) { const el = document.getElementById(id); el.classList.toggle('open');"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Etikk, grenser og det teatrale i hverdagen — Teaterfag kompendium ← Kompendium Etikk, grenser og det teatrale i hverdagen ☀︎ ⌕ Søk 08 ETIKK, GRENSER OG DET TEATRALE I HVERDAGEN Identitet, politikk og provokasjon på scenen. Politisk teater Vis Politisk teater bruker scenen som arena for samfunnskritikk og endring. Det kjennetegnes av at formen og innholdet henger uatskillelig sammen — måten det fortelles på er like politisk som hva som fortelles. Politisk teater er ikke én ting — det arbeider på minst tre måter: Folket mot makten — agitprop, actos, forumteater, gateteater Makten mot folket — showprosesser, propaganda De skjulte stemmene — representasjon, dokumentarteater Folket mot makten Agitprop Ordet kommer fra «agitation og propaganda» og ble en formell del av den kommunistiske regjeringen i Sovjet etter revolusjonen. Forestillingene var flyttbare og ofte fremført i gatene — deklamatoriske, repetitive og direkte henvendt til arbeiderklassen. Formen nådde sitt høydepunkt på 1920-tallet. Vsevolod Meyerhold arbeidet med agitprop-teater som skulle gjenspeile oktoberrevolusjonen. Det var eksplisitt ikke-realistisk og i tjeneste for arbeiderklassen: skuespillerne skulle presentere — ikke representere — sine rollefigurer. Brecht tok dette direkte med seg videre. Se Meyerhold og Brecht . Kilde: Radical Revisions: Rereading 1930s Culture . Actos — El Teatro Campesino Grunnlagt i 1965 av Luis Valdez i California, blant mexicansk-amerikanske landarbeidere i UFW-streiken. Actos er korte, satiriske sketsjer — ikke agitprop i tradisjonell forstand, men teater laget av undertrykte for å styrke solidaritet. Forestillingene ble spilt på lastebilflak ute i åkrene, foran arbeiderne selv, uten scene, billetter eller teaterbygg. ↗ El Teatro Campesino ▶ YouTube: El Teatro Campesino Gateteater Fremført i offentlig rom — ikke for et invitert publikum, men for tilfeldig forbipasserende. Forestillingen må erobre oppmerksomheten. Gateteater er politisk i selve formen: det tar kunsten ut av de etablerte institusjonene og inn i hverdagslivet. ↗ Instagram: Stella Polaris (gateteater-eksempel) Forumteater Utviklet av Augusto Boal som del av «Theatre of the Oppressed». Publikum kan stoppe forestillingen og erstatte en skuespiller for å prøve ut alternative handlinger. Det er ikke primært et kunstverk, men et verktøy for sosial endring. Se Fordypning: Forumteater . Se også Grotowski — fattig teater . Rimini Protokoll Tysk konseptuelt teaterkollektiv (Helgard Haug, Stefan Kaegi, Daniel Wetzel). Kjent for å bruke «hverdagseksperter» — ikke-profesjonelle som opptrer som seg selv på scenen. En lastebilsjåfør forteller om livet på veien fra innsiden av en kjørende lastebil. Hundre tilfeldige innbyggere representerer en by statistisk. Publikum følger GPS-instruksjoner gjennom en fremmed by. Rimini Protokoll utfordrer spørsmålet om hvem som har rett til å fortelle — og hva som i det hele tatt er teater. Evros Walk Water (2015/2017) er bygget rundt John Cages stykke Water Walk (1959)"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": " de etablerte institusjonene og inn i hverdagslivet. ↗ Instagram: Stella Polaris (gateteater-eksempel) Forumteater Utviklet av Augusto Boal som del av «Theatre of the Oppressed». Publikum kan stoppe forestillingen og erstatte en skuespiller for å prøve ut alternative handlinger. Det er ikke primært et kunstverk, men et verktøy for sosial endring. Se Fordypning: Forumteater . Se også Grotowski — fattig teater . Rimini Protokoll Tysk konseptuelt teaterkollektiv (Helgard Haug, Stefan Kaegi, Daniel Wetzel). Kjent for å bruke «hverdagseksperter» — ikke-profesjonelle som opptrer som seg selv på scenen. En lastebilsjåfør forteller om livet på veien fra innsiden av en kjørende lastebil. Hundre tilfeldige innbyggere representerer en by statistisk. Publikum følger GPS-instruksjoner gjennom en fremmed by. Rimini Protokoll utfordrer spørsmålet om hvem som har rett til å fortelle — og hva som i det hele tatt er teater. Evros Walk Water (2015/2017) er bygget rundt John Cages stykke Water Walk (1959) og navnene på elven Evros — grensen mellom Hellas og Tyrkia, og en av Europas farligste flyktningruter. Tenåringer fra et flyktningmottak i Athen ble cast som utøvere. Publikum tar deres plass ved instrumentene og lytter til historiene deres på hodetelefoner mens musikken spilles om og om igjen. Siden forestillingen ble laget, har noen av tenåringene kommet seg til Sveits, Sverige og Danmark. Andre er fortsatt der. ↗ Rimini Protokoll: Evros Walk Water ▶ Vimeo: Rimini Protokoll ↗ Makten mot folket Showprosessen — rettssalen som scene «Russiske politiske rettssaker — historisk i Sovjetunionen og i den moderne russiske føderasjonen — har ofte fungert som politisk teater («showprosesser») designet for å konsolidere makt, eliminere opposisjon og håndheve ideologisk konformitet. Disse rettssakene kjennetegnes av forhåndsbestemte utfall, tvungne tilståelser og bruk av rettsvesenet som propaganda.» HowlRound Theatre Commons Rettssalen har alle teatrets elementer: en scene, skuespillere (tiltalte, dommere, aktor), et manus (tilståelsen) og et publikum av presse og folk. Men her er konsekvensene virkelige. Meyerhold skapte agitprop-teateret for revolusjonen. I 1939 ble han arrestert av den samme staten han hadde tjent, torturert til å tilstå og henrettet i 1940. Mannen som hadde brukt teater som politisk våpen ble selv et offer for statens politiske teater. Det er en av historiens mest bitre ironier. Showprosessen som form lever videre: forhåndsbestemte utfall, tvungne tilståelser, kameraer i rettssalen. Theatron — skueplassen — brukt ikke til frigjøring, men til kontroll. Propaganda og kunst — Taking Sides Statlig propaganda trenger ikke alltid en rettsal. Noen ganger er det nok med en konsertsal. Wilhelm Furtwängler var Tysklands mest berømte dirigent — og han ble værende i Nazi-Tyskland gjennom hele krigen. Han dirigerte på Hitlers fødselsdag. Han ledet Berlin Filharmonikerne mens jødiske musikere ble forvist. Etter krigen ble han avhørt av en amerikansk offiser om hvorvi"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "lte, dommere, aktor), et manus (tilståelsen) og et publikum av presse og folk. Men her er konsekvensene virkelige. Meyerhold skapte agitprop-teateret for revolusjonen. I 1939 ble han arrestert av den samme staten han hadde tjent, torturert til å tilstå og henrettet i 1940. Mannen som hadde brukt teater som politisk våpen ble selv et offer for statens politiske teater. Det er en av historiens mest bitre ironier. Showprosessen som form lever videre: forhåndsbestemte utfall, tvungne tilståelser, kameraer i rettssalen. Theatron — skueplassen — brukt ikke til frigjøring, men til kontroll. Propaganda og kunst — Taking Sides Statlig propaganda trenger ikke alltid en rettsal. Noen ganger er det nok med en konsertsal. Wilhelm Furtwängler var Tysklands mest berømte dirigent — og han ble værende i Nazi-Tyskland gjennom hele krigen. Han dirigerte på Hitlers fødselsdag. Han ledet Berlin Filharmonikerne mens jødiske musikere ble forvist. Etter krigen ble han avhørt av en amerikansk offiser om hvorvidt han hadde vært en propagandist for regimet. Ronald Harwoods skuespill Taking Sides (1995) dramatiserer dette avhøret. Spørsmålet stykket stiller, er ikke enkelt: kan stor kunst skilles fra den politiske konteksten den ble skapt i? Kan en kunstner skyve seg inn i rommet mellom makten og kulturens ødeleggelse og kalle det motstand? Det politiske teateret er ikke musikken — det er selve handlingen å stille seg på scenen for makten. Statlig bruk av prestisjekultur som selvfremstilling er ikke unikt for autoritære regimer: sovjetiske parader, nordkoreanske massespill, amerikanske militærparader og halftime-show, 4. juli-feiring med fyrverkeri — teatralitetens verktøy brukt bevisst for å skape et bilde av kraft, enhet og nasjonal identitet. Riefenstahls Triumph des Willens (1935) er det mest rendyrkede eksemplet, men mekanismen er universell. ▶ YouTube: Taking Sides De skjulte stemmene Representasjon Representasjon på scenen handler ikke bare om estetikk — det er et politisk spørsmål: hvem er synlig, hvem har stemme, og hvems historier blir fortalt? Representasjon — Kathleen Gallagher (blogg, engelsk) ↗ Dokumentarteater Klikk på de tre prikkene for å velge fullskjerm. All of Us — Francesca Martinez Francesca Martinez er skuespiller, komiker og forfatter med cerebral parese — hun foretrekker selv ordet «wobbly». Hennes debutstykke All of Us (National Theatre, London, 2022) handler om Jess, en terapeut med cerebral parese som mister stønadsrettighetene sine som følge av britiske nedskjæringspolitikk. Mange av skuespillerne i stykket har selv funksjonsvariasjoner. Stykket er ikke bare om funksjonshemming. Det handler om alle formene for usynliggjøring som virker samtidig: klasse, seksuell identitet, økonomi. En av hovedpersonene er lesbisk, og stykket viser hvordan sosiale privilegier — eller mangelen på dem — bestemmer hvem som har råd til å ha en kropp som ikke passer inn i systemets kategorier. I andre akt åpner stykket seg mot det offentlige rommet: et politisk presse"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "m er synlig, hvem har stemme, og hvems historier blir fortalt? Representasjon — Kathleen Gallagher (blogg, engelsk) ↗ Dokumentarteater Klikk på de tre prikkene for å velge fullskjerm. All of Us — Francesca Martinez Francesca Martinez er skuespiller, komiker og forfatter med cerebral parese — hun foretrekker selv ordet «wobbly». Hennes debutstykke All of Us (National Theatre, London, 2022) handler om Jess, en terapeut med cerebral parese som mister stønadsrettighetene sine som følge av britiske nedskjæringspolitikk. Mange av skuespillerne i stykket har selv funksjonsvariasjoner. Stykket er ikke bare om funksjonshemming. Det handler om alle formene for usynliggjøring som virker samtidig: klasse, seksuell identitet, økonomi. En av hovedpersonene er lesbisk, og stykket viser hvordan sosiale privilegier — eller mangelen på dem — bestemmer hvem som har råd til å ha en kropp som ikke passer inn i systemets kategorier. I andre akt åpner stykket seg mot det offentlige rommet: et politisk pressemøte, protestaksjoner, en konfrontasjon mellom den private historien og det politiske systemet som har skapt den. Det er teater som gjør det usynlige synlig — og som insisterer på at det angår alle. ↗ National Theatre: All of Us Skjul ↑ Det tomme rommet har alltid vært Vis Peter Brook åpnet Det tomme rom (1968) med en enkel påstand: et tomt rom er alt som trengs. En person krysser det, en annen ser på — og teateret har oppstått. Ingen bygning, ingen institusjon, ingen tekst. Bare en utøver og et vitne. Det Brook beskrev som en oppdagelse, viste seg å være en bekreftelse. Da Schechner, Grotowski og andre reiste verden rundt for å lære av andre kulturer, fant de tradisjoner som hadde eksistert i tusenvis av år — rike, sofistikerte og fullt utviklede, uten at de noen gang hadde trengt et teatron. Noen bruker begrepet urteater om disse tradisjonene — performance i sin «opprinnelige» form. Det er et begrep som kan åpne noe, men det er omdiskutert: Schechners tilnærming til ikke-vestlige ritualer som kilde for vestlig teater ble kritisert av blant andre Rustom Bharucha, som i Theatre and the World (1993) argumenterte for at praksisen reflekterer en eurosentrisk appropriasjon. Debatten er ikke avsluttet, og Schechner selv har forsvart sitt syn. Men spørsmålet den reiser er relevant: disse tradisjonene er fullverdige uttrykksformer på egne premisser — ikke råmateriale for vestlig fornyelse. Selve ordet teater kommer fra det greske theatron — stedet man ser fra. I den forstand har disse tradisjonene alltid vært teater: overalt hvor noen ser på noen andre som gjør noe, finnes et theatron. Det er den samme logikken som ligger til grunn for funnet rom og promenadeteater i dag. Brook, P. (1968). The Empty Space . MacGibbon & Kee. · Se Brook i Teaterfornyere . Gerewol — Wodaabe, Sahel Wodaabe-mennene danser, synger og viser tennene og hvitene av øynene i dagevis for å bli valgt av kvinner som dommere. Det finnes ingen scene og ingen publikum i vestlig forstand, og likevel er dett"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "ualer som kilde for vestlig teater ble kritisert av blant andre Rustom Bharucha, som i Theatre and the World (1993) argumenterte for at praksisen reflekterer en eurosentrisk appropriasjon. Debatten er ikke avsluttet, og Schechner selv har forsvart sitt syn. Men spørsmålet den reiser er relevant: disse tradisjonene er fullverdige uttrykksformer på egne premisser — ikke råmateriale for vestlig fornyelse. Selve ordet teater kommer fra det greske theatron — stedet man ser fra. I den forstand har disse tradisjonene alltid vært teater: overalt hvor noen ser på noen andre som gjør noe, finnes et theatron. Det er den samme logikken som ligger til grunn for funnet rom og promenadeteater i dag. Brook, P. (1968). The Empty Space . MacGibbon & Kee. · Se Brook i Teaterfornyere . Gerewol — Wodaabe, Sahel Wodaabe-mennene danser, synger og viser tennene og hvitene av øynene i dagevis for å bli valgt av kvinner som dommere. Det finnes ingen scene og ingen publikum i vestlig forstand, og likevel er dette en av de mest gjennomarbeidede og kulturelt forankrede performance-tradisjonene i verden. Performeren iscenesetter seg selv bokstavelig talt. Kukeri — Bulgaria En gammel bulgarsk masketradisjon der familier kler seg i dyreskinn og store bjeller og driver onde ånder på flukt gjennom landsbyene. Her er skillet mellom utøver og publikum i stor grad oppløst — familien performerer som gruppe, for og med hverandre. Ritualet markerer overgangen mellom vinter og vår og er fortsatt en levende praksis. ↗ Nowness: Kukeri — Bulgaria Samisk runebommeseremoni Noaiden (sjamanen) bruker runebommen til å reise mellom verdener — en rituell performance med kropp, lyd og tilstedeværelse som kjernen. En levende norsk urfolkstradisjon. SNL: Noaidi ↗ SNL: Runebomme ↗ Sun Dance — Plains-stammer, Nord-Amerika En sentral seremoni for mange Plains-stammer som involverer faste, dans og fysisk dedikasjon som bønn for fellesskapet. Grensen mellom deltaker og vitne er ikke alltid tydelig — det å være til stede er i seg selv en form for deltakelse. Av respekt for seremoniens hellighet og at den er en levende praksis, finnes det ikke lenker eller videoer her. Kilde: Holler, C. Black Elk's Religion: The Sun Dance and Lakota Catholicism . · Smithsonian National Museum of the American Indian: americanindian.si.edu ↗ Når skillet mellom utøver og publikum ikke bare viskes ut, men aldri har eksistert som kategori, nærmer vi oss det Grotowski kalte parateater — en praksis han identifiserte og navnga som kunstform i vestlig forstand. Se Grotowski i Teaterfornyere . Skjul ↑ Iscenesettelse av selvet Vis «Iscenesettelse av selvet» kan bety to ting — og begge er teatrale i sin kjerne. Å speile samfunnet En kultur kan iscenesette seg selv på scenen — ikke bare for å underholde, men for å vise frem det den ønsker å tro om seg selv, eller det den ikke tør si høyt på andre arenaer. Da Pierre-Augustin Caron de Beaumarchais satte Le Mariage de Figaro opp i Paris i 1784, satte han droit du seigneur i sentrum av han"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "i seg selv en form for deltakelse. Av respekt for seremoniens hellighet og at den er en levende praksis, finnes det ikke lenker eller videoer her. Kilde: Holler, C. Black Elk's Religion: The Sun Dance and Lakota Catholicism . · Smithsonian National Museum of the American Indian: americanindian.si.edu ↗ Når skillet mellom utøver og publikum ikke bare viskes ut, men aldri har eksistert som kategori, nærmer vi oss det Grotowski kalte parateater — en praksis han identifiserte og navnga som kunstform i vestlig forstand. Se Grotowski i Teaterfornyere . Skjul ↑ Iscenesettelse av selvet Vis «Iscenesettelse av selvet» kan bety to ting — og begge er teatrale i sin kjerne. Å speile samfunnet En kultur kan iscenesette seg selv på scenen — ikke bare for å underholde, men for å vise frem det den ønsker å tro om seg selv, eller det den ikke tør si høyt på andre arenaer. Da Pierre-Augustin Caron de Beaumarchais satte Le Mariage de Figaro opp i Paris i 1784, satte han droit du seigneur i sentrum av handlingen. Kongen forsøkte å forby stykket i årevis. Da det endelig ble oppført, var publikum henrykt og rasende på samme tid. Napoleon skal senere ha sagt at stykket var «revolusjonen allerede i gang» (tilskrevet Napoleon Bonaparte) . Teateret hadde sagt det samfunnet ennå ikke var i stand til å vedta som lov. Se også Representasjon og dokumentarteater . Å spille seg selv Vi iscenesetter oss selv hele tiden. Vi velger klær, stemme og atferd etter kontekst: hjemme, på skolen, med venner, i jobbintervjuet, på første date, i begravelsen. Det er ikke uærlighet — det er en grunnleggende menneskelig kapasitet. Sosiologen Erving Goffman beskrev i The Presentation of Self in Everyday Life (1959) hverdagslivet som en slags forestilling: vi «spiller roller», styrer inntrykk og tilpasser oss ulike «scener». Front stage er der vi opptrer for andre. Back stage er der vi slipper masken. De samme elementene er til stede som i teateret — men scenen er hverdagen. Filosofen Judith Butler tok dette videre med begrepet performativity : identitet er ikke noe vi har, men noe vi gjentatte ganger gjør . Vi handler ikke ut fra et ferdig selv — vi skaper selvet gjennom handlingen. Gender Trouble (1990). En konkret inngang til disse ideene: In & Of Itself av Derek DelGaudio — en forestilling om identitet, magi og det å bli sett. Forestillingen handler om å se og bli sett — og om hvordan din egen fortelling om hvem du er kolliderer med andres fortellinger om deg som du aldri fikk skrive selv. NPR, 2021. NPR: In & Of Itself — A Study of Identity and Magic ↗ Dette er også kjernen i mye moderne skuespillertrening: du gjør en karakter, du er den ikke. Schechners «restored behavior» peker i samme retning — all atferd er innøvd og repetert, aldri helt original. Vi siterer atferd vi har lært. Se Schechner . Metateater i hverdagen Begrepet metateater ble myntet av den amerikanske kritikeren Lionel Abel i Metatheatre: A New View of Dramatic Form (1963). Han brukte det om stykker som er selvbevisste — so"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": " med begrepet performativity : identitet er ikke noe vi har, men noe vi gjentatte ganger gjør . Vi handler ikke ut fra et ferdig selv — vi skaper selvet gjennom handlingen. Gender Trouble (1990). En konkret inngang til disse ideene: In & Of Itself av Derek DelGaudio — en forestilling om identitet, magi og det å bli sett. Forestillingen handler om å se og bli sett — og om hvordan din egen fortelling om hvem du er kolliderer med andres fortellinger om deg som du aldri fikk skrive selv. NPR, 2021. NPR: In & Of Itself — A Study of Identity and Magic ↗ Dette er også kjernen i mye moderne skuespillertrening: du gjør en karakter, du er den ikke. Schechners «restored behavior» peker i samme retning — all atferd er innøvd og repetert, aldri helt original. Vi siterer atferd vi har lært. Se Schechner . Metateater i hverdagen Begrepet metateater ble myntet av den amerikanske kritikeren Lionel Abel i Metatheatre: A New View of Dramatic Form (1963). Han brukte det om stykker som er selvbevisste — som tematiserer sitt eget vesen som teater: stykket vet at det er et stykke. Luigi Pirandello er det fremste eksemplet. I Seks karakterer søker en forfatter (1921) banker seks karakterer på døren til en teaterprøve og insisterer på at de er virkelige og trenger noen til å fullføre historien sin. Skuespillerne og regissøren er på scenen som seg selv. Ingen fjerde vegg. Karakterene hevder å være mer autentiske enn skuespillerne som skal spille dem — og stykket spør: hvem er egentlig «virkelig» her? Det er det Goffman snur på hodet i hverdagen: vi er alle karakterer som vet at vi spilles — av oss selv, for et publikum. Den selvbevisstheten om egne handlinger og roller er et slags hverdagslig metateater. Uendelige speilbilder — hvor er originalen? Når du ser læreren som stiller seg foran klassen og rydder halsen for å få oppmerksomhet — ser du hennes autentiske selv? Eller er det en rolle hun spiller? Og når du er sammen med foreldrene dine, vennene dine, kjæresten din — er det samme deg i hvert rom? Når skjedde det at den rollen ble en del av deg? Formet rollen seg til deg, eller formet du deg til rollen? Kan det iscenesatte selvet spille falskt — og i så fall, overfor hvem? Jeg mener... Skjul ↑ Performance som kunstform Vis Performance som kunstform oppstod i USA og Europa på 1960-tallet — men som vi har sett, er performance som menneskelig praksis langt eldre. Det som var nytt var at vestlige kunstnere begynte å bruke performance bevisst som kunstnerisk form og teoretisere rundt den. Schechner — Performance Studies Richard Schechner utviklet Performance Studies som akademisk felt ved NYU. Hans viktigste begreper: «Is» performance — teater, ritual, sport: bevisst fremføring for et publikum «As» performance — hverdagslig atferd sett som forestilling (jf. Goffman) Restored behavior — all atferd er innøvd og repetert, aldri helt original. Vi «siterer» atferd vi har lært. Kontinuumet — fra «impure theatre» (parader, demonstrasjoner) til «pure theatre» (tradisjonelt teater)."}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "vert rom? Når skjedde det at den rollen ble  ↗ Hva mener du? Et av de mest spennende teatrene i New York-avantgarden var La MaMa — nettopp fordi det ikke forsøkte å kontrollere hva som var «god kunst» eller diktere hva som var kunst i det hele tatt. Men hvis alt kan være kunst — slik Kaprow hevdet — er da ingenting kunst? Jeg mener... Parateater — Grotowski I sin andre fase (1970–75) forlot Grotowski forestillingsformen helt. Det han beskrev og navnga som parateater — et møtested der alle er seg selv, der prosessen er målet og skillet mellom utøver og publikum er borte — er ikke en vestlig oppfinnelse. Det er en praksis som har eksistert i kulturer verden over lenge før teaterbygningene ble reist. Grotowski identifiserte den, ga den et begrep og plasserte den innenfor en vestlig kunstramme. Se Grotowski i Teaterfornyere . ▶ YouTube: My Dinner with Andre — om parateater (fra 10:15) Immersive theatre Publikum beveger seg gjennom forestillingen og kan velge hva de følger — utøverne er ove"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": ". Abrams. Artsy: What were 1960s Happenings? ↗ Hva mener du? Et av de mest spennende teatrene i New York-avantgarden var La MaMa — nettopp fordi det ikke forsøkte å kontrollere hva som var «god kunst» eller diktere hva som var kunst i det hele tatt. Men hvis alt kan være kunst — slik Kaprow hevdet — er da ingenting kunst? Jeg mener... Parateater — Grotowski I sin andre fase (1970–75) forlot Grotowski forestillingsformen helt. Det han beskrev og navnga som parateater — et møtested der alle er seg selv, der prosessen er målet og skillet mellom utøver og publikum er borte — er ikke en vestlig oppfinnelse. Det er en praksis som har eksistert i kulturer verden over lenge før teaterbygningene ble reist. Grotowski identifiserte den, ga den et begrep og plasserte den innenfor en vestlig kunstramme. Se Grotowski i Teaterfornyere . ▶ YouTube: My Dinner with Andre — om parateater (fra 10:15) Immersive theatre Publikum beveger seg gjennom forestillingen og kan velge hva de følger — utøverne er overalt. Grenser viskes ut mellom scene og sal, utøver og tilskuer. Punchdrunk er det mest kjente eksemplet. Immersive theatre hører hjemme her fordi det, som performance, utfordrer det grunnleggende skillet mellom dem som viser og dem som ser. Se også Fordypning: begrep . Durational performance Forestillinger eller handlinger som varer over lang tid — timer, dager, uker. Tid og utholdenhet er selve kunstverket. Abramović er det fremste eksemplet. Se Performance-kunstnere . Skjul ↑ Performance-kunstnere Vis Lenker og ressurser legges til fortløpende. Rachel Rosenthal 1926–2015 · Frankrike/USA Feministisk performance, kropp, alder, dyrerettigheter og økologi. Kombinerte teater og performance på en måte som utfordret begge felt. En av de mest innflytelsesrike performance-kunstnerne i USA. ▶ YouTube: Rachel Rosenthal Kjartan Slettemark 1932–2008 · Norge/Sverige Norsk/svensk kunstner og performance-pioneer fra 1960-tallet. Vietnam-bildene, nakenhet som politisk statement. Kobler norsk kunsthistorie til den internasjonale performance-bevegelsen. Politisk performance i ordets fulleste forstand. SNL: Kjartan Slettemark ↗ Marina Abramović 1946– · Serbia/USA Kroppen er kunstmediet: utholdenhet, smerte og tilstedeværelse er materialet. «The artist is present» (MoMA, 2010): satt 736 timer ansikt til ansikt med fremmede. Relasjonen mellom utøver og deltaker er selve verket. Kalt «performance-kunstens bestemor». ▶ YouTube: Marina Abramović Andy Kaufman 1949–1984 · USA Visket ut grensen mellom person og karakter så totalt at publikum aldri visste hva som var «ekte». Tony Clifton-karakteren, wrestlingperioden og til og med «døden» hans var alle mulig performance. En direkte kobling til spørsmålet om iscenesettelse av selvet. ▶ YouTube: Andy Kaufman ↗ Baktruppen 1986–2014 · Norge · oppløst Norsk performance-kollektiv med internasjonal profil. Blander teater, performance a
