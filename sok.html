ger Fordypning + ↗ dewangen.com ↗ Instagram: @dewangen Skjul ↑ JS Jo Strømgren Fysisk teater · Komedie Norge Vis Norsk koreograf og regissør med internasjonal profil Leder Jo Strømgren Kompani Kjent for humoristisk og absurd fysisk teater som kombinerer dans, komedie og samfunnskritikk Fordypning + ↗ jskompani.no ↗ Instagram: @jostromgrenkompani Skjul ↑ De underrepresenterte Vis Vestlig teaterhistorie har lenge oversett kvinner, ikke-vestlige tradisjoner og marginaliserte stemmer. Denne seksjonen er under utvikling. Sor Juana Inés de la Cruz Kolonitid 1651–1695 · Ny-Spania (Mexico) Vis Født Juana Inés Absaje y Ramírez de Santillana i det som er Mexico i dag Poet, dramatiker og intellektuell i kolonitiden Skrev mysterispillet Divine Narcissus En av de første store litterære stemmene i Amerika Fordypning + ↗ SNL: Sor Juana Inés de la Cruz ▶ YouTube: Sor Juana Inés de la Cruz ↗ Tilleggsmateriale: Sor Juana Skjul ↑ Aphra Behn English Restoration 1640?–1689 · England Vis Den første profesjonelle kvinnelige forfatter i Europa English Restoration-dramatiker Skrev i en tid da teatrene ble gjenåpnet i England (etter 1660) Fordypning + ↗ SNL: Aphra Behn ↗ English Restoration og Aphra Behn ▶ YouTube: Aphra Behn 1 ▶ YouTube: Aphra Behn 2 Skjul ↑ Baroness Elsa von Freytag-Loringhoven Dadaisme · Performance 1874–1927 · Tyskland/USA Vis Dadaistisk kunstner blant New York-dadaistene Studerte å være skuespiller som 18-åring Levde i Tyskland, Canada, Frankrike og USA Brukte spiseskjeer og hverdagsgjenstander som smykker (readymades) Forløper til samtidas performance-kunstnere Antageligvis kunstneren «R. Mutt» bak «Fontene» som Duchamp har fått kreditt for Fordypning + ↗ Wikipedia: Elsa von Freytag-Loringhoven ▶ YouTube: Baronessen og performance-tekster ▶ YouTube: Baronessen 2 Skjul ↑ ← Teaterhistorie Dramaturgi → © 2026 · Redaktør: Ren Powell"}, {"file": "teaterfornyere.html", "id": "", "title": "Sentrale skikkelser", "page": "Sentrale skikkelser", "num": "02", "text": "formance-tekster ▶ YouTube: Baronessen 2 Skjul ↑ ← Teaterhistorie Dramaturgi → © 2026 · Redaktør: Ren Powell"}, {"file": "teaterfornyere.html", "id": "wagner", "title": "Richard Wagner", "page": "Sentrale skikkelser", "num": "02", "text": "Richard Wagner Gesamtkunstwerk 1813–1883 · Tyskland Vis Gesamtkunstwerk — alle elementer på scenen arbeider som en helhet Komponisten som den totale kunstner Senket orkestergraven og slukket lyset i salen Fjernet klasseskillet i salen"}, {"file": "teaterfornyere.html", "id": "reinhardt", "title": "Max Reinhardt", "page": "Sentrale skikkelser", "num": "02", "text": "Max Reinhardt Regikunst 1873–1943 · Østerrike/Tyskland Vis «Regikunstens far» Ingen fasit for iscenesettelse — formen følger innholdet Brukte alle rom: kirker, torg, sirkus Massescener og lyssetting som dramaturgisk verktøy Utviklet kammerspill"}, {"file": "teaterfornyere.html", "id": "appia", "title": "Adolphe Appia + Gordon Craig", "page": "Sentrale skikkelser", "num": "02", "text": "Adolphe Appia + Gordon Craig Scenografi · Teaterkunst Appia 1862–1928 · Sveits · Craig 1872–1966 · England Vis Appia: Musikkens sjel — brøt med den flate, naturalistiske malte kulissen Appia: Romlig skulptur — utviklet 3D-scenografi med trapper og platåer Appia: Levende lys — brukte lys som et dramaturgisk element som følger musikken Appia: Eurytmi — utviklet rytmisk bevegelseslære sammen med Dalcroze Appia: Dypden — fokuserte på skuespillerens indre rytme og menneskelige tilstedeværelse Craig: Regissøren som enekunstner — krevde total kontroll over alle teaterets elementer Craig: Übermarionette — ideelt skuespill uten ego, følelser eller tilfeldigheter Craig: Monumental scenografi — abstrakte, enorme flater og bevegelige skjermer Craig: Det bevegelige maleriet — så på scenen som en visuel"}, {"file": "teaterfornyere.html", "id": "saxemeiningen", "title": "Georg II, Hertug Saxe-Meiningen", "page": "Sentrale skikkelser", "num": "02", "text": "Georg II, Hertug Saxe-Meiningen Regikunst 1826–1914 · Tyskland Vis En av de første til å ta inn scenegulvet som en del av den scenografiske designen Koret var ikke lenger en samling av statister, men skuespillere med individuelle roller Prøvene varte 5–6 timer og var fulle forestillinger, ikke bare gjennomganger Etablerte teaterverksteder som produserte møbler og kostymer til hver enkelt oppsetning"}, {"file": "teaterfornyere.html", "id": "stanislavski", "title": "Konstantin Stanislavski", "page": "Sentrale skikkelser", "num": "02", "text": "Konstantin Stanislavski Naturalisme 1863–1938 · Russland Vis Grunnla Moskva Kunstnerteater (1898) Utviklet «Systemet» — metodikk for realistisk skuespill Fokus på indre motivasjon og emosjonell hukommelse Basis for Method Acting (Lee Strasberg, USA) I sitt senere arbeid beveget han seg bort fra emosjonell hukommelse og mot fysiske handlinger som inngang til rollen — dette kalles den fysiske handlingsmetoden Hovedverk: An Actor Prepares (1936)"}, {"file": "teaterfornyere.html", "id": "fd-stanislavski", "title": "Tidlig fase", "page": "Sentrale skikkelser", "num": "02", "text": "Fordypning + Stanislavski endret synspunkt underveis — det finnes ingen enkel «Stanislavski-metode». Tidlig fase Følelseshukommelse — skuespilleren henter fram personlige minner for å skape ekte følelser. Grunnlaget for Method Acting (Strasberg) — men ikke hele Stanislavski. Midtfase Tvil og revisjon — Stanislavski ble kritisk til følelseshukommelse som primærverktøy. Han søkte en mer pålitelig inngang. Sen fase Fysiske handlingers metode — i stedet for «hva ville jeg føle?» spør skuespilleren «hva ville jeg gjøre ?» Følelsen oppstår av handlingen. Meisner og Adler utviklet sine metoder i denne retningen. Stanislavski, K. (1936). An Actor Prepares . · Carnicke, S. M. (2009). Stanislavski in Focus . Routledge. ↗ SNL: Konstantin Stanislavski ▶ YouTube: Stanislavski biografi ↗ Stanislavski-te"}, {"file": "teaterfornyere.html", "id": "tsjehov", "title": "Anton Tsjekhov", "page": "Sentrale skikkelser", "num": "02", "text": "Anton Tsjekhov Realisme 1860–1904 · Russland Vis Kjent for: Kirsebærhagen , Tre søstre , Måken , Onkel Vanja Stykkene ble ikke godt mottatt før Stanislavskis oppsetninger Betegnet selv stykkene sine som komedier «Chekhov's gun» er et litterært og dramaturgisk prinsipp som sier at alle elementer i en fortelling må være nødvendige for handlingen"}, {"file": "teaterfornyere.html", "id": "ibsen", "title": "Henrik Ibsen", "page": "Sentrale skikkelser", "num": "02", "text": "Henrik Ibsen Realisme 1828–1906 · Norge Vis «Moderne dramas far» Innførte prosadrama basert på virkelig liv Kuttet enetaler og umotivert eksposisjon Tematiserte samfunnskritikk og individets frihet Kjente verk: Et dukkehjem , Hedda Gabler , Vildanden"}, {"file": "teaterfornyere.html", "id": "zola", "title": "Émile Zola", "page": "Sentrale skikkelser", "num": "02", "text": "Émile Zola Naturalisme 1840–1902 · Frankrike Vis Naturalismens far — Le Naturalisme au Théâtre (1885) Påvirket av Charles Darwin Menneskets oppførsel er et resultat av arv og miljø Dramatikeren som vitenskapsmann"}, {"file": "teaterfornyere.html", "id": "antoine", "title": "André Antoine", "page": "Sentrale skikkelser", "num": "02", "text": "André Antoine Naturalisme 1858–1943 · Frankrike Vis Grunnla Théâtre Libre — abonnementsteater for å unngå sensur Ensemble-spill, naturlig oppførsel mot deklamatorisk stil Naturalistisk scenografi med ekte rekvisitter Innførte den fjerde veggen som prinsipp Regissørens rolle som kunstnerisk leder"}, {"file": "teaterfornyere.html", "id": "maeterlinck", "title": "Maurice Maeterlinck", "page": "Sentrale skikkelser", "num": "02", "text": "Maurice Maeterlinck Symbolisme 1862–1949 · Belgia Vis Ledende symbolist i teateret Drømmeaktige, stemningsfulle stykker med taushet og det uutsigelige i sentrum Påvirket August Strindberg og symbolistiske regissører Kjent verk: Pelléas et Mélisande Nobelprisen i litteratur i 1911"}, {"file": "teaterfornyere.html", "id": "strindberg", "title": "August Strindberg", "page": "Sentrale skikkelser", "num": "02", "text": "August Strindberg Naturalisme · symbolistiske trekk 1849–1912 · Sverige Vis Skrev Frøken Julie (naturalisme) Ble forløper til symbolistene etter et psykisk sammenbrudd han kalte «Inferno» Noen ser hans sene periode som symbolistisk — andre mener han brukte symbolisme som virkemiddel uten å tilhøre bevegelsen Påvirket av Maurice Maeterlinck Skrev Et Drømmespill"}, {"file": "teaterfornyere.html", "id": "jarry", "title": "Alfred Jarry", "page": "Sentrale skikkelser", "num": "02", "text": "Alfred Jarry Symbolisme · Absurdisme 1873–1907 · Frankrike Vis Symbolistisk forfatter og forløper til det absurdistiske teateret Skrev Ubu Roi (Kong Ubu) i 1896 — ble satt opp og lagt ned samme kveld på Théâtre de l'Œuvre Regnes noen ganger som det første absurdistiske drama — en verden uten menneskelig verdighet Artaud grunnla Alfred Jarry Theatre i 1926"}, {"file": "teaterfornyere.html", "id": "meyerhold", "title": "Vsevolod Meyerhold", "page": "Sentrale skikkelser", "num": "02", "text": "Vsevolod Meyerhold Biomekanikk 1874–1940 · Russland Vis Stjerneelev hos Stanislavski — begynte å utforske ikke-realistiske spillestiler med forbindelse til symbolismen Drev med reteatralisering — et brudd med realismen som søkte tilbake til teaterets tidligere tradisjoner Utviklet biomekanikk som skuespillertrening Konstruktivistisk scenografi Arrestert og henrettet av Stalins regime (1940)"}, {"file": "teaterfornyere.html", "id": "fd-meyerhold", "title": "Otkaz", "page": "Sentrale skikkelser", "num": "02", "text": "Fordypning + Biomekanikk er en systematisk skuespillertrening basert på presis fysisk kontroll. Bevegelsen organiseres i en syklus av fire elementer: Otkaz Forberedende motbevegelse — for å gå fremover lener du deg først bakover. Signaliserer intensjonen og samler energi. Posyl Selve utførelsen — oppfyllelsen av bevegelsen otkaz initierte. Tochka / Stoika Det endelige stoppet — handlingen fryses i en presis positur. Avslutning med opprettholdt indre spenning. Tormoz Det bevisste kontrollelementet — regulerer rytmen gjennom hele syklusen. Leach, R. (1989). Vsevolod Meyerhold . Cambridge University Press. ↗ SNL: Vsevolod Meyerhold ▶ YouTube: Biomekanikk — etude ↗ Kapittel om Meyerhold og Commedia dell'arte (PDF) ↗ Biomekanikk i Skuespill Skjul ↑"}, {"file": "teaterfornyere.html", "id": "wilde", "title": "Oscar Wilde", "page": "Sentrale skikkelser", "num": "02", "text": "Oscar Wilde L'art pour l'art 1854–1900 · Irland Vis Tok inspirasjon fra det franske L'art pour l'art — kunst for kunstens skyld Mente at ikke alle hadde evne til å kjenne igjen eller bedømme kunst Livet bør være et kunstverk heller enn å herme livet Utfordret og parodierte samfunnets regler og normer Kjente verk: Salome , A Woman of No Importance , The Importance of Being Earnest Hans tragiske biografi overskygger ofte hans sentrale rolle i fin de siècle-kunstmiljøet"}, {"file": "teaterfornyere.html", "id": "terents", "title": "Terents", "page": "Sentrale skikkelser", "num": "02", "text": "Terents Romersk antikken 195–159? fvt · Carthage/Roma Vis Født i Carthage, Nord Afrika — levde som romersk slave, ble frigitt Tilpasset greske komedier fra hellenistisk tid til et enkelt, konversasjonelt latin 650 manuskripter av hans verk er bevart fra etter år 800 Hrotsvit von Gandersheim oppgav hans stykker som inspirasjon — og reaksjon Sentral referanse for renessansehumanister og reformatorer"}, {"file": "teaterfornyere.html", "id": "hrotsvit", "title": "Hrotsvit von Gandersheim", "page": "Sentrale skikkelser", "num": "02", "text": "Hrotsvit von Gandersheim Middelalderen 935–1002 evt · Tysk Vis Første kvinnelige dramatiker vi vet om En velstående nonne som skrev komedier basert på Terents sine stykker 6 komedier: 2 mirakelspill, 2 spill om forkynnelse, 2 om prostituerte omvendt til kristendommen En scene i Dulcitius viser en mann som forveksler kjøkkenutstyr med unge kvinner — feministisk kommentar? Ikke den første kvinnelige poet eller forfatter — men den første dramatiker"}, {"file": "teaterfornyere.html", "id": "shakespeare", "title": "William Shakespeare", "page": "Sentrale skikkelser", "num": "02", "text": "William Shakespeare Renessansen 1564–1616 · Engelsk Vis Skrev Hamlet , Macbeth og Romeo og Julie Utviklet det engelske språket og mestret både blankvers og komplekse karakterportretter Sentral i den engelske renessansen; hans verker er verdens mest spilte dramatikk Spilte på The Globe (utendørs) og Blackfriars Theatre (innendørs, vinterstid)"}, {"file": "teaterfornyere.html", "id": "marlowe", "title": "Christopher Marlowe", "page": "Sentrale skikkelser", "num": "02", "text": "Christopher Marlowe Renessansen 1564–1593 · Engelsk Vis Skrev Doctor Faustus og The Jew of Malta Etablerte blankverset som standardform for engelsk drama før Shakespeare Kjent for sine «overmenneskelige» karakterer og et turbulent liv som endte i et knivstikk-slagsmål"}, {"file": "teaterfornyere.html", "id": "lopevega", "title": "Lope de Vega", "page": "Sentrale skikkelser", "num": "02", "text": "Lope de Vega Renessansen 1562–1635 · Spansk Vis Skrev Fuenteovejuna og over 500 andre bevarte skuespill Grunnla den spanske gullalderens drama ved å bryte de klassiske reglene for tid og sted Blandet det tragiske med det komiske og fokuserte på folkelige temaer og nasjonal ære"}, {"file": "teaterfornyere.html", "id": "moliere", "title": "Molière", "page": "Sentrale skikkelser", "num": "02", "text": "Molière Klassisismen 1622–1673 · Frankrike Vis Født Jean-Baptiste Poquelin — valgte teater fremfor farens yrke som kongelig møbeltapetserer Grunnla teatertruppen Illustre Théâtre sammen med Madeleine Béjart I fengsel to ganger i 1645 for gjeld — truppen begynte å turnere rundt i landet Imponerte kongens bror med en farse — fikk dele Hôtel du Petit-Bourbon med commedia dell'arte-skuespillere Fikk til slutt støtte fra kongen selv — konstant konflikt med kirken Kjente verk: Tartuffe , Den gjerrige , Misantropen Bruker «double vision» — stykkene stiller motpoler side om side: vis/tåpelig, høflig/grov for å vise det tåpelige som vis, det høflige som grovt"}, {"file": "teaterfornyere.html", "id": "schiller", "title": "Friedrich Schiller", "page": "Sentrale skikkelser", "num": "02", "text": "Friedrich Schiller Romantikken 1759–1805 · Tysk Vis Skrev Røverne , Wilhelm Tell og Mary Stuart Ledende skikkelse i Sturm und Drang-bevegelsen og senere tysk klassisisme Nær venn av Goethe; hans verk utforsker menneskets kamp for politisk og åndelig frihet"}, {"file": "teaterfornyere.html", "id": "holberg", "title": "Ludvig Holberg", "page": "Sentrale skikkelser", "num": "02", "text": "Ludvig Holberg Komedie 1684–1754 · Norge/Danmark Vis Regnes som nordisk teaters far — grunnla en hel komedietradisjon i Norden Norsk/dansk forfatter og historiker — levde det meste av livet i København Inspirert av Molière og commedia dell'arte — men med et særnorsk satirisk blikk Karaktertyper, ikke psykologiske individer — satire over borgerskapet Skrev 33 komedier på seks år: Jeppe paa Bierget , Den Politiske Kandstøber , Erasmus Montanus , Den Stundesløse Preget av humanisme, opplysningstid, klassisisme og barokk"}, {"file": "teaterfornyere.html", "id": "pirandello", "title": "Luigi Pirandello", "page": "Sentrale skikkelser", "num": "02", "text": "Luigi Pirandello Metateater 1867–1936 · Italia Vis Det groteske teateret og metateater (begrep fra Lionel Abel, 1964) Realitet er en illusjon — sannheten er nødvendigvis personlig og subjektiv Forløper til både eksistensialisme og absurdistisk teater Fikk Nobelprisen i 1934 Kjent verk: Seks personer søker en forfatter (1921)"}, {"file": "teaterfornyere.html", "id": "piscator", "title": "Erwin Piscator", "page": "Sentrale skikkelser", "num": "02", "text": "Erwin Piscator Episk teater 1893–1966 · Tyskland Vis Ville lage et proletarisk drama og utfordre et arbeiderklassepublikum Brukte film, tegnefilm, tredemøller og episodisk dramaturgi — agitprop som kunstnerisk form Judith Malina studerte under ham (1945) og tok med seg hans strukturelle teknikker — det episke over det dramatiske, teateret som et direkte instrument for sosial endring — inn i The Living Theatre og sin egen anarkopasifistiske ideologi. Wikipedia: Judith Malina. Brecht jobbet under ham og videreutviklet ideene hans mot det politisk-episke teateret og Verfremdungseffekt Flyttet fra Tyskland i 1933"}, {"file": "teaterfornyere.html", "id": "tzara", "title": "Tristan Tzara", "page": "Sentrale skikkelser", "num": "02", "text": "Tristan Tzara Dadaisme 1896–1963 · Rumansk/Fransk Vis Poet og dramatiker — en av grunnleggerne av Dada-bevegelsen Dada ble født på Cabaret Voltaire i Zürich i 1916 som reaksjon på krigens galskap Da han satte opp stykket Gasshjerte på en festival brøt det ut kaos — den dadaistiske kunstneren André Breton brakk armen på en skuespiller Tzara ble senere surrealist"}, {"file": "teaterfornyere.html", "id": "lorca", "title": "Federico García Lorca", "page": "Sentrale skikkelser", "num": "02", "text": "Federico García Lorca Symbolisme · Surrealisme 1898–1936 · Spania Vis Poet og dramatiker som jobbet med symbolisme, surrealisme og futurisme Antageligvis henrettet av nasjonalister ved starten av den spanske borgerkrig Kjente verk: Blodsbryllup og Bernarda Albas hus"}, {"file": "teaterfornyere.html", "id": "brecht", "title": "Bertolt Brecht", "page": "Sentrale skikkelser", "num": "02", "text": "Bertolt Brecht Episk teater 1898–1956 · Tyskland Vis Jobbet hos Reinhardt og Piscator Utviklet det episke teateret — distanse fremfor innlevelse Verfremdungseffekt (V-effekten): bryt illusjonen Gestus: kroppen viser sosiale og politiske relasjoner Grunnla Berliner Ensemble med Helene Weigel (1949) Kjente verk: Mor Courage , Den kaukasiske kritt-sirkelen"}, {"file": "teaterfornyere.html", "id": "artaud", "title": "Antonin Artaud", "page": "Sentrale skikkelser", "num": "02", "text": "Antonin Artaud Grusomhetens teater 1896–1948 · Frankrike Vis Forlot den surrealistiske bevegelsen for å utforske sin Grusomhetens teater — en total sanseopplevelse Brøt med teksten — kropp, lyd og rom er primære uttrykk Publikum plassert i svingstolar med skuespillere på begge sider Teateret skal være som pest — transformerende og destabiliserende Kjent for teorier — ikke for gjennomførte oppsetninger Kjent for sin bok Teateret og dets dobbeltgjenger — som har inspirert generasjoner av kunstnere Var opptatt av det metafysiske — teateret som en levende, ugjenkallelig virkelighet. Se Fordypning: Teater og metafysikk"}, {"file": "teaterfornyere.html", "id": "genet", "title": "Jean Genet", "page": "Sentrale skikkelser", "num": "02", "text": "Jean Genet Absurdisme 1910–1986 · Frankrike Vis Ofte kategorisert som absurdist — men hans fokus er mer rituelt og seremonielt enn eksistensielt Ingenting har mening uten at det motsatte eksisterer: kjærlighet/hat, makt/avmakt Livet er en serie seremonier som skaper orden av meningsløs aktivitet Levde mye av livet i fengsel — det preget forfatterskapet Jean Paul Sartre skrev hans biografi: Saint Genet, comédien et martyr Kjente verk: The Maids , The Balcony"}, {"file": "teaterfornyere.html", "id": "weiss", "title": "Peter Weiss", "page": "Sentrale skikkelser", "num": "02", "text": "Peter Weiss Dokumentarteater 1916–1983 · Tysk/Sveitsisk Vis Familien tvunget til eksil fra Tyskland i 1934 (etniske jøder, luthersk tro) Influert av surrealisme, Artaud, Franz Kafka og Henry Miller Kan betraktes som en sammenslåing av Artaud og Brecht Grunnla dokumentarisk teater (relatert: verbatim theatre) Kjent verk: Marat/Sade — visker vekk skillet mellom logikk og galskap"}, {"file": "teaterfornyere.html", "id": "pinter", "title": "Harold Pinter", "page": "Sentrale skikkelser", "num": "02", "text": "Harold Pinter Etterkrigsdrama 1930–2008 · England Vis Betegnet som Absurdist — nektet å akseptere merkelappen «Pinteresque» og «Pinter Pause» er begreper fra hans dramatikk Trussel, maktspill og det usagte under overflaten Nobelprisen i litteratur i 2005 Kjente verk: The Birthday Party , The Caretaker , Homecoming"}, {"file": "teaterfornyere.html", "id": "arrabal", "title": "Fernando Arrabal", "page": "Sentrale skikkelser", "num": "02", "text": "Fernando Arrabal Absurdisme · Théâtre Panique 1932– · Spania Vis Betegnet som Absurdist — grunnla Théâtre Panique (seremoniteater som er delvis anti-religiøst, delvis hellig) Brøt med surrealismen fordi Breton hadde utviklet en surrealistisk respektabilitet de ville unngå «Why is it thought that victims have everything but humor?» Humor — permanently out of control — is a salute to anguish, not a denial of it. — Eder, R. New York Times , 28. mars 1982 Opptatt av at tid og rom er en illusjon Kjent verk: Piknik i det grønne"}, {"file": "teaterfornyere.html", "id": "sartre", "title": "Jean Paul Sartre + Albert Camus", "page": "Sentrale skikkelser", "num": "02", "text": "Jean Paul Sartre + Albert Camus Eksistensialisme · Absurdisme Sartre 1905–1980 · Camus 1913–1960 · Frankrike Vis Sartre: Eksistensialismens far — «eksistens kommer før essens» Sartre: Nektet å motta Nobelprisen i 1964. Livspartner: Simone de Beauvoir Sartre: Kjent verk: Bak lukkede dører («Helvete er andre mennesker») Camus: Gav oss begrepet «absurd» i teaterkonteksten gjennom essayet Myten om Sisyfos Camus: Fikk Nobelprisen i 1957 Begge enige: Det finnes ikke objektivt kriterium for å ta valg i livet Uenige: Sartre mente alle måtte ta politisk ansvar — Camus nektet å godta at alle valg var like gyldige"}, {"file": "teaterfornyere.html", "id": "beckett", "title": "Samuel Beckett", "page": "Sentrale skikkelser", "num": "02", "text": "Samuel Beckett Absurdisme 1906–1989 · Irland Vis Opptatt med menneskers metafysiske tilværelse — ikke politiske eller sosiale spørsmål Uttrykte etterkrigstids angst Fikk Nobelprisen i 1969 Kjente verk: Mens vi venter på Godot , Sluttspill , Happy Days"}, {"file": "teaterfornyere.html", "id": "ionesco", "title": "Eugène Ionesco", "page": "Sentrale skikkelser", "num": "02", "text": "Eugène Ionesco Absurdisme 1912–1994 · Romania/Frankrike Vis Kalte eget verk «theater of derision» — ble betegnet som Absurdist mot sin vilje Var ikke eksistensialist og trodde ikke at teater skulle belære Synliggjorde språkets klisjeer, meningsløs materialisme og korrupte ideologier Mente at det komiske og det tragiske er uatskillelige — komedie er minst like alvorlig som tragedie Mente at blind lydighet til ideologier og kollektive bevegelser er etisk forkastelig — dette er kjernen i Nesehornet Kjente verk: Den skallete sangerinne , Nesehornet , Privattimen"}, {"file": "teaterfornyere.html", "id": "littlewood", "title": "Joan Littlewood", "page": "Sentrale skikkelser", "num": "02", "text": "Joan Littlewood Theatre Workshop 1914–2002 · England Vis Etablerte Theatre Workshop i 1945 Vil inkludere publikum i «en begivenhet» Politisk teater for arbeiderklassen Kjent verk: Å for en artig krig"}, {"file": "teaterfornyere.html", "id": "mnouchkine", "title": "Ariane Mnouchkine", "page": "Sentrale skikkelser", "num": "02", "text": "Ariane Mnouchkine Théâtre du Soleil 1936– · Frankrike Vis Etablerte Théâtre du Soleil i 1964 Fysisk teater influert av Jacques Lecoq Politisk teater influert av Brecht Trekker fra balinesisk, indisk og japansk teater"}, {"file": "teaterfornyere.html", "id": "fo", "title": "Dario Fo + Franca Rame", "page": "Sentrale skikkelser", "num": "02", "text": "Dario Fo + Franca Rame Politisk teater Fo 1926–2016 · Rame 1929–2013 · Italia Vis Dario Fo: Satirisk politisk teater i commedia dell'arte-tradisjonen Dario Fo: Fikk Nobelprisen i 1997 Franca Rame: Skuespiller, dramatiker og politisk aktivist — sentral medskaper Arbeidet konsekvent med tema som maktmisbruk, feminisme og arbeiderklassen"}, {"file": "teaterfornyere.html", "id": "grotowski", "title": "Jerzy Grotowski", "page": "Sentrale skikkelser", "num": "02", "text": "Jerzy Grotowski Fattig teater 1933–1999 · Polen Vis Fattig teater — fjern alt unødvendig, behold skuespiller og tilskuer Via negativa: ikke legg til, fjern hindringer Psykofysisk trening — kropp og psyke er uatskillelige 4 faser: fattig teater, parateater, «Theatre of Sources», objektiv drama Påvirket Eugenio Barba og Odin Teatret"}, {"file": "teaterfornyere.html", "id": "fd-grotowski", "title": "Fase 1", "page": "Sentrale skikkelser", "num": "02", "text": "Fordypning + Fase 1 Det fattige teateret · 1959–1970 — bare skuespiller og tilskuer. Ingen scenografi, sminke, kostyme eller musikk utover det kroppen lager. Rituell opplevelse. I 1970 følte Grotowski at de var «fullkomne» og sluttet å lage forestillinger. Fase 2 Parateater · 1970–1975 — alle er seg selv (A), ingen publikum. «Research University» i Warszawa — Peter Brook og Joseph Chaikin deltok. Se My Dinner with Andre (1981). Fase 3 Theatre of Sources · 1976–1982 — reiste til Japan, India, Haiti, Afrika. Søkte universelle «kildeteknikker» på tvers av kulturer. Fase 4 Objective Drama · 1983–1986 — UC Irvine, California. Teknikker uavhengig av kulturell bakgrunn. Fase 5 Art as Vehicle · 1986–1999 — Workcenter i Pontevedra, Italia. Fra å fremføre for publikum til fremførelse som indre trans"}, {"file": "teaterfornyere.html", "id": "brook", "title": "Peter Brook", "page": "Sentrale skikkelser", "num": "02", "text": "Peter Brook Det tomme rom 1925–2022 · England/Frankrike Vis Regisserte sin første profesjonelle Shakespeare-produksjon som 20-åring I 1962 — sammen med Michel Saint-Denis — ansvar for «Theatre of Cruelty»-prosjekt under RSC. Satte opp Marat/Sade I 1970 satte han opp A Midsummer Night's Dream med RSC Etter en invitasjon fra Jean-Louis Barrault — fikk i 1971 ansvar for «International Center for Theatre Research» i Paris Reiste gjennom Afrika 1972–1973 med et teppe Deltok i Grotowskis ritualistiske «Research University» i 1975 (parateater) Satte opp Mahabharata i 1984 — 9 timers spilletid Skrev teoriboka The Empty Space i 1968 Delte teateret inn i 4 kategorier: Deadly, Holy, Rough og Immediate Kjent for «Color Blind Casting»"}, {"file": "teaterfornyere.html", "id": "malina", "title": "Judith Malina / Julian Beck", "page": "Sentrale skikkelser", "num": "02", "text": "Judith Malina / Julian Beck The Living Theatre Malina 1926–2015 · Beck 1925–1985 Vis Etablerte The Living Theatre i 1946 — mest kontroversielle teatergruppen i 1960-tallet Vil skape «a Beautiful Non-Violent Anarchist Revolution» Influert av Piscator og Artaud — inspirert av yoga, zen og «teater som seremoni» «Paradise Now!» — publikum invitert opp på scenen"}, {"file": "teaterfornyere.html", "id": "schechner", "title": "Richard Schechner", "page": "Sentrale skikkelser", "num": "02", "text": "Richard Schechner Miljøteater f. 1934 · USA Vis Grunnla The Performance Group i New York (1967) — pionér for miljøteater Dionysus in 69 — publikum og skuespillere i samme rom, grensene mellom dem utvisket Forlot gruppen i 1980 etter konflikt om nakenhet — Elizabeth LeCompte tok over og omdøpte det til The Wooster Group Grunnla Performance Studies-faget ved Tisch School of the Arts, NYU Redaktør av TDR: The Drama Review fra 1962 — fortsatt aktiv"}, {"file": "teaterfornyere.html", "id": "lecompte", "title": "Elizabeth LeCompte", "page": "Sentrale skikkelser", "num": "02", "text": "EL Elizabeth LeCompte Postdramatisk f. 1944 · USA Vis Tok over The Performance Group i 1980 og omdøpte det til The Wooster Group Bruker collage, mediateknologi og fragmentert tekst som sceniske virkemidler Wooster Group er fortsatt et av USAs ledende eksperimentelle teaterkollektiver"}, {"file": "teaterfornyere.html", "id": "offoffbroadway", "title": "Caffe Cino · La MaMa · The Open Theater", "page": "Sentrale skikkelser", "num": "02", "text": "NY Caffe Cino · La MaMa · The Open Theater Off-Off-Broadway 1958–1968 · New York Vis Joe Cino / Caffe Cino (1958–1968) — Regnes som Off-Off-Broadways fødested. Et kafékjeller i Greenwich Village der teater, poesi og LHBT-stemmer fikk fritt spillerom. Ingen budsjett, ingen sensur. Bernadette Peters, Sam Shepard og Lanford Wilson begynte her. Cino sa: «It's magic time!» Ellen Stewart / La MaMa (1961–) — Afroamerikansk motedesigner som grunnla La MaMa Experimental Theatre Club i East Village. Satte opp flere forestillinger på ett år enn hele Broadway samlet. Ingen mal for hva som var «godt nok». Joseph Chaikin / The Open Theater (1963–1973) — Grunnlagt sammen med Megan Terry og Jean-Claude van Itallie. Ville frigjøre skuespilleren fra Method Acting — fokus på «sound and movement», ensemblearb"}, {"file": "teaterfornyere.html", "id": "chaikin", "title": "Joseph Chaikin", "page": "Sentrale skikkelser", "num": "02", "text": "JC Joseph Chaikin The Open Theater 1935–2003 · USA Vis Grunnla The Open Theater i New York (1963) sammen med Megan Terry og Jean-Claude van Itallie Ville frigjøre skuespilleren fra Method Acting — fokus på «sound and movement», ensemblearbeid og improvisasjon Inviterte publikum til å vitne prosessen, ikke ferdige forestillinger Kjent for The Serpent (1969) — et kollektivt skapt verk om Genesis og Kennedy-attentatet Oppløste bevisst The Open Theater i 1973 for å unngå institusjonalisering"}, {"file": "teaterfornyere.html", "id": "wilson", "title": "Robert Wilson †", "page": "Sentrale skikkelser", "num": "02", "text": "Robert Wilson † Visuelt teater 1941–2025 · USA Vis «What if you light it first? What if you light it before the text is written, before the music is written? Start with light.» — Euroluce International Lighting Forum, masterclass, 2025 Form fremfor innhold — det visuelle og formale er viktigere enn tekstlig tolkning Stivnet tid — ekstremt langsomme bevegelser som endrer publikums tidsoppfatning Arkitektonisk lys — lyset skaper rommet og er en selvstendig medspiller Kjent verk: Einstein on the Beach (med Philip Glass)"}, {"file": "teaterfornyere.html", "id": "churchill", "title": "Caryl Churchill", "page": "Sentrale skikkelser", "num": "02", "text": "Caryl Churchill Postmoderne 1938– · England Vis Kjent for sin nyskapende bruk av teaterformer, sin utforskning av maktmisbruk og sine sterke feministiske og politiske temaer — regnes som en av de mest innflytelsesrike nålevende dramatikerne i verden Skrev radioteater i 1960-tallet — husdramatiker på Royal Court Theatre 1974–1975 Har skrevet over 40 teaterstykker Kjente verk: Cloud Nine (1979), Top Girls (1982), Serious Money (1987), Seven Jewish Children (2009)"}, {"file": "teaterfornyere.html", "id": "muller", "title": "Heiner Müller", "page": "Sentrale skikkelser", "num": "02", "text": "Heiner Müller Postdramatisk 1929–1995 · Tyskland Vis Postdramatisk og postmoderne poet, dramatiker og regissør «Synthetic fragments» — scener satt sammen uten narrative intensjoner «Fragments have a special value today, because all the coherent stories we used to tell ourselves to make sense of life have collapsed» (New York Times, 1990) Kjent verk: Hamletmaskin"}, {"file": "teaterfornyere.html", "id": "frantic", "title": "Frantic Assembly", "page": "Sentrale skikkelser", "num": "02", "text": "Frantic Assembly Fysisk teater Grunnlagt 1994 · England Vis Scott Graham, Artistic Director Skaper fysisk, tilgjengelig teater — spanner dans, film og tv «Theatre is for all» — sterkt fokus på mangfold og tilgjengelighet Sentrale teknikker: chair duets, round/by/through, hymn hands Ignite-divisjonen arbeider med unge menn i underserverte områder som aldri har vært eksponert for teater"}, {"file": "teaterfornyere.html", "id": "meisner", "title": "Sanford Meisner", "page": "Sentrale skikkelser", "num": "02", "text": "Sanford Meisner Realistisk 1905–1997 · USA Vis «Leve sant under imaginære omstendigheter» Repetisjonsøvelse — total oppmerksomhet på partneren Reaksjon er viktigere enn planlagt handling Videreutviklet Stanislavski i amerikansk retning"}, {"file": "teaterfornyere.html", "id": "utahagen", "title": "Uta Hagen", "page": "Sentrale skikkelser", "num": "02", "text": "Uta Hagen Realistisk 1919–2004 · USA/Tyskland Vis Substitusjon — bytt ut fiksjon med eget liv De ni spørsmålene som karakteranalyseverktøy Fysiske handlinger forankrer karakteren i kroppen Objektøvelser — ekte gjenstander, ekte handlinger Underviste i over 40 år ved HB Studio, New York"}, {"file": "teaterfornyere.html", "id": "mchekhov", "title": "Michael Chekhov", "page": "Sentrale skikkelser", "num": "02", "text": "Michael Chekhov Imaginasjonsbasert 1891–1955 · Russland/USA Vis Studerte med Stanislavski — fikk sammenbrudd etter arbeid med «emotional memory» Etablerte et imaginasjonsbasert system for skuespillere Rollefigurens indre drivkraft uttrykkes gjennom en ekstern gest — gestus internaliseres i kroppen «The body and its psychology are inseparable» — Chekhov, M. (1953). To the Actor . Harper & Row. Psykologisk gest (Psychological Gesture) er hans mest kjente bidrag"}, {"file": "teaterfornyere.html", "id": "adler", "title": "Stella Adler", "page": "Sentrale skikkelser", "num": "02", "text": "Stella Adler Imaginasjonsbasert 1901–1992 · USA Vis Studerte hos Stanislavski i Paris — etter at han hadde forlatt «emotional memory» Brøt med The Group Theatre og Method Acting på bakgrunn av dette Fokus på imaginasjon, ikke personlig hukommelse Etablerte Stella Adler Studio of Acting i 1949"}, {"file": "teaterfornyere.html", "id": "lecoq", "title": "Jacques Lecoq", "page": "Sentrale skikkelser", "num": "02", "text": "Jacques Lecoq Fysisk / maskearbeid 1921–1999 · Frankrike Vis Nøytral maske — nullpunkt, ingen karakter Dyranalyse — observer og legemliggjør dyrenes bevegelse og energi Le jeu (spillet) — oppdagelse gjennom lek og improvisasjon Melodrama, klovn, commedia — ulike spilleregistre Grunnla École internationale de théâtre Jacques Lecoq i Paris"}, {"file": "teaterfornyere.html", "id": "laban", "title": "Rudolf Laban", "page": "Sentrale skikkelser", "num": "02", "text": "Rudolf Laban Bevegelsesanalyse 1879–1958 · Ungarn/England Vis Laban bevegelsesanalyse (LMA) — et system for å forstå bevegelse Effort: kvaliteter — vekt, tid, rom, flyt Brukes som analyseverktøy på tvers av alle skuespillerteknikker Nyttig for karakterarbeid, koreografi og regiarbeid"}, {"file": "teaterfornyere.html", "id": "barba", "title": "Eugenio Barba", "page": "Sentrale skikkelser", "num": "02", "text": "Eugenio Barba Teatrantropologi 1936– · Italia/Danmark Vis Grunnla Odin Teatret (1964) i Danmark Videreutviklet Grotowskis psykofysiske trening Teatrantropologi — studiet av skuespillerens nærvær på tvers av kulturer Barter (byttehandel) — Odin turnerte i marginaliserte samfunn og byttet forestillinger mot lokale kulturuttrykk"}, {"file": "teaterfornyere.html", "id": "fosse", "title": "Jon Fosse", "page": "Sentrale skikkelser", "num": "02", "text": "JF Jon Fosse Ny dramatikk f. 1959 · Norge Vis Postmimetisk dramatikk — bryter med den klassiske handlingen til fordel for indre, eksistensielle tilstander Repetisjon og rytme — bruker musikalske språkmønstre og gjentakelser for å skape en suggererende, dvelende effekt Eksistensiell fenomenologi — utforsker menneskets grunnvilkår som ensomhet, venting og møtet med døden Nobelprisen i litteratur (2023) — anerkjent for sin nyskapende dramatikk som gir form til det uutsigelige"}, {"file": "teaterfornyere.html", "id": "loveid", "title": "Cecilie Løveid", "page": "Sentrale skikkelser", "num": "02", "text": "CL Cecilie Løveid Samtidsdramatikk f. 1951 · Norge Vis Ved siden av Jon Fosse den norske dramatikeren som i samtiden er blitt mest spilt i utlandet Debuterte som dramatiker på Den Nationale Scene i 1982 med Måkespisere — vant Prix Italia Tekstene bryter ned sjangergrenser — blander poesi, musikk, dans og dramatikk Har selv opptrådt i egne performance-forestillinger og samarbeidet med komponister og billedkunstnere Har tre ganger mottatt Ibsenprisen for sitt dramatiske forfatterskap"}, {"file": "teaterfornyere.html", "id": "horn", "title": "Kjersti Horn", "page": "Sentrale skikkelser", "num": "02", "text": "KH Kjersti Horn Regi f. 1977 · Norge Vis Utdannet ved Dramatiska Institutet i Stockholm (2003–2006) Teatersjef ved Det Norske Teatret fra 2025 — første kvinne i stillingen siden 1945 Kjent for eksperimentell bruk av live-video og film som scenisk virkemiddel Tematisk fokus på utenforskap, normalitet og menneskelige sprekker Sju Heddaprisnominasjoner for beste regi — vant 2023 for Romeo og Julie (DNS) og for særlig kunstnerisk innsats Kjente produksjoner: Arv og miljø , Raskolnikov , Kristin Lavransdotter , Hamlet"}, {"file": "teaterfornyere.html", "id": "dewangen", "title": "Claire de Wangen", "page": "Sentrale skikkelser", "num": "02", "text": "CW Claire de Wangen Fysisk teater · Koreografi Norge Vis Norsk regissør og koreograf Arbeider i skjæringspunktet mellom dans, teater og visuell kunst Kjent for site-spesifikke og promenadeteater-forestillinger Kjent for fysisk presise og visuelt sterke forestillinger"}, {"file": "teaterfornyere.html", "id": "stromgren", "title": "Jo Strømgren", "page": "Sentrale skikkelser", "num": "02", "text": "JS Jo Strømgren Fysisk teater · Komedie Norge Vis Norsk koreograf og regissør med internasjonal profil Leder Jo Strømgren Kompani Kjent for humoristisk og absurd fysisk teater som kombinerer dans, komedie og samfunnskritikk"}, {"file": "teaterfornyere.html", "id": "sorjuana", "title": "Sor Juana Inés de la Cruz", "page": "Sentrale skikkelser", "num": "02", "text": "Sor Juana Inés de la Cruz Kolonitid 1651–1695 · Ny-Spania (Mexico) Vis Født Juana Inés Absaje y Ramírez de Santillana i det som er Mexico i dag Poet, dramatiker og intellektuell i kolonitiden Skrev mysterispillet Divine Narcissus En av de første store litterære stemmene i Amerika"}, {"file": "teaterfornyere.html", "id": "behn", "title": "Aphra Behn", "page": "Sentrale skikkelser", "num": "02", "text": "Aphra Behn English Restoration 1640?–1689 · England Vis Den første profesjonelle kvinnelige forfatter i Europa English Restoration-dramatiker Skrev i en tid da teatrene ble gjenåpnet i England (etter 1660)"}, {"file": "teaterfornyere.html", "id": "baronessen", "title": "Baroness Elsa von Freytag-Loringhoven", "page": "Sentrale skikkelser", "num": "02", "text": "Baroness Elsa von Freytag-Loringhoven Dadaisme · Performance 1874–1927 · Tyskland/USA Vis Dadaistisk kunstner blant New York-dadaistene Studerte å være skuespiller som 18-åring Levde i Tyskland, Canada, Frankrike og USA Brukte spiseskjeer og hverdagsgjenstander som smykker (readymades) Forløper til samtidas performance-kunstnere Antageligvis kunstneren «R. Mutt» bak «Fontene» som Duchamp har fått kreditt for"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "Drama og Dramaturgi — Teaterfag kompendium ← Kompendium Drama og Dramaturgi ☀︎ ⌕ Søk 03 DRAMA OG DRAMATURGI Fra side til scene til kunstverk. Dette kapittelet er ikke en fullstendig oversikt — det er et utgangspunkt. Dramaturgi som fagfelt er bredere enn det som dekkes her. Andre innfallsvinkler og systemer for analyse, som refleksiv dramaturgi og dramapedagogiske tilnærminger, ivaretas av faglærere med erfaring fra andre og verdifulle perspektiver på teater som kunstform. For utfyllende ressurser, se scenetreff.no ↗ . Ordet drama kommer fra det greske dran — å handle, å gjøre. I sin enkleste form er drama det som skjer når noen gjør noe i nærvær av andre som ser på. Det er ikke en tekst, ikke en bygning og ikke et publikum — det er en handling. Forholdet mellom drama, dramaturgi og teater kan forstås slik: Drama Selve handlingsstrukturen — det som skjer, hvem det skjer med, og i hvilken rekkefølge. Det kan finnes som et skrevet manus, men trenger ikke det. Et improvisert forløp har også en dramatisk struktur. Dramaturgi Kunsten og håndverket å forme den strukturen bevisst — å ta valg om spenning, rytme, form og fremdrift. Dramaturgien er bindeleddet mellom idéen og forestillingen. Teater Den levende begivenheten der drama og dramaturgi møter et publikum i tid og rom. Teksten eller planen blir til noe som skjer — én gang, her og nå. «Post» betyr etter. Når teateret beveger seg bort fra dramaet — bryter ned rekkefølgen i fortellingen — kaller vi det post drama tisk. Se Postdramatisk i Ulike dramaturgiske modeller. De tre henger uløselig sammen, men er ikke det samme. En dramatiker arbeider med drama. En dramaturg arbeider med dramaturgien. En regissør arbeider i skjæringspunktet mellom alle tre — og det er det dette kapittelet handler om. → Se Å finne de rette ordene: Drama og teater for definisjoner og distinksjoner. Å skape et helhetlig scenisk uttrykk Sjanger — hva slags historie fortelles? Tone, tema og publikums forventninger til utfall. Eks: tragedie, komedie, melodrama, farse. Valg av sjanger vil ofte implisere en spillestil. Spillestil obs: ikke det samme som skuespillerteknikker Et spesifikt, helhetlig ekspressivt uttrykk som skuespilleren eller ensemblet skaper gjennom valgte bevegelseskvaliteter, stemmebruk og sceniske virkemidler. Spillestil kan kategoriseres som konvensjonell, realistisk, deklamatorisk eller stilisert. Stilisert kan videre avgrenses til for eksempel farse, «finsk fjernsynsteater», Pinteresque eller Wilsonesque . Spillestilen alene kan ofte signalisere sjanger til et publikum. NB — «Konvensjonell» spillestil «Konvensjonell» brukes her om teatralsk presentasjon med utgangspunkt i psykologisk realisme — ikke illusjonistisk realisme slik vi kjenner det fra film. Teaterform — definert av konvensjonene for hvordan forestillingen lages og presenteres. Teaterformen fastslår blant annet publikumskontrakten. Eks: commedia dell'arte, forumteater, gateteater, kabuki. Forestillinger som bevisst opererer utenfor etablerte teaterfor"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "melodrama, farse. Valg av sjanger vil ofte implisere en spillestil. Spillestil obs: ikke det samme som skuespillerteknikker Et spesifikt, helhetlig ekspressivt uttrykk som skuespilleren eller ensemblet skaper gjennom valgte bevegelseskvaliteter, stemmebruk og sceniske virkemidler. Spillestil kan kategoriseres som konvensjonell, realistisk, deklamatorisk eller stilisert. Stilisert kan videre avgrenses til for eksempel farse, «finsk fjernsynsteater», Pinteresque eller Wilsonesque . Spillestilen alene kan ofte signalisere sjanger til et publikum. NB — «Konvensjonell» spillestil «Konvensjonell» brukes her om teatralsk presentasjon med utgangspunkt i psykologisk realisme — ikke illusjonistisk realisme slik vi kjenner det fra film. Teaterform — definert av konvensjonene for hvordan forestillingen lages og presenteres. Teaterformen fastslår blant annet publikumskontrakten. Eks: commedia dell'arte, forumteater, gateteater, kabuki. Forestillinger som bevisst opererer utenfor etablerte teaterformer og deres konvensjoner kalles gjerne eksperimentelt teater . Publikumskontrakt — den implisitte avtalen om forholdet mellom utøvere og publikum — om publikum er passive betraktere, delaktige eller medskapende. Teatermodell — den fysiske og romlige organiseringen av forholdet mellom scene og sal: proscenium, traverse, black box, arena, site-specific. Det finnes ingen fasit på rekkefølgen når en regissør tar valg. En valgt teaterform vil ofte implisere en sjanger. En valgt sjanger vil ofte begrense valg av teaterform. Eigtved, M. (2007). Forestillingsanalyse . Forlaget Samfundslitteratur. · Gladsø, S. et al. (2005). Dramaturgi . Universitetsforlaget. · Nygaard, J. (1990). Om teater . Å skape en fengslende produksjon Når de praktiske rammene er valgt — sjanger, spillestil, teaterform, teatermodell — begynner arbeidet med å forme selve forestillingen som et særegent scenisk uttrykk. Det er her dramaturgien blir håndverk og kunst. Dramaturgisk modell (berg-og-dal-bane-skinnene) — den tekniske planen for fremdriften. Som skinnene på en berg-og-dal-bane bestemmer modellen tempoet på spenningskurven: hvor raskt konflikten eskalerer og hvor vendepunktene kommer. Dramaturgisk form (berg-og-dal-bane-opplevelsen) — det helhetlige sceniske uttrykket publikum faktisk får. Man kan følge spenningskurven lojalt — eller bryte den, f.eks. ved å senke tempoet helt ned i et klimaks for å skape episke grep. Regissørens verktøy Regissøren har to typer verktøy — sceniske og dramaturgiske virkemidler. Begge er de samme på tvers av modeller og former. Det er valgene regissøren tar i bruken av dem som skaper den dramaturgiske formen publikum opplever. Sceniske virkemidler Det materielle og sanselige — det publikum ser og hører. Lys, lyd, tekst, scenografi, kostyme og arrangement. De er materialet regissøren arbeider med. Dramaturgiske virkemidler Organiseringen av materialet over tid — hvordan spenning, rytme og mening bygges og brytes gjennom forestillingen. Dramaturgiske virkemidler Se o"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "niske planen for fremdriften. Som skinnene på en berg-og-dal-bane bestemmer modellen tempoet på spenningskurven: hvor raskt konflikten eskalerer og hvor vendepunktene kommer. Dramaturgisk form (berg-og-dal-bane-opplevelsen) — det helhetlige sceniske uttrykket publikum faktisk får. Man kan følge spenningskurven lojalt — eller bryte den, f.eks. ved å senke tempoet helt ned i et klimaks for å skape episke grep. Regissørens verktøy Regissøren har to typer verktøy — sceniske og dramaturgiske virkemidler. Begge er de samme på tvers av modeller og former. Det er valgene regissøren tar i bruken av dem som skaper den dramaturgiske formen publikum opplever. Sceniske virkemidler Det materielle og sanselige — det publikum ser og hører. Lys, lyd, tekst, scenografi, kostyme og arrangement. De er materialet regissøren arbeider med. Dramaturgiske virkemidler Organiseringen av materialet over tid — hvordan spenning, rytme og mening bygges og brytes gjennom forestillingen. Dramaturgiske virkemidler Se også Sceniske virkemidler Vis Her er de seks virkemidlene forklart — du vil se hvordan de brukes i de ulike dramaturgiske modellene nedenfor. Spenning Vis Forholdet mellom forventning og utløsning — det som holder publikum i stolen. Spenning bygges gjennom å gi publikum informasjon karakterene mangler (dramatisk ironi), ved å holde tilbake avgjørende opplysninger, eller ved å skape et gap mellom det en karakter sier og det den gjør. Utløsningen — vendepunktet eller klimakset — gir mening til alt som kom før. Skjul ↑ Kontraster Vis Bruk av motsetninger for å skape dynamikk og forsterke virkning. En stille scene før noe voldsomt gjør volden sterkere. En komisk figur i en tragedie setter det tragiske i relief. Stillhet etter intens fysisk aktivitet kan bære mer enn aktiviteten selv. Kontrasten er ikke et tilfeldig skifte — den er et bevisst grep for å gi publikum noe å måle mot. Skjul ↑ Ritualer Vis Gjentakende, formelle handlinger som gir forestillingen tyngde og indre logikk. En hilsen, et måltid, en bestemt frase — gjentatt nok ganger bygger den forventning og vekt. Når ritualet brytes eller nektes, bærer selve bruddet meningen. Det er ikke handlingen i seg selv, men det den har blitt ladet med gjennom gjentakelsen. Skjul ↑ Symboler Vis Gjenstander, figurer eller handlinger som bærer gjentatt eller forsterket betydning innenfor et bestemt verk. Symbolet bygges gjennom repetisjon og eskalering: første gang er det nøytralt, andre gang er det ladet, tredje gang bærer det hele stykkets tyngde. Villanden i Ibsens stykke er et klassisk eksempel. Det skiller seg fra et semiotisk tegn, som kan være et hvilket som helst element publikum tolker som meningsbærende. Se Fordypning: Semiotikk vs. dramaturgiske symboler . Skjul ↑ Rytme Vis Den tidsmessige organiseringen av forestillingen — tempoet i scenebytte, forholdet mellom handling og stillhet, hastigheten i dialogen. En langsom oppbygging etterfulgt av et brått kutt er i seg selv et dramaturgisk valg. Rytmen styrer når publik"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "et måltid, en bestemt frase — gjentatt nok ganger bygger den forventning og vekt. Når ritualet brytes eller nektes, bærer selve bruddet meningen. Det er ikke handlingen i seg selv, men det den har blitt ladet med gjennom gjentakelsen. Skjul ↑ Symboler Vis Gjenstander, figurer eller handlinger som bærer gjentatt eller forsterket betydning innenfor et bestemt verk. Symbolet bygges gjennom repetisjon og eskalering: første gang er det nøytralt, andre gang er det ladet, tredje gang bærer det hele stykkets tyngde. Villanden i Ibsens stykke er et klassisk eksempel. Det skiller seg fra et semiotisk tegn, som kan være et hvilket som helst element publikum tolker som meningsbærende. Se Fordypning: Semiotikk vs. dramaturgiske symboler . Skjul ↑ Rytme Vis Den tidsmessige organiseringen av forestillingen — tempoet i scenebytte, forholdet mellom handling og stillhet, hastigheten i dialogen. En langsom oppbygging etterfulgt av et brått kutt er i seg selv et dramaturgisk valg. Rytmen styrer når publikum puster ut, og når de ikke får lov. Skjul ↑ Gjentagelser Vis Repetisjon av elementer — en replikk, en bevegelse, et bilde — for å skape gjenkjennelse, forsterke budskap eller bygge mening over tid. Den samme replikken i tre ulike kontekster betyr tre ulike ting. En gest som gjentas i et avgjørende øyeblikk rekker tilbake til alle gangene den ble brukt før. Gjentagelse er ikke redundans — det er akkumulering. Skjul ↑ Ulike dramaturgiske modeller Vis Klassisk En lineær spenningskurve som bygger seg opp mot ett avgjørende klimaks og en løsning. Tid, sted og handling henger logisk sammen (kausalitet). Den mest utbredte modellen i vestlig teater. Illustrert av Freytags pyramide (1863) og basert på Aristoteles' Poetikk (ca. 335 f.Kr.). Også kalt lineær dramaturgi . Episk Episodisk struktur — scenene kan stå relativt fritt fra hverandre. Spenningskurven brytes bevisst gjennom fremmedgjøringsteknikker: tittelkort, direkte henvendelse til publikum, sang. Tilskueren skal tenke, ikke bare føle. Utviklet av Bertolt Brecht. Se Brecht i Teaterfornyere . Sirkulær Forestillingen vender tilbake til utgangspunktet — strukturen er lukket som en ring, slutten ekkoer begynnelsen. Brukes i ritualdrama og mange samtidsforestillinger. NB: «Sirkulær dramaturgi» er et moderne analytisk begrep, men strukturen er svært gammel — rituelle praksiser hadde allerede sirkulær logikk. Simultan Flere handlinger eller verdener eksisterer samtidig i samme rom. Publikum velger hva de følger. Kjent fra middelalderens mansions — ulike spillesteder synlige på én gang. NB: «Simultan dramaturgi» er et moderne analytisk begrep, men praksisen er gammel — se Middelalderen i Teaterhistorie . Likestilt De sceniske virkemidlene — tekst, kropp, lys, lyd, scenografi — er prinsipielt jevnbyrdige. Ingen tjener de andre. Scenografien er ikke dekorasjon for dialogen; lyset er ikke bare belysning. Hvert element bærer mening på egne premisser. Begrepet ble utviklet av Knut Ove Arntzen (UiB) på slutten av 1980-tallet. Leh"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": " Utviklet av Bertolt Brecht. Se Brecht i Teaterfornyere . Sirkulær Forestillingen vender tilbake til utgangspunktet — strukturen er lukket som en ring, slutten ekkoer begynnelsen. Brukes i ritualdrama og mange samtidsforestillinger. NB: «Sirkulær dramaturgi» er et moderne analytisk begrep, men strukturen er svært gammel — rituelle praksiser hadde allerede sirkulær logikk. Simultan Flere handlinger eller verdener eksisterer samtidig i samme rom. Publikum velger hva de følger. Kjent fra middelalderens mansions — ulike spillesteder synlige på én gang. NB: «Simultan dramaturgi» er et moderne analytisk begrep, men praksisen er gammel — se Middelalderen i Teaterhistorie . Likestilt De sceniske virkemidlene — tekst, kropp, lys, lyd, scenografi — er prinsipielt jevnbyrdige. Ingen tjener de andre. Scenografien er ikke dekorasjon for dialogen; lyset er ikke bare belysning. Hvert element bærer mening på egne premisser. Begrepet ble utviklet av Knut Ove Arntzen (UiB) på slutten av 1980-tallet. Lehmanns postdramatiske teori fra 1999 berører lignende spørsmål. Se Verdensteatret og Vinge/Müller som norske eksempler. Arntzen, K.O. (1990). «En visuell dramaturgi: De likestilte elementer». · Lehmann, H.-T. (2006). Postdramatic Theatre . Routledge, s. 93. · Larsen, W. (2019). «Likestilt dramaturgi». Teatervitenskapelige studier , 3, 39–54. Landskapsdramaturgi I stedet for en vertikal kurve mot et klimaks spres forestillingen horisontalt — som et landskap publikum kan betrakte fritt. Hendelsene følger ikke logisk av hverandre; det er ikke en tunnel å gå gjennom, men et rom å oppholde seg i. Elementer eksisterer i relasjon til hverandre fremfor i sekvens. Begrepet stammer fra Gertrude Steins forelesning «Plays» (1935), der hun beskrev teaterstykket som et landskap: noe som ikke beveger seg mot et mål, men som «er der». NB: Begrepet omtales også som «flat dramaturgi» i norske fagkilder. Stein, G. (1935). «Plays». I Lectures in America . Random House. Postdramatisk Bryter med drama som det organiserende prinsippet. Teksten er ikke lenger overordnet — den er ett materiale blant flere. Forestillingen er ikke nødvendigvis narrativ. Lehmanns begrep fra 1999 beskriver mye av samtidsscenekunsten fra 1970-tallet og fremover. Se post drama tisk — post (etter) + drama. NB: Begrepet er omdiskutert. Teaterteoretikeren Elinor Fuchs kritiserte Lehmanns brede bruk av begrepet i TDR (2008) — hun mente at Lehmann samler for mange ulike kunstnere og retninger under én paraply, og at begrepet dermed mister presisjon. Flere forskere har også påpekt at ideen om det postdramatiske ikke er Lehmanns originale — begrepet ble først introdusert av Andrzej Wirth og Richard Schechner. Lehmann, H-T. (2006). Postdramatic Theatre . Routledge. · Schechner, R. (1988). Performance Theory . Routledge, s. 20. · Fuchs, E. (2008). TDR , 52(2), s. 179–180. → Se Postdramatisk teater og Postdramatisk dramaturgi i Å finne
