ket ble ikke stoppet, men kritikken var ment som utryddelse. Disse eksemplene har ulike kunstneriske utgangspunkt, men felles er at de stiller spørsmål ved grenser — mellom kunst og virkelighet, mellom scene og samfunn, mellom frihet og ansvar. Noen har utløst juridiske, politiske eller etiske debatter. Hvem bestemmer grensen? Og hvem betaler? Ron Athey Vis En kunstner bruker sitt eget blod på scenen. Pressen rapporterer om noe som aldri skjedde. Kongressen grep inn. Ron Athey er en amerikansk performance-kunstner kjent for rituell bruk av kropp og smerte som kunstnerisk materiale, og forestillinger som trekker på S/M-kultur, religiøs ekstase og queer-identitet. Han er HIV-positiv og har brukt dette eksplisitt i sitt arbeid siden 1980-tallet. I 1994 fremførte han Four Scenes in a Harsh Life i Minneapolis. I en sekvens skar han et mønster i ryggen på en medperformer og hengte papirservietter fra sårene — servietter som deretter ble heist over publikum. Medperformeren var ikke HIV-positiv. Det var ingen smitterisiko. Pressen rapporterte at HIV-infisert blod hadde regnet over publikum. Det var usant. Men historien spredte seg raskt, nådde Kongressen, og utløste en nasjonal debatt om hva offentlige kulturmidler skulle finansiere. NEA — National Endowment for"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "litiske eller etiske debatter. Hvem bestemmer grensen? Og hvem betaler? Ron Athey Vis En kunstner bruker sitt eget blod på scenen. Pressen rapporterer om noe som aldri skjedde. Kongressen grep inn. Ron Athey er en amerikansk performance-kunstner kjent for rituell bruk av kropp og smerte som kunstnerisk materiale, og forestillinger som trekker på S/M-kultur, religiøs ekstase og queer-identitet. Han er HIV-positiv og har brukt dette eksplisitt i sitt arbeid siden 1980-tallet. I 1994 fremførte han Four Scenes in a Harsh Life i Minneapolis. I en sekvens skar han et mønster i ryggen på en medperformer og hengte papirservietter fra sårene — servietter som deretter ble heist over publikum. Medperformeren var ikke HIV-positiv. Det var ingen smitterisiko. Pressen rapporterte at HIV-infisert blod hadde regnet over publikum. Det var usant. Men historien spredte seg raskt, nådde Kongressen, og utløste en nasjonal debatt om hva offentlige kulturmidler skulle finansiere. NEA — National Endowment for the Arts — ble nesten nedlagt. Saken er et lærebokeksempel på hvordan kunstnerisk provokasjon møter mediemakt: det som faktisk skjedde, hadde liten betydning for debatten som fulgte. Kunstnere har alltid utfordret grenser. Det som er nytt, er ikke provokasjonen — det er spredningshastigheten til en feilaktig historie. ↗ Walker Art Center: Ron Athey og medieskandalens anatomi Skjul ↑ Vegard Vinge og Ida Müller Vis Klokken 02:40 om natten stoppes forestillingen. Man er fortsatt i første akt. Det norsk-tyske regissørparet er blant Norges mest internasjonalt anerkjente og kontroversielle teaterkunstnere. Kjent for ekstremt lange forestillinger — gjerne 8–12 timer — der Ibsens stykker dekonstrueres til det ugjenkjennelige. Kostymene er overdrevne, musikken er uhyggelig og høy, og det visuelle universet grenser til det karikerte. Under Festspillene i Bergen 2009 ble urpremieren på Vildanden stoppet klokken 02:40 om natten, etter ni timer — man var fortsatt i første akt. Festivaldirektøren grep inn; to tredjedeler av publikum hadde allerede gått. Aftenposten: Måtte stoppe skandaleteater ↗ ▶ YouTube: Vildanden — Vinge/Müller ↗ Skjul ↑ Ways of Seeing Vis Politikere angriper et teaterstykke om rasisme. Så viser det seg hvem som egentlig sto bak truslene. Teaterstykke av Pia Maria Roll, Hanan Benammar, Sara Baban og Marius von der Fehr. Hadde premiere på Black Box Teater i Oslo i november 2018. Stykket kartlegger nettverk som arbeider for å gjøre Norge til et mer rasistisk samfunn, og viser bilder av private hjem tilhørende offentlige personer — inkludert daværende justisminister Tor Mikkel Waras bolig. Det utløste en av de mest betente debattene om ytringsfrihet og kunstnerisk ansvar i nyere norsk teaterhistorie. Politikere anklaget kunstnerne for å krenke privatlivets fred. Statsminister Erna Solberg kritiserte forestillingen offentlig uten å ha sett den. I mars 2019 ble Waras samboer pågrepet og senere dømt for selv å stå bak trusselhendelsene mot paret — hendelser hun had"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "rep inn; to tredjedeler av publikum hadde allerede gått. Aftenposten: Måtte stoppe skandaleteater ↗ ▶ YouTube: Vildanden — Vinge/Müller ↗ Skjul ↑ Ways of Seeing Vis Politikere angriper et teaterstykke om rasisme. Så viser det seg hvem som egentlig sto bak truslene. Teaterstykke av Pia Maria Roll, Hanan Benammar, Sara Baban og Marius von der Fehr. Hadde premiere på Black Box Teater i Oslo i november 2018. Stykket kartlegger nettverk som arbeider for å gjøre Norge til et mer rasistisk samfunn, og viser bilder av private hjem tilhørende offentlige personer — inkludert daværende justisminister Tor Mikkel Waras bolig. Det utløste en av de mest betente debattene om ytringsfrihet og kunstnerisk ansvar i nyere norsk teaterhistorie. Politikere anklaget kunstnerne for å krenke privatlivets fred. Statsminister Erna Solberg kritiserte forestillingen offentlig uten å ha sett den. I mars 2019 ble Waras samboer pågrepet og senere dømt for selv å stå bak trusselhendelsene mot paret — hendelser hun hadde forsøkt å knytte til teaterstykket. IETM: Ways of Seeing og ytringsfrihet ↗ NRK: Ways of Seeing til Festspillene i Bergen ↗ Skjul ↑ Mia Habib Vis Han kaller det sløseri. Hun kaller det kunst. 500 000 klikk avgjorde ikke hvem som hadde rett. Mia Habib er danser, performer og koreograf basert i Oslo. Hun arbeider sjangeroverskridende og politisk — mennesker, møter og kulturell overskridelse er kjernen i arbeidet hennes. I 2018 ble hun tildelt basisfinansiering fra Kulturrådet — 2,8 millioner kroner i året i fire år. Facebook-profilen «Sløseriombudsmannen» (Are Søberg) plukket opp tildelingen og publiserte videoklipp av Habibs gulvbaserte koreografier med kommentarer om skattepengesløsing. Innlegget fikk 500 000 klikk. Habibs arbeid ble latterliggjort og tatt ut av kontekst — og hun mottok i kjølvannet av dette trusler og rasistiske kommentarer. Hun anmeldte nettavisen Resett for hatefulle ytringer. Saken er ikke unik. Sløseriombudsmannen hadde tidligere hengt ut flere scenekunstnere i en julekalender og vokste seg gradvis til en Facebook-side med over 77 000 følgere. Det som begynte som kritikk av offentlig pengebruk gled over i systematisk latterliggjøring av kunstnere — og i Habibs tilfelle i rasistisk hets. Saken utløste en bred debatt om kunstens rolle, armlengdeprinsippet, og grensen mellom satire og digital trakassering — en debatt som ennå ikke er avsluttet. Kilde: Habib, M. (2019). «Mia Habib anmelder Resett». Scenekunst.no , 28. februar. · Aftenposten (2021). «Kunstnere får flere trusler enn før», 18. mars. Skjul ↑ Hva mener du? Hva er tillatt å vise på en scene? Hva bør skattebetalerne finansiere — og hvem skal bestemme det? Har kunst en forpliktelse til å være forståelig? Har kunst en forpliktelse til å være moralsk «god»? Har kunst en forpliktelse til å være teknisk dyktig? Hvis alt kan være kunst — hvem fortjener da støtte? Jeg mener... ← Kropp, stemme og bevegelse Å finne de rette ordene → © 2026 · Redaktør: Ren Powell"}, {"file": "performance-politikk.html", "id": "", "title": "Etikk, grenser og det teatrale", "page": "Etikk, grenser og det teatrale", "num": "08", "text": " en julekalender og vokste seg gradvis til en Facebook-side med over 77 000 følgere. Det som begynte som kritikk av offentlig pengebruk gled over i systematisk latterliggjøring av kunstnere — og i Habibs tilfelle i rasistisk hets. Saken utløste en bred debatt om kunstens rolle, armlengdeprinsippet, og grensen mellom satire og digital trakassering — en debatt som ennå ikke er avsluttet. Kilde: Habib, M. (2019). «Mia Habib anmelder Resett». Scenekunst.no , 28. februar. · Aftenposten (2021). «Kunstnere får flere trusler enn før», 18. mars. Skjul ↑ Hva mener du? Hva er tillatt å vise på en scene? Hva bør skattebetalerne finansiere — og hvem skal bestemme det? Har kunst en forpliktelse til å være forståelig? Har kunst en forpliktelse til å være moralsk «god»? Har kunst en forpliktelse til å være teknisk dyktig? Hvis alt kan være kunst — hvem fortjener da støtte? Jeg mener... ← Kropp, stemme og bevegelse Å finne de rette ordene → © 2026 · Redaktør: Ren Powell"}, {"file": "performance-politikk.html", "id": "pp-politisk", "title": "Politisk teater", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Politisk teater Vis Politisk teater bruker scenen som arena for samfunnskritikk og endring. Det kjennetegnes av at formen og innholdet henger uatskillelig sammen — måten det fortelles på er like politisk som hva som fortelles. Politisk teater er ikke én ting — det arbeider på minst tre måter: Folket mot makten — agitprop, actos, forumteater, gateteater Makten mot folket — showprosesser, propaganda De skjulte stemmene — representasjon, dokumentarteater Folket mot makten Agitprop Ordet kommer fra «agitation og propaganda» og ble en formell del av den kommunistiske regjeringen i Sovjet etter revolusjonen. Forestillingene var flyttbare og ofte fremført i gatene — deklamatoriske, repetitive og direkte henvendt til arbeiderklassen. Formen nådde sitt høydepunkt på 1920-tallet. Vsevolod Meyerhold "}, {"file": "performance-politikk.html", "id": "pp-bro", "title": "Det tomme rommet har alltid vært", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Det tomme rommet har alltid vært Vis Peter Brook åpnet Det tomme rom (1968) med en enkel påstand: et tomt rom er alt som trengs. En person krysser det, en annen ser på — og teateret har oppstått. Ingen bygning, ingen institusjon, ingen tekst. Bare en utøver og et vitne. Det Brook beskrev som en oppdagelse, viste seg å være en bekreftelse. Da Schechner, Grotowski og andre reiste verden rundt for å lære av andre kulturer, fant de tradisjoner som hadde eksistert i tusenvis av år — rike, sofistikerte og fullt utviklede, uten at de noen gang hadde trengt et teatron. Noen bruker begrepet urteater om disse tradisjonene — performance i sin «opprinnelige» form. Det er et begrep som kan åpne noe, men det er omdiskutert: Schechners tilnærming til ikke-vestlige ritualer som kilde for vestlig teater bl"}, {"file": "performance-politikk.html", "id": "pp-selv", "title": "Iscenesettelse av selvet", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Iscenesettelse av selvet Vis «Iscenesettelse av selvet» kan bety to ting — og begge er teatrale i sin kjerne. Å speile samfunnet En kultur kan iscenesette seg selv på scenen — ikke bare for å underholde, men for å vise frem det den ønsker å tro om seg selv, eller det den ikke tør si høyt på andre arenaer. Da Pierre-Augustin Caron de Beaumarchais satte Le Mariage de Figaro opp i Paris i 1784, satte han droit du seigneur i sentrum av handlingen. Kongen forsøkte å forby stykket i årevis. Da det endelig ble oppført, var publikum henrykt og rasende på samme tid. Napoleon skal senere ha sagt at stykket var «revolusjonen allerede i gang» (tilskrevet Napoleon Bonaparte) . Teateret hadde sagt det samfunnet ennå ikke var i stand til å vedta som lov. Se også Representasjon og dokumentarteater . Å spi"}, {"file": "performance-politikk.html", "id": "pp-kunstform", "title": "Performance som kunstform", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Performance som kunstform Vis Performance som kunstform oppstod i USA og Europa på 1960-tallet — men som vi har sett, er performance som menneskelig praksis langt eldre. Det som var nytt var at vestlige kunstnere begynte å bruke performance bevisst som kunstnerisk form og teoretisere rundt den. Schechner — Performance Studies Richard Schechner utviklet Performance Studies som akademisk felt ved NYU. Hans viktigste begreper: «Is» performance — teater, ritual, sport: bevisst fremføring for et publikum «As» performance — hverdagslig atferd sett som forestilling (jf. Goffman) Restored behavior — all atferd er innøvd og repetert, aldri helt original. Vi «siterer» atferd vi har lært. Kontinuumet — fra «impure theatre» (parader, demonstrasjoner) til «pure theatre» (tradisjonelt teater). Environme"}, {"file": "performance-politikk.html", "id": "pp-kunstnere", "title": "Performance-kunstnere", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Performance-kunstnere Vis Lenker og ressurser legges til fortløpende. Rachel Rosenthal 1926–2015 · Frankrike/USA Feministisk performance, kropp, alder, dyrerettigheter og økologi. Kombinerte teater og performance på en måte som utfordret begge felt. En av de mest innflytelsesrike performance-kunstnerne i USA. ▶ YouTube: Rachel Rosenthal Kjartan Slettemark 1932–2008 · Norge/Sverige Norsk/svensk kunstner og performance-pioneer fra 1960-tallet. Vietnam-bildene, nakenhet som politisk statement. Kobler norsk kunsthistorie til den internasjonale performance-bevegelsen. Politisk performance i ordets fulleste forstand. SNL: Kjartan Slettemark ↗ Marina Abramović 1946– · Serbia/USA Kroppen er kunstmediet: utholdenhet, smerte og tilstedeværelse er materialet. «The artist is present» (MoMA, 2010): sat"}, {"file": "performance-politikk.html", "id": "pp-athey", "title": "Ron Athey", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Ron Athey Vis En kunstner bruker sitt eget blod på scenen. Pressen rapporterer om noe som aldri skjedde. Kongressen grep inn. Ron Athey er en amerikansk performance-kunstner kjent for rituell bruk av kropp og smerte som kunstnerisk materiale, og forestillinger som trekker på S/M-kultur, religiøs ekstase og queer-identitet. Han er HIV-positiv og har brukt dette eksplisitt i sitt arbeid siden 1980-tallet. I 1994 fremførte han Four Scenes in a Harsh Life i Minneapolis. I en sekvens skar han et mønster i ryggen på en medperformer og hengte papirservietter fra sårene — servietter som deretter ble heist over publikum. Medperformeren var ikke HIV-positiv. Det var ingen smitterisiko. Pressen rapporterte at HIV-infisert blod hadde regnet over publikum. Det var usant. Men historien spredte seg raskt"}, {"file": "performance-politikk.html", "id": "pp-vinge", "title": "Vegard Vinge og Ida Müller", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Vegard Vinge og Ida Müller Vis Klokken 02:40 om natten stoppes forestillingen. Man er fortsatt i første akt. Det norsk-tyske regissørparet er blant Norges mest internasjonalt anerkjente og kontroversielle teaterkunstnere. Kjent for ekstremt lange forestillinger — gjerne 8–12 timer — der Ibsens stykker dekonstrueres til det ugjenkjennelige. Kostymene er overdrevne, musikken er uhyggelig og høy, og det visuelle universet grenser til det karikerte. Under Festspillene i Bergen 2009 ble urpremieren på Vildanden stoppet klokken 02:40 om natten, etter ni timer — man var fortsatt i første akt. Festivaldirektøren grep inn; to tredjedeler av publikum hadde allerede gått. Aftenposten: Måtte stoppe skandaleteater ↗ ▶ YouTube: Vildanden — Vinge/Müller ↗ Skjul ↑"}, {"file": "performance-politikk.html", "id": "pp-ways", "title": "Ways of Seeing", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Ways of Seeing Vis Politikere angriper et teaterstykke om rasisme. Så viser det seg hvem som egentlig sto bak truslene. Teaterstykke av Pia Maria Roll, Hanan Benammar, Sara Baban og Marius von der Fehr. Hadde premiere på Black Box Teater i Oslo i november 2018. Stykket kartlegger nettverk som arbeider for å gjøre Norge til et mer rasistisk samfunn, og viser bilder av private hjem tilhørende offentlige personer — inkludert daværende justisminister Tor Mikkel Waras bolig. Det utløste en av de mest betente debattene om ytringsfrihet og kunstnerisk ansvar i nyere norsk teaterhistorie. Politikere anklaget kunstnerne for å krenke privatlivets fred. Statsminister Erna Solberg kritiserte forestillingen offentlig uten å ha sett den. I mars 2019 ble Waras samboer pågrepet og senere dømt for selv å s"}, {"file": "performance-politikk.html", "id": "pp-habib", "title": "Mia Habib", "page": "Etikk, grenser og det teatrale", "num": "08", "text": "Mia Habib Vis Han kaller det sløseri. Hun kaller det kunst. 500 000 klikk avgjorde ikke hvem som hadde rett. Mia Habib er danser, performer og koreograf basert i Oslo. Hun arbeider sjangeroverskridende og politisk — mennesker, møter og kulturell overskridelse er kjernen i arbeidet hennes. I 2018 ble hun tildelt basisfinansiering fra Kulturrådet — 2,8 millioner kroner i året i fire år. Facebook-profilen «Sløseriombudsmannen» (Are Søberg) plukket opp tildelingen og publiserte videoklipp av Habibs gulvbaserte koreografier med kommentarer om skattepengesløsing. Innlegget fikk 500 000 klikk. Habibs arbeid ble latterliggjort og tatt ut av kontekst — og hun mottok i kjølvannet av dette trusler og rasistiske kommentarer. Hun anmeldte nettavisen Resett for hatefulle ytringer. Saken er ikke unik. Sl"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "Å finne de rette ordene — Teaterfag kompendium ← Kompendium Å finne de rette ordene ☀︎ ⌕ 09 Å FINNE DE RETTE ORDENE Å skrive dramatisk tekst · Akademisk skriving · Begrep Å skrive dramatisk tekst Vis Å skrive monologer og dialoger Vis Ikke tenk på dette som en skriveoppgave. Fokuser på det talte ordet — et levende, muntlig språk. Teater handler om handling: karakterene gjør ting og lever i øyeblikket. De strever med å forstå sine erfaringer foran oss — i sanntid. En dramatisk monolog presenterer en karakter som vanligvis gjennomgår en slags forandring. Komme i gang Vis Den sveitsiske dramatikeren Dürrenmatt sa: Begynn aldri med et tema — begynn med en karakter. Sett karakteren gjennom det verste du kan tenke deg mens de kjemper for å få det de vil ha. Hva vil karakteren? Hva står på spill for dem? Hvordan vil de nå målet sitt? Scenario først: Finn en situasjon. Velg sjanger. Spør: hvilken karakter ville hatt det verst her? Grav deg inn i karakteren — skriv dagbokinnlegg, GOTEsheet ↗ , varm stol. Lek scenen igjen og igjen. Form og dramaturgi Vis Første utkast har ofte en form som ligner en bratt oppoverbakke — stigende spenning uten pustepause. Prøv å sette karakteren — og publikum — på en berg-og-dal-bane. Veksle mellom lettere og tyngre beats. Du trenger ikke følge aristotelisk dramaturgi, men vær bevisst på hvordan du samhandler med publikums forventninger. Vanlige feller Vis Ikke skrive første, andre og tredje utkast — og ikke ta imot tilbakemeldinger Ikke lese monologen høyt underveis i prosessen Skrive en karakterskisse eller et dikt i stedet for en teatralsk monolog — en sint tirade er ikke et drama. En demonstrasjon av én følelse er langt mindre interessant enn en metamorfose Fortelle hva du gjorde i dag til en uspesifisert lytter — noe må stå på spill Skrive subteksten i stedet for dialogen Sjekkliste — når utkastet er klart Vis Har karakteren din en spine ? — det overordnede målet eller behovet som driver karakteren gjennom hele stykket. Alt karakteren gjør springer ut av denne grunnleggende drivkraften. Matcher språkets tempo karakterens emosjonelle tempo? Finnes det utilsiktede klisjeer eller generaliseringer du må gjøre spesifikke? Matcher språket karakterens alder, utdanning og bakgrunn? Bryr du deg om karakteren din og det de har å si? Lydenes emosjonelle effekt Vis Ordenes lyd påvirker publikum emosjonelt — uavhengig av betydning. Dette er verktøy for deg som dramatiker: Plosiver — harde konsonanter (p, b, t, d, k, g) skaper spenning, energi og aggresjon: banker, biter, kutter, dreper . Frikkativer — mykere konsonanter (f, v, s, h) skaper flyt, ro eller hvesing: sukker, svever, hvisker, flyter . Nasaler — resonante konsonanter (m, n, ng) gir varm, summende kvalitet: minner, nynner, synger . Skaper nærhet og ettertanke. Likvider — flytende konsonanter (l, r) gir myk, klingende lyd: rullet, glir, latter . Brukt mye i poesi for sin musikalske kvalitet. Vokaler — åpne vokaler (a, æ, ø) skaper romslighet og åpenhet; lukkede vokaler (i, "}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": " springer ut av denne grunnleggende drivkraften. Matcher språkets tempo karakterens emosjonelle tempo? Finnes det utilsiktede klisjeer eller generaliseringer du må gjøre spesifikke? Matcher språket karakterens alder, utdanning og bakgrunn? Bryr du deg om karakteren din og det de har å si? Lydenes emosjonelle effekt Vis Ordenes lyd påvirker publikum emosjonelt — uavhengig av betydning. Dette er verktøy for deg som dramatiker: Plosiver — harde konsonanter (p, b, t, d, k, g) skaper spenning, energi og aggresjon: banker, biter, kutter, dreper . Frikkativer — mykere konsonanter (f, v, s, h) skaper flyt, ro eller hvesing: sukker, svever, hvisker, flyter . Nasaler — resonante konsonanter (m, n, ng) gir varm, summende kvalitet: minner, nynner, synger . Skaper nærhet og ettertanke. Likvider — flytende konsonanter (l, r) gir myk, klingende lyd: rullet, glir, latter . Brukt mye i poesi for sin musikalske kvalitet. Vokaler — åpne vokaler (a, æ, ø) skaper romslighet og åpenhet; lukkede vokaler (i, u) skaper intensitet eller tetthet. Lange vokaler bremser tempoet; korte driver det fremover. Onomatopeia — ord som ligner lyden de beskriver: sus, knas, brak, knirk . Gir teksten sensorisk umiddelbarhet. Tenk på hvordan din karakters språk lyder — ikke bare hva det betyr. En karakter under press snakker kanskje i kortere, hardere ord. En drømmende karakter i lengre, mykere setninger. Rytme og setningsstruktur Vis Rytmen i teksten kommuniserer like mye som ordene. Noen verktøy: Enstavelsesord skaper urgency og direkte kraft: Gå. Nå. Hit. Stopp. — korte ord banker. Flerstavelsesord bremser og nyanserer. Ferdige tanker lukker — de avslutter og gir ikke motparten rom. Uferdig tanker åpner: «Jeg tenkte at kanskje...» inviterer og viser sårbarhet. Avbrutte setninger — karakteren starter men klarer ikke fullføre. Det som ikke sies er ofte mer ladet enn det som sies. Skriv avbruddet inn i teksten: «Jeg vil bare at du skal—» Taushet og pause er handling, ikke tomrom. Pinter bygde hele dramaturgier av det som ikke ble sagt. Sceneanvisninger og fysisk handling Vis I de fleste tilfeller er ikke en regissør forpliktet til å følge dine sceneanvisninger. Det eneste unntaket er noen dramatikere — Beckett er det mest kjente — hans bo beskytter instruksjonene som en del av verket. Det betyr at du ikke kan stole på sceneanvisninger for å fortelle historien. Det fysiske må ligge i dialogen — ikke som instruksjon, men som nødvendighet. Hvis karakteren din trenger å krysse rommet, gi dem en grunn som springer ut av det de sier eller hva de trenger. En karakter som desperat trenger på toalettet beveger seg annerledes enn en som er nysgjerrig på noe i vinduet. Skriv behovet inn i teksten — la regissøren og skuespilleren finne formen. Kilde: Powell, R. (2016/2024). Å skrive monologer og dialoger . Teaterfag kompendium: tilleggsmateriale. Skjul ↑ Å skrive scener Vis Drama = konflikt. Begge karakterene må ha motstridende mål — og begge må forvente å nå sitt. En scene skal ikke være en monolo"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "gier av det som ikke ble sagt. Sceneanvisninger og fysisk handling Vis I de fleste tilfeller er ikke en regissør forpliktet til å følge dine sceneanvisninger. Det eneste unntaket er noen dramatikere — Beckett er det mest kjente — hans bo beskytter instruksjonene som en del av verket. Det betyr at du ikke kan stole på sceneanvisninger f  R. (2016/2024). Creating Scenes for Classwork . Teaterfag kompendium: tilleggsmateriale. Skjul ↑ Karakterdrevet vs. handlingsdrevet Vis Karakterdrevet — karakteren er så spesifikk som mulig. Hennes individuelle, realistiske samspill med skiftende omstendigheter driver historien fremover. Hun transformerer og tilpasser seg nye omstendigheter. Publikum identifiserer seg med karakteren og opplever tilfredsstillelse når karakteren vokser. Teksten gjenspeiler karakterens skiftende indre tilstand. Handlingsdrevet — karakteren er en «type» som ikke er i stand til å transformere seg. Vi nyter å se en kjent type reagere på skiftende omstendigheter på en måte som "}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "ne» et beat, så tape det neste. Lengden på et beat bestemmer tempoet i scenen — som i et partitur. In medias res Vis Begynn midt i noe som allerede er i gang. Nye dramatikere starter ofte for tidlig — med ankomst, hilsener, oppsett. Det publikum trenger å vite om bakgrunnen, avdekkes underveis. Se Begrep: In medias res . Kilde: Powell, R. (2016/2024). Creating Scenes for Classwork . Teaterfag kompendium: tilleggsmateriale. Skjul ↑ Karakterdrevet vs. handlingsdrevet Vis Karakterdrevet — karakteren er så spesifikk som mulig. Hennes individuelle, realistiske samspill med skiftende omstendigheter driver historien fremover. Hun transformerer og tilpasser seg nye omstendigheter. Publikum identifiserer seg med karakteren og opplever tilfredsstillelse når karakteren vokser. Teksten gjenspeiler karakterens skiftende indre tilstand. Handlingsdrevet — karakteren er en «type» som ikke er i stand til å transformere seg. Vi nyter å se en kjent type reagere på skiftende omstendigheter på en måte som er true-to-type . Den komiske verdien ligger i at vi gjenkjenner karakteren og absurditeten i situasjonen. Krever kontrollert, ekspressiv bevegelse. Meyerhold mente biomekanikk var nødvendig for denne typen spill. Den upålitelige fortelleren — publikum tror de møter én type person — jo mer karakteren snakker, jo mer ser vi hvem de virkelig er. Karakteren vet det ikke selv. Dette er et eksempel på dramatisk ironi — publikum vet noe karakteren ikke vet om seg selv, og må selv trekke konklusjonen. Kilde: Powell, R. (2016/2024). Character-driven vs. Plot-driven . Teaterfag kompendium: tilleggsmateriale. Skjul ↑ Troper, klisjeer og restriksjoner Vis Restriksjoner Ingen selvmord på scenen Ingen skudd Ingen selvskading Ingen «dead girl trope» — en død eller voldtatt kvinne som kun er et plottgrep Dette er skolens policy og lærerens pedagogiske filosofi — ikke sensur av ytringer i samfunnet. Dramaturgisk flat skriving bør løses med kreativitet, ikke billige troper. Spør Ren hvis du vil argumentere for et unntak. Hva er en trope? Vis En trope er en sekvens av hendelser vi ofte ser gjentatt — i en enkelt fortelling eller i kulturens historiefortelling generelt. En trope i seg selv er ikke et problem. Problemet oppstår når tropen brukes så ofte at den glir over i en klisjé — og publikum slutter å legge merke til detaljene. Hva er galt med en klisjé? Vis Klisjeer er ofte sanne — det er derfor de oppsto. Problemet er at de er så kjente at publikum ikke lenger tenker over hva de betyr. Som dramatiker ønsker vi at karakterens stemme virkelig kommuniserer rikdommen i deres erfaring — ikke at publikum skummer over teksten fordi den er for kjent. Unntak: Du kan velge å skrive en karakter som snakker i ingenting annet enn klisjeer — det kan i seg selv være et bevisst kunstnerisk valg. Kilde: Powell, R. (2016/2024). Troper, klisjeer og restriksjoner . Teaterfag kompendium: tilleggsmateriale. Skjul ↑ Analyser din egen tekst Vis Bruk de samme verktøyene du bruker på andres tekster på din"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "tere for et unntak. Hva er en trope? Vis En trope er en sekvens av ntert fakta, forklart med egne ord, og sammenlignet på faglig grunnlag. ✓ «Basert på denne sammenligningen kan man argumentere for at [A] skiller seg fra [B] ved [faglig aspekt], fordi [faglig begrunnelse fra pensum].» Nivå 6 — Syntese Vis Syntese innebærer å skape noe genuint nytt ved å kombinere ideer fra ulike kilder. Vi forventer ikke syntese på videregående nivå. Karakter 6 oppnås med særdeles god drøfting. NB — Plagiat og ansvar for informasjon Presenterer du en idé uten kilde = plagiat Presenterer du en idé med kilde = fakta (uansett om du er enig) I begge tilfeller kan du ikke drøfte ideen videre som din egen Basert på Blooms taksonomi · UDIR sin anbefaling for vurdering · Ren Powell Skjul ↑ Hypotese, disposisjon og martiniglasset Vis Hypotese vs. problemstilling Vis En problemstilling er det dere kjenner fra før — et spørsmål som tar leseren med på selve læringsprosessen og utforsker svaret underveis. En hypotese er annerledes: teksten forteller leseren hva forfatteren allerede har lært — ikke hvordan de lærte det. Du legger frem påstanden i innledningen og bruker resten av teksten til å underbygge den med fakta, sammenligning og drøfting. Læringsprosessen er gjort på forhånd. Det leseren får se er konklusjonen og begrunnelsen for den. Eksempel: Hypotese: Banan er den perfekte turmat. Teksten tar med bekreftende fakta, tar opp motargumenter — og tilbyr løsninger. NB: Hvis du underveis finner ut at hypotesen var feil — skriv oppgaven om igjen slik at påstand og konklusjon stemmer. Disposisjon Vis Et veikart for teksten — både for deg som skriver og leseren som følger argumentet ditt. Martiniglasset — mal for oppgavestruktur Vis Begynn bredt og arbeid deg mot det spesifikke. Konklusjonen åpner seg ut igjen — tilbake til den brede sammenhengen. X og Y = de to elementene du sammenligner (f.eks. to fornyere, to metoder, to epoker). Kursiv = delkonklusjon. Enkel Innledning Bredt tema Smalere kontekst → Hypotese I. Fakta A. X og hennes teatersyn B. Y og hans teatersyn C. Delkonklusjon II. Sammenligning A. [aspekt 1] — X og Y B. [a"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "nnledningen og bruker resten av teksten til å underbygge den med fakta, sammenligning og drøfting. Læringsprosessen er gjort på forhånd. Det leseren får se er konklusjonen og begrunnelsen for den. Eksempel: Hypotese: Banan er den perfekte turmat. Teksten tar med bekreftende fakta, tar opp motargumenter — og tilbyr løsninger. NB: Hvis du underveis finner ut at hypotesen var feil — skriv oppgaven om igjen slik at påstand og konklusjon stemmer. Disposisjon Vis Et veikart for teksten — både for deg som skriver og leseren som følger argumentet ditt. Martiniglasset — mal for oppgavestruktur Vis Begynn bredt og arbeid deg mot det spesifikke. Konklusjonen åpner seg ut igjen — tilbake til den brede sammenhengen. X og Y = de to elementene du sammenligner (f.eks. to fornyere, to metoder, to epoker). Kursiv = delkonklusjon. Enkel Innledning Bredt tema Smalere kontekst → Hypotese I. Fakta A. X og hennes teatersyn B. Y og hans teatersyn C. Delkonklusjon II. Sammenligning A. [aspekt 1] — X og Y B. [aspekt 2] — X og Y C. [aspekt 3] — X og Y D. Delkonklusjon III. Drøfting A. Motargument B. Din faglige posisjon C. Delkonklusjon — sterkeste sist Konklusjon → Gjenta hypotesen Smalere kontekst Bredt tema Avansert Innledning Bredt tema Smalere kontekst → Hypotese I. Fakta A. X og hennes teatersyn B. Y og hans teatersyn C. Delkonklusjon II. Sammenligning — [aspekt 1] A. X sitt syn i. [punkt] ii. [punkt] B. Y sitt syn i. [punkt] ii. [punkt] C. Delkonklusjon III. Sammenligning — [aspekt 2] A. X sitt syn i. [punkt] ii. [punkt] B. Y sitt syn i. [punkt] ii. [punkt] C. Delkonklusjon IV. Sammenligning — [aspekt 3] A. X sitt syn i. [punkt] ii. [punkt] B. Y sitt syn i. [punkt] ii. [punkt] C. Delkonklusjon V. Drøfting A. Motargument B. Din faglige posisjon C. Delkonklusjon — sterkeste sist Konklusjo t). Sanselighet og tilstedeværelse. Eksistens Karakterer som ideer. Karakterer via skuespillere. Performeren som seg selv. Handling En logisk rekkefølge. Scener som utspiller seg. Tilstander eller fragmenter. Dramaet er oppskriften, men teateret er selve kaken. Postdramatisk teater stiller spørsmål ved om det i det hele tatt trenger en oppskrift. Tassi, A. (1998). The Metaphysics of Performance: The \"Theatre of the World\" . Presentert ved The Twentieth World Congress of Philosophy, Boston University. · European Theatre Lexicon: Postdramatic Theatre ↗ Teater og metafysikk (Tassi) Vis Metafysikk høres komplisert ut, men i teateret betyr det rett og slett å undersøke hva det vil si å eksistere. Professor Aldo Tassi mener at teateret er det perfekte stedet å se «virkeligheten i aksjon». Hva er metafysikk? — Metafysikk er den delen av filosofien som spør: Hva er virkelig? og Hva vil det si å finnes? Tassi sier at alt i universet «gjør» sin egen eksistens. Et tre er ikke bare et tre; det «tre-er» aktivt ved å vokse og være til stede. Han kaller dette for «the performance of being» (værens prestasjon). Hvordan ser vi dette i teateret? — Teateret er som et laboratorium for eksistens. Når en skuespiller går ut på en tom scene, skjer det noe magisk: Nærvær (Presence) — Skuespilleren henter frem en karakter som ikke fantes før. Dette er metafysikk i praksis fordi vi ser skapelsen av en «ny virkelighet» her og nå. Felles sannhet — Publikumet og skuespillerne blir enige om at det som skjer på scenen er «sant» akkurat nå. Dette speiler hvordan vi i hverdagen er med på å skape den virkeligheten vi lever i. Tassi, A. (1998). The Metaphysics of Performance: The \"Theatre of the World\" . Presentert ved The Twentieth World Congress of Philosophy, Boston University. Skjul ↑ Å lage teater Vis Ensemble Vis En gruppering av utøvere hvor alle gjør det som må til (en flat organisasjonsstruktur) for å skape en teateroppsetning. Devising Vis En arbeidsprosess hvor ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd. Konvensjoner Vis Teatrale konvensjoner er de uskrevne reglene som styrer møtet mellom forestilling og publikum — gjenkjennelige spilleregler som begge parter aksepterer. Konvensjoner varierer mellom teaterformer og epoker, og kan brytes bevisst for artis"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": " Dette er metafysikk i praksis fordi vi ser skapelsen av en «ny virkelighet» her og nå. Felles sannhet — Publikumet og skuespillerne blir enige om at det som skjer på scenen er «sant» akkurat nå. Dette speiler hvordan vi i hverdagen er med på å skape den virkeligheten vi lever i. Tassi, A. (1998). The Metaphysics of Performance: The \"Theatre of the World\" . Presentert ved The Twentieth World Congress of Philosophy, Boston University. Skjul ↑ Å lage teater Vis Ensemble Vis En gruppering av utøvere hvor alle gjør det som må til (en flat organisasjonsstruktur) for å skape en teateroppsetning. Devising Vis En arbeidsprosess hvor ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd. Konvensjoner Vis Teatrale konvensjoner er de uskrevne reglene som styrer møtet mellom forestilling og publikum — gjenkjennelige spilleregler som begge parter aksepterer. Konvensjoner varierer mellom teaterformer og epoker, og kan brytes bevisst for artistisk effekt. Handling Vis Sceniske handlinger — alt som skjer fysisk på scenen. Dramaturgiske handlinger — handlinger som fører fram fortellingen eller forestillingens dramaturgi (kan være lysforandringer eller andre sceniske elementer). Handlingsforløp — dramaturgisk begrep, «plot», handlingen i et dramatisk verk. Iscenesettelse Vis Å forberede, regissere og sette i scene et teaterstykke. Teatral ytring Vis En handling eller et uttrykk som er rammet inn for å bli sett og tolket av andre. Det teatrale ligger ikke nødvendigvis i at det skjer på en scene — men i at noen iscenesetter seg selv eller noe annet for et publikum, bevisst eller ubevisst. En politisk tale, et rituale, en motevisning og et teaterstykke er alle teatrale ytringer. Se også: Iscenesettelse av selvet . Skjul ↑ Greske begreper Vis Mimesis Vis Etterligning eller fremstilling av virkeligheten gjennom kunst. Aristoteles mente at all kunst er mimesis — en imitasjon av menneskelige handlinger. Katarsis Vis Tilskuerens emosjonelle renselse gjennom medlidenhet og frykt i møte med tragedien. Et sentralt begrep i Aristoteles' Poetikk . Hamartia Vis Protagonistens fatale feil eller svakhet som fører til fall. Ikke nødvendigvis en moralsk feil — det kan være uvitenhet eller feilvurdering. Hubris Vis Overmod eller stolthet som fører til fall — en vanlig form for hamartia i gresk tragedie. Protagonisten overvurderer sin egen makt eller utfordrer gudene. Peripeteia Vis Vendepunktet — en plutselig og uventet omvending av protagonistens situasjon, fra lykke til ulykke eller omvendt. Anagnorisis Vis Gjenkjennelse — protagonistens plutselige innsikt om sin egen situasjon, identitet eller en annens. Inntreffer ofte samtidig med peripeteia. Deus ex machina Vis «Gud fra maskinen» — en uventet og kunstig løsning på en konflikt, der en ekstern kraft griper inn. I gresk teater ble en gud bokstavelig talt heist ned på scenen med en kran. Skjul ↑ Dramaturgiske begreper Vis Eksposisjon Vis Innledningen der situasjon, karakter"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "onelle renselse gjennom medlidenhet og frykt i møte med tragedien. Et sentralt begrep i Aristoteles' Poetikk . Hamartia Vis Protagonistens fatale feil eller svakhet som fører til fall. Ikke nødvendigvis en moralsk feil — det kan være uvitenhet eller feilvurdering. Hubris Vis Overmod eller stolthet som fører til fall — en vanlig form for hamartia i gresk tragedie. Protagonisten overvurderer sin egen makt eller utfordrer gudene. Peripeteia Vis Vendepunktet — en plutselig og uventet omvending av protagonistens situasjon, fra lykke til ulykke eller omvendt. Anagnorisis Vis Gjenkjennelse — protagonistens plutselige innsikt om sin egen situasjon, identitet eller en annens. Inntreffer ofte samtidig med peripeteia. Deus ex machina Vis «Gud fra maskinen» — en uventet og kunstig løsning på en konflikt, der en ekstern kraft griper inn. I gresk teater ble en gud bokstavelig talt heist ned på scenen med en kran. Skjul ↑ Dramaturgiske begreper Vis Eksposisjon Vis Innledningen der situasjon, karakterer og bakgrunn presenteres for publikum. Komplikasjon Vis Det som setter konflikten i gang — en hendelse eller avsløring som forstyrrer den innledende balansen og driver handlingen fremover. Klimaks Vis Spenningens høydepunkt — det avgjørende øyeblikket der konflikten når sin topp og utfallet bestemmes. Fallende handling Vis Handlingen etter klimaks, der spenningen løses opp og konsekvensene av det avgjørende øyeblikket utspiller seg. Løsning / denouement Vis Avslutningen der konfliktens tråder løses opp og en ny balanse etableres. Fra fransk «å løse opp en knute». In medias res Vis «Midt i tingene» — å begynne forestillingen eller teksten midt i handlingen, uten innledende eksposisjon. Bakgrunn avdekkes gradvis underveis. Skjul ↑ Teaterretninger Vis Eksempler på historiske kunstneriske bevegelser — epoke, estetikk, nøkkelpersoner. Realisme Vis Psykologisk troverdige karakterer i gjenkjennelige situasjoner. Ikke nødvendigvis fotografisk nøyaktig, men emosjonelt sant. Fra 1870-tallet. Sentrale navn: Ibsen, Tsjehov. Naturalisme Vis Nøyaktig gjengivelse av virkeligheten på scenen — inkludert det hverdagslige og det stygge. Skuespillerne oppfører seg som om publikum ikke er til stede (den fjerde veggen). Sentrale navn: Strindberg, Antoine (1880-tallet). Ekspresjonisme Vis Ytre uttrykk for indre tilstand — virkeligheten forvrenses for å gjenspeile karakterenes psykologi eller samfunnskritikk. Stiliserte bevegelser, overdrevet scenografi, skjeve vinkler. Tidlig 1900-tall. Absurdteater Vis Speiler tilværelsens meningsløshet gjennom gjentakelse, stillstand og språklig sammenbrudd. Konflikten løses ikke — den bare fortsetter. NB: Begrepet ble introdusert av kritikeren Martin Esslin i 1961/62 for å beskrive en rekke ulike og ikke-relaterte dramatikere fra 1940- og 50-tallet — Beckett, Ionesco, Genet — som aldri selv brukte betegnelsen om sitt eget arbeid. Postdramatisk teater og dramaturgi Vis Postdramatisk teater beskriver teater som ikke lenger setter den dramatiske teksten"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "entrale navn: Ibsen, Tsjehov. Naturalisme Vis Nøyaktig gjengivelse av virkeligheten på scenen — inkludert det hverdagslige og det stygge. Skuespillerne oppfører seg som om publikum ikke er til stede (den fjerde veggen). Sentrale navn: Strindberg, Antoine (1880-tallet). Ekspresjonisme Vis Ytre uttrykk for indre tilstand — virkeligheten forvrenses for å gjenspeile karakterenes psykologi eller samfunnskritikk. Stiliserte bevegelser, overdrevet scenografi, skjeve vinkler. Tidlig 1900-tall. Absurdteater Vis Speiler tilværelsens meningsløshet gjennom gjentakelse, stillstand og språklig sammenbrudd. Konflikten løses ikke — den bare fortsetter. NB: Begrepet ble introdusert av kritikeren Martin Esslin i 1961/62 for å beskrive en rekke ulike og ikke-relaterte dramatikere fra 1940- og 50-tallet — Beckett, Ionesco, Genet — som aldri selv brukte betegnelsen om sitt eget arbeid. Postdramatisk teater og dramaturgi Vis Postdramatisk teater beskriver teater som ikke lenger setter den dramatiske teksten i sentrum. I stedet er det den sceniske tilstedeværelsen, den performative handlingen og forholdet mellom utøver og publikum som bærer forestillingen. Det var Richard Schechner som først brukte termen post-dramatic theater — om happenings og eksperimentelt teater — på slutten av 1960-tallet. Den tyske teaterteoretikeren Hans-Thies Lehmann tok begrepet videre og bygde en omfattende teori rundt det i Postdramatisches Theater (1999), som raskt ble et sentralt referansepunkt i internasjonal teaterfaglig diskurs. Noen bruker også termen postdramatisk dramaturgi for å beskrive de strategiene som kjennetegner denne typen teater: fragmentering, ikke-lineær struktur, simultanitet og et oppbrudd med den aristoteliske handlingslogikken. Andre mener begrepet ikke holder som selvstendig kategori — at det bare er en beskrivelse av verktøy som alltid har eksistert, nå pakket inn i et nytt navn. Begge synspunkter kan være nyttige. Elinor Fuchs kritiserte Lehmanns brede anvendelse av termen og mente han samlet altfor mange ulike teaterformer under én paraply. Er postdramatisk teater en epoke, en estetikk, eller bare et samlenavn for alt som bryter med den dramatiske tradisjonen? Det er ikke enighet om svaret — og det trenger det ikke å være. Begreper er ikke sannheter. De er avtaler som tjener fruktbare diskusjoner. Schechner, Richard. Performance Theory . Routledge, 1988, s. 20. · Lehmann, Hans-Thies. Postdramatic Theatre , overs. Karen Jürs-Munby. Routledge, 2006. · Fuchs, Elinor. TDR: The Drama Review 52:2 (2008). Skjul ↑ Teaterformer Vis Eksempler på konvensjoner som styrer forestillingsbegivenheten — fastslår blant annet publikumskontrakten. Fysisk teater Vis Kroppen er det primære uttrykket. Bevegelse, gestikk og romlig komposisjon bærer forestillingen like mye som eller mer enn teksten. Inspirert av Artaud, Lecoq og Grotowski. Dokumentarteater Vis Basert på virkelige hendelser, dokumenter, intervjuer eller arkivmateriale. Publikumskontrakten inkluderer en forpliktelse til fa"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "an samlet altfor mange ulike teaterformer under én paraply. Er postdramatisk teater en epoke, en estetikk, eller bare et samlenavn for alt som bryter med den dramatiske tradisjonen? Det er ikke enighet om svaret — og det trenger det ikke å være. Begreper er ikke sannheter. De er avtaler som tjener fruktbare diskusjoner. Schechner, Richard. Performance Theory . Routledge, 1988, s. 20. · Lehmann, Hans-Thies. Postdramatic Theatre , overs. Karen Jürs-Munby. Routledge, 2006. · Fuchs, Elinor. TDR: The Drama Review 52:2 (2008). Skjul ↑ Teaterformer Vis Eksempler på konvensjoner som styrer forestillingsbegivenheten — fastslår blant annet publikumskontrakten. Fysisk teater Vis Kroppen er det primære uttrykket. Bevegelse, gestikk og romlig komposisjon bærer forestillingen like mye som eller mer enn teksten. Inspirert av Artaud, Lecoq og Grotowski. Dokumentarteater Vis Basert på virkelige hendelser, dokumenter, intervjuer eller arkivmateriale. Publikumskontrakten inkluderer en forpliktelse til faktabasert fremstilling. Gateteater Vis Fremført i offentlig rom. Publikum er ikke invitert — de er tilfeldig til stede og kan gå når de vil. Forestillingen må erobre oppmerksomheten. Forumteater Vis Publikum kan stoppe forestillingen og erstatte en skuespiller for å prøve ut alternative handlinger. Utviklet av Augusto Boal som del av «Theatre of the Oppressed». Commedia dell'arte Vis Faste masker og rolletyper (Arlecchino, Pantalone, Il Dottore), improvisasjon rundt et løst scenario (canovaccio), direkte publikumshenvendelse. Oppsto i Italia på 1500-tallet. Kabuki Vis Japansk teaterform med stiliserte bevegelser, mie-poser (frosne dramatiske øyeblikk), onnagata (mannlige skuespillere i kvinneroller) og spesifikk musikk og kostyme. Fra 1600-tallet. Skjul ↑ Kunstnerisk uttrykk og analyse Vis De samme begrepene brukes både når du skaper og når du analyserer — perspektivet skifter. For regissøren og kunstneren er de virkemidler; for analytikeren er de kilden til den opplevelsen og effekten som oppstår. Lesemåte Vis Lesemåte beskriver det analytiske perspektivet eller den tolkningsrammen man velger å bruke når man nærmer seg en tekst eller forestilling. Ulike lesemåter vil fremheve ulike aspekter — en feministisk lesemåte ser på kjønnsroller og maktstrukturer, en marxistisk lesemåte på klassekonflikter, en postkolonial lesemåte på kolonialismens spor. Valg av lesemåte påvirker hva man ser — og hva man overser. Deklamatorisk Vis En spillestil kjennetegnet av formell, høytidelig vokal fremføring med stilisert gestikk. Var normen i klassisk og neoklassisk teater før psykologisk realisme ble dominerende på slutten av 1800-tallet. Ikke det samme som overdrevet eller dårlig spill — det er en bevisst og historisk forankret stil. Stilisert Vis Et scenisk uttrykk der elementer er bevisst forenklet, overdrevet eller abstrahert fra naturalismens illusjon. Stilisering er ikke overdrivelse for overdrivelsens skyld — det er et kunstnerisk valg om å prioritere uttrykk over illusjon. Al"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": " som oppstår. Lesemåte Vis Lesemåte beskriver det analytiske perspektivet eller den tolkningsrammen man velger å bruke når man nærmer seg en tekst eller forestilling. Ulike lesemåter vil fremheve ulike aspekter — en feministisk lesemåte ser på kjønnsroller og maktstrukturer, en marxistisk lesemåte på klassekonflikter, en postkolonial lesemåte på kolonialismens spor. Valg av lesemåte påvirker hva man ser — og hva man overser. Deklamatorisk Vis En spillestil kjennetegnet av formell, høytidelig vokal fremføring med stilisert gestikk. Var normen i klassisk og neoklassisk teater før psykologisk realisme ble dominerende på slutten av 1800-tallet. Ikke det samme som overdrevet eller dårlig spill — det er en bevisst og historisk forankret stil. Stilisert Vis Et scenisk uttrykk der elementer er bevisst forenklet, overdrevet eller abstrahert fra naturalismens illusjon. Stilisering er ikke overdrivelse for overdrivelsens skyld — det er et kunstnerisk valg om å prioritere uttrykk over illusjon. Alle teaterformer som ikke streber etter naturalistisk virkelighet er i en viss grad stiliserte. Se også: Deklamatorisk, Gestus (Brecht). Tragedie Vis Protagonisten faller — ofte som følge av hamartia (karakterfeil eller skjebnens vilje). Aristoteles beskrev katarsis som tragediens mål: renselse gjennom medfølelse og frykt. Komedie Vis Konflikten løses lykkelig til slutt. Ofte sosial kritikk gjennom humor — komedien tillater seg å si det tragedien ikke kan. Melodrama Vis Overdreven emosjonell spenning med tydelig skille mellom godt og ondt. Populær form på 1800-tallet — opprinnelig med musikk (melo = sang). Moralsk orden gjenopprettes til slutt. Farse Vis Ekstrem, overdreven komikk basert på misforståelser, forviklinger og fysisk humor. Karakterene er ofte stereotype typer. Musicalteater Vis Sang, dans og dialog er likestilte virkemidler som driver handlingen fremover. Utviklet i USA og Storbritannia på 1900-tallet. Rekvisitter Vis Gjenstander brukt av skuespillerne på scenen — kan bære symbolsk mening eller støtte den fysiske handlingen. Kostymer Vis Hva skuespillerne har på seg — kommuniserer tid, sted, karakter og sosial status. Lyd Vis Musikk, lydeffekter og stillhet — setter stemning, markerer overganger og kan kommentere handlingen. Lys Vis Styrer publikums fokus, skaper atmosfære og kan markere tid og sted. Kan brukes realistisk eller symbolsk. Scenografi Vis Det visuelle rommet — scenebilde, møbler, baktepper og arkitektoniske elementer som definerer forestillingens verden. Sminke Vis Forsterker eller transformerer skuespillerens ansikt — kan understreke karakter, alder eller være del av et stilisert uttrykk. Dukke / Maske Vis Masker skjuler eller erstatter ansiktet og abstraherer karakteren. Dukker og figurer kan representere karakterer uten en skuespillerkropp. Spillestil Vis Det helhetlige ekspressive uttrykket skuespillerne skaper — realistisk, stilisert, deklamatorisk eller konvensjonell. Se Analyse . Sceniske uttrykk Vis Hvordan en forestilling kommunise"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "symbolsk mening eller støtte den fysiske handlingen. Kostymer Vis Hva skuespillerne har på seg — kommuniserer tid, sted, karakter og sosial status. Lyd Vis Musikk, lydeffekter og stillhet — setter stemning, markerer overganger og kan kommentere handlingen. Lys Vis Styrer publikums fokus, skaper atmosfære og kan markere tid og sted. Kan brukes realistisk eller symbolsk. Scenografi Vis Det visuelle rommet — scenebilde, møbler, baktepper og arkitektoniske elementer som definerer forestillingens verden. Sminke Vis Forsterker eller transformerer skuespillerens ansikt — kan understreke karakter, alder eller være del av et stilisert uttrykk. Dukke / Maske Vis Masker skjuler eller erstatter ansiktet og abstraherer karakteren. Dukker og figurer kan representere karakterer uten en skuespillerkropp. Spillestil Vis Det helhetlige ekspressive uttrykket skuespillerne skaper — realistisk, stilisert, deklamatorisk eller konvensjonell. Se Analyse . Sceniske uttrykk Vis Hvordan en forestilling kommuniserer gjennom kropp, stemme, scenografi, rom, lys, lyd og handling, og hvilke stemninger og assosiasjoner dette skaper hos publikum. Estetisk Vis Hvordan en forestilling ser ut og oppleves sanselig. Det kan handle om det vakre og harmoniske, men også om bevisste valg som skaper ubehag eller bryter med det forventede. Arrangement Vis «Blocking» — visuelt bevegelsesmønster og handlinger på scenen (hvem gjør hva, hvor og når — ofte med bakgrunn i tekstanalyse og arbeid med rollefigurens taktikk/mål). Regikonsept Vis Regikonsept er regissørens overordnede kunstneriske visjon for en forestilling. Det omfatter både kunstneriske valg — dramaturgiske og sceniske — og de praktiske beslutningene som former produksjonen. Regikonseptet er utgangspunktet for alle andre valg i prosessen. Se Produksjon for full oversikt. Kunstnerisk valg Vis Samlebegrepet for de bevisste beslutningene en regissør eller et ensemble tar i skapelsen av et verk — inkludert dramaturgiske valg og sceniske valg. Dramaturgi Vis Hvordan spenningen bygges opp og presenteres i en forestilling. Se Dramaturgi . Dramaturgisk analyse Vis Tekstanalyse — analyse av det dramatiske tekstgrunnlaget Realisasjonsanalyse — analyse av alle steg som er nødvendige for å realisere produksjonen: framdriftsplan, regikonsept Forestillingsanalyse — analyse av publikums oppfatning av produksjonen: estetisk uttrykk, budskap osv. Szatkowski, 1989. Dramatisk ironi Vis Når publikum vet noe som en eller flere av karakterene ikke vet. Spenningen oppstår i gapet mellom det karakteren tror er sant og det publikum kan se. Se også: upålitelig forteller under Å skrive dramatisk tekst. Skjul ↑ Begreper i teater og bevegelse Vis Gest Vis En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen. Dynamikk Vis Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet. Komponere Vis"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "s Hvordan spenningen bygges opp og presenteres i en forestilling. Se Dramaturgi . Dramaturgisk analyse Vis Tekstanalyse — analyse av det dramatiske tekstgrunnlaget Realisasjonsanalyse — analyse av alle steg som er nødvendige for å realisere produksjonen: framdriftsplan, regikonsept Forestillingsanalyse — analyse av publikums oppfatning av produksjonen: estetisk uttrykk, budskap osv. Szatkowski, 1989. Dramatisk ironi Vis Når publikum vet noe som en eller flere av karakterene ikke vet. Spenningen oppstår i gapet mellom det karakteren tror er sant og det publikum kan se. Se også: upålitelig forteller under Å skrive dramatisk tekst. Skjul ↑ Begreper i teater og bevegelse Vis Gest Vis En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen. Dynamikk Vis Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet. Komponere Vis Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere. Koreografi Vis Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi. Teatralsk biomekanikk Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Meyerhold — Biomekanikk for detaljer. Fra gest til koreografi Vis En bevegelsesfrase kan sammenlignes med en setning i språket — kort eller lang, med egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi . Kilde: Brustad, M. (2009). Teater og bevegelse . Oslo: Thalia Publishing, s. 128–129. Skjul ↑ Sammenkoblede begreper Vis Det finnes ingen fasit på rekkefølgen når en regissør tar valg. En valgt teaterform vil ofte implisere en sjanger. En valgt sjanger vil ofte begrense valg av teaterform. Begrepene påvirker hverandre gjensidig. Eigtved (2007) · Gladsø et al. (2005) · Nygaard (1990). Sjanger Vis Beskriver hva slags historie som fortelles — tone, tema og publikums forventninger til utfall. Eks: tragedie, komedie, melodrama, farse. Eigtved, 2007. Publikum Vis Publikum er ikke bare tilskuere — de er en aktiv del av den teatrale ytringen. Uten et publikum finnes det ikke et teater. Publikums tilstedeværelse, forventninger og fortolkning er med på å skape forestillingen. I kapittel 08 ser vi nærmere på hvordan iscenesettelsen av selvet i h"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "d egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi . Kilde: Brustad, M. (2009). Teater og bevegelse . Oslo: Thalia Publishing, s. 128–129. Skjul ↑ Sammenkoblede begreper Vis Det finnes ingen fasit på rekkefølgen når en regissør tar valg. En valgt teaterform vil ofte implisere en sjanger. En valgt sjanger vil ofte begrense valg av teaterform. Begrepene påvirker hverandre gjensidig. Eigtved (2007) · Gladsø et al. (2005) · Nygaard (1990). Sjanger Vis Beskriver hva slags historie som fortelles — tone, tema og publikums forventninger til utfall. Eks: tragedie, komedie, melodrama, farse. Eigtved, 2007. Publikum Vis Publikum er ikke bare tilskuere — de er en aktiv del av den teatrale ytringen. Uten et publikum finnes det ikke et teater. Publikums tilstedeværelse, forventninger og fortolkning er med på å skape forestillingen. I kapittel 08 ser vi nærmere på hvordan iscenesettelsen av selvet i hverdagen også kan forstås som en form for teater — med publikum som en forutsetning for den sosiale performansen. Se også: Iscenesettelse av selvet . Publikumskontrakt Vis Den implisitte avtalen mellom forestilling og publikum som følger av teaterformen — hva forventes av publikum, og hva kan de forvente? I forumteater forventes deltakelse. I gateteater kan du gå. I titteskapsscene later vi som om den fjerde veggen er der. Gladsø et al., 2005. Teaterform Vis Definert av konvensjonene for hvordan forestillingen lages og presenteres. Teaterformen fastslår blant annet publikumskontrakten. Eks: commedia dell'arte, forumteater, gateteater, kabuki. Gladsø et al., 2005. «Teaterform» er et samlebegrep for hvordan en forestilling presenteres. I dette kompendiet bruker vi også de mer detaljerte begrepene — teatermodell , sjanger og spillestil — fordi de åpner for mer spesifikke og fruktbare faglige diskusjoner. Teatermodell Vis Den fysiske og sosiale organiseringen av forestillingsbegivenheten — hvem møter hvem, i hvilken skala, og med hvilken grad av deltakelse. En intim forestilling for 20 i et kjøkken er en annen teatermodell enn et stadionshow for 50 000. NB: Jon Nygaard bruker «teatermodell» annerledes — som analytisk ramme (aristotelisk, episk, ekspressiv). Her følger vi Gladsø et al. Gladsø et al., 2005. Dramaturgisk modell Vis Beskriver hvordan fortellingen er strukturert — aristotelisk kurve, episodisk, sirkulær. Se Dramaturgi — modeller . Nygaard, J. (1990). Om teater . Dramaturgisk form Vis Det helhetlige sceniske uttrykket — den opplevelsen publikum faktisk får. Resultatet av alle de dramaturgiske valgene. Se Dramaturgi . Nygaard, J. (1990). Om teater . Skjul ↑ Begrep som er lette å blande Vis Begrep Hva er det? Teatermodell Den fysiske og sosiale organiseringen av forestillingsbegivenheten — skala, rom, grad av deltakelse. «Teaterform» Et samlebegrep. Kan også diskuteres i detaljier som teatermodell + sjanger + spillestil. Dramaturgisk modell Den tekniske struktu"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": " hvem møter hvem, i hvilken skala, og med hvilken grad av deltakelse. En intim forestilling for 20 i et kjøkken er en annen teatermodell enn et stadionshow for 50 000. NB: Jon Nygaard bruker «teatermodell» annerledes — som analytisk ramme (aristotelisk, episk, ekspressiv). Her følger vi Gladsø et al. Gladsø et al., 2005. Dramaturgisk modell Vis Beskriver hvordan fortellingen er strukturert — aristotelisk kurve, episodisk, sirkulær. Se Dramaturgi — modeller . Nygaard, J. (1990). Om teater . Dramaturgisk form Vis Det helhetlige sceniske uttrykket — den opplevelsen publikum faktisk får. Resultatet av alle de dramaturgiske valgene. Se Dramaturgi . Nygaard, J. (1990). Om teater . Skjul ↑ Begrep som er lette å blande Vis Begrep Hva er det? Teatermodell Den fysiske og sosiale organiseringen av forestillingsbegivenheten — skala, rom, grad av deltakelse. «Teaterform» Et samlebegrep. Kan også diskuteres i detaljier som teatermodell + sjanger + spillestil. Dramaturgisk modell Den tekniske strukturen for fremdriften — aristotelisk kurve, episodisk, sirkulær. Skinnene. Dramaturgisk form Den opplevelsen publikum faktisk får — resultatet av alle de dramaturgiske valgene. Turen. Spillestil Det helhetlige ekspressive uttrykket ensemblet skaper — realistisk, stilisert, deklamatorisk. Et kunstnerisk valg. Skuespillteknikker De konkrete metodene og øvelsene den enkelte skuespiller bruker for å bygge og fremføre en rolle — Stanislavski-systemet, Meisner-teknikk, fysiske handlinger. Se Skuespillteknikker . Begrep som blandes med hverandre Moderne teater / Modernisme / -ismene Vis Moderne teater er teater fra den moderne epoken — fra slutten av 1800-tallet og frem til i dag. Det er ikke en stilretning men en tidsepoke. Modernisme er den brede kulturelle og kunstneriske bevegelsen bort fra tradisjonelle former i samme periode. -Ismene (ekspresjonisme, dadaisme, surrealisme) er tette grupper av likesinnede eksperimenterende kunstnere med manifestoer og eksplisitte estetiske programmer — ofte kortlivede. En Ibsen-forestilling er moderne teater men ikke en -isme. Dada er både en -isme og del av modernismen. Representasjon / Presentasjon Vis Representasjonsteater later som om det er virkelighet — skuespilleren er karakteren, rommet er stedet. Den fjerde veggen opprettholdes. Presentasjonsteater viser frem — skuespilleren presenterer karakteren uten å skjule at det er teater. Brecht er det tydeligste eksemplet. Illusjonsteater / Realisme / Naturalisme Vis Illusjonsteater er det overordnede begrepet — teater som skaper illusjon av virkelighet. Realisme er en historisk teaterretning (fra 1870-tallet) — psykologisk troverdige karakterer i gjenkjennelige situasjoner. Naturalisme er en strengere variant — fotografisk nøyaktighet, inkludert det hverdagslige og det stygge. Alle tre henger sammen men er ikke synonymer. Realisme / realistisk / illusjonsteater Vis Realisme er en historisk teaterretning fra 1870-tallet — psykologisk troverdige karakterer i gjenkjennelige situasjoner (I"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "e kortlivede. En Ibsen-forestilling er moderne teater men ikke en -isme. Dada er både en -isme og del av modernismen. Representasjon / Presentasjon Vis Representasjonsteater later som om det er virkelighet — skuespilleren er karakteren, rommet er stedet. Den fjerde veggen opprettholdes. Presentasjonsteater viser frem — skuespilleren presenterer karakteren uten å skjule at det er teater. Brecht er det tydeligste eksemplet. Illusjonsteater / Realisme / Naturalisme Vis Illusjonsteater er det overordnede begrepet — teater som skaper illusjon av virkelighet. Realisme er en historisk teaterretning (fra 1870-tallet) — psykologisk troverdige karakterer i gjenkjennelige situasjoner. Naturalisme er en strengere variant — fotografisk nøyaktighet, inkludert det hverdagslige og det stygge. Alle tre henger sammen men er ikke synonymer. Realisme / realistisk / illusjonsteater Vis Realisme er en historisk teaterretning fra 1870-tallet — psykologisk troverdige karakterer i gjenkjennelige situasjoner (Ibsen, Tsjehov). Det er en epoke og en estetikk. Realistisk er et adjektiv som beskriver noe som ligner virkeligheten — men det er ikke det samme som å tilhøre realismen som bevegelse. En commedia dell'arte-forestilling kan ha realistiske elementer uten å være realisme. Illusjonsteater er det overordnede begrepet for teater som opprettholder den fjerde veggen og inviterer publikum til å godta den fiktive verdenen som «virkelig» innenfor forestillingens egne premisser. Dette kalles «suspension of disbelief». En forestilling med alver og monstre kan være illusjonsteater — det handler ikke om fotografisk nøyaktighet, men om at publikum aksepterer spillets regler. Realisme er én type illusjonsteater. Ikke alt illusjonsteater er realisme. Absurdteater / Postmoderne Vis Absurdteater er en spesifikk historisk kategori — Esslins begrep fra 1961/62 for dramatikere fra 1940- og 50-tallet som aldri selv brukte betegnelsen. Postmoderne er et bredere kulturelt og filosofisk begrep fra 1970-tallet — skeptisk til store fortellinger, spiller med sjangre og referanser. De overlapper i tid og estetikk, men er ikke det samme. Episk / Dramatisk / Eksperimentelt / Postdramatisk teater Vis Dramatisk teater = karakterdrevet, narrativt forankret teater — handlingen drives fremover av konflikt mellom karakterer mot en løsning. Episk teater (Brecht) = fremmedgjøring — tilskueren holdes på avstand for å tenke kritisk. Eksperimentelt teater = opererer bevisst utenfor etablerte teaterformer og deres konvensjoner. Postdramatisk teater (Lehmann, 1999) = går forbi begge — teksten er ikke lenger overordnet, forestillingen er ikke nødvendigvis narrativ. Se Dramaturgi . Teater / Parateater / Performance / Happenings / Environmental Theater Vis Teater = A spiller B for C — utøvere og publikum i definerte roller. Parateater (Grotowski) = prosessen er målet, ikke forestillingen — grensen mellom utøver og deltaker viskes ut. Performance = kunstnerisk handling der kunstnerens kropp og tilstedeværelse er se"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "skeptisk til store fortellinger, spiller med sjangre og referanser. De overlapper i tid og estetikk, men er ikke det samme. Episk / Dramatisk / Eksperimentelt / Postdramatisk teater Vis Dramatisk teater = karakterdrevet, narrativt forankret teater — handlingen drives fremover av konflikt mellom karakterer mot en løsning. Episk teater (Brecht) = fremmedgjøring — tilskueren holdes på avstand for å tenke kritisk. Eksperimentelt teater = opererer bevisst utenfor etablerte teaterformer og deres konvensjoner. Postdramatisk teater (Lehmann, 1999) = går forbi begge — teksten er ikke lenger overordnet, forestillingen er ikke nødvendigvis narrativ. Se Dramaturgi . Teater / Parateater / Performance / Happenings / Environmental Theater Vis Teater = A spiller B for C — utøvere og publikum i definerte roller. Parateater (Grotowski) = prosessen er målet, ikke forestillingen — grensen mellom utøver og deltaker viskes ut. Performance = kunstnerisk handling der kunstnerens kropp og tilstedeværelse er selve verket. Happenings (Kaprow, 1960-tallet) = spontane, ikke-repetérbare kunsthendelser uten fast manus eller publikumsrolle. Environmental Theater (Schechner) = forestillingen omgir publikum — ingen fast scene/sal-inndeling. Se teaterform og teatermodell. Installasjoner / Environmental Theater / Immersive Theatre Vis Installasjoner = kunst i rom — publikum beveger seg gjennom et verk, ikke en forestilling. Ingen utøvere. Environmental Theater = forestilling der rommet omgir publikum — fortsatt utøvere og tilskuere. Immersive Theatre = publikum beveger seg gjennom forestillingen og kan velge hva de følger — utøverne er overalt. Eks: Punchdrunk. Grensene er flytende. Dramaturgiske virkemidler / Sceniske virkemidler Vis Dramaturgiske virkemidler = verktøy for å bygge fortellingen — spenningskurve, vendepunkt, konflikt, tempo. Se Dramaturgi . Sceniske virkemidler = alt det publikum ser og hører — lys, lyd, kostyme, scenografi, bevegelse. Se Analyse . Begge påvirker hverandre men beskriver ulike lag av forestillingen. Scenisk handling / Dramaturgisk handling / Fysiske handlinger / Handlingsforløp Vis Sceniske handlinger — alt som skjer fysisk på scenen: en skuespiller reiser seg, slår en dør, løper over scenen. Dramaturgiske handlinger — handlinger som fører fortellingen eller forestillingens dramaturgi fremover. Kan være fysiske handlinger, men også lysforandringer, lydeffekter eller pauser — alt som driver strukturen. Fysiske handlinger (Stanislavski) — et skuespillerfaglig begrep fra Stanislavskis sene fase. I stedet for å spørre «hva ville jeg føle?» spør skuespilleren «hva ville jeg gjøre ?» — konkrete, spillbare handlinger som forankrer karakteren. Følelsen oppstår som resultat av handlingen, ikke omvendt. Se Fordypning: Stanislavski . Handlingsforløp — det dramaturgiske begrepet for plot: den samlede rekken av hendelser i et dramatisk verk sett som helhet. En scenisk handling er alltid synlig. En dramaturgisk handling trenger ikke å være det. Stanislavskis fysis"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "r ulike lag av forestillingen. Scenisk handling / Dramaturgisk handling / Fysiske handlinger / Handlingsforløp Vis Sceniske handlinger — alt som skjer fysisk på scenen: en skuespiller reiser seg, slår en dør, løper over scenen. Dramaturgiske handlinger — handlinger som fører fortellingen eller forestillingens dramaturgi fremover. Kan være fysiske handlinger, men også lysforandringer, lydeffekter eller pauser — alt som driver strukturen. Fysiske handlinger (Stanislavski) — et skuespillerfaglig begrep fra Stanislavskis sene fase. I stedet for å spørre «hva ville jeg føle?» spør skuespilleren «hva ville jeg gjøre ?» — konkrete, spillbare handlinger som forankrer karakteren. Følelsen oppstår som resultat av handlingen, ikke omvendt. Se Fordypning: Stanislavski . Handlingsforløp — det dramaturgiske begrepet for plot: den samlede rekken av hendelser i et dramatisk verk sett som helhet. En scenisk handling er alltid synlig. En dramaturgisk handling trenger ikke å være det. Stanislavskis fysiske handlinger er et skuespillerpedagogisk verktøy — ikke en beskrivelse av hva publikum ser. Semiotikk / Dramaturgiske symboler Vis Semiotikk er det overordnede teorifundamentet — læren om tegn generelt. Alt på scenen kan leses som et tegn: lys, kostyme, bevegelse, stillhet. Ikonisk (ligner det det representerer), indeksikal (peker på noe) eller symbolsk (kulturelt bestemt betydning). Se Analyse: Semiotikk . Dramaturgiske symboler er et mer spesifikt begrep: gjenstander, figurer eller handlinger som bærer gjentatt og forsterket mening innenfor ett bestemt verk — bygget opp over tid i fortellingen. Villanden i Ibsen, kirsebærhagen i Tsjekhov. Se Dramaturgi: Symboler . Alle dramaturgiske symboler er tegn — men ikke alle tegn er dramaturgiske symboler. Skjul ↑ Misbrukte begrep Vis Kunstnerisk Vis Brukes ofte som et vagt kompliment — «det var veldig kunstnerisk». I faglig sammenheng betyr kunstnerisk at noe tilhører kunstfeltet, har en skapende intensjon, eller er uttrykk for et kunstnerisk syn. Det er ikke en kvalitetsbetegnelse og ikke synonymt med «sært». → Hva er kunst? ↗ Absurd (misbrukt) Vis I dagligtalen brukes «absurd» om noe morsomt, rart eller ulogisk. I teaterfaget refererer absurdteater til en spesifikk historisk kategori — Esslins begrep fra 1961/62. Ikke bruk «absurd» som synonym for «komisk» eller «surrealistisk» i faglig analyse. Realistisk (misbrukt) Vis Brukes ofte feil om teater fra før 1800-tallet — «det greske teateret var ikke realistisk». Realisme som teaterretning oppsto på 1870-tallet. Å kalle eldre teater «urealistisk» fordi det ikke ligner realismen er anakronistisk — det var klassisk, barokt eller neoklassisk. Skjul ↑ Vurdering og skuespill Vis Tilstedeværelse Vis Tilskuerens opplevelse av at eleven er fullstendig til stede her og nå — enten som skuespiller i rollen eller som performer. Scenisk oppmerksomhet Vis Eleven har fokus i den fiktive situasjonen og evt. medspilleren. Rolleidentifikasjon Vis Synlig tegn på at eleven fremstiller noe/no"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": "k syn. Det er ikke en kvalitetsbetegnelse og ikke synonymt med «sært». → Hva er kunst? ↗ Absurd (misbrukt) Vis I dagligtalen brukes «absurd» om noe morsomt, rart eller ulogisk. I teaterfaget refererer absurdteater til en spesifikk historisk kategori — Esslins begrep fra 1961/62. Ikke bruk «absurd» som synonym for «komisk» eller «surrealistisk» i faglig analyse. Realistisk (misbrukt) Vis Brukes ofte feil om teater fra før 1800-tallet — «det greske teateret var ikke realistisk». Realisme som teaterretning oppsto på 1870-tallet. Å kalle eldre teater «urealistisk» fordi det ikke ligner realismen er anakronistisk — det var klassisk, barokt eller neoklassisk. Skjul ↑ Vurdering og skuespill Vis Tilstedeværelse Vis Tilskuerens opplevelse av at eleven er fullstendig til stede her og nå — enten som skuespiller i rollen eller som performer. Scenisk oppmerksomhet Vis Eleven har fokus i den fiktive situasjonen og evt. medspilleren. Rolleidentifikasjon Vis Synlig tegn på at eleven fremstiller noe/noen annen enn seg selv. Karakterisering Vis Karaktertrekk, egenskaper og kjennetegn man tilegner rollen — ikke nødvendigvis naturlig for skuespilleren. Innlevelse Vis Eleven får publikum til å tro på rollefigurens tanker, handlinger, vilje og følelser. Fysisk uttrykk Vis Eleven formidler rolle/situasjon/stemning gjennom bruk av kroppen. Selvstendig uttrykk Vis Eleven bruker fagets teknikker for å skape et individuelt uttrykk basert på egen kreativ prosess innenfor gitte rammer — dvs. ikke kopiere/reprodusere. Ekspressivitet Vis Å tydeliggjøre og levendegjøre det eleven vil fortelle — enten uttrykket er forenklet eller overdrevet. Gi og ta impulser i samspill Vis Timing i dialog, «listening» og tydeliggjøring av mål/taktikk i samspill. Timing Vis Å gjøre riktig ting til riktig tid i henhold til forestillingens rytme og samspill med medspilleren og publikum. Utforske Vis En kreativ prosess hvor en bevisst ser på og prøver utvalgt materiale fra ulike innfallsvinkler. Innebærer en vurdering av hva som skal være med videre i prosessen frem mot produktet. (Grunnen til at underveisvurdering er nødvendig i dramafag.) Skjul ↑ Test deg selv Vis Koble kunstner til konsept Vis Klikk på et kort for å se hvilken kunstner eller bevegelse begrepet hører til. Se Teaterfornyere for mer. Bland Nullstill Skjul ↑ Ressurser Vis Scenetreff — norsk teaterressurs ↗ Ridiculously Simplified Theater History — Genially ↗ Norsk teaterhistorie — Store norske leksikon ↗ Finner ikke det du trenger? Søk i tilleggsmateriale — blogg ↗ Teaterhistorie t.o.m. realismen — Padlet ↗ ← Etikk, grenser og det teatrale i hverdagen © 2026 · Redaktør: Ren Powell"}, {"file": "fordypning.html", "id": "", "title": "Å finne de rette ordene", "page": "Å finne de rette ordene", "num": "09", "text": " av hva som skal være med videre i prosessen frem mot produktet. (Grunnen til at underveisvurdering er nødvendig i dramafag.) Skjul ↑ Test deg selv Vis Koble kunstner til konsept Vis Klikk på et kort for å se hvilken kunstner eller bevegelse begrepet hører til. Se Teaterfornyere for mer. Bland Nullstill Skjul ↑ Ressurser Vis Scenetreff — norsk teaterressurs ↗ Ridiculously Simplified Theater History — Genially ↗ Norsk teaterhistorie — Store norske leksikon ↗ Finner ikke det du trenger? Søk i tilleggsmateriale — blogg ↗ Teaterhistorie t.o.m. realismen — Padlet ↗ ← Etikk, grenser og det teatrale i hverdagen © 2026 · Redaktør: Ren Powell"}, {"file": "fordypning.html", "id": "tm-skrive-monolog", "title": "Å skrive monologer og dialoger", "page": "Å finne de rette ordene", "num": "09", "text": "Å skrive monologer og dialoger Vis Ikke tenk på dette som en skriveoppgave. Fokuser på det talte ordet — et levende, muntlig språk. Teater handler om handling: karakterene gjør ting og lever i øyeblikket. De strever med å forstå sine erfaringer foran oss — i sanntid. En dramatisk monolog presenterer en karakter som vanligvis gjennomgår en slags forandring."}, {"file": "fordypning.html", "id": "sk-begynn", "title": "Komme i gang", "page": "Å finne de rette ordene", "num": "09", "text": "Komme i gang Vis Den sveitsiske dramatikeren Dürrenmatt sa: Begynn aldri med et tema — begynn med en karakter. Sett karakteren gjennom det verste du kan tenke deg mens de kjemper for å få det de vil ha. Hva vil karakteren? Hva står på spill for dem? Hvordan vil de nå målet sitt? Scenario først: Finn en situasjon. Velg sjanger. Spør: hvilken karakter ville hatt det verst her? Grav deg inn i karakteren — skriv dagbokinnlegg, GOTEsheet ↗ , varm stol. Lek scenen igjen og igjen."}, {"file": "fordypning.html", "id": "sk-form", "title": "Form og dramaturgi", "page": "Å finne de rette ordene", "num": "09", "text": "Form og dramaturgi Vis Første utkast har ofte en form som ligner en bratt oppoverbakke — stigende spenning uten pustepause. Prøv å sette karakteren — og publikum — på en berg-og-dal-bane. Veksle mellom lettere og tyngre beats. Du trenger ikke følge aristotelisk dramaturgi, men vær bevisst på hvordan du samhandler med publikums forventninger."}, {"file": "fordypning.html", "id": "sk-feller", "title": "Vanlige feller", "page": "Å finne de rette ordene", "num": "09", "text": "Vanlige feller Vis Ikke skrive første, andre og tredje utkast — og ikke ta imot tilbakemeldinger Ikke lese monologen høyt underveis i prosessen Skrive en karakterskisse eller et dikt i stedet for en teatralsk monolog — en sint tirade er ikke et drama. En demonstrasjon av én følelse er langt mindre interessant enn en metamorfose Fortelle hva du gjorde i dag til en uspesifisert lytter — noe må stå på spill Skrive subteksten i stedet for dialogen"}, {"file": "fordypning.html", "id": "sk-sjekkliste", "title": "Sjekkliste — når utkastet er klart", "page": "Å finne de rette ordene", "num": "09", "text": "Sjekkliste — når utkastet er klart Vis Har karakteren din en spine ? — det overordnede målet eller behovet som driver karakteren gjennom hele stykket. Alt karakteren gjør springer ut av denne grunnleggende drivkraften. Matcher språkets tempo karakterens emosjonelle tempo? Finnes det utilsiktede klisjeer eller generaliseringer du må gjøre spesifikke? Matcher språket karakterens alder, utdanning og bakgrunn? Bryr du deg om karakteren din og det de har å si?"}, {"file": "fordypning.html", "id": "sk-lyd", "title": "Lydenes emosjonelle effekt", "page": "Å finne de rette ordene", "num": "09", "text": "Lydenes emosjonelle effekt Vis Ordenes lyd påvirker publikum emosjonelt — uavhengig av betydning. Dette er verktøy for deg som dramatiker: Plosiver — harde konsonanter (p, b, t, d, k, g) skaper spenning, energi og aggresjon: banker, biter, kutter, dreper . Frikkativer — mykere konsonanter (f, v, s, h) skaper flyt, ro eller hvesing: sukker, svever, hvisker, flyter . Nasaler — resonante konsonanter (m, n, ng) gir varm, summende kvalitet: minner, nynner, synger . Skaper nærhet og ettertanke. Likvider — flytende konsonanter (l, r) gir myk, klingende lyd: rullet, glir, latter . Brukt mye i poesi for sin musikalske kvalitet. Vokaler — åpne vokaler (a, æ, ø) skaper romslighet og åpenhet; lukkede vokaler (i, u) skaper intensitet eller tetthet. Lange vokaler bremser tempoet; korte driver det fremov"}, {"file": "fordypning.html", "id": "sk-rytme", "title": "Rytme og setningsstruktur", "page": "Å finne de rette ordene", "num": "09", "text": "Rytme og setningsstruktur Vis Rytmen i teksten kommuniserer like mye som ordene. Noen verktøy: Enstavelsesord skaper urgency og direkte kraft: Gå. Nå. Hit. Stopp. — korte ord banker. Flerstavelsesord bremser og nyanserer. Ferdige tanker lukker — de avslutter og gir ikke motparten rom. Uferdig tanker åpner: «Jeg tenkte at kanskje...» inviterer og viser sårbarhet. Avbrutte setninger — karakteren starter men klarer ikke fullføre. Det som ikke sies er ofte mer ladet enn det som sies. Skriv avbruddet inn i teksten: «Jeg vil bare at du skal—» Taushet og pause er handling, ikke tomrom. P
