t (kausalitet). Lukket form — resultatet føles som en tett, uunngåelig historie. Åpen modell — en plan med hopp i tid og sted. Scenene står mer fritt (episodisk). Åpen form — resultatet føles mangfoldig og gir rom for refleksjon. En dyktig regissør kan bruke en lukket modell, men bryte den med episke grep for å skape en åpen form. Klotz, V. (1960). Geschlossene und offene Form im Drama . Hanser. Sammenligning av modeller Vis Merk: Modellen tilhører iscenesettelsen — ikke teksten. Den samme dramatiske teksten kan settes opp under ulike modeller. Spenningskurvens form Modell Spenningskurvens form Klassisk Lineær oppbygging mot ett klimaks Episk Brutt — episodisk, reset mellom scener Sirkulær Vender tilbake til utgangspunktet Simultan Flere parallelle kurver samtidig i rommet Likestilt Uavhengig av kurveform — handler om hvilke sceniske virkemidler som bærer spenningen Landskapsdramaturgi Horisontal — spenningen ligger i relasjonene mellom elementer, ikke i retning mot klimaks Postdramatisk Dekonstruert — kurven finnes, men brytes systematisk eller unngås bevisst Virkemidler og dramaturgiske grep Modell Sceniske virkemidler som bærer spenningen Dramaturgiske grep Klassisk Dialog, handling Spenning → "}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "r refleksjon. En dyktig regissør kan bruke en lukket modell, men bryte den med episke grep for å skape en åpen form. Klotz, V. (1960). Geschlossene und offene Form im Drama . Hanser. Sammenligning av modeller Vis Merk: Modellen tilhører iscenesettelsen — ikke teksten. Den samme dramatiske teksten kan settes opp under ulike modeller. Spenningskurvens form Modell Spenningskurvens form Klassisk Lineær oppbygging mot ett klimaks Episk Brutt — episodisk, reset mellom scener Sirkulær Vender tilbake til utgangspunktet Simultan Flere parallelle kurver samtidig i rommet Likestilt Uavhengig av kurveform — handler om hvilke sceniske virkemidler som bærer spenningen Landskapsdramaturgi Horisontal — spenningen ligger i relasjonene mellom elementer, ikke i retning mot klimaks Postdramatisk Dekonstruert — kurven finnes, men brytes systematisk eller unngås bevisst Virkemidler og dramaturgiske grep Modell Sceniske virkemidler som bærer spenningen Dramaturgiske grep Klassisk Dialog, handling Spenning → konflikt, vendepunkt, klimaks Episk Gestus, direkte henvendelse, tittelkort Kontraster → fremmedgjøring, brudd · Rytme → episodisk brudd Sirkulær Rituell repetisjon, musikk, kropp Ritualer → innramming, overgang · Gjentagelser → variasjon Simultan Rom, parallelle handlinger Kontraster → montasje, parallellitet Likestilt Alle sceniske virkemidler prinsipielt likestilt Avhengig av produksjonen Landskapsdramaturgi Lys, lyd, kropp, rom Rytme → pust, dveling · Kontraster → juxtaposisjon i det sceniske/fiktive rom Postdramatisk Skifter — ingen fast hierarki Rytme → fragmentering · Gjentagelser → forvrenging, forflytning Merk: Noen dramaturgiske virkemidler er ikke modellspesifikke. Symboler kan brukes som et semiotisk element i klassisk dramaturgi — en gjenstand som bygger mening over tid. I sirkulær dramaturgi kan det samme symbolet fungere som et rituelt element, ladet gjennom repetisjon. Det er ikke det dramaturgiske virkemiddelet som avgjør modellen — det er grepet. To grupper Klassisk, episk, sirkulær og simultan arbeider innenfor dramatisk logikk — de former fortellingen på ulike måter, men forutsetter fortsatt karakterer med intensjoner og handlinger som driver frem. Landskapsdramaturgi og postdramatisk trer utenfor dramatisk logikk — de gjør intet forsøk på å skape narrativ i klassisk forstand. Likestilt dramaturgi er ikke en kurveform og tilhører ingen av gruppene — det handler om maktforholdet mellom de sceniske virkemidlene, og kan forekomme i produksjoner på begge sider av linjen. Simultan kan se ut som landskapsdramaturgi fra utsiden — flere ting skjer, ingen tydelig fokuspunkt — men simultan følger fortsatt dramatisk logikk. Forskjellen er mellom å fortelle flere historier på én gang, og å ikke fortelle en historie i det hele tatt. Skjul ↑ YouTube: Spilleliste — dramaturgi ↗ ← Teaterfornyere Analyse → © 2026 · Redaktør: Ren Powell"}, {"file": "dramaturgi.html", "id": "", "title": "Drama og dramaturgi", "page": "Drama og dramaturgi", "num": "03", "text": "episk, sirkulær og simultan arbeider innenfor dramatisk logikk — de former fortellingen på ulike måter, men forutsetter fortsatt karakterer med intensjoner og handlinger som driver frem. Landskapsdramaturgi og postdramatisk trer utenfor dramatisk logikk — de gjør intet forsøk på å skape narrativ i klassisk forstand. Likestilt dramaturgi er ikke en kurveform og tilhører ingen av gruppene — det handler om maktforholdet mellom de sceniske virkemidlene, og kan forekomme i produksjoner på begge sider av linjen. Simultan kan se ut som landskapsdramaturgi fra utsiden — flere ting skjer, ingen tydelig fokuspunkt — men simultan følger fortsatt dramatisk logikk. Forskjellen er mellom å fortelle flere historier på én gang, og å ikke fortelle en historie i det hele tatt. Skjul ↑ YouTube: Spilleliste — dramaturgi ↗ ← Teaterfornyere Analyse → © 2026 · Redaktør: Ren Powell"}, {"file": "dramaturgi.html", "id": "tm-drama-intro", "title": "Drama", "page": "Drama og dramaturgi", "num": "03", "text": "Ordet drama kommer fra det greske dran — å handle, å gjøre. I sin enkleste form er drama det som skjer når noen gjør noe i nærvær av andre som ser på. Det er ikke en tekst, ikke en bygning og ikke et publikum — det er en handling. Forholdet mellom drama, dramaturgi og teater kan forstås slik: Drama Selve handlingsstrukturen — det som skjer, hvem det skjer med, og i hvilken rekkefølge. Det kan finnes som et skrevet manus, men trenger ikke det. Et improvisert forløp har også en dramatisk struktur. Dramaturgi Kunsten og håndverket å forme den strukturen bevisst — å ta valg om spenning, rytme, form og fremdrift. Dramaturgien er bindeleddet mellom idéen og forestillingen. Teater Den levende begivenheten der drama og dramaturgi møter et publikum i tid og rom. Teksten eller planen blir til noe so"}, {"file": "dramaturgi.html", "id": "dramt-spenning", "title": "Spenning", "page": "Drama og dramaturgi", "num": "03", "text": "Spenning Vis Forholdet mellom forventning og utløsning — det som holder publikum i stolen. Spenning bygges gjennom å gi publikum informasjon karakterene mangler (dramatisk ironi), ved å holde tilbake avgjørende opplysninger, eller ved å skape et gap mellom det en karakter sier og det den gjør. Utløsningen — vendepunktet eller klimakset — gir mening til alt som kom før. Skjul ↑"}, {"file": "dramaturgi.html", "id": "dramt-kontraster", "title": "Kontraster", "page": "Drama og dramaturgi", "num": "03", "text": "Kontraster Vis Bruk av motsetninger for å skape dynamikk og forsterke virkning. En stille scene før noe voldsomt gjør volden sterkere. En komisk figur i en tragedie setter det tragiske i relief. Stillhet etter intens fysisk aktivitet kan bære mer enn aktiviteten selv. Kontrasten er ikke et tilfeldig skifte — den er et bevisst grep for å gi publikum noe å måle mot. Skjul ↑"}, {"file": "dramaturgi.html", "id": "dramt-ritualer", "title": "Ritualer", "page": "Drama og dramaturgi", "num": "03", "text": "Ritualer Vis Gjentakende, formelle handlinger som gir forestillingen tyngde og indre logikk. En hilsen, et måltid, en bestemt frase — gjentatt nok ganger bygger den forventning og vekt. Når ritualet brytes eller nektes, bærer selve bruddet meningen. Det er ikke handlingen i seg selv, men det den har blitt ladet med gjennom gjentakelsen. Skjul ↑"}, {"file": "dramaturgi.html", "id": "dramt-symboler", "title": "Symboler", "page": "Drama og dramaturgi", "num": "03", "text": "Symboler Vis Gjenstander, figurer eller handlinger som bærer gjentatt eller forsterket betydning innenfor et bestemt verk. Symbolet bygges gjennom repetisjon og eskalering: første gang er det nøytralt, andre gang er det ladet, tredje gang bærer det hele stykkets tyngde. Villanden i Ibsens stykke er et klassisk eksempel. Det skiller seg fra et semiotisk tegn, som kan være et hvilket som helst element publikum tolker som meningsbærende. Se Fordypning: Semiotikk vs. dramaturgiske symboler . Skjul ↑"}, {"file": "dramaturgi.html", "id": "dramt-rytme", "title": "Rytme", "page": "Drama og dramaturgi", "num": "03", "text": "Rytme Vis Den tidsmessige organiseringen av forestillingen — tempoet i scenebytte, forholdet mellom handling og stillhet, hastigheten i dialogen. En langsom oppbygging etterfulgt av et brått kutt er i seg selv et dramaturgisk valg. Rytmen styrer når publikum puster ut, og når de ikke får lov. Skjul ↑"}, {"file": "dramaturgi.html", "id": "dramt-gjentagelser", "title": "Gjentagelser", "page": "Drama og dramaturgi", "num": "03", "text": "Gjentagelser Vis Repetisjon av elementer — en replikk, en bevegelse, et bilde — for å skape gjenkjennelse, forsterke budskap eller bygge mening over tid. Den samme replikken i tre ulike kontekster betyr tre ulike ting. En gest som gjentas i et avgjørende øyeblikk rekker tilbake til alle gangene den ble brukt før. Gjentagelse er ikke redundans — det er akkumulering. Skjul ↑"}, {"file": "dramaturgi.html", "id": "grp-modeller", "title": "Klassisk", "page": "Drama og dramaturgi", "num": "03", "text": "Ulike dramaturgiske modeller Vis Klassisk En lineær spenningskurve som bygger seg opp mot ett avgjørende klimaks og en løsning. Tid, sted og handling henger logisk sammen (kausalitet). Den mest utbredte modellen i vestlig teater. Illustrert av Freytags pyramide (1863) og basert på Aristoteles' Poetikk (ca. 335 f.Kr.). Også kalt lineær dramaturgi . Episk Episodisk struktur — scenene kan stå relativt fritt fra hverandre. Spenningskurven brytes bevisst gjennom fremmedgjøringsteknikker: tittelkort, direkte henvendelse til publikum, sang. Tilskueren skal tenke, ikke bare føle. Utviklet av Bertolt Brecht. Se Brecht i Teaterfornyere . Sirkulær Forestillingen vender tilbake til utgangspunktet — strukturen er lukket som en ring, slutten ekkoer begynnelsen. Brukes i ritualdrama og mange samtidsfores"}, {"file": "dramaturgi.html", "id": "dramt-sammenligning", "title": "Sammenligning av modeller", "page": "Drama og dramaturgi", "num": "03", "text": "Sammenligning av modeller Vis Merk: Modellen tilhører iscenesettelsen — ikke teksten. Den samme dramatiske teksten kan settes opp under ulike modeller. Spenningskurvens form Modell Spenningskurvens form Klassisk Lineær oppbygging mot ett klimaks Episk Brutt — episodisk, reset mellom scener Sirkulær Vender tilbake til utgangspunktet Simultan Flere parallelle kurver samtidig i rommet Likestilt Uavhengig av kurveform — handler om hvilke sceniske virkemidler som bærer spenningen Landskapsdramaturgi Horisontal — spenningen ligger i relasjonene mellom elementer, ikke i retning mot klimaks Postdramatisk Dekonstruert — kurven finnes, men brytes systematisk eller unngås bevisst Virkemidler og dramaturgiske grep"}, {"file": "analyse.html", "id": "", "title": "Analyse", "page": "Analyse", "num": "04", "text": "Analyse — Teaterfag kompendium ← Kompendium Analyse ☀︎ ⌕ Søk 04 ANALYSE Verktøy for å lese og analysere teatrale ytringer. Abstrakt, representasjon og kontinuumet Vis I billedkunst finnes to hovedretninger: representasjonell kunst (gjenkjennelig, etterligner virkeligheten) og ikke-representasjonell kunst (former, farger, følelser uten gjenkjennelige motiver). Aristoteles skrev om mimesis — en form for representasjon. Å abstrahere betyr å ta vekk detaljer. Det finnes et kontinuum fra det naturalistiske til det nesten ikke-gjenkjennelige. Abstrakt kunst er alltid forbundet med noe visuelt fra den virkelige verden — men i sterk grad bearbeidet. I teateret: en stereotype («skurken», «heksen») er en liten grad av abstrahering. Naturalisme forsøker å ligge på den ene enden av kontinuumet. Artauds grusomhetsteater og dadaismen befinner seg på den andre. ← Bla sideveis → Klikk for å forstørre Kilde: Lumin. Introduction to Art Concepts . Skjul ↑ Semiotikk — tegn og koder i teateret Vis Semiotikk er læren om tegn og betydning. I teateret kommuniserer alt — ikke bare teksten. Hvert element på scenen er et potensielt tegn som publikum tolker. Hva er et tegn? Et tegn er noe som betyr noe annet enn seg selv. En rød kjole på scenen er ikke bare en kjole — den kan bety lidenskap, fare, makt eller blod, avhengig av kontekst. Publikum tolker kontinuerlig alle sceniske elementer som potensielle tegn. Ikoniske tegn Ligner det de representerer. Et bord på scenen representerer et bord. Et foto av en person representerer den personen. Naturalistisk scenografi er full av ikoniske tegn. Indeksikale tegn Peker på noe uten å ligne det. Røyk indikerer ild. En tom stol indikerer fravær. Stillhet kan indikere spenning eller død. Mange av de sterkeste teatrale virkemidlene er indeksikale. Symbolske tegn Konvensjonelle tegn der forbindelsen er kulturelt bestemt — ikke naturlig. Et flagg symboliserer en nasjon. Svart symboliserer sorg i vestlig kultur, hvitt i mange asiatiske kulturer. Symbolske tegn forutsetter felles kulturell kode mellom scene og publikum. Koder Tegn virker innenfor koder — systemer av konvensjoner publikum kjenner. Teaterkoder inkluderer: belysning (spot = fokus), musikk (dur = glede, moll = sorg), kostyme (frakk = autoritet). Regissøren kan bekrefte eller bryte kodene bevisst. I analysen I analysen undersøker vi: hva er tegnet, hva refererer det til, og hvilken kode aktiverer det. Er det ikonisk, indeksikal eller symbolsk? Og er bruken konsistent eller ironisk — bekrefter det helheten, eller bryter det med den? Elam, K. (1980). The Semiotics of Theatre and Drama . Methuen. · Eigtved, M. (2007). Forestillingsanalyse . Forlaget Samfundslitteratur. Skjul ↑ Forestillingsanalyse Vis Teatral beskriver en begivenhet der noe eller noen settes i fokus — adskilt fra hverdagen og rammet inn slik at det krever oppmerksomhet. Noen defineres som utøver, andre som tilskuer. Det kan skje på en scene, men trenger ikke det. Se også: Iscenesettelse av selvet og Performance so"}, {"file": "analyse.html", "id": "", "title": "Analyse", "page": "Analyse", "num": "04", "text": "gn forutsetter felles kulturell kode mellom scene og publikum. Koder Tegn virker innenfor koder — systemer av konvensjoner publikum kjenner. Teaterkoder inkluderer: belysning (spot = fokus), musikk (dur = glede, moll = sorg), kostyme (frakk = autoritet). Regissøren kan bekrefte eller bryte kodene bevisst. I analysen I analysen undersøker vi: hva er tegnet, hva refererer det til, og hvilken kode aktiverer det. Er det ikonisk, indeksikal eller symbolsk? Og er bruken konsistent eller ironisk — bekrefter det helheten, eller bryter det med den? Elam, K. (1980). The Semiotics of Theatre and Drama . Methuen. · Eigtved, M. (2007). Forestillingsanalyse . Forlaget Samfundslitteratur. Skjul ↑ Forestillingsanalyse Vis Teatral beskriver en begivenhet der noe eller noen settes i fokus — adskilt fra hverdagen og rammet inn slik at det krever oppmerksomhet. Noen defineres som utøver, andre som tilskuer. Det kan skje på en scene, men trenger ikke det. Se også: Iscenesettelse av selvet og Performance som kunstform. En teateranalyse begynner med en hypotese . Det er mulig å peke på referanser til tradisjoner, men fokus i analysen er forestillingen selv — i sin spesifikke kontekst — og den opplevelsen den gir publikum. Når vi analyserer en teatral begivenhet skal vi være mer fokuserte på det vi opplever enn på hvordan forestillingen ble til — arbeidsmetoder eller regissørens intensjoner er ikke det sentrale. Formålet er heller ikke å vurdere om forestillingen var bra eller dårlig. Formålet med analysen er å fokusere på hva publikum kan få ut av å overvære en bestemt begivenhet: hvilke elementer som spiller sammen og på hvilken måte, hvordan dette kan settes i sammenheng med verden vi lever i dag, og hvordan det kan plasseres i en historisk forståelsesramme. En teateranalyse er subjektiv, men kan allikevel sammenlignes med en vitenskapelig metode: Vitenskap Utforme en hypotese Tilegne seg reelle erfaringer (empiri) Drøfte årsaksforklaring Tolkning Forestillingsanalyse Definere analytiske spørsmål / spesifikk interesse Opplevelse / erindring Samspillet i opplevelsen Kontekstualisering NB: Se og ta i bruk Patrice Pavis sitt spørsmålsskjema som veiledning i analysen. → Pavis spørsmålsskjema (PDF) ↗ → Last ned skjema (PDF) ↗ Kilde: Eigtved, M. (2007). Forestillingsanalyse: en introduktion . Forlaget Samfundslitteratur. Skjul ↑ Forestillingsanalyse — et bredere blikk Vis Pavis-skjemaet gir deg strukturen. Men bak hvert spørsmål ligger mer. Her er fire innganger som kan hjelpe deg å se bredere i analysen. Rom og romlige relasjoner Rommet er aldri nøytralt. Hvem er i sentrum og hvem er i periferien? Hva sier avstanden mellom kropper om makt og relasjon? Hvordan endrer rommet seg gjennom forestillingen — og hva betyr det når det gjør det? Se også Teatermodell i Dramaturgi. Kropp og bevegelse som tegn Kroppen kommuniserer uavhengig av teksten. Tempo, kvalitet, vekt og retning i bevegelsen bærer mening. En karakter som beveger seg sakte og tungt kommuniserer noe annet enn en s"}, {"file": "analyse.html", "id": "", "title": "Analyse", "page": "Analyse", "num": "04", "text": "e spørsmål / spesifikk interesse Opplevelse / erindring Samspillet i opplevelsen Kontekstualisering NB: Se og ta i bruk Patrice Pavis sitt spørsmålsskjema som veiledning i analysen. → Pavis spørsmålsskjema (PDF) ↗ → Last ned skjema (PDF) ↗ Kilde: Eigtved, M. (2007). Forestillingsanalyse: en introduktion . Forlaget Samfundslitteratur. Skjul ↑ Forestillingsanalyse — et bredere blikk Vis Pavis-skjemaet gir deg strukturen. Men bak hvert spørsmål ligger mer. Her er fire innganger som kan hjelpe deg å se bredere i analysen. Rom og romlige relasjoner Rommet er aldri nøytralt. Hvem er i sentrum og hvem er i periferien? Hva sier avstanden mellom kropper om makt og relasjon? Hvordan endrer rommet seg gjennom forestillingen — og hva betyr det når det gjør det? Se også Teatermodell i Dramaturgi. Kropp og bevegelse som tegn Kroppen kommuniserer uavhengig av teksten. Tempo, kvalitet, vekt og retning i bevegelsen bærer mening. En karakter som beveger seg sakte og tungt kommuniserer noe annet enn en som beveger seg raskt og lett — selv om replikkene er identiske. Se Semiotikk og Kropp, stemme og bevegelse . Lys, lyd og musikk Disse elementene er ikke pynt — de er dramaturgiske verktøy. Lys definerer fokus, tid og stemning. Lyd og musikk kan bekrefte eller underminere det vi ser. Spør: hva ville skjedd om lydsporet var byttet ut? Hva forteller lyset som teksten ikke sier? Publikums rolle Publikum er ikke passive mottakere — de er en del av begivenheten. Hva inviterer forestillingen publikum til å gjøre, føle eller tenke? Og hva skjer i rommet mellom scene og sal — den energien som bare finnes i det levende møtet? Eigtved, M. (2007). Forestillingsanalyse: en introduktion . Forlaget Samfundslitteratur. · Elam, K. (1980). The Semiotics of Theatre and Drama . Methuen. Skjul ↑ Å lese en dramatisk tekst Vis En dramatisk tekst er ikke litteratur — den er en plan for noe som skal skje i rom og tid. Spørsmålene nedenfor er ikke litterære, men teatrale: hva krever denne teksten av scenen? Dramaturgisk struktur Hvilken dramaturgisk form har teksten? Hvor ligger spenningen, og hva utløser den? Er det en løsning, eller lar teksten spørsmålene stå åpne? Se Dramaturgi . Tid, sted og rom Hva forteller teksten om hvor og når handlingen foregår? Hva er presist angitt, og hva er overlatt til regissøren? Hvilke muligheter åpner rommet for? Figurer og relasjoner Hvem driver handlingen fremover, og hvem motsetter seg den? Hva er maktrelasjonene mellom figurene? Hvordan endrer relasjonene seg i løpet av teksten? Språk og tone Er språket poetisk, naturalistisk eller fragmentert? Hva sier tempoet og rytmen i replikkvekslingen om stemningen og forholdet mellom figurene? Sceneanvisninger Hva forteller sceneanvisningene deg, og hva overlater de åpent? Noen dramatikere (Beckett, Fosse) skriver sceneanvisninger som er en del av selve det dramatiske språket — ikke praktiske instruksjoner, men poetiske eller rytmiske elementer som er like viktige som replikken. Åpne spørsmål Hva svarer teksten "}, {"file": "analyse.html", "id": "", "title": "Analyse", "page": "Analyse", "num": "04", "text": "maturgisk struktur Hvilken dramaturgisk form har teksten? Hvor ligger spenningen, og hva utløser den? Er det en løsning, eller lar teksten spørsmålene stå åpne? Se Dramaturgi . Tid, sted og rom Hva forteller teksten om hvor og når handlingen foregår? Hva er presist angitt, og hva er overlatt til regissøren? Hvilke muligheter åpner rommet for? Figurer og relasjoner Hvem driver handlingen fremover, og hvem motsetter seg den? Hva er maktrelasjonene mellom figurene? Hvordan endrer relasjonene seg i løpet av teksten? Språk og tone Er språket poetisk, naturalistisk eller fragmentert? Hva sier tempoet og rytmen i replikkvekslingen om stemningen og forholdet mellom figurene? Sceneanvisninger Hva forteller sceneanvisningene deg, og hva overlater de åpent? Noen dramatikere (Beckett, Fosse) skriver sceneanvisninger som er en del av selve det dramatiske språket — ikke praktiske instruksjoner, men poetiske eller rytmiske elementer som er like viktige som replikken. Åpne spørsmål Hva svarer teksten ikke på? Dette er regissørens inngangspunkter — stedene der tolkningsarbeidet begynner. Skjul ↑ ← Dramaturgi Produksjon → © 2026 · Redaktør: Ren Powell"}, {"file": "analyse.html", "id": "tm-abstrakt", "title": "Abstrakt, representasjon og kontinuumet", "page": "Analyse", "num": "04", "text": "Abstrakt, representasjon og kontinuumet Vis I billedkunst finnes to hovedretninger: representasjonell kunst (gjenkjennelig, etterligner virkeligheten) og ikke-representasjonell kunst (former, farger, følelser uten gjenkjennelige motiver). Aristoteles skrev om mimesis — en form for representasjon. Å abstrahere betyr å ta vekk detaljer. Det finnes et kontinuum fra det naturalistiske til det nesten ikke-gjenkjennelige. Abstrakt kunst er alltid forbundet med noe visuelt fra den virkelige verden — men i sterk grad bearbeidet. I teateret: en stereotype («skurken», «heksen») er en liten grad av abstrahering. Naturalisme forsøker å ligge på den ene enden av kontinuumet. Artauds grusomhetsteater og dadaismen befinner seg på den andre. ← Bla sideveis → Klikk for å forstørre"}, {"file": "analyse.html", "id": "tm-semiotikk", "title": "Semiotikk — tegn og koder i teateret", "page": "Analyse", "num": "04", "text": "Semiotikk — tegn og koder i teateret Vis Semiotikk er læren om tegn og betydning. I teateret kommuniserer alt — ikke bare teksten. Hvert element på scenen er et potensielt tegn som publikum tolker. Hva er et tegn? Et tegn er noe som betyr noe annet enn seg selv. En rød kjole på scenen er ikke bare en kjole — den kan bety lidenskap, fare, makt eller blod, avhengig av kontekst. Publikum tolker kontinuerlig alle sceniske elementer som potensielle tegn. Ikoniske tegn Ligner det de representerer. Et bord på scenen representerer et bord. Et foto av en person representerer den personen. Naturalistisk scenografi er full av ikoniske tegn. Indeksikale tegn Peker på noe uten å ligne det. Røyk indikerer ild. En tom stol indikerer fravær. Stillhet kan indikere spenning eller død. Mange av de sterkeste "}, {"file": "analyse.html", "id": "tm-teatral", "title": "Forestillingsanalyse", "page": "Analyse", "num": "04", "text": "Forestillingsanalyse Vis Teatral beskriver en begivenhet der noe eller noen settes i fokus — adskilt fra hverdagen og rammet inn slik at det krever oppmerksomhet. Noen defineres som utøver, andre som tilskuer. Det kan skje på en scene, men trenger ikke det. Se også: Iscenesettelse av selvet og Performance som kunstform. En teateranalyse begynner med en hypotese . Det er mulig å peke på referanser til tradisjoner, men fokus i analysen er forestillingen selv — i sin spesifikke kontekst — og den opplevelsen den gir publikum. Når vi analyserer en teatral begivenhet skal vi være mer fokuserte på det vi opplever enn på hvordan forestillingen ble til — arbeidsmetoder eller regissørens intensjoner er ikke det sentrale. Formålet er heller ikke å vurdere om forestillingen var bra eller dårlig. Formå"}, {"file": "analyse.html", "id": "tm-analyse-vg3", "title": "Forestillingsanalyse — et bredere blikk", "page": "Analyse", "num": "04", "text": "Forestillingsanalyse — et bredere blikk Vis Pavis-skjemaet gir deg strukturen. Men bak hvert spørsmål ligger mer. Her er fire innganger som kan hjelpe deg å se bredere i analysen. Rom og romlige relasjoner Rommet er aldri nøytralt. Hvem er i sentrum og hvem er i periferien? Hva sier avstanden mellom kropper om makt og relasjon? Hvordan endrer rommet seg gjennom forestillingen — og hva betyr det når det gjør det? Se også Teatermodell i Dramaturgi. Kropp og bevegelse som tegn Kroppen kommuniserer uavhengig av teksten. Tempo, kvalitet, vekt og retning i bevegelsen bærer mening. En karakter som beveger seg sakte og tungt kommuniserer noe annet enn en som beveger seg raskt og lett — selv om replikkene er identiske. Se Semiotikk og Kropp, stemme og bevegelse . Lys, lyd og musikk Disse elementene"}, {"file": "analyse.html", "id": "tm-tekst", "title": "Å lese en dramatisk tekst", "page": "Analyse", "num": "04", "text": "Å lese en dramatisk tekst Vis En dramatisk tekst er ikke litteratur — den er en plan for noe som skal skje i rom og tid. Spørsmålene nedenfor er ikke litterære, men teatrale: hva krever denne teksten av scenen? Dramaturgisk struktur Hvilken dramaturgisk form har teksten? Hvor ligger spenningen, og hva utløser den? Er det en løsning, eller lar teksten spørsmålene stå åpne? Se Dramaturgi . Tid, sted og rom Hva forteller teksten om hvor og når handlingen foregår? Hva er presist angitt, og hva er overlatt til regissøren? Hvilke muligheter åpner rommet for? Figurer og relasjoner Hvem driver handlingen fremover, og hvem motsetter seg den? Hva er maktrelasjonene mellom figurene? Hvordan endrer relasjonene seg i løpet av teksten? Språk og tone Er språket poetisk, naturalistisk eller fragmentert? H"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "Produksjon — Teaterfag kompendium ← Kompendium Produksjon ☀︎ ⌕ Søk 05 PRODUKSJON Fra idé til forestilling — prosess og praksis. Sceneapp — dokumentasjon og kommunikasjon ↗ Demo: demo1 · abc Skuespillerens rolle Vis Å spille teater handler ikke primært om å lære seg replikker. Det handler om tilstedeværelse og ekte kontakt — med de andre på scenen, den fiktive verden, og av og til publikum. Samspill er ikke én teknikk blant andre — det er selve grunnlaget for alt scenisk arbeid. En skuespiller bruker skuespillteknikk for å oppnå en bestemt skuespillstil . Stilen springer ut av sjangeren og regissørens visjon — en naturalistisk forestilling krever en annen stil enn commedia dell'arte eller episk teater, og dermed andre teknikker. Graden av autonomi en skuespiller har i prosessen varierer etter arbeidsmodellen for produksjonen. I noen modeller er skuespilleren medskaper — i andre er rollen å utføre en visjon som allerede er ferdig tenkt. Skjul ↑ Etikk i prøverommet Vis Et trygt prøverom er en forutsetning for godt kunstnerisk arbeid. Når folk føler seg trygge, tar de større kunstneriske risiko. Etiske rammer bør etableres tidlig i prosessen. Basert på allment anerkjent praksis i teaterpedagogikk. Arbeidsregler Møt presis og forberedt — andres tid er like verdifull som din Telefonen er borte under prøve Si ifra i god tid hvis du ikke kan møte Kle deg passende for fysisk arbeid Gi konstruktive tilbakemeldinger — kun om det er etterspurt Det som skjer i prøverommet, blir i prøverommet Deling av bilder og video fra prøverommet krever samtykke fra alle involverte 1 Samtykke og grenser Alle fysiske og emosjonelle krav i produksjonen kommuniseres tydelig før arbeidet begynner. Ingen skal overraskes av hva som forventes av dem. 2 Maktforhold Regissøren har makt i rommet. Ubehag er en del av kunstnerisk utforsking — men hvis en retning føles utrygg, skal skuespilleren si dette direkte til regissøren (læreren). 3 Emosjonelt krevende materiale Prøverommet er ikke et terapirom. Studenter skal ikke bruke personlige traumer som råmateriale — av hensyn til medspillere og regissøren (læreren), som verken er i posisjon til eller skal settes i en posisjon til å fungere som terapeut. Hvis du befinner deg i en situasjon som føles emosjonelt overveldende, stopp og snakk med regissøren (læreren). Mental helse er en prioritet. Skjul ↑ Auteur-teater og totalt teater Vis I samtidsteateret finnes regissører som aktivt streber etter å skape totalt teater — regissører som selv skaper verket de setter opp, koreograferer bevegelsene, designer scenografien og planlegger lyset. Disse kalles gjerne auteur -regissører, et begrep hentet fra nybølge-filmteorien: en regissør som dominerer hele skapelsesprosessen slik at sluttproduktet er et personlig uttrykk. Mange auteur-regissører er også billedkunstnere. Auteur-regissøren dominerer hele skapelsesprosessen — tekst, kropp, rom, lys og lyd er likestilte elementer under én kunstnerisk visjon. De mest fremtredende auteurene er fra samtid"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "udenter skal ikke bruke personlige traumer som råmateriale — av hensyn til medspillere og regissøren (læreren), som verken er i posisjon til eller skal settes i en posisjon til å fungere som terapeut. Hvis du befinner deg i en situasjon som føles emosjonelt overveldende, stopp og snakk med regissøren (læreren). Mental helse er en prioritet. Skjul ↑ Auteur-teater og totalt teater Vis I samtidsteateret finnes regissører som aktivt streber etter å skape totalt teater — regissører som selv skaper verket de setter opp, koreograferer bevegelsene, designer scenografien og planlegger lyset. Disse kalles gjerne auteur -regissører, et begrep hentet fra nybølge-filmteorien: en regissør som dominerer hele skapelsesprosessen slik at sluttproduktet er et personlig uttrykk. Mange auteur-regissører er også billedkunstnere. Auteur-regissøren dominerer hele skapelsesprosessen — tekst, kropp, rom, lys og lyd er likestilte elementer under én kunstnerisk visjon. De mest fremtredende auteurene er fra samtidsteateret: Robert Wilson, Richard Foreman og Robert Lepage er tydelige eksempler — men begrunnelsen for denne graden av regikontroll har røtter tilbake til begynnelsen av 1900-tallet, der den ble formulert først av Gordon Craig. Craig gikk langt i sin tenkning om regissørens autoritet. Hans begrep übermarionette beskrev idealskuespilleren som en fullstendig kontrollert figur — uten egen vilje, et perfekt instrument for regissørens visjon. Begrepet er provoserende, men peker på noe reelt: i auteur-teateret er skuespillerens autonomi minimal. Se Craig i Teaterfornyere . Kilde: Innes, C. og Shevtsova, M. «Total theatre: the director as auteur», kap. 5 i The Cambridge Introduction to Theatre Directing . Cambridge University Press, 2013. Skjul ↑ Devising Vis En arbeidsmodell der ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd. Forestillingen skapes gjennom utforsking, improvisasjon og kollektive beslutninger underveis i prosessen — heller enn å realisere en forhåndsbestemt plan. Devising skiller seg fra tradisjonell regi ved at tekst, form og uttrykk oppstår i prosessen — ikke før den. Devising bruker ofte en flat organisasjonsmodell — alle i ensemblet bidrar likeverdig til skapelsen, uten en fast hierarkisk struktur. Kilde: Oddey, A. (1994). Devising Theatre: A Practical and Theoretical Handbook . Routledge. Skjul ↑ Sceneformer og rom Vis Forholdet mellom scene og sal former publikumsopplevelsen fundamentalt — før en eneste replikk er sagt. Valget av sceneform er alltid et kunstnerisk og dramaturgisk valg. Titteskapsscene Publikum sitter foran og ser inn i en bilderamme. Scenen er adskilt fra salen. Gir naturlig fjerde vegg og illusjonsteatrets konvensjoner. Brukes i de fleste etablerte teaterbygninger. Arenascene Publikum omringer scenen på alle fire sider. Skuespillerne er alltid synlige fra alle vinkler. Krever bevisst arrangement/blokkering slik at ingen del av publikum alltid ser ryggen. Skaper intimit"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "en — heller enn å realisere en forhåndsbestemt plan. Devising skiller seg fra tradisjonell regi ved at tekst, form og uttrykk oppstår i prosessen — ikke før den. Devising bruker ofte en flat organisasjonsmodell — alle i ensemblet bidrar likeverdig til skapelsen, uten en fast hierarkisk struktur. Kilde: Oddey, A. (1994). Devising Theatre: A Practical and Theoretical Handbook . Routledge. Skjul ↑ Sceneformer og rom Vis Forholdet mellom scene og sal former publikumsopplevelsen fundamentalt — før en eneste replikk er sagt. Valget av sceneform er alltid et kunstnerisk og dramaturgisk valg. Titteskapsscene Publikum sitter foran og ser inn i en bilderamme. Scenen er adskilt fra salen. Gir naturlig fjerde vegg og illusjonsteatrets konvensjoner. Brukes i de fleste etablerte teaterbygninger. Arenascene Publikum omringer scenen på alle fire sider. Skuespillerne er alltid synlige fra alle vinkler. Krever bevisst arrangement/blokkering slik at ingen del av publikum alltid ser ryggen. Skaper intimitet, men gjør scenografi komplisert. Thrust-scene Scenen stikker ut i salen og omringes av publikum på tre sider — som The Globe Theatre i England. Kombinerer intimitet med muligheten for bakvegg og scenografi. Traverse-scene Publikum sitter på begge langsider av en avlang scene. Handlingen utspiller seg mellom dem — som en catwalk. Gir spennende muligheter for bevegelse langs aksen. Black box Et nøytralt, svartmalt rom uten fast scene eller publikumsplassering. Kan konfigureres fritt — titteskapsscene, arena, traverse eller noe helt annet. Gir maksimal fleksibilitet og er standardmodellen i mange øvingslokaler og mindre teaterbygninger. Promenadeteater Publikum beveger seg gjennom rommet og forestillingen skjer rundt dem. Ingen fast scene. Kan skje i teatersaler, fabrikker, utendørs eller historiske bygg. Grenser mot immersive theatre. Funnet rom En ikke-teatral lokasjon brukes som spillested — fabrikkhall, kirke, stasjon, gate. Rommet bærer mening og historie som forestillingen aktiverer. Peter Brook og Grotowski brukte funnet rom bevisst. Site-specific Forestillingen er laget for ett bestemt sted — ikke bare fremført der. Stedet er ikke et nøytralt lerret, men en integrert del av verket. Kan ikke flyttes til en annen lokasjon uten at forestillingen endrer karakter fundamentalt. Skjul ↑ Kunstnerisk valg Vis Når vi tar beslutninger i prosessen med å skape scenekunst, er noen av dem helt basert på praktiske hensyn: Ta valg av rom som eksempel. Rommet kan forme kunstverket på en betydelig måte — men selve valget av rom er ofte styrt av tilgjengelighet og økonomi, ikke kunstnerisk intensjon. På samme måte kan rollebesetting være et rent kunstnerisk valg, men det kan like gjerne handle om hvem som er i klassen, i et amatørteater, eller på institusjonens lønningsliste. Oftest er mange beslutninger litt praktisk og litt kunstnerisk, avhengig av omstendigheter. Merk: Diagrammet er én tolkningsmodell, ikke en fasit. × Kunstnerisk valg – venndiagram Venndiagram: dramaturgisk"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "rer. Peter Brook og Grotowski brukte funnet rom bevisst. Site-specific Forestillingen er laget for ett bestemt sted — ikke bare fremført der. Stedet er ikke et nøytralt lerret, men en integrert del av verket. Kan ikke flyttes til en annen lokasjon uten at forestillingen endrer karakter fundamentalt. Skjul ↑ Kunstnerisk valg Vis Når vi tar beslutninger i prosessen med å skape scenekunst, er noen av dem helt basert på praktiske hensyn: Ta valg av rom som eksempel. Rommet kan forme kunstverket på en betydelig måte — men selve valget av rom er ofte styrt av tilgjengelighet og økonomi, ikke kunstnerisk intensjon. På samme måte kan rollebesetting være et rent kunstnerisk valg, men det kan like gjerne handle om hvem som er i klassen, i et amatørteater, eller på institusjonens lønningsliste. Oftest er mange beslutninger litt praktisk og litt kunstnerisk, avhengig av omstendigheter. Merk: Diagrammet er én tolkningsmodell, ikke en fasit. × Kunstnerisk valg – venndiagram Venndiagram: dramaturgiske valg og sceniske valg er fullt inne i kunstnerisk valg. Teaterform er for det meste inne og krysser venstre grense. Valg av rom og rollebesetting er delvis inne. Arbeidsform er bare litt inne. kunstnerisk valg dramaturgiske valg sceniske valg teaterform sjanger teater- modell spille- stil valg av rom rolle- besetting arbeidsform Tradisjonell produksjonstidslinje Vis Tradisjonelle produksjoner har en hierarkisk organisasjonsmodell — med regissøren, kunstnerisk leder eller produsent på toppen, og ulike fagroller under. 14 uker · 5 timer per uke · ca. 70 timer totalt — omtrent det samme som en amatørproduksjon. Rekkefølgen varierer: noen regissører starter med improvisasjon, andre med tekst eller arrangement. Uke 1–2 Oppstart Auditions og casting Lesing og research Sette datoer — individuelle frister og avtaler Uke 3–5 Utforsking Improvisasjon / tekstarbeid / devising Research og referanser Scenografiske idéer under utvikling Uke 6–9 Forming Arrangement og sceniske valg Kostyme og rekvisitt under utvikling Scenografi konkretiseres Uke 10–11 Konsolidering Kostyme, rekvisitt og regi på plass Gjennomkjøringer Uke 12–13 Markedsføring og teknikk Markedsføring starter — kostyme og regi er klart Teknisk prøve Gjennomkjøringer med alle elementer Uke 14 Forestilling Generalprøve(r) Forestilling(er) Etter Post mortem Strukturert gjennomgang av prosessen Skjul ↑ Del 1 — Regikonsept Vis Dette er ikke en fasit, men én måte å organisere tankene om hvilke valg som skaper den endelige dramaturgiske formen. Gjelder ikke devising-teater, der de kunstneriske valgene tas underveis i prosessen. 1 Visjon Hva er din overordnede idé og hensikt med denne oppsetningen? Hvorfor nå? Hva ønsker du at publikum skal sitte igjen med? 2 Tema og lesemåte Hvordan leser og tolker du materialet? Hvilke hovedtemaer ønsker du å belyse? 3 Tekst og materiale Hvilken rolle spiller teksten i oppsetningen? Hva beholdes, endres eller legges til, og hvorfor? 4 Teaterform Hvilken teatertradisjon ligger til grunn?"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "sitt under utvikling Scenografi konkretiseres Uke 10–11 Konsolidering Kostyme, rekvisitt og regi på plass Gjennomkjøringer Uke 12–13 Markedsføring og teknikk Markedsføring starter — kostyme og regi er klart Teknisk prøve Gjennomkjøringer med alle elementer Uke 14 Forestilling Generalprøve(r) Forestilling(er) Etter Post mortem Strukturert gjennomgang av prosessen Skjul ↑ Del 1 — Regikonsept Vis Dette er ikke en fasit, men én måte å organisere tankene om hvilke valg som skaper den endelige dramaturgiske formen. Gjelder ikke devising-teater, der de kunstneriske valgene tas underveis i prosessen. 1 Visjon Hva er din overordnede idé og hensikt med denne oppsetningen? Hvorfor nå? Hva ønsker du at publikum skal sitte igjen med? 2 Tema og lesemåte Hvordan leser og tolker du materialet? Hvilke hovedtemaer ønsker du å belyse? 3 Tekst og materiale Hvilken rolle spiller teksten i oppsetningen? Hva beholdes, endres eller legges til, og hvorfor? 4 Teaterform Hvilken teatertradisjon ligger til grunn? Realistisk, episk, poetisk, fysisk teater, postdramatisk, dokumentarisk? 5 Publikumskontrakt Åpen eller lukket teatermodell? Skal publikum observere, delta, konfronteres eller medskape? 6 Arbeidsprosess Hvordan vil du jobbe med ensemblet? Improvisasjon, tekstarbeid, fysiske øvelser, research, devising, kollektiv dramaturgi. Prøvestruktur: lesing, arrangement, gjennomkjøringer. 7 Etisk og sosial relevans Hvordan relaterer forestillingen seg til vår samtid — politisk, kulturelt, menneskelig? 8 Målgruppe Hvem ønsker du å nå? Hvordan former målgruppen de kunstneriske valgene dine? Tenk også på hvem forestillingen reelt sett er åpen for — ikke bare hvem den er laget for. 9 Tid og sted i fiksjonen Hvor og når foregår handlingen i din versjon? Historisk, samtidsnært eller abstrakt? 10 Casting og rollefordeling Hvordan tas casting-beslutninger? Audition, devising-basert eller ensemble-beslutning? Hvilke kunstneriske og etiske hensyn gjelder? Kunstnerisk valg — virkemidler og uttrykk 11 Dramaturgiske valg av de dramaturgiske virkemidlene Klipp, kontraster, symboler, gjentagelser, parallellhandlinger, fortellerteknikker. → Drama og Dramaturgi 12 Sceniske valg av de sceniske virkemidlene Hvordan støtter de sceniske virkemidlene regikonseptet? Se diagrammet nedenfor. 13 Konseptuell symbolbærer Hvilket bilde, objekt eller idé binder forestillingen sammen? Stormen, kartet, speilet, kappen, kronen? 14 Estetisk uttrykk Helhetsuttrykk: farger, form, tone, rytme, materialitet. Hvordan ser og føles forestillingen? 15 Fysisk uttrykk Hvordan brukes kroppen og rommet til å formidle mening? Koreografi, rytme, scenekamp, gestus. 16 Skuespillerstil og foreslåtte teknikker Regissøren fastsetter den overordnede stilen. Valg kan være realistisk eller stilisert, der skuespilleren: a) går inn i rollen — Stanislavski-tradisjonen b) presenterer rollefiguren uten illusjon — Brecht: publikum skal ikke «glemme» at det er en skuespiller c) ikke spiller en rolle i det hele tatt — performance-tradisjon"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "urgiske valg av de dramaturgiske virkemidlene Klipp, kontraster, symboler, gjentagelser, parallellhandlinger, fortellerteknikker. → Drama og Dramaturgi 12 Sceniske valg av de sceniske virkemidlene Hvordan støtter de sceniske virkemidlene regikonseptet? Se diagrammet nedenfor. 13 Konseptuell symbolbærer Hvilket bilde, objekt eller idé binder forestillingen sammen? Stormen, kartet, speilet, kappen, kronen? 14 Estetisk uttrykk Helhetsuttrykk: farger, form, tone, rytme, materialitet. Hvordan ser og føles forestillingen? 15 Fysisk uttrykk Hvordan brukes kroppen og rommet til å formidle mening? Koreografi, rytme, scenekamp, gestus. 16 Skuespillerstil og foreslåtte teknikker Regissøren fastsetter den overordnede stilen. Valg kan være realistisk eller stilisert, der skuespilleren: a) går inn i rollen — Stanislavski-tradisjonen b) presenterer rollefiguren uten illusjon — Brecht: publikum skal ikke «glemme» at det er en skuespiller c) ikke spiller en rolle i det hele tatt — performance-tradisjon Valg av konkrete teknikker kan skje i samarbeid med teaterpedagoger. → Skuespill 17 Referanser, allusjoner og inspirasjonskilder Kunstverk, forestillinger, bilder, musikk, filosofi eller tekster som har påvirket visjonen. Regikonseptets elementer Skjul ↑ Del 2 — Produksjonskonsept Vis 1 Spillested og produksjonsrom Hvilket fysisk rom skal forestillingen spilles i? Hvilke muligheter og begrensninger gir det for produksjonen? Arena, black box, utescene, site-specific? Vurder også tilgjengelighet: rullestoltilgang, akustikk, sitteplasser og sansemessige hensyn — er lokalet tilgjengelig for alle? 2 Organisasjonsmodell Hvordan er produksjonen organisert? Streng hierarki eller flat organisasjon? 3 Praktisk gjennomføring og logistikk Hva må være på plass for at produksjonen skal fungere under prøver og forestillinger? 4 HMS og sikkerhet Scenekamp, løft, strøm, rigging — hvilke sikkerhetshensyn gjelder? Hvem har ansvar? 5 Markedsføring og publikum Målgruppe, kanaler (plakat, sosiale medier, skolekanaler, lokalpresse), samarbeid mellom produksjonsstab og markedsføringsansvarlige. Markedsføring starter når kostyme, rekvisitt og regi er på plass. 6 Budsjett Forventede utgifter (kostyme, scenografi, rekvisitter, teknikk, markedsføring), tilgjengelige ressurser, prioriteringer. → Skyggeregnskap-eksempel 7 Dokumentasjon Foto, video, produksjonslogg. → Sceneapp Skjul ↑ Hvem gjør hva? Vis Produsent Vis Overordnet ansvar for at produksjonen gjennomføres innenfor budsjett og tidsplan Koordinerer mellom de ulike faggruppene Håndterer praktiske og administrative oppgaver — kontrakter, økonomi, markedsføring og lokaler I profesjonelle produksjoner er produsenten ofte den som initierer prosjektet og engasjerer regissøren Regissør Vis Ansvar for det kunstneriske arbeidet og ensemblets samarbeid Samarbeide med inspisient om planlegging og struktur Koordinere ensemblet på en demokratisk og rettferdig måte Ta kunstneriske beslutninger og ha siste ord Gi korte, jevnlige notater til ensemblet"}, {"file": "produksjon.html", "id": "", "title": "Produksjon", "page": "Produksjon", "num": "05", "text": "kolekanaler, lokalpresse), samarbeid mellom produksjonsstab og markedsføringsansvarlige. Markedsføring starter når kostyme, rekvisitt og regi er på plass. 6 Budsjett Forventede utgifter (kostyme, scenografi, rekvisitter, teknikk, markedsføring), tilgjengelige ressurser, prioriteringer. → Skyggeregnskap-eksempel 7 Dokumentasjon Foto, video, produksjonslogg. → Sceneapp Skjul ↑ Hvem gjør hva? Vis Produsent Vis Overordnet ansvar for at produksjonen gjennomføres innenfor budsjett og tidsplan Koordinerer mellom de ulike faggruppene Håndterer praktiske og administrative oppgaver — kontrakter, økonomi, markedsføring og lokaler I profesjonelle produksjoner er produsenten ofte den som initierer prosjektet og engasjerer regissøren Regissør Vis Ansvar for det kunstneriske arbeidet og ensemblets samarbeid Samarbeide med inspisient om planlegging og struktur Koordinere ensemblet på en demokratisk og rettferdig måte Ta kunstneriske beslutninger og ha siste ord Gi korte, jevnlige notater til ensemblet Utvikle felles visjon og regi-/produksjonsk
