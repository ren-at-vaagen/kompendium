gner en bratt oppoverbakke — stigende spenning uten pustepause. Prøv å sette karakteren — og publikum — på en berg-og-dal-bane. Veksle mellom lettere og tyngre beats. Du trenger ikke følge aristotelisk dramaturgi, men vær bevisst på hvordan du samhandler med publikums forventninger.", "id": "sk-form", "url": "fordypning.html#sk-form", "file": "fordypning.html"}, {"title": "Vanlige feller", "text": "Ikke skrive første, andre og tredje utkast — og ikke ta imot tilbakemeldinger", "id": "sk-feller", "url": "fordypning.html#sk-feller", "file": "fordypning.html"}, {"title": "Sjekkliste for sene utkast", "text": "Har karakteren din en spine", "id": "sk-sjekkliste", "url": "fordypning.html#sk-sjekkliste", "file": "fordypning.html"}, {"title": "Lydenes emosjonelle effekt — onomatopeia og plosiver", "text": "Ordenes lyd påvirker publikum emosjonelt — uavhengig av betydning. Dette er verktøy for deg som dramatiker:", "id": "sk-lyd", "url": "fordypning.html#sk-lyd", "file": "fordypning.html"}, {"title": "Å skrive scener", "text": "Drama = konflikt.", "id": "tm-skrive-scene", "url": "fordypning.html#tm-skrive-scene", "file": "fordypning.html"}, {"title": "Subtekst og dialog", "text": "La aldri karakterene si akkurat det de mener. Vi sier sjelden det vi egentlig mener. Skriv alltid scenariet", "id": "sk-dialog", "url": "fordypning.html#sk-dialog", "file": "fordypning.html"}, {"title": "Beats", "text": "En scene består av flere beats — karakterene skifter taktikk for å nå målet sitt. De kan «vinne» et beat, så tape det neste. Varier lengden på hvert beat: noen er enkle seire, andre er intense kamper. Beats krever godt partnerarbeid — lytt i karakter, vent ikke på neste replikk.", "id": "sk-beats", "url": "fordypning.html#sk-beats", "file": "fordypning.html"}, {"title": "Karakterdrevet", "text": "Karakteren er så spesifikk som mulig. Hennes individuelle, realistiske samspill med skiftende omstendigheter driver historien fremover. Hun transformerer og tilpasser seg nye omstendigheter.", "id": "sk-kar", "url": "fordypning.html#sk-kar", "file": "fordypning.html"}, {"title": "Handlingsdrevet", "text": "Karakteren er en «type» som ikke er i stand til å transformere seg. Vi nyter å se en kjent type reagere på skiftende omstendigheter på en måte som er true-to-type", "id": "sk-hand", "url": "fordypning.html#sk-hand", "file": "fordypning.html"}, {"title": "Den upålitelige fortelleren", "text": "En tredje mulighet: publikum tror de møter én type person — jo mer karakteren snakker, jo mer ser vi hvem de virkelig er. Karakteren vet det ikke selv. Dette er et eksempel på dramatisk ironi", "id": "sk-upål", "url": "fordypning.html#sk-upål", "file": "fordypning.html"}, {"title": "Hva er en trope?", "text": "En trope er en sekvens av hendelser vi ofte ser gjentatt — i en enkelt fortelling eller i kulturens historiefortelling generelt. En trope i seg selv er ikke et problem. Problemet oppstår når tropen brukes så ofte at den glir over i en klisjé — og publikum slutter å legge merke til detaljene.", "id": "sk-trope", "url": "fordypning.html#sk-trope", "file": "fordypning.html"}, {"title": "Hva er galt med en klisjé?", "text": "Klisjeer er ofte sanne — det er derfor de oppsto. Problemet er at de er så kjente at publikum ikke lenger tenker over hva de betyr. Som dramatiker ønsker vi at karakterens stemme virkelig kommuniserer rikdommen i deres erfaring — ikke at publikum skummer over teksten fordi den er for kjent.", "id": "sk-klisje", "url": "fordypning.html#sk-klisje", "file": "fordypning.html"}, {"title": "Analyser din egen tekst", "text": "Bruk de samme verktøyene du bruker på andres tekster på din egen. Les teksten din som om du er analytiker, ikke forfatter — før du leverer et siste utkast. Se Dramaturgi — virkemidler", "id": "tm-analyser-egen", "url": "fordypning.html#tm-analyser-egen", "file": "fordypning.html"}];

const FILE_LABELS = {
  'teaterhistorie.html': 'Teaterhistorie',
  'teaterfornyere.html': 'Teaterfornyere',
  'dramaturgi.html': 'Dramaturgi',
  'analyse.html': 'Analyse',
  'produksjon.html': 'Produksjon',
  'skuespill.html': 'Skuespillteknikker',
  'bevegelse.html': 'Kropp, stemme og bevegelse',
  'fordypning.html': 'Fordypning',
};

const fuse = new Fuse(SEARCH_INDEX, {
  keys: [
    { name: 'title', weight: 2 },
    { name: 'text', weight: 1 }
  ],
  threshold: 0.35,
  minMatchCharLength: 2,
  includeScore: true,
  ignoreLocation: true,
});

const input = document.getElementById('sok-input');
const results = document.getElementById('sok-results');
const status = document.getElementById('sok-status');

input.addEventListener('input', () => {
  const q = input.value.trim();
  if (q.length < 2) {
    results.innerHTML = '';
    status.textContent = '';
    return;
  }

  const hits = fuse.search(q, { limit: 20 });

  if (hits.length === 0) {
    status.textContent = 'Ingen resultater.';
    results.innerHTML = '';
    return;
  }

  status.textContent = hits.length + ' resultat' + (hits.length === 1 ? '' : 'er');

  results.innerHTML = hits.map(({ item }) => {
    const label = FILE_LABELS[item.file] || item.file;
    const snippet = item.text ? item.text.substring(0, 120) + (item.text.length > 120 ? '…' : '') : '';
    return `
      <a href="${item.url}" class="sok-result">
        <span class="sok-result-label">${label}</span>
        <span class="sok-result-title">${item.title}</span>
        ${snippet ? `<span class="sok-result-snippet">${snippet}</span>` : ''}
      </a>
    `;
  }).join('');
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = results.querySelector('.sok-result');
    if (first) window.location.href = first.getAttribute('href');
  }
});

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☽' : '☀︎';
  localStorage.setItem('theme', next);
}
const saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'dark') document.querySelector('.theme-toggle').textContent = '☽';
}
</script>

<style>
.sok-result {
  display: block;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border2);
  text-decoration: none;
  color: var(--text);
}
.sok-result:hover {
  color: var(--accent, #0066cc);
}
.sok-result-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 0.2rem;
}
.sok-result-title {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.2rem;
}
.sok-result:hover .sok-result-title {
  text-decoration: underline;
}
.sok-result-snippet {
  display: block;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
#sok-input:focus {
  border-color: var(--text2);
}
</style>
