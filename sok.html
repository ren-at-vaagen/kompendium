var entries = [{"file": "introduksjon.html", "id": "", "title": "Å vite at ingen vet", "page": "Å vite at ingen vet", "num": "00", "text": "Å vite at ingen vet — Teaterfag kompendium ← Kompendium Å vite at ingen vet ☀︎ ⌕ Dette kompendiet dekker et utvalg av fagstoffet i min undervisning — basert på min erfaring og faglige bakgrunn. Det er ikke et uttømmende kompendium for hele dramalinja. Andre fagområder, og andre perspektiver på de samme fagområdene, ivaretas av kollegaer med verdifull erfaring og faglig bakgrunn. For materiell som ikke er inkludert her, se også scenetreff.no ↗ . 00 Å VITE AT INGEN VET Illustrasjon av nebbdyret. Biodiversity Heritage Library. Public Domain. Vi tror vi vet ting. Den greske filosofen Sokrates sa at han var klokere enn alle andre fordi han visste at han ikke visste. Å lære noe nytt krever det vi kaller «nybegynnersinnet»: du må midlertidig legge bort det du tror du vet, og åpne deg for ny informasjon. Først når du reflekterer — når du setter ny og gammel kunnskap opp mot hverandre — kan du danne deg meningsfulle meninger og nye teorier. Dette er kjernen i det vi kaller et vekstsinn. Da engelskmennene Georg Shaw først beskrev nebbdyret, trodde vitenskapsmenn det var en bløff. Pattedyr, fugler, reptiler — vi visste jo hvordan dyreriket var bygget opp. Et hårete dyr som legger egg? Umulig. Men nebbdyret brydde seg ikke om våre kategorier. Det bare levde. Slik er det med de fleste kategorier vi bruker — de er rammer for diskusjon, ikke regler naturen selv følger. Når vi låser oss til ett perspektiv, mister vi ting av syne. Som nebbdyr. Og oss selv. Det samme gjelder i kunsten og i historien. Når vi snakker om hva renessansekunstnere «gjorde», betyr ikke det at alle som levde på den tiden fulgte reglene nøyaktig. «Reglene» er nesten alltid generaliseringer laget av folk som ser bakover — på et lite utvalg som skal representere en hel epoke. Og perspektivet til de som skriver historien, teller. Det er viktig å være åpen for å stille spørsmål ved det vi tror vi vet. Vi har for eksempel belegg for at myten om at greske statuer var umalt, delvis er basert på en bevisst løgn fremmet på 1700-tallet. Vet du det — får det deg til å tenke på hva vi i Vesten egentlig mener med «skjønnhet»? Vis bilde UV-lys avslører originale farger på greske statuer. Skjul Noen av dere kjenner kanskje Lysistrata , en komedie fra antikkens Hellas. Handlingen handler om kvinner som nekter menn sex til de stopper krigen. Vi leser den gjerne i dag som et antikrigs-stykke. Men det utdannede publikummet i antikkens Hellas mente at kjærlighet mellom to menn var mer edel enn kjærlighet mellom mann og kvinne — og de satte militær styrke høyt. Kan det hende at stykket var morsomt for grekerne av helt andre grunner enn vi synes det er morsomt? Noen ganger er det ubehagelig å befinne seg i en tilstand av ikke-viten. Poeten Keats kalte evnen til å akseptere usikkerhet for «negativ kapabilitet» — og han så på det som et av de viktigste utgangspunktene for kreativitet og visdom. Begrepene du finner i dette kompendiet er ikke fasiter — de er verktøy for samtalen. Som alle ord avhenger de av konteks"}, {"file": "introduksjon.html", "id": "", "title": "Å vite at ingen vet", "page": "Å vite at ingen vet", "num": "00", "text": "et på 1700-tallet. Vet du det — får det deg til å tenke på hva vi i Vesten egentlig mener med «skjønnhet»? Vis bilde UV-lys avslører originale farger på greske statuer. Skjul Noen av dere kjenner kanskje Lysistrata , en komedie fra antikkens Hellas. Handlingen handler om kvinner som nekter menn sex til de stopper krigen. Vi leser den gjerne i dag som et antikrigs-stykke. Men det utdannede publikummet i antikkens Hellas mente at kjærlighet mellom to menn var mer edel enn kjærlighet mellom mann og kvinne — og de satte militær styrke høyt. Kan det hende at stykket var morsomt for grekerne av helt andre grunner enn vi synes det er morsomt? Noen ganger er det ubehagelig å befinne seg i en tilstand av ikke-viten. Poeten Keats k eren — kjent for politisk satire og absurd humor. Hans komedier latterliggjorde samtidige politikere og filosofer, inkludert Sokrates. → Greske begreper — Å finne de rette ordene Pensumbok · Gresk antikken · side 15–46 ↗ Den romerske antikken · 300 fvt – 453 vt Samfunn Romersk imperium. Teater som masseunderholdning og politisk spektakel. Formål Underholdning, propaganda og feiring av statsmakt. Brød og sirkus — teater og spill som middel til å holde befolkningen fornøyd. Materiell Innendørs og utendørs teatre. Mer spektakulære og voldsomme oppsetninger enn gresk tradisjon. Dramatikere Plautus · Seneca · Terents Pensumbok · Romersk antikken · side 46–56 ↗ Lukk ↑ Middelalderen 500–1500 vt Vis Samfunn Kristen Europa. Kirken dominerer kultur og politikk. Lite skriftlig drama — muntlig tradisjon. Formål Formidling av bibelsk innhold til en analfabetisk befolkning. Teater som massemedia og religiøs opplæring. Materiell Mysteriespill og moralitetsspill. Spillvogner i gatene (pageant wagons). Lekfolk som skuespillere. Allegoriske figurer. Dramatikere Anonym · Hrotsvit Fordypning — teaterformer + Liturgisk drama Den tidligste formen, vokst ut av messens ritualer på 900-tallet. Fremført av geistlige inne i kirken, på latin. Dramatiserte bibelske hendelser — særlig påske og jul. Ikke underholdning, men religiøs formidling. Mysterispill Bibelske fortellinger fra skapelsen til dommedag, fremført på spillvogner (pageant wagons) som beveget seg gjennom byene. Lekfolk spilte rollene. Kunne vare over flere dager. Mirakelspill Dramatisering av helgeners liv og mirakler. Populære i Frankrike og England. Fremført på festdager knyttet til den aktuelle helgenen. Pasjonsspill Dramatisering av Jesu lidelse, død og oppstandelse. Kunne vare flere dager og involvere hele lokalsamfunnet. Tradisjonen lever videre i Oberam"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "bibelsk innhold til en analfabetisk befolkning. Teater lske språket og mestret både blankvers og komplekse karakterportretter Sentral i den engelske renessansen — hans verker er verdens mest spilte dramatikk Spilte på The Globe (utendørs) og Blackfriars Theatre (innendørs, vinterstid) Var deleier i The Globe Theatre og Blackfriars Theatre Hvem William Shakespeare (1564–1616). Skuespiller, dramatiker og medeier av Globe Theatre og innendørsteateret Blackfriars i London. Skrev 37 stykker — tragedier, komedier og historiske dramaer — samt dikt. Språk Skrev på tidlig moderne engelsk. Blander prosa og vers — Shakespeare videreførte blankverset (jambisk pentameter: ti stavelser, ujamn-jamn-rytme) som Marlowe hadde etablert som standard dramatisk form. Tjenere snakker gjerne i prosa, adelige i vers. Rytmen er ikke bare estetisk — den bærer mening og tempo, og er lett å huske. Sjangre Tragedier (Hamlet, Macbeth, Othello, Kong Lear) — nærmer seg aristotelisk form, med protagonister som bærer på "}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "cbeth og Romeo og Julie, blant annet Utviklet det engelske språket og mestret både blankvers og komplekse karakterportretter Sentral i den engelske renessansen — hans verker er verdens mest spilte dramatikk Spilte på The Globe (utendørs) og Blackfriars Theatre (innendørs, vinterstid) Var deleier i The Globe Theatre og Blackfriars Theatre Hvem William Shakespeare (1564–1616). Skuespiller, dramatiker og medeier av Globe Theatre og innendørsteateret Blackfriars i London. Skrev 37 stykker — tragedier, komedier og historiske dramaer — samt dikt. Språk Skrev på tidlig moderne engelsk. Blander prosa og vers — Shakespeare videreførte blankverset (jambisk pentameter: ti stavelser, ujamn-jamn-rytme) som Marlowe hadde etablert som standard dramatisk form. Tjenere snakker gjerne i prosa, adelige i vers. Rytmen er ikke bare estetisk — den bærer mening og tempo, og er lett å huske. Sjangre Tragedier (Hamlet, Macbeth, Othello, Kong Lear) — nærmer seg aristotelisk form, med protagonister som bærer på en fatal feil eller blindhet. Hevntragedier (Titus Andronikus) — blodig, rituell hevn som dramaturgisk motor. Komedier (En midtsommernattsdrøm, Som du vil det, Mye støy for ingenting) — forviklinger, forkledning og lykkelig slutt. Historiske dramaer (Henrik V, Richard III) — engelske konger som moralske og politiske speil. Romanser (The Tempest) — ofte kalt fantasy- eller eventyrsjanger; blander det magiske og det menneskelige. Scenen Globe Theatre: åpen scene som stakk ut i publikum på tre sider. Ingen kulisser — stedet etableres gjennom teksten. Ingen lys bortsett fra dagslys. Alle roller spilt av menn. Publikum fra alle samfunnslag stod eller satt rundt scenen. Shakespeare var også medeier i Blackfriars Theatre — et innendørs, overbygget teater som tillot kveldsforestillinger med levende lys (stearinlys) og et mer velstående publikum. Kulturell arv Shakespeare bygde de fleste stykkene sine på eksisterende legender, noveller eller andre teaterstykker — det originale lå i språket og karakterdybden, ikke i plottet. Hans verk falt ut av favør under restaurasjonstiden, men ble brakt tilbake til forgrunnen av den engelske kulturarven av skuespilleren og impresarioen David Garrick på midten av 1700-tallet. Siden da har Shakespeares stykker vært et fast referansepunkt for allusjoner i vestlig kunst og kultur — i litteratur, opera, film, musikk og populærkultur. Å kjenne Shakespeare er å kjenne et felles europeisk referansebibliotek. Hvorfor viktig Shakespeare er den mest oppførte dramatikeren i verden. Hans stykker utforsker makt, kjærlighet, sjalusi, forræderi og identitet med en psykologisk dybde som holder seg. Han er også referansepunktet for veldig mye vestlig dramaturgisk teori etter 1600. Pensumbok · side 90–129 ↗ Fordypning: Shakespeare — presentasjoner og materiale ↗ Lukk ↑ Klassisismen og Restoration ca. 1600–1725 Vis Samfunn Absolutistiske monarker. Hoffteater. Opera utvikles i Italia. I England stengte puritanerne teatrene 1642–1660 — da monarkiet ble gjenopp"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "arakterdybden, ikke i plottet. Hans verk falt ut av favør under restaurasjonstiden, men ble brakt tilbake til forgrunnen av den engelske kulturarven av skuespilleren og impresarioen David Garrick på midten av 1700-tallet. Siden da har Shakespeares stykker vært et fast referansepunkt for allusjoner i vestlig kunst og kultur — i litteratur, opera, film, musikk og populærkultur. Å kjenne Shakespeare er å kjenne et felles europeisk referansebibliotek. Hvorfor viktig Shakespeare er den mest oppførte dramatikeren i verden. Hans stykker utforsker makt, kjærlighet, sjalusi, forræderi og identitet med en psykologisk dybde som holder seg. Han er også referansepunktet for veldig mye vestlig dramaturgisk teori etter 1600. Pensumbok · side 90–129 ↗ Fordypning: Shakespeare — presentasjoner og materiale ↗ Lukk ↑ Klassisismen og Restoration ca. 1600–1725 Vis Samfunn Absolutistiske monarker. Hoffteater. Opera utvikles i Italia. I England stengte puritanerne teatrene 1642–1660 — da monarkiet ble gjenopprettet med Karl II, åpnet teatrene igjen. Formål Ære og prestisje for fyrsten, og utforskning av det menneskelige gjennom strenge dramatiske former. Materiell Frankrike: strenge klassiske regler (de tre enheter). England: Restoration-teateret var mer påvirket av barokkens symmetri og struktur. Lukket scenerom med kulissescenografi. Profesjonelle skuespillerinner på den engelske offentlige scenen for første gang — i Italia hadde kvinner opptrådt profesjonelt siden 1500-tallet (Isabella Andreini er det tidligste kjente eksempelet), og i Frankrike var Marie Venier aktiv allerede på slutten av 1500-tallet. Deklamatorisk spillestil. Dramatikere Racine · Corneille · Molière Pensumbok · side 136–156 ↗ Lukk ↑ Opplysningstiden ca. 1700–1800 Vis Samfunn Fornuft og vitenskap utfordrer religion og tradisjon. England, Frankrike, Tyskland og Norden. Formål Opplysning, moral og samfunnskritikk. Borgerskapets teater vokser frem. Materiell Borgerlig drama, sentimentalt drama. Løsning fra klassisismens strenge regler. Dramatikere Voltaire · Lessing · Ludvig Holberg — se Norsk teaterhistorie ↓ Pensumbok · side 161–191 ↗ Lukk ↑ Romantikken ca. 1815–1850 Vis Samfunn Reaksjon mot opplysningstidens fornuftsideal. Følelser, natur og nasjonalisme i sentrum. England, Frankrike, Tyskland, Norge. Formål Uttrykke individets indre liv og nasjonale identitet. Materiell Melodrama, historiske skuespill, spektakulær scenografi. Sturm og Drang — tysk bevegelse som fremhevet ekstreme følelser og opprør mot fornuftens regler. Dramatikere Schiller · Hugo · Büchner Pensumbok · side 194–213 ↗ Lukk ↑ 1800-tallet og realismen ca. 1850–1900 Vis Samfunn Industrialisering. Fremvekst av middelklassen. Nasjonalisme. Darwin og vitenskapelig tenkemåte. Sosiale problemer som rusmisbruk, barnearbeid og prostitusjon kom på den offentlige agendaen. Formål Bruke scenen som laboratorium for sosial endring — belyse samfunnsproblemer som fattigdom, arv og dobbeltmoral (Zola, Ibsen). Materiell Fjerde vegg-illusjonen. Natur"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "strenge regler. Dramatikere Voltaire · Lessing · Ludvig Holberg — se Norsk teaterhistorie ↓ Pensumbok · side 161–191 ↗ Lukk ↑ Romantikken ca. 1815–1850 Vis Samfunn Reaksjon mot opplysningstidens fornuftsideal. Følelser, natur og nasjonalisme i sentrum. England, Frankrike, Tyskland, Norge. Formål Uttrykke individets indre liv og nasjonale identitet. Materiell Melodrama, historiske skuespill, spektakulær scenografi. Sturm og Drang — tysk bevegelse som fremhevet ekstreme følelser og opprør mot fornuftens regler. Dramatikere Schiller · Hugo · Büchner Pensumbok · side 194–213 ↗ Lukk ↑ 1800-tallet og realismen ca. 1850–1900 Vis Samfunn Industrialisering. Fremvekst av middelklassen. Nasjonalisme. Darwin og vitenskapelig tenkemåte. Sosiale problemer som rusmisbruk, barnearbeid og prostitusjon kom på den offentlige agendaen. Formål Bruke scenen som laboratorium for sosial endring — belyse samfunnsproblemer som fattigdom, arv og dobbeltmoral (Zola, Ibsen). Materiell Fjerde vegg-illusjonen. Naturalistiske scenografi. Prosa i stedet for vers. Psykologisk dybde i karakter. Reteatralisering Da filmen kom, søkte teateret tilbake til sine egne tradisjoner: maske, ritual, commedia dell'arte. Se Førstegenerasjons fornyere . Dramatikere Ibsen Strindberg Tsjehov Pensumbok · side 215–242 ↗ Lukk ↑ Etter 1875 — se også Teaterfornyere Pensumbok · Etter 1875 ↗ Modernismen, eksperimentet og samtiden er også organisert etter nøkkelpersoner. → Gå til Teaterfornyere Fin de Siècle og tidlig modernisme 1880–1914 Vis Overgangen fra 1800-tallets melodrama til en søken etter indre sannhet. Samfunn Industrialisering, urbanisering og politisk uro. Vitenskapelig tenkemåte utfordrer tradisjonelle verdier. Formål Søke sannhet — enten gjennom vitenskapelig og sosial analyse eller gjennom det åndelige og indre. Kunstbevegelsene splittet seg mellom disse to. Viktige retninger Naturalisme og realisme — Ibsen og Strindberg brakte ekte samfunnsproblemer (arv, kjønn, klasse) inn på scenen. Teateret som laboratorium for menneskelig atferd. Symbolisme — Reaksjon mot realismen. Drømmeaktige bilder og symboler for å fange det uutsigelige og sjelelige. Regissørens fremvekst — Teateret som helhetlig kunstverk (Gesamtkunstverk) kontrollert av en visjonær regissør. Dramatikere Ibsen Strindberg Tsjehov Wilde Fornyere Wagner Reinhardt Antoine Saxe-Meiningen → Moderne teater: to greiner — Analyse Moderne teater: to greiner Fra fin de siècle hadde kunstnerne to ulike tilnærminger til det å uttrykke menneskets tilstand: Vitenskapsmennene — inspirert av Darwin. Årsak og virkning, det logiske og objektive. Naturalisme, realisme, og etter hvert Brechts episke teater. (Merk: Brecht begynte som ekspresjoni Zürich 1916 som reaksjon på krigens galskap. Tristan Tzara sentral. Provokative, ikke-logiske tekster og happenings. Surrealisme Drøm og det ubevisste som kilde til kunstnerisk sannhet (Breton, 1924). Artaud tilhørte surrealistene før bevegelsen ble politisk — da surrealistene vendte mot politikken, gikk Artaud dypere inn i det de hadde begynt å utforske. Ekspresjonisme Forvridde, subjektive følelsesuttrykk. Scenebildet speiler karakterens indre verden fremfor den ytre virkeligheten — virkeligheten var mer enn de fem sansene. Sterk i tysk teater 1910–1925. Futurisme Italiensk bevegelse (Marinetti, ca. 1909). Hyllet maskin, fart, krig og brudd med fortiden — bevegelsen var åpent misogynistisk. Ville brenne ned biblioteker og spille teater i diskotek. Korte, provokative sceniske øyeblikk — forløpere til performance-kunsten. Konstruktivisme Russisk bevegelse. Meyerhold brukte maskinkonstruksjoner som scenografi og biomekanikk som skuespillerteknikk. Teateret som politisk fabrikk. Mer om ismene — tilleggsmateriale ↗ Lukk ↑ Modernismen frem til etterkrigstiden 1914–1945 Vis Mellomkrigstiden brukte teateret som et verktøy for radikal samfunnsendring og som svar på krigens traumer. Formål Teateret som politisk og sosialt redskap — et svar på krig, fascisme og samfunnskrise. Viktige retninger Agitprop — politisk teater som agiterte direkte for revolusjon og klassekamp. Kortformater, slagkraftige budskap, ofte fremf"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "r karakterens indre verden fremfor den ytre virkeligheten — virkeligheten var mer enn de fem sansene. Sterk i tysk teater 1910–1925. Futurisme Italiensk bevegelse (Marinetti, ca. 1909). Hyllet maskin, fart, krig og brudd med fortiden — bevegelsen var åpent misogynistisk. Ville brenne ned biblioteker og spille teater i diskotek. Korte, provokative sceniske øyeblikk — forløpere til performance-kunsten. Konstruktivisme Russisk bevegelse. Meyerhold brukte maskinkonstruksjoner som scenografi og biomekanikk som skuespillerteknikk. Teateret som politisk fabrikk. Mer om ismene — tilleggsmateriale ↗ Lukk ↑ Modernismen frem til etterkrigstiden 1914–1945 Vis Mellomkrigstiden brukte teateret som et verktøy for radikal samfunnsendring og som svar på krigens traumer. Formål Teateret som politisk og sosialt redskap — et svar på krig, fascisme og samfunnskrise. Viktige retninger Agitprop — politisk teater som agiterte direkte for revolusjon og klassekamp. Kortformater, slagkraftige budskap, ofte fremført utenfor tradisjonelle teatre. Episk teater — Brecht videreutviklet Erwin Piscators arbeid og etablerte Verfremdungseffekt (fremmedgjøring) for å få publikum til å tenke kritisk fremfor å leve seg inn i følelsene. Grusomhetens teater — Mens Brecht ville fikse samfunnet, trodde Artaud at mennesket måtte helbredes først. Som pesten skulle teateret trenge gjennom publikums selvtilfredshet — gjennom et voldsomt, sanselig og rituelt teaterspråk. Hans teorier er blant de mest innflytelsesrike konseptene i postmoderne teater. Fornyere Brecht Artaud Meyerhold Piscator Lukk ↑ Etterkrigstiden og postmodernismen 1945–i dag Vis Teateret dekonstruerte «de store fortellingene» og beveget seg fra leting etter sannhet til en lek med ulike perspektiver. Formål Stille spørsmål ved mening, språk og de store fortellingene etter krigens ødeleggelser. Viktige retninger Det absurde teater — Beckett og Ionesco fremstilte mennesket som fanget i en meningsløs eksistens der språket ofte bryter sammen. I motsetning til modernismens «ismer» var ikke absurdisme en organisert bevegelse eller et manifest — begrepet ble først tatt i bruk av kritikeren Martin Esslin i 1961/62, da han samlet en rekke etterkrigsdramatikere under én beskrivelse i boken Theatre of the Absurd . Esslin hentet begrepet fra Albert Camus' essay Myten om Sisyfos (1942), der Camus argumenterte for at menneskets grunnvilkår er absurd — livet er meningsløst, men vi fortsetter likevel. erer seg selv som teater (Abel, 1963; Pirandello som sentralt eksempel). Se Iscenesettelse av selvet . Kritikk av forbrukerkultur og kapitalisme Oversiktskart: Moderne, postmoderne og fysisk teater ↗ Felluga, D. «General Introduction to Postmodernism.» Introductory Guide to Critical Theory . Purdue University. Lukk ↑ New York Avant-Garde · 1958–1980 Off-Off-Broadway Vis Broadway · Off-Broadway · Off-Off-Broadway Betegnelsene har ingenting med gateadresse å gjøre — det handler om størrelsen på teatersalen: Broadway = 500+ seter (store kommersielle teatre). Off-Broadway = 100–499 seter. Off-Off-Broadway = under 100 seter. Jo færre seter, jo større artistisk frihet og jo lavere krav til lisenser og lønnsavtaler. Kontekst Mens Off-Broadway på 1960-tallet ble stadig mer kommersiell, vokste det frem et nytt lag under: Off-Off-Broadway. Startstedet var kafeer, kirker og kunstgallerier i Greenwich Village og East Village — steder som ikke trengte teaterlisens og ikke brydde seg om anmeldelser. Kunstnerne betalte ikke og ble ikke betalt. Teateret var et eksperiment, ikke et produkt. Caffe Cino · 1958 Joe Cino åpnet et kafékjeller på Cornelia Street i Greenwich Village — ikke som teater, men som møtested. Teater oppsto av seg selv. Ingen budsjett, ingen sensur, ingen mal. LHBT-stemmer fikk plass da de ikke hadde andre scener. Det var her Tennessee Williams for første gang fikk oppmerksomhet som dramatiker. Regnes som Off-Off-Broadways fødested. Se Teaterfornyere . La MaMa · 1961 Ellen Stewart grunnla La MaMa Experimental Theatre Club i East Village. Satte opp flere forestillinger på ett år enn hele Broadway. Åpen for alle — ingen mal for «kvalitet». Frem"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "g jo lavere krav til lisenser og lønnsavtaler. Kontekst Mens Off-Broadway på 1960-tallet ble stadig mer kommersiell, vokste det frem et nytt lag under: Off-Off-Broadway. Startstedet var kafeer, kirker og kunstgallerier i Greenwich Village og East Village — steder som ikke trengte teaterlisens og ikke brydde seg om anmeldelser. Kunstnerne betalte ikke og ble ikke betalt. Teateret var et eksperiment, ikke et produkt. Caffe Cino · 1958 Joe Cino åpnet et kafékjeller på Cornelia Street i Greenwich Village — ikke som teater, men som møtested. Teater oppsto av seg selv. Ingen budsjett, ingen sensur, ingen mal. LHBT-stemmer fikk plass da de ikke hadde andre scener. Det var her Tennessee Williams for første gang fikk oppmerksomhet som dramatiker. Regnes som Off-Off-Broadways fødested. Se Teaterfornyere . La MaMa · 1961 Ellen Stewart grunnla La MaMa Experimental Theatre Club i East Village. Satte opp flere forestillinger på ett år enn hele Broadway. Åpen for alle — ingen mal for «kvalitet». Fremdeles aktiv. Se Teaterfornyere . The Living Theatre · 1946 Judith Malina og Julian Beck. Politisk, anarkistisk og kroppslig — ville skape «a Beautiful Non-Violent Anarchist Revolution». Inspirert av både Artaud og Piscator, som Malina arbeidet direkte med. «Paradise Now!» inviterte publikum opp på scenen. Se Teaterfornyere . The Open Theater · 1963 Joseph Chaikin grunnla The Open Theater sammen med Megan Terry og Jean-Claude van Itallie. Ville frigjøre skuespilleren fra Method Acting — fokus på ensemble, lyd og bevegelse, og improvisasjon. Inviterte publikum til å vitne prosessen. Se Teaterfornyere . The Performance Group · 1967 Richard Schechner grunnla The Performance Group — utgangspunktet for Environmental Theater og Performance Studies. Se Teaterfornyere . The Wooster Group · 1980 Elizabeth LeCompte tok over The Performance Group og omdøpte det til The Wooster Group — ett av verdens mest innflytelsesrike eksperimentelle ensembler. Se Teaterfornyere . Lukk ↑ Norsk teaterhistorie · 1684–i dag Vis Formål Profesjonalisering av norsk teater som en del av nasjonsbyggingen — å etablere norsk språk, identitet og kultur på scenen. Holberg (1684–1754) Ludvig Holberg — norsk/dansk forfatter og historiker, levde det meste av livet i Danmark. Regnes som nordisk teaters far. Verk 33 komedier på seks år, inspirert av Molière og commedia dell'arte. Karaktertyper, ikke psykologiske individer — satire over borgerskapet. Kjente stykker: Jeppe paa Bierget , Den Politiske Kandstøber , Den Stundesløse , Erasmus Montanus . Ressurser SNL: Ludvig Holberg ↗ NRK Fjernsynsteatret — Holberg (1964) ↗ NRK Fjernsynsteatret — Holberg (1984) ↗ De faste scenene (1827–1913) Christiania Theater Norges første faste offentlige scene, åpnet 1827 i Christiania (Oslo). Satte standarden for norsk institusjonsteater. Den Nationale Scene Grunnlagt i Bergen 1876. Ibsen var sceneinstruktør her tidlig i karrieren. Fremdeles aktiv. Nationaltheatret Åpnet i Oslo 1899 med Ibsen og Bjørnson som grunnpilarene. Fo"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "1684–i dag Vis Formål Profesjonalisering av norsk teater som en del av nasjonsbyggingen — å etablere norsk språk, identitet og kultur på scenen. Holberg (1684–1754) Ludvig Holberg — norsk/dansk forfatter og historiker, levde det meste av livet i Danmark. Regnes som nordisk teaters far. Verk 33 komedier på seks år, inspirert av Molière og commedia dell'arte. Karaktertyper, ikke psykologiske individer — satire over borgerskapet. Kjente stykker: Jeppe paa Bierget , Den Politiske Kandstøber , Den Stundesløse , Erasmus Montanus . Ressurser SNL: Ludvig Holberg ↗ NRK Fjernsynsteatret — Holberg (1964) ↗ NRK Fjernsynsteatret — Holberg (1984) ↗ De faste scenene (1827–1913) Christiania Theater Norges første faste offentlige scene, åpnet 1827 i Christiania (Oslo). Satte standarden for norsk institusjonsteater. Den Nationale Scene Grunnlagt i Bergen 1876. Ibsen var sceneinstruktør her tidlig i karrieren. Fremdeles aktiv. Nationaltheatret Åpnet i Oslo 1899 med Ibsen og Bjørnson som grunnpilarene. Fortsatt Norges prestisjetyngste scene. Det Norske Teatret Grunnlagt 1913 av Hulda Garborg — dramatiker, essayist og sentral skikkelse i nynorsk-bevegelsen. I dag det teatret i verden som setter opp flest forestillinger på nynorsk. Ibsen og Bjørnson Henrik Ibsen Skapte det psykologiske borgerlige dramaet — Et dukkehjem , Hedda Gabler , Vildanden . Var internasjonalt berømt i sin levetid og regnes som grunnleggeren av det moderne drama. Hans stykker spilles fortsatt over hele verden. Bjørnstjerne Bjørnson Like dominerende som Ibsen i sin tid, men langt mer glemt internasjonalt i dag. Gikk fra nasjonalromantisk bondedrama til samfunnskritisk realisme. Mottok Nobelprisen i litteratur i 1903 — den første nordmann. Friteaterbevegelsen (1970-tallet) Bakgrunn Opprør mot de etablerte institusjonsteatrene — politisk, eksperimentelt og desentralisert. Inspirert av Brecht, Boal og internasjonale frigrupper. Åpnet teater for nye stemmer, nye rom og nye publikumsgrupper. La grunnlaget for det norske fri-scenefeltet. Tramteatret 1976–1986 · oppløst Stiftet i Oslo 1976 av Liv Aakvik. Vedtok å alltid ta de svake og undertryktes parti og nå ut til hele Norges befolkning. Laget politisk musikkrevy med sterk forankring i rockemusikk. Nådde et bredt publikum gjennom NRK-serier og turneer over hele landet. Gjenforeningsturné 2003. Baktruppen 1986–2014 · oppløst Norsk performance-kollektiv grunnlagt i Oslo. Blandet teater, performance art og konseptuell kunst. Postdramatisk praksis: ingen fast tekst, ingen fast rolle. Et av Norges mest internasjonalt profilerte eksperimentelle ensembler. Ble oppløst etter at statlig basisfinansiering ikke ble fornyet. Trine Falch, med bakgrunn fra Baktruppen, grunnla senere Susie Wang — se Norske samtidskompanier nedenfor. Jon Fosse (1959–) Verdens mest oppførte nålevende dramatiker. Skriver på nynorsk. Mottok Nobelprisen i litteratur 2023. Uttrykk Minimalistisk, repetitivt språk med lange pauser — taushet er like viktig som replikk. Tematikk: ensomhet, na"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "fri-scenefeltet. Tramteatret 1976–1986 · oppløst Stiftet i Oslo 1976 av Liv Aakvik. Vedtok å alltid ta de svake og undertryktes parti og nå ut til hele Norges befolkning. Laget politisk musikkrevy med sterk forankring i rockemusikk. Nådde et bredt publikum gjennom NRK-serier og turneer over hele landet. Gjenforeningsturné 2003. Baktruppen 1986–2014 · oppløst Norsk performance-kollektiv grunnlagt i Oslo. Blandet teater, performance art og konseptuell kunst. Postdramatisk praksis: ingen fast tekst, ingen fast rolle. Et av Norges mest internasjonalt profilerte eksperimentelle ensembler. Ble oppløst etter at statlig basisfinansiering ikke ble fornyet. Trine Falch, med bakgrunn fra Baktruppen, grunnla senere Susie Wang — se Norske samtidskompanier nedenfor. Jon Fosse (1959–) Verdens mest oppførte nålevende dramatiker. Skriver på nynorsk. Mottok Nobelprisen i litteratur 2023. Uttrykk Minimalistisk, repetitivt språk med lange pauser — taushet er like viktig som replikk. Tematikk: ensomhet, natur, eksistens og det uutsigelige. Representerer en særnorsk tradisjon der det som ikke sies er det viktigste. Ressurser SNL: Jon Fosse ↗ SNL: Norsk teaterhistorie ↗ Norske samtidskompanier Wakka Wakka Visuelt teaterselskap grunnlagt i 2001 av Kirjan Waage (norsk) og Gwendolyn Warnock. Basert i New York og Oslo. Kombinerer dukketeater, objektmanipulasjon, masker, video og originalmusikk for å utforske globale temaer — fra den islandske finanskrisen til klimaendringer og menneskerettigheter. Internasjonal turné siden 2006. Obie Award og Drama Desk Award. wakkawakka.org ↗ De Utvalgte Fri scenisk gruppe grunnlagt i 1993, utdannet ved Nordisk Teaterskole i Danmark. Arbeider i grenselandet mellom teater, billedkunst og performance, med egenprodusert video, lyd og musikk som likestilte virkemidler. Kjent for å blande fiksjon og dokumentarisk materiale, det komiske og det tragiske. Vant Kritikerprisen (2012), Heddaprisen (2012 og 2019) og Torshovteatrets pris (2010). Holder til på Nesodden. deutvalgte.no ↗ ▶ YouTube: De Utvalgte Verdensteatret Kunstkollektiv grunnlagt i Bergen i 1986 av Lisbeth Bodd og Asle Nilsen, nå basert i Oslo. Kombinerer performance, installasjon, lyd, animasjon og skyggelek i tverrkunstneriske verk som vises på museer, gallerier og musikk- og scenekunstfestivaler internasjonalt. Et sentralt eksempel på likestilt dramaturgi i norsk samtidsscenekunst — ingen av virkemidlene er underordnet de andre. Heddaprisens ærespris 2014. Bessie Award, New York, 2006. verdensteatret.com ↗ SNL: Verdensteatret ↗ Susie Wang Kjærlighet og kannibalisme. New York Times anmeldte det. Norsk teatergruppe grunnlagt i 2017 av Trine Falch, Martin Langlie, Mona Solhaug og Bo Krister Wallström — to av dem med bakgrunn fra Baktruppen. Lager representasjonelt teater med røtter i skrekksjangeren, det absurde og B-film-estetikk. Kjent for horrortrilogien der Burnt Toast er siste del — en forestilling om kjærlighet og kannibalisme som New York Times omtalte som «a disturbing yet ten"}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "eutvalgte.no ↗ ▶ YouTube: De Utvalgte Verdensteatret Kunstkollektiv grunnlagt i Bergen i 1986 av Lisbeth Bodd og Asle Nilsen, nå basert i Oslo. Kombinerer performance, installasjon, lyd, animasjon og skyggelek i tverrkunstneriske verk som vises på museer, gallerier og musikk- og scenekunstfestivaler internasjonalt. Et sentralt eksempel på likestilt dramaturgi i norsk samtidsscenekunst — ingen av virkemidlene er underordnet de andre. Heddaprisens ærespris 2014. Bessie Award, New York, 2006. verdensteatret.com ↗ SNL: Verdensteatret ↗ Susie Wang Kjærlighet og kannibalisme. New York Times anmeldte det. Norsk teatergruppe grunnlagt i 2017 av Trine Falch, Martin Langlie, Mona Solhaug og Bo Krister Wallström — to av dem med bakgrunn fra Baktruppen. Lager representasjonelt teater med røtter i skrekksjangeren, det absurde og B-film-estetikk. Kjent for horrortrilogien der Burnt Toast er siste del — en forestilling om kjærlighet og kannibalisme som New York Times omtalte som «a disturbing yet tender tale». Internasjonal profil: Kampnagel i Hamburg, NYU Skirball i New York. Susie Wang — nettside ↗ ▶ YouTube: Susie Wang ↗ Lukk ↑ Samtiden — vi ser konturene etter 1980 Vis Jo nærmere vi er vår egen tid, jo vanskeligere er det å se hva som vil vise seg å være viktig. Globaliseringen har gjort teaterfeltet mer sammenvevd enn noensinne — impulser, kunstnere og forestillinger beveger seg raskt på tvers av grenser. Det vi kan se, er noen tydelige tendenser. Men hvilke av disse som vil forme neste generasjon teater, vet vi ikke ennå. Postdramatisk og visuelt teater Teksten er ikke lenger øverstkommanderende. Lys, kropp, rom og lyd likestilles som dramaturgiske elementer. Robert Wilson, Verdensteatret og mange andre arbeider i denne tradisjonen. Se også Postdramatisk dramaturgi . Postdramatisk teater — Wikipedia ↗ Immersivt teater Publikum er ikke tilskuere, men deltakere som beveger seg fritt i forestillingsrommet og skaper sin egen opplevelse. Punchdrunk er det mest kjente eksempelet internasjonalt. Punchdrunk ↗ Dokumentarteater og virkelighetsteater Teateret henter sitt materiale direkte fra virkeligheten: intervjuer, rettsdokumenter, statistikk. Rimini Protokoll er blant de mest profilerte. Se også Performance og politikk . Rimini Protokoll ↗ Dekolonisering av repertoar og scenerom Hvem sine historier fortelles, hvem spiller dem, og hvem skriver dem? Teaterfelt over hele verden stiller spørsmål ved det europeiske kanon og søker nye stemmer og tradisjoner. Decolonizing Theatre Practice — HowlRound ↗ Klimakrise og bærekraft Klimakrisen setter spor i både tematikk og produksjonspraksis. Noen teatre endrer måten de produserer på; andre setter klimaet på scenen som tema. Theatre in the Age of Climate Change — HowlRound ↗ Hybridformer mellom dans og teater Grensene mellom dans, teater og performance art viskes ut. Fysisk teater, dansebasert teater og bevegelsesscore finner nye uttrykk. Se Kropp, stemme og bevegelse og norske eksempler i Sentrale skikkelser . Gecko: Kin "}, {"file": "teaterhistorie.html", "id": "", "title": "Teaterhistorie", "page": "Teaterhistorie", "num": "01", "text": "nternasjonalt. Punchdrunk ↗ Dokumentarteater og virkelighetsteater Teateret henter sitt materiale direkte fra virkeligheten: intervjuer, rettsdokumenter, statistikk. Rimini Protokoll er blant de mest profilerte. Se også Performance og politikk . Rimini Protokoll ↗ Dekolonisering av repertoar og scenerom Hvem sine historier fortelles, hvem spiller dem, og hvem skriver dem? Teaterfelt over hele verden stiller spørsmål ved det europeiske kanon og søker nye stemmer og tradisjoner. Decolonizing Theatre Practice — HowlRound ↗ Klimakrise og bærekraft Klimakrisen setter spor i både tematikk og produksjonspraksis. Noen teatre endrer måten de produserer på; andre setter klimaet på scenen som tema. Theatre in the Age of Climate Change — HowlRound ↗ Hybridformer mellom dans og teater Grensene mellom dans, teater og performance art viskes ut. Fysisk teater, dansebasert teater og bevegelsesscore finner nye uttrykk. Se Kropp, stemme og bevegelse og norske eksempler i Sentrale skikkelser . Gecko: Kin — National Theatre ↗ Digital og multimedial scenografi Video, live-kamera, projeksjon og digitale verktøy er blitt ordinære sceniske elementer — ikke eksotiske tillegg. Se Kjersti Horn som et norsk eksempel. Lukk ↑ ← Introduksjon Teaterfornyere → © 2026 · Redaktør: Ren Powell"}, {"file": "teaterhistorie.html", "id": "ep-antikk", "title": "Antikken", "page": "Teaterhistorie", "num": "01", "text": "Antikken 547 fvt – 453 vt Vis Den greske antikken · 547–31 fvt Samfunn Gresk bystat. Teater knyttet til religiøse festivaler for Dionysos. Formål Religiøs feiring, borgerlig deltakelse, katarsis (Aristoteles). Materiell Utendørs amfiteater. Masker, kothurner. Bare mannlige skuespillere. Kor. Maks tre skuespillere på scenen. Dramatikere Sofokles · Euripides · Aristofanes Tragedie og komedie Aristoteles analyserte tragedien i Poetikken (bok I) — den er bevart og er grunnlaget for vestlig dramateori. Han skrev også en bok om komedien (bok II), men den er tapt. Vi vet derfor langt mer om den greske tragediens teori enn komedienes. Aristofanes er den viktigste overleverte komedieskriveren — kjent for politisk satire og absurd humor. Hans komedier latterliggjorde samtidige politikere og filosofe"}, {"file": "teaterhistorie.html", "id": "ep-middel", "title": "Middelalderen", "page": "Teaterhistorie", "num": "01", "text": "Middelalderen 500–1500 vt Vis Samfunn Kristen Europa. Kirken dominerer kultur og politikk. Lite skriftlig drama — muntlig tradisjon. Formål Formidling av bibelsk innhold til en analfabetisk befolkning. Teater som massemedia og religiøs opplæring. Materiell Mysteriespill og moralitetsspill. Spillvogner i gatene (pageant wagons). Lekfolk som skuespillere. Allegoriske figurer. Dramatikere Anonym · Hrotsvit"}, {"file": "teaterhistorie.html", "id": "fd-middelalder", "title": "Liturgisk drama", "page": "Teaterhistorie", "num": "01", "text": "Fordypning — teaterformer + Liturgisk drama Den tidligste formen, vokst ut av messens ritualer på 900-tallet. Fremført av geistlige inne i kirken, på latin. Dramatiserte bibelske hendelser — særlig påske og jul. Ikke underholdning, men religiøs formidling. Mysterispill Bibelske fortellinger fra skapelsen til dommedag, fremført på spillvogner (pageant wagons) som beveget seg gjennom byene. Lekfolk spilte rollene. Kunne vare over flere dager. Mirakelspill Dramatisering av helgeners liv og mirakler. Populære i Frankrike og England. Fremført på festdager knyttet til den aktuelle helgenen. Pasjonsspill Dramatisering av Jesu lidelse, død og oppstandelse. Kunne vare flere dager og involvere hele lokalsamfunnet. Tradisjonen lever videre i Oberammergau i Bayern siden 1634. ↗ oberammergau Moralitete"}, {"file": "teaterhistorie.html", "id": "ep-renes", "title": "Renessansen", "page": "Teaterhistorie", "num": "01", "text": "Renessansen 1453–1650 Vis Samfunn Gjenoppdagelse av antikken. Humanisme. Fremvekst av profesjonelle teaterkompanier og faste teaterbygninger. Formål Vende tilbake til antikkens teaterformer og sette mennesket — ikke religionen — i sentrum (med unntak av Spania). Materiell Commedia dell'arte (Italia): masker, faste roller, improvisasjon. Perspektivscenografi utvikles i italiensk hoffteater (Serlio, 1500-tallet). Elisabetansk teater: sceneplattform som stakk ut i publikum, tekstbasert. Dramatikere Shakespeare Marlowe Lope de Vega Pensumbok · side 90–129 ↗ Shakespeare i dybden Nøkkelpunkter Skrev Hamlet, Macbeth og Romeo og Julie, blant annet Utviklet det engelske språket og mestret både blankvers og komplekse karakterportretter Sentral i den engelske renessansen — hans verker er verdens mest"}, {"file": "teaterhistorie.html", "id": "ep-barokk", "title": "Klassisismen og Restoration", "page": "Teaterhistorie", "num": "01", "text": "Klassisismen og Restoration ca. 1600–1725 Vis Samfunn Absolutistiske monarker. Hoffteater. Opera utvikles i Italia. I England stengte puritanerne teatrene 1642–1660 — da monarkiet ble gjenopprettet med Karl II, åpnet teatrene igjen. Formål Ære og prestisje for fyrsten, og utforskning av det menneskelige gjennom strenge dramatiske former. Materiell Frankrike: strenge klassiske regler (de tre enheter). England: Restoration-teateret var mer påvirket av barokkens symmetri og struktur. Lukket scenerom med kulissescenografi. Profesjonelle skuespillerinner på den engelske offentlige scenen for første gang — i Italia hadde kvinner opptrådt profesjonelt siden 1500-tallet (Isabella Andreini er det tidligste kjente eksempelet), og i Frankrike var Marie Venier aktiv allerede på slutten av 1500-tallet."}, {"file": "teaterhistorie.html", "id": "ep-opplysning", "title": "Opplysningstiden", "page": "Teaterhistorie", "num": "01", "text": "Opplysningstiden ca. 1700–1800 Vis Samfunn Fornuft og vitenskap utfordrer religion og tradisjon. England, Frankrike, Tyskland og Norden. Formål Opplysning, moral og samfunnskritikk. Borgerskapets teater vokser frem. Materiell Borgerlig drama, sentimentalt drama. Løsning fra klassisismens strenge regler. Dramatikere Voltaire · Lessing · Ludvig Holberg — se Norsk teaterhistorie ↓ Pensumbok · side 161–191 ↗ Lukk ↑"}, {"file": "teaterhistorie.html", "id": "ep-romantikk", "title": "Romantikken", "page": "Teaterhistorie", "num": "01", "text": "Romantikken ca. 1815–1850 Vis Samfunn Reaksjon mot opplysningstidens fornuftsideal. Følelser, natur og nasjonalisme i sentrum. England, Frankrike, Tyskland, Norge. Formål Uttrykke individets indre liv og nasjonale identitet. Materiell Melodrama, historiske skuespill, spektakulær scenografi. Sturm og Drang — tysk bevegelse som fremhevet ekstreme følelser og opprør mot fornuftens regler. Dramatikere Schiller · Hugo · Büchner Pensumbok · side 194–213 ↗ Lukk ↑"}, {"file": "teaterhistorie.html", "id": "ep-realisme", "title": "1800-tallet og realismen", "page": "Teaterhistorie", "num": "01", "text": "1800-tallet og realismen ca. 1850–1900 Vis Samfunn Industrialisering. Fremvekst av middelklassen. Nasjonalisme. Darwin og vitenskapelig tenkemåte. Sosiale problemer som rusmisbruk, barnearbeid og prostitusjon kom på den offentlige agendaen. Formål Bruke scenen som laboratorium for sosial endring — belyse samfunnsproblemer som fattigdom, arv og dobbeltmoral (Zola, Ibsen). Materiell Fjerde vegg-illusjonen. Naturalistiske scenografi. Prosa i stedet for vers. Psykologisk dybde i karakter. Reteatralisering Da filmen kom, søkte teateret tilbake til sine egne tradisjoner: maske, ritual, commedia dell'arte. Se Førstegenerasjons fornyere . Dramatikere Ibsen Strindberg Tsjehov Pensumbok · side 215–242 ↗ Lukk ↑ Etter 1875 — se også Teaterfornyere Pensumbok · Etter 1875 ↗ Modernismen, eksperimentet og"}, {"file": "teaterhistorie.html", "id": "ep-findesiecle", "title": "Fin de Siècle og tidlig modernisme", "page": "Teaterhistorie", "num": "01", "text": "Fin de Siècle og tidlig modernisme 1880–1914 Vis Overgangen fra 1800-tallets melodrama til en søken etter indre sannhet. Samfunn Industrialisering, urbanisering og politisk uro. Vitenskapelig tenkemåte utfordrer tradisjonelle verdier. Formål Søke sannhet — enten gjennom vitenskapelig og sosial analyse eller gjennom det åndelige og indre. Kunstbevegelsene splittet seg mellom disse to. Viktige retninger Naturalisme og realisme — Ibsen og Strindberg brakte ekte samfunnsproblemer (arv, kjønn, klasse) inn på scenen. Teateret som laboratorium for menneskelig atferd. Symbolisme — Reaksjon mot realismen. Drømmeaktige bilder og symboler for å fange det uutsigelige og sjelelige. Regissørens fremvekst — Teateret som helhetlig kunstverk (Gesamtkunstverk) kontrollert av en visjonær regissør. Dramatiker"}, {"file": "teaterhistorie.html", "id": "ep-ismer", "title": "Ismene i teateret", "page": "Teaterhistorie", "num": "01", "text": "Ismene i teateret ca. 1880–1940 Vis Kunstneriske bevegelser som brøt med realismen og utforsket nye uttrykksformer. Formål Brøt med realismen og søkte nye måter å erkjenne og uttrykke sannhet på. Symbolisme Reaksjon mot realismens ytre virkelighet. Drøm, myte og det indre sjelsliv i sentrum. Diffus belysning, symbolske bilder. Maeterlinck er sentral. Dadaisme Anti-kunst og anti-logikk. Oppsto i Zürich 1916 som reaksjon på krigens galskap. Tristan Tzara sentral. Provokative, ikke-logiske tekster og happenings. Surrealisme Drøm og det ubevisste som kilde til kunstnerisk sannhet (Breton, 1924). Artaud tilhørte surrealistene før bevegelsen ble politisk — da surrealistene vendte mot politikken, gikk Artaud dypere inn i det de hadde begynt å utforske. Ekspresjonisme Forvridde, subjektive følelse"}, {"file": "teaterhistorie.html", "id": "ep-modernisme", "title": "Modernismen frem til etterkrigstiden", "page": "Teaterhistorie", "num": "01", "text": "Modernismen frem til etterkrigstiden 1914–1945 Vis Mellomkrigstiden brukte teateret som et verktøy for radikal samfunnsendring og som svar på krigens traumer. Formål Teateret som politisk og sosialt redskap — et svar på krig, fascisme og samfunnskrise. Viktige retninger Agitprop — politisk teater som agiterte direkte for revolusjon og klassekamp. Kortformater, slagkraftige budskap, ofte fremført utenfor tradisjonelle teatre. Episk teater — Brecht videreutviklet Erwin Piscators arbeid og etablerte Verfremdungseffekt (fremmedgjøring) for å få publikum til å tenke kritisk fremfor å leve seg inn i følelsene. Grusomhetens teater — Mens Brecht ville fikse samfunnet, trodde Artaud at mennesket måtte helbredes først. Som pesten skulle teateret trenge gjennom publikums selvtilfredshet — gjennom et "}, {"file": "teaterhistorie.html", "id": "ep-etterkrig", "title": "Etterkrigstiden og postmodernismen", "page": "Teaterhistorie", "num": "01", "text": "Etterkrigstiden og postmodernismen 1945–i dag Vis Teateret dekonstruerte «de store fortellingene» og beveget seg fra leting etter sannhet til en lek med ulike perspektiver. Formål Stille spørsmål ved mening, språk og de store fortellingene etter krigens ødeleggelser. Viktige retninger Det absurde teater — Beckett og Ionesco fremstilte mennesket som fanget i en meningsløs eksistens der språket ofte bryter sammen. I motsetning til modernismens «ismer» var ikke absurdisme en organisert bevegelse eller et manifest — begrepet ble først tatt i bruk av kritikeren Martin Esslin i 1961/62, da han samlet en rekke etterkrigsdramatikere under én beskrivelse i boken Theatre of the Absurd . Esslin hentet begrepet fra Albert Camus' essay Myten om Sisyfos (1942), der Camus argumenterte for at menneskets g"}, {"file": "teaterhistorie.html", "id": "ep-nyavant", "title": "New York Avant-Garde · 1958–1980", "page": "Teaterhistorie", "num": "01", "text": "New York Avant-Garde · 1958–1980 Off-Off-Broadway Vis Broadway · Off-Broadway · Off-Off-Broadway Betegnelsene har ingenting med gateadresse å gjøre — det handler om størrelsen på teatersalen: Broadway = 500+ seter (store kommersielle teatre). Off-Broadway = 100–499 seter. Off-Off-Broadway = under 100 seter. Jo færre seter, jo større artistisk frihet og jo lavere krav til lisenser og lønnsavtaler. Kontekst Mens Off-Broadway på 1960-tallet ble stadig mer kommersiell, vokste det frem et nytt lag under: Off-Off-Broadway. Startstedet var kafeer, kirker og kunstgallerier i Greenwich Village og East Village — steder som ikke trengte teaterlisens og ikke brydde seg om anmeldelser. Kunstnerne betalte ikke og ble ikke betalt. Teateret var et eksperiment, ikke et produkt. Caffe Cino · 1958 Joe Cino å"}, {"file": "teaterhistorie.html", "id": "ep-norsk", "title": "Norsk teaterhistorie · 1684–i dag", "page": "Teaterhistorie", "num": "01", "text": "Norsk teaterhistorie · 1684–i dag Vis Formål Profesjonalisering av norsk teater som en del av nasjonsbyggingen — å etablere norsk språk, identitet og kultur på scenen. Holberg (1684–1754) Ludvig Holberg — norsk/dansk forfatter og historiker, levde det meste av livet i Danmark. Regnes som nordisk teaters far. Verk 33 komedier på seks år, inspirert av Molière og commedia dell'arte. Karaktertyper, ikke psykologiske individer — satire over borgerskapet. Kjente stykker: Jeppe paa Bierget , Den Politiske Kandstøber , Den Stundesløse , Erasmus Montanus . Ressurser SNL: Ludvig Holberg ↗ NRK Fjernsynsteatret — Holberg (1964) ↗ NRK Fjernsynsteatret — Holberg (1984) ↗ De faste scenene (1827–1913) Christiania Theater Norges første faste offentlige scene, åpnet 1827 i Christiania (Oslo). Satte standard"}, {"file": "teaterhistorie.html", "id": "ep-susie-wang", "title": "Susie Wang", "page": "Teaterhistorie", "num": "01", "text": "Susie Wang Kjærlighet og kannibalisme. New York Times anmeldte det. Norsk teatergruppe grunnlagt i 2017 av Trine Falch, Martin Langlie, Mona Solhaug og Bo Krister Wallström — to av dem med bakgrunn fra Baktruppen. Lager representasjonelt teater med røtter i skrekksjangeren, det absurde og B-film-estetikk. Kjent for horrortrilogien der Burnt Toast er siste del — en forestilling om kjærlighet og kannibalisme som New York Times omtalte som «a disturbing yet tender tale». Internasjonal profil: Kampnagel i Hamburg, NYU Skirball i New York. Susie Wang — nettside ↗ ▶ YouTube: Susie Wang ↗ Lukk ↑"}, {"file": "teaterhistorie.html", "id": "ep-samtid", "title": "Samtiden — vi ser konturene", "page": "Teaterhistorie", "num": "01", "text": "Samtiden — vi ser konturene etter 1980 Vis Jo nærmere vi er vår egen tid, jo vanskeligere er det å se hva som vil vise seg å være viktig. Globaliseringen har gjort teaterfeltet mer sammenvevd enn noensinne — impulser, kunstnere og forestillinger beveger seg raskt på tvers av grenser. Det vi kan se, er noen tydelige tendenser. Men hvilke av disse som vil forme neste generasjon teater, vet vi ikke ennå. Postdramatisk og visuelt teater Teksten er ikke lenger øverstkommanderende. Lys, kropp, rom og lyd likestilles som dramaturgiske elementer. Robert Wilson, Verdensteatret og mange andre arbeider i denne tradisjonen. Se også Postdramatisk dramaturgi . Postdramatisk teater — Wikipedia ↗ Immersivt teater Publikum er ikke tilskuere, men deltakere som beveger seg fritt i forestillingsrommet og skap"}, {"file": "teaterfornyere.html", "id": "", "title": "Sentrale skikkelser", "page": "Sentrale skikkelser", "num": "02", "text": "Teaterfornyere — Teaterfag kompendium ← Kompendium Sentrale skikkelser i teaterhistorien ☀︎ ⌕ Søk 02 SENTRALE SKIKKELSER I TEATERHISTORIEN Individuelle portretter av regissører, dramatikere og teoretikere som forandret teateret. For historisk kontekst og epoker, se Teaterhistorie → Førstegenerasjons fornyere · 1875–1914 Vis Da filmen kom på begynnelsen av 1900-tallet, måtte teateret spørre seg hva det var — og hva det ikke var. Svaret var reteatralisering: en bevisst vending bort fra realismen og tilbake til teaterets egne tradisjoner. Ikke naturlig lys og hverdagsdialog, men maske, ritual, commedia dell'arte og den stiliserte kroppen. Teateret hentet inspirasjon fra det gamle for å finne sin egenart. Richard Wagner Gesamtkunstwerk 1813–1883 · Tyskland Vis Gesamtkunstwerk — alle elementer på scenen arbeider som en helhet Komponisten som den totale kunstner Senket orkestergraven og slukket lyset i salen Fjernet klasseskillet i salen Fordypning + ↗ SNL: Richard Wagner ▶ YouTube: Richard Wagner biografi ↗ Wagner i dag — scenekunst.no Skjul ↑ Max Reinhardt Regikunst 1873–1943 · Østerrike/Tyskland Vis «Regikunstens far» Ingen fasit for iscenesettelse — formen følger innholdet Brukte alle rom: kirker, torg, sirkus Massescener og lyssetting som dramaturgisk verktøy Utviklet kammerspill Fordypning + ↗ SNL: Max Reinhardt ▶ YouTube: Max Reinhardt Skjul ↑ Adolphe Appia + Gordon Craig Scenografi · Teaterkunst Appia 1862–1928 · Sveits · Craig 1872–1966 · England Vis Appia: Musikkens sjel — brøt med den flate, naturalistiske malte kulissen Appia: Romlig skulptur — utviklet 3D-scenografi med trapper og platåer Appia: Levende lys — brukte lys som et dramaturgisk element som følger musikken Appia: Eurytmi — utviklet rytmisk bevegelseslære sammen med Dalcroze Appia: Dypden — fokuserte på skuespillerens indre rytme og menneskelige tilstedeværelse Craig: Regissøren som enekunstner — krevde total kontroll over alle teaterets elementer Craig: Übermarionette — ideelt skuespill uten ego, følelser eller tilfeldigheter Craig: Monumental scenografi — abstrakte, enorme flater og bevegelige skjermer Craig: Det bevegelige maleriet — så på scenen som en visuell komposisjon fremfor litteratur Craig: Revolusjonerte regi — la grunnlaget for moderne europeisk regitenkning og abstraksjon Fordypning: Appia vs. Craig + Appia Craig Fokus Dypden — indre, menneskelig sjeletilstand Monumental — det storslåtte, visuelle bildet Scenografi 3D-arkitektur med trapper og platåer Bevegelige «screens» som endrer rommet Lys Lever og endrer seg etter musikkens stemning Arkitektonisk — skarpe skygger, enorme dimensjoner Bevegelse Eurytmi (med Dalcroze) — rytmisk til musikk Übermarionette — total kontroll, uten ego Regissøren Koordinerer lys, rom og kropp til en helhet Komponist/kunstner — eier alt inkl. dramatikeren Scenerammen Beholder prosceniumbuen for å definere rommet Fjerner rammen — grenseløst, abstrakt univers ↗ SNL: Adolphe Appia ▶ YouTube: Appia 1 ▶ YouTube: Appia 2 ▶ YouTube: Appia 3 ↗ S"}, {"file": "teaterfornyere.html", "id": "", "title": "Sentrale skikkelser", "page": "Sentrale skikkelser", "num": "02", "text": "ølelser eller tilfeldigheter Craig: Monumental scenografi — abstrakte, enorme flater og bevegelige skjermer Craig: Det bevegelige maleriet — så på scenen som en visuell komposisjon fremfor litteratur Craig: Revolusjonerte regi — la grunnlaget for moderne europeisk regitenkning og abstraksjon Fordypning: Appia vs. Craig + Appia Craig Fokus Dypden — indre, menneskelig sjeletilstand Monumental — det storslåtte, visuelle bildet Scenografi 3D-arkitektur med trapper og platåer Bevegelige «screens» som endrer rommet Lys Lever og endrer seg etter musikkens stemning Arkitektonisk — skarpe skygger, enorme dimensjoner Bevegelse Eurytmi (med Dalcroze) — rytmisk til musikk Übermarionette — total kontroll, uten ego Regissøren Koordinerer lys, rom og kropp til en helhet Komponist/kunstner — eier alt inkl. dramatikeren Scenerammen Beholder prosceniumbuen for å definere rommet Fjerner rammen — grenseløst, abstrakt univers ↗ SNL: Adolphe Appia ▶ YouTube: Appia 1 ▶ YouTube: Appia 2 ▶ YouTube: Appia 3 ↗ SNL: Gordon Craig ▶ Vimeo: Gordon Craig — His Own Words and Images Skjul ↑ Georg II, Hertug Saxe-Meiningen Regikunst 1826–1914 · Tyskland Vis En av de første til å ta inn scenegulvet som en del av den scenografiske designen Koret var ikke lenger en samling av statister, men skuespillere med individuelle roller Prøvene varte 5–6 timer og var fulle forestillinger, ikke bare gjennomganger Etablerte teaterverksteder som produserte møbler og kostymer til hver enkelt oppsetning Fordypning + ↗ SNL: Georg II Sachsen-Meiningen ▶ YouTube: Saxe-Meiningen Skjul ↑ Konstantin Stanislavski Naturalisme 1863–1938 · Russland Vis Grunnla Moskva Kunstnerteater (1898) Utviklet «Systemet» — metodikk for realistisk skuespill Fokus på indre motivasjon og emosjonell hukommelse Basis for Method Acting (Lee Strasberg, USA) I sitt senere arbeid beveget han seg bort fra emosjonell hukommelse og mot fysiske handlinger som inngang til rollen — dette kalles den fysiske handlingsmetoden Hovedverk: An Actor Prepares (1936) Fordypning + Stanislavski endret synspunkt underveis — det finnes ingen enkel «Stanislavski-metode». Tidlig fase Følelseshukommelse — skuespilleren henter fram personlige minner for å skape ekte følelser. Grunnlaget for Method Acting (Strasberg) — men ikke hele Stanislavski. Midtfase Tvil og revisjon — Stanislavski ble kritisk til følelseshukommelse som primærverktøy. Han søkte en mer pålitelig inngang. Sen fase Fysiske handlingers metode — i stedet for «hva ville jeg føle?» spør skuespilleren «hva ville jeg gjøre ?» Følelsen oppstår av handlingen. Meisner og Adler utviklet sine metoder i denne retningen. Stanislavski, K. (1936). An Actor Prepares . · Carnicke, S. M. (2009). Stanislavski in Focus . Routledge. ↗ SNL: Konstantin Stanislavski ▶ YouTube: Stanislavski biografi ↗ Stanislavski-teknikk i Skuespill Skjul ↑ Anton Tsjekhov Realisme 1860–1904 · Russland Vis Kjent for: Kirsebærhagen , Tre søstre , Måken , Onkel Vanja Stykkene ble ikke godt mottatt før Stanislavskis oppsetninger"}, {"file": "teaterfornyere.html", "id": "", "title": "Sentrale skikkelser", "page": "Sentrale skikkelser", "num": "02", "text": "36) Fordypning + Stanislavski endret synspunkt underveis — det finnes ingen enkel «Stanislavski-metode». Tidlig fase Følelseshukommelse — skuespilleren henter fram personlige minner for å skape ekte følelser. Grunnlaget for Method Acting (Strasberg) — men ikke hele Stanislavski. Midtfase Tvil og revisjon — Stanislavski ble kritisk til følelseshu
