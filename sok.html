[{"title": "Antikken", "text": "Den greske antikken · 547–31 fvt", "id": "ep-antikk", "url": "teaterhistorie.html#ep-antikk", "file": "teaterhistorie.html"}, {"title": "Fordypning: Holberg på scenen", "text": "NRK Fjernsynsteatret — Holberg (1964)", "id": "ford-holberg", "url": "teaterhistorie.html#ford-holberg", "file": "teaterhistorie.html"}, {"title": "Fin de Siècle og tidlig modernisme", "text": "Overgangen fra 1800-tallets melodrama til en søken etter indre sannhet.", "id": "ep-findesiecle", "url": "teaterhistorie.html#ep-findesiecle", "file": "teaterhistorie.html"}, {"title": "Ismene i teateret", "text": "Kunstneriske bevegelser som brøt med realismen og utforsket nye uttrykksformer.", "id": "ep-ismer", "url": "teaterhistorie.html#ep-ismer", "file": "teaterhistorie.html"}, {"title": "Modernismen frem til etterkrigstiden", "text": "Mellomkrigstiden brukte teateret som et verktøy for radikal samfunnsendring og som svar på krigens traumer.", "id": "ep-modernisme", "url": "teaterhistorie.html#ep-modernisme", "file": "teaterhistorie.html"}, {"title": "Etterkrigstiden og postmodernismen", "text": "Teateret dekonstruerte «de store fortellingene» og beveget seg fra leting etter sannhet til en lek med ulike perspektiver.", "id": "ep-etterkrig", "url": "teaterhistorie.html#ep-etterkrig", "file": "teaterhistorie.html"}, {"title": "Richard Wagner Gesamtkunstwerk", "text": "Gesamtkunstwerk — alle elementer på scenen arbeider som en helhet", "id": "wagner", "url": "teaterfornyere.html#wagner", "file": "teaterfornyere.html"}, {"title": "Max Reinhardt Regikunst", "text": "«Regikunstens far»", "id": "reinhardt", "url": "teaterfornyere.html#reinhardt", "file": "teaterfornyere.html"}, {"title": "Georg II, Hertug Saxe-Meiningen Regikunst", "text": "En av de første til å ta inn scenegulvet som en del av den scenografiske designen", "id": "saxemeiningen", "url": "teaterfornyere.html#saxemeiningen", "file": "teaterfornyere.html"}, {"title": "Konstantin Stanislavski Naturalisme", "text": "Grunnla Moskva Kunstnerteater (1898)", "id": "stanislavski", "url": "teaterfornyere.html#stanislavski", "file": "teaterfornyere.html"}, {"title": "Anton Tsjekhov Realisme", "text": "Kjent for: Kirsebærhagen", "id": "tsjehov", "url": "teaterfornyere.html#tsjehov", "file": "teaterfornyere.html"}, {"title": "Henrik Ibsen Realisme", "text": "«Moderne dramas far»", "id": "ibsen", "url": "teaterfornyere.html#ibsen", "file": "teaterfornyere.html"}, {"title": "Émile Zola Naturalisme", "text": "Naturalismens far — Le Naturalisme au Théâtre", "id": "zola", "url": "teaterfornyere.html#zola", "file": "teaterfornyere.html"}, {"title": "André Antoine Naturalisme", "text": "Grunnla Théâtre Libre — abonnementsteater for å unngå sensur", "id": "antoine", "url": "teaterfornyere.html#antoine", "file": "teaterfornyere.html"}, {"title": "Maurice Maeterlinck Symbolisme", "text": "Ledende symbolist i teateret", "id": "maeterlinck", "url": "teaterfornyere.html#maeterlinck", "file": "teaterfornyere.html"}, {"title": "August Strindberg Naturalisme · Symbolisme", "text": "Skrev Frøken Julie", "id": "strindberg", "url": "teaterfornyere.html#strindberg", "file": "teaterfornyere.html"}, {"title": "Alfred Jarry Symbolisme · Absurdisme", "text": "Symbolistisk forfatter og forløper til det absurdistiske teateret", "id": "jarry", "url": "teaterfornyere.html#jarry", "file": "teaterfornyere.html"}, {"title": "Vsevolod Meyerhold Biomekanikk", "text": "Stjerneelev hos Stanislavski — begynte å utforske ikke-realistiske spillestiler med forbindelse til symbolismen", "id": "meyerhold", "url": "teaterfornyere.html#meyerhold", "file": "teaterfornyere.html"}, {"title": "Oscar Wilde L'art pour l'art", "text": "Tok inspirasjon fra det franske L'art pour l'art", "id": "wilde", "url": "teaterfornyere.html#wilde", "file": "teaterfornyere.html"}, {"title": "Terents Romersk antikken", "text": "Født i Carthage, Nord Afrika — levde som romersk slave, ble frigitt", "id": "terents", "url": "teaterfornyere.html#terents", "file": "teaterfornyere.html"}, {"title": "Hrotsvit von Gandersheim Middelalderen", "text": "Første kvinnelige dramatiker vi vet om", "id": "hrotsvit", "url": "teaterfornyere.html#hrotsvit", "file": "teaterfornyere.html"}, {"title": "Christopher Marlowe Renessansen", "text": "Skrev Doctor Faustus", "id": "marlowe", "url": "teaterfornyere.html#marlowe", "file": "teaterfornyere.html"}, {"title": "Lope de Vega Renessansen", "text": "Skrev Fuenteovejuna", "id": "lopevega", "url": "teaterfornyere.html#lopevega", "file": "teaterfornyere.html"}, {"title": "Molière Klassisismen", "text": "Født Jean-Baptiste Poquelin — valgte teater fremfor farens yrke som kongelig møbeltapetserer", "id": "moliere", "url": "teaterfornyere.html#moliere", "file": "teaterfornyere.html"}, {"title": "Luigi Pirandello Metateater", "text": "Det groteske teateret og metateater (begrep fra Lionel Abel, 1964)", "id": "pirandello", "url": "teaterfornyere.html#pirandello", "file": "teaterfornyere.html"}, {"title": "Erwin Piscator Episk teater", "text": "Ville lage et proletarisk drama og utfordre et arbeiderklassepublikum", "id": "piscator", "url": "teaterfornyere.html#piscator", "file": "teaterfornyere.html"}, {"title": "Tristan Tzara Dadaisme", "text": "Poet og dramatiker — en av grunnleggerne av Dada-bevegelsen", "id": "tzara", "url": "teaterfornyere.html#tzara", "file": "teaterfornyere.html"}, {"title": "Federico García Lorca Symbolisme · Surrealisme", "text": "Poet og dramatiker som jobbet med symbolisme, surrealisme og futurisme", "id": "lorca", "url": "teaterfornyere.html#lorca", "file": "teaterfornyere.html"}, {"title": "Bertolt Brecht Episk teater", "text": "Jobbet hos Reinhardt og Piscator", "id": "brecht", "url": "teaterfornyere.html#brecht", "file": "teaterfornyere.html"}, {"title": "Antonin Artaud Grusomhetens teater", "text": "Forlot den surrealistiske bevegelsen for å utforske sin Grusomhetens teater — en total sanseopplevelse", "id": "artaud", "url": "teaterfornyere.html#artaud", "file": "teaterfornyere.html"}, {"title": "Jean Genet Absurdisme", "text": "Ingenting har mening uten at det motsatte eksisterer: kjærlighet/hat, makt/avmakt", "id": "genet", "url": "teaterfornyere.html#genet", "file": "teaterfornyere.html"}, {"title": "Peter Weiss Dokumentarteater", "text": "Familien tvunget til eksil fra Tyskland i 1934 (etniske jøder, luthersk tro)", "id": "weiss", "url": "teaterfornyere.html#weiss", "file": "teaterfornyere.html"}, {"title": "Harold Pinter Etterkrigsdrama", "text": "Betegnet som Absurdist — nektet å akseptere merkelappen", "id": "pinter", "url": "teaterfornyere.html#pinter", "file": "teaterfornyere.html"}, {"title": "Fernando Arrabal Absurdisme · Théâtre Panique", "text": "Betegnet som Absurdist — grunnla Théâtre Panique (seremoniteater som er delvis anti-religiøst, delvis hellig)", "id": "arrabal", "url": "teaterfornyere.html#arrabal", "file": "teaterfornyere.html"}, {"title": "Samuel Beckett Absurdisme", "text": "Opptatt med menneskers metafysiske tilværelse — ikke politiske eller sosiale spørsmål", "id": "beckett", "url": "teaterfornyere.html#beckett", "file": "teaterfornyere.html"}, {"title": "Eugène Ionesco Absurdisme", "text": "Kalte eget verk «theater of derision» — ble betegnet som Absurdist mot sin vilje", "id": "ionesco", "url": "teaterfornyere.html#ionesco", "file": "teaterfornyere.html"}, {"title": "Joan Littlewood Theatre Workshop", "text": "Etablerte Theatre Workshop i 1945", "id": "littlewood", "url": "teaterfornyere.html#littlewood", "file": "teaterfornyere.html"}, {"title": "Ariane Mnouchkine Théâtre du Soleil", "text": "Etablerte Théâtre du Soleil i 1964", "id": "mnouchkine", "url": "teaterfornyere.html#mnouchkine", "file": "teaterfornyere.html"}, {"title": "Jerzy Grotowski Fattig teater", "text": "Fattig teater — fjern alt unødvendig, behold skuespiller og tilskuer", "id": "grotowski", "url": "teaterfornyere.html#grotowski", "file": "teaterfornyere.html"}, {"title": "Peter Brook Det tomme rom", "text": "Regisserte sin første profesjonelle Shakespeare-produksjon som 20-åring", "id": "brook", "url": "teaterfornyere.html#brook", "file": "teaterfornyere.html"}, {"title": "Judith Malina / Julian Beck The Living Theatre", "text": "Etablerte The Living Theatre i 1946 — mest kontroversielle teatergruppen i 1960-tallet", "id": "malina", "url": "teaterfornyere.html#malina", "file": "teaterfornyere.html"}, {"title": "Richard Schechner Miljøteater", "text": "Grunnla The Performance Group i New York (1967) — pionér for miljøteater", "id": "schechner", "url": "teaterfornyere.html#schechner", "file": "teaterfornyere.html"}, {"title": "Elizabeth LeCompte Postdramatisk", "text": "Tok over The Performance Group i 1980 og omdøpte det til The Wooster Group", "id": "lecompte", "url": "teaterfornyere.html#lecompte", "file": "teaterfornyere.html"}, {"title": "Robert Wilson † Visuelt teater", "text": "«Lyset er den viktigste aktøren»", "id": "wilson", "url": "teaterfornyere.html#wilson", "file": "teaterfornyere.html"}, {"title": "Caryl Churchill Postmoderne", "text": "Kjent for sin nyskapende bruk av teaterformer, sin utforskning av maktmisbruk og sine sterke feministiske og politiske temaer — regnes som en av de mest innflytelsesrike nålevende dramatikerne i verden", "id": "churchill", "url": "teaterfornyere.html#churchill", "file": "teaterfornyere.html"}, {"title": "Jon Fosse Ny dramatikk", "text": "Postmimetisk dramatikk — bryter med den klassiske handlingen til fordel for indre, eksistensielle tilstander", "id": "fosse", "url": "teaterfornyere.html#fosse", "file": "teaterfornyere.html"}, {"title": "Heiner Müller Postdramatisk", "text": "Postdramatisk og postmoderne poet, dramatiker og regissør", "id": "muller", "url": "teaterfornyere.html#muller", "file": "teaterfornyere.html"}, {"title": "Frantic Assembly Fysisk teater", "text": "Scott Graham, Artistic Director", "id": "frantic", "url": "teaterfornyere.html#frantic", "file": "teaterfornyere.html"}, {"title": "Sanford Meisner Realistisk", "text": "«Leve sant under imaginære omstendigheter»", "id": "meisner", "url": "teaterfornyere.html#meisner", "file": "teaterfornyere.html"}, {"title": "Uta Hagen Realistisk", "text": "Substitusjon — bytt ut fiksjon med eget liv", "id": "utahagen", "url": "teaterfornyere.html#utahagen", "file": "teaterfornyere.html"}, {"title": "Michael Chekhov Imaginasjonsbasert", "text": "Studerte med Stanislavski — fikk sammenbrudd etter arbeid med «emotional memory»", "id": "mchekhov", "url": "teaterfornyere.html#mchekhov", "file": "teaterfornyere.html"}, {"title": "Stella Adler Imaginasjonsbasert", "text": "Studerte hos Stanislavski i Paris — etter at han hadde forlatt «emotional memory»", "id": "adler", "url": "teaterfornyere.html#adler", "file": "teaterfornyere.html"}, {"title": "Jacques Lecoq Fysisk / maskearbeid", "text": "Nøytral maske — nullpunkt, ingen karakter", "id": "lecoq", "url": "teaterfornyere.html#lecoq", "file": "teaterfornyere.html"}, {"title": "Rudolf Laban Bevegelsesanalyse", "text": "Laban bevegelsesanalyse (LMA) — et system for å forstå bevegelse", "id": "laban", "url": "teaterfornyere.html#laban", "file": "teaterfornyere.html"}, {"title": "Eugenio Barba Teatrantropologi", "text": "Grunnla Odin Teatret (1964) i Danmark", "id": "barba", "url": "teaterfornyere.html#barba", "file": "teaterfornyere.html"}, {"title": "Sor Juana Inés de la Cruz Kolonitid", "text": "Født Juana Inés Absaje y Ramírez de Santillana i det som er Mexico i dag", "id": "sorjuana", "url": "teaterfornyere.html#sorjuana", "file": "teaterfornyere.html"}, {"title": "Aphra Behn English Restoration", "text": "Den første profesjonelle kvinnelige forfatter i Europa", "id": "behn", "url": "teaterfornyere.html#behn", "file": "teaterfornyere.html"}, {"title": "Baroness Elsa von Freytag-Loringhoven Dadaisme · Performance", "text": "Dadaistisk kunstner blant New York-dadaistene", "id": "baronessen", "url": "teaterfornyere.html#baronessen", "file": "teaterfornyere.html"}, {"title": "Klassisk (Aristotelisk)", "text": "En lineær spenningskurve — ofte også betegnet som lineær dramaturgi", "id": "dramt-klassisk", "url": "dramaturgi.html#dramt-klassisk", "file": "dramaturgi.html"}, {"title": "Episk (Brechtian)", "text": "En episodisk form som bruker avbrytelser for å stanse spenningen og tvinge frem refleksjon. Sentrale teknikker inkluderer montasje og fremmedgjøring. Se Fordypning", "id": "dramt-episk", "url": "dramaturgi.html#dramt-episk", "file": "dramaturgi.html"}, {"title": "Sirkulær", "text": "En struktur basert på gjentakelse, der handlingen vender tilbake til start uten løsning.", "id": "dramt-sirk", "url": "dramaturgi.html#dramt-sirk", "file": "dramaturgi.html"}, {"title": "Simultan", "text": "Flere handlinger skjer samtidig, slik at publikum selv må velge hvor de retter sitt fokus.", "id": "dramt-sim", "url": "dramaturgi.html#dramt-sim", "file": "dramaturgi.html"}, {"title": "Flat dramaturgi", "text": "Ikke-lineære, ikke-hierarkiske sceniske strukturer som prioriterer assosiative, romlige og materielle relasjoner over tradisjonell handling, kausalitet og karakterutvikling. Favoriserer sykliske, horisontale eller «kartlignende» erfaringer — tilskueren navigerer temaer og bilder fremfor å følge et fast narrativ.", "id": "dramt-flat", "url": "dramaturgi.html#dramt-flat", "file": "dramaturgi.html"}, {"title": "Postdramatisk Lehmann, 2006", "text": "En bred kategori som rommer alle dramaturgiske grep som bryter med det tradisjonelle dramaet. Fokus på hendelse fremfor handling — det som skjer mellom utøver og publikum i øyeblikket, ikke en historie som skal fortelles.", "id": "dramt-post", "url": "dramaturgi.html#dramt-post", "file": "dramaturgi.html"}, {"title": "Spenning", "text": "Forholdet mellom forventning og utløsning i forløpet.", "id": "dramt-spenning", "url": "dramaturgi.html#dramt-spenning", "file": "dramaturgi.html"}, {"title": "Kontraster", "text": "Bruk av motsetninger (lys/mørke, lyd/stille) for å skape dynamikk.", "id": "dramt-kontraster", "url": "dramaturgi.html#dramt-kontraster", "file": "dramaturgi.html"}, {"title": "Ritualer", "text": "Gjentakende, formelle handlinger som gir forestillingen tyngde og rituell logikk.", "id": "dramt-ritualer", "url": "dramaturgi.html#dramt-ritualer", "file": "dramaturgi.html"}, {"title": "Symboler", "text": "Objekter eller handlinger som representerer en dypere mening eller et tema.", "id": "dramt-symboler", "url": "dramaturgi.html#dramt-symboler", "file": "dramaturgi.html"}, {"title": "Rytme", "text": "Den tidsmessige organiseringen og tempoet i forestillingen.", "id": "dramt-rytme", "url": "dramaturgi.html#dramt-rytme", "file": "dramaturgi.html"}, {"title": "Gjentagelser", "text": "Repetisjon av elementer for å skape gjenkjennelse eller forsterke et budskap.", "id": "dramt-gjentagelser", "url": "dramaturgi.html#dramt-gjentagelser", "file": "dramaturgi.html"}, {"title": "Abstrakt, representasjon og kontinuumet", "text": "I billedkunst finnes to hovedretninger: representasjonell kunst (gjenkjennelig, etterligner virkeligheten) og ikke-representasjonell kunst (former, farger, følelser uten gjenkjennelige motiver). Aristoteles skrev om mimesis", "id": "tm-abstrakt", "url": "analyse.html#tm-abstrakt", "file": "analyse.html"}, {"title": "Moderne teater: to greiner", "text": "Fra fin de siècle hadde kunstnerne to ulike tilnærminger til det å uttrykke menneskets tilstand:", "id": "tm-greiner", "url": "analyse.html#tm-greiner", "file": "analyse.html"}, {"title": "Postmodernisme — 9 trekk", "text": "Selvreflekterende", "id": "tm-postmoderne", "url": "analyse.html#tm-postmoderne", "file": "analyse.html"}, {"title": "Å lese en dramatisk tekst", "text": "En dramatisk tekst er ikke litteratur — den er en plan for noe som skal skje i rom og tid. Spørsmålene nedenfor er ikke litterære, men teatrale: hva krever denne teksten av scenen?", "id": "tm-tekst", "url": "analyse.html#tm-tekst", "file": "analyse.html"}, {"title": "Dramaturgisk struktur", "text": "Tid, sted og rom", "id": "tm-tekst", "url": "analyse.html#tm-tekst", "file": "analyse.html"}, {"title": "Tid, sted og rom", "text": "Figurer og relasjoner", "id": "tm-tekst", "url": "analyse.html#tm-tekst", "file": "analyse.html"}, {"title": "Språk og tone", "text": "Sceneanvisninger", "id": "tm-tekst", "url": "analyse.html#tm-tekst", "file": "analyse.html"}, {"title": "Auteur-teater og totalt teater", "text": "I samtidseateret finnes regissører som aktivt streber etter å skape totalt teater", "id": "ps-auteur", "url": "produksjon.html#ps-auteur", "file": "produksjon.html"}, {"title": "Devising", "text": "En arbeidsprosess der ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd. Forestillingen skapes gjennom utforsking, improvisasjon og kollektive beslutninger underveis i prosessen — heller enn å realisere en forhåndsbestemt plan.", "id": "ps-devising", "url": "produksjon.html#ps-devising", "file": "produksjon.html"}, {"title": "Sceneformer og rom", "text": "Forholdet mellom scene og sal former publikumsopplevelsen fundamentalt — før en eneste replikk er sagt. Valget av sceneform er alltid et kunstnerisk og dramaturgisk valg.", "id": "ps-sceneformer", "url": "produksjon.html#ps-sceneformer", "file": "produksjon.html"}, {"title": "Etikk i prøverommet", "text": "Et trygt prøverom er ikke en luksus — det er en forutsetning for godt kunstnerisk arbeid. Når folk føler seg trygge, tar de større kunstneriske risiko. Etiske rammer bør etableres tidlig i prosessen, ikke som reaksjon på problemer.", "id": "ps-etikk", "url": "produksjon.html#ps-etikk", "file": "produksjon.html"}, {"title": "Tradisjonell produksjonstidslinje", "text": "Tradisjonelle produksjoner har en hierarkisk organisasjonsmodell", "id": "ps-tidslinje", "url": "produksjon.html#ps-tidslinje", "file": "produksjon.html"}, {"title": "Del 1 — Regikonsept", "text": "Regikonseptet beskriver de kunstneriske valgene. Produksjonskonseptet samler de praktiske rammene.", "id": "ps-regi", "url": "produksjon.html#ps-regi", "file": "produksjon.html"}, {"title": "Produsent", "text": "Overordnet ansvar for at produksjonen gjennomføres innenfor budsjett og tidsplan", "id": "rolle-produsent", "url": "produksjon.html#rolle-produsent", "file": "produksjon.html"}, {"title": "Regissør", "text": "Ansvar for det kunstneriske arbeidet og ensemblets samarbeid", "id": "rolle-regissør", "url": "produksjon.html#rolle-regissør", "file": "produksjon.html"}, {"title": "Regiassistent", "text": "Føre arrangementsnotater", "id": "rolle-regiass", "url": "produksjon.html#rolle-regiass", "file": "produksjon.html"}, {"title": "Dramaturg", "text": "Arbeider med tekstgrunnlaget og forestillingens dramaturgiske struktur", "id": "rolle-dramaturg", "url": "produksjon.html#rolle-dramaturg", "file": "produksjon.html"}, {"title": "Inspisient", "text": "Lede produksjonsmøter og skrive referat", "id": "rolle-inspisient", "url": "produksjon.html#rolle-inspisient", "file": "produksjon.html"}, {"title": "Scenografi", "text": "Utvikle scenografisk idé i samarbeid med regi og ensemble", "id": "rolle-scenografi", "url": "produksjon.html#rolle-scenografi", "file": "produksjon.html"}, {"title": "Rekvisitter", "text": "Ha oversikt over alle rekvisitter i produksjonen", "id": "rolle-rekvisitt", "url": "produksjon.html#rolle-rekvisitt", "file": "produksjon.html"}, {"title": "Kostyme", "text": "Utvikle kostymekonsept i dialog med regi og ensemble", "id": "rolle-kostyme", "url": "produksjon.html#rolle-kostyme", "file": "produksjon.html"}, {"title": "Sminke og hår", "text": "Utvikle sminke- og håruttrykk i tråd med karakter og helhet", "id": "rolle-sminke", "url": "produksjon.html#rolle-sminke", "file": "produksjon.html"}, {"title": "Lys", "text": "Utvikle lysidé i samspill med scenografi og regi", "id": "rolle-lys", "url": "produksjon.html#rolle-lys", "file": "produksjon.html"}, {"title": "Lyd og musikk", "text": "Utvikle lydlig konsept — musikk, lyder, stillhet", "id": "rolle-lyd", "url": "produksjon.html#rolle-lyd", "file": "produksjon.html"}, {"title": "Bevegelseinstruktør / koreograf", "text": "Utvikle bevegelsesstruktur i samarbeid med regi og ensemble", "id": "rolle-koreografi", "url": "produksjon.html#rolle-koreografi", "file": "produksjon.html"}, {"title": "Markedsføring", "text": "Utvikle markedsføringsidé i tråd med forestillingens uttrykk og målgruppe", "id": "rolle-marked", "url": "produksjon.html#rolle-marked", "file": "produksjon.html"}, {"title": "Regnskap", "text": "Ha oversikt over produksjonens økonomi", "id": "rolle-regnskap", "url": "produksjon.html#rolle-regnskap", "file": "produksjon.html"}, {"title": "Publikumsansvarlig", "text": "Organisere billetter, program og velkomst", "id": "rolle-publikum", "url": "produksjon.html#rolle-publikum", "file": "produksjon.html"}, {"title": "Post mortem", "text": "En strukturert gjennomgang av produksjonsprosessen etter endt forestilling — ikke for å kritisere, men for å lære.", "id": "ps-postmortem", "url": "produksjon.html#ps-postmortem", "file": "produksjon.html"}, {"title": "Stanislavski-systemet", "text": "Indre motivasjon — hva vil karakteren?", "id": "stanislavski", "url": "skuespill.html#stanislavski", "file": "skuespill.html"}, {"title": "Øvelse 1 — De seks spørsmålene", "text": "Velg en enkel hverdagssituasjon. Still deg selv: Hvem er jeg? Hva vil jeg? Hvor er jeg? Når er det? Hva er hindringen? Hva skjedde rett før? Gjør situasjonen uten å tenke på publikum.", "id": "ex-stan-1", "url": "skuespill.html#ex-stan-1", "file": "skuespill.html"}, {"title": "Øvelse 2 — Enkel handling", "text": "Velg én fysisk handling (helle vann, skrive et brev, lete etter noe). Gjør den med full konsentrasjon. La omgivelsene og situasjonen forme handlingen — ikke tankene om rollen.", "id": "ex-stan-2", "url": "skuespill.html#ex-stan-2", "file": "skuespill.html"}, {"title": "Meisner-teknikk", "text": "«Leve sant under imaginære omstendigheter»", "id": "meisner", "url": "skuespill.html#meisner", "file": "skuespill.html"}, {"title": "Øvelse 1 — Repetisjonsøvelse", "text": "To spillere. A observerer B og sier hva de ser: «Du ser til høyre.» B gjentar det tilbake: «Jeg ser til høyre.» Bytt. Ikke tenk — reager. Øvelsen varer til noe ekte skjer mellom dere.", "id": "ex-meis-1", "url": "skuespill.html#ex-meis-1", "file": "skuespill.html"}, {"title": "Uta Hagen-metoden", "text": "Substitusjon — bytt ut fiksjon med eget liv", "id": "utahagen", "url": "skuespill.html#utahagen", "file": "skuespill.html"}, {"title": "Øvelse 1 — Objektøvelse", "text": "Velg tre ekte gjenstander fra din hverdag. Lag en scene på 2–3 minutter der du bruker dem med full konsentrasjon. Ingen publikum — bare deg og gjenstandene. Handlingen avslører karakteren.", "id": "ex-uta-1", "url": "skuespill.html#ex-uta-1", "file": "skuespill.html"}, {"title": "Øvelse 2 — De ni spørsmålene", "text": "Hvem er jeg? Hva er tidspunktet? Hvor er jeg? Hva omgir meg? Hva er mitt forhold til de andre? Hva vil jeg? Hva er hindringen? Hva gjør jeg for å få det jeg vil? Hva er den forutgående handlingen?", "id": "ex-uta-2", "url": "skuespill.html#ex-uta-2", "file": "skuespill.html"}, {"title": "Gestus", "text": "Gestus = holdning som viser sosial relasjon og makt", "id": "brecht", "url": "skuespill.html#brecht", "file": "skuespill.html"}, {"title": "Øvelse 1 — Status og kropp", "text": "Gå gjennom rommet. Tenk: hva er din karakter sin sosiale posisjon? Høy status, lav status? La kroppen vise det — ikke ansiktet. Bytt status midt i bevegelsen. Hva endrer seg?", "id": "ex-brecht-1", "url": "skuespill.html#ex-brecht-1", "file": "skuespill.html"}, {"title": "Psykofysisk trening", "text": "Kropp og psyke er uatskillelige — trening er alltid begge deler", "id": "grotowski", "url": "skuespill.html#grotowski", "file": "skuespill.html"}, {"title": "Øvelse 1 — Slow walk", "text": "Gå ekstremt langsomt gjennom rommet. Hvert steg tar 10 sekunder. Kjenn vekten flytte seg fra hæl til tå. Stopp plutselig. Vent. Fortsett. Målet er fullstendig nærvær — ikke prestasjon.", "id": "ex-grot-1", "url": "skuespill.html#ex-grot-1", "file": "skuespill.html"}, {"title": "Lecoq-metoder", "text": "Nøytral maske — nullpunkt, ingen karakter", "id": "lecoq", "url": "skuespill.html#lecoq", "file": "skuespill.html"}, {"title": "Øvelse 1 — Dyranalyse", "text": "Velg et dyr. Observer det (video eller irl) i 10 minutter. Fokuser på: rytme, vekt, hvordan hodet beveger seg, tempo. Begynn med kroppen — ikke hodet. Gå gradvis fra dyr mot menneskelig figur.", "id": "ex-lecoq-1", "url": "skuespill.html#ex-lecoq-1", "file": "skuespill.html"}, {"title": "Øvelse 2 — Nøytral maske", "text": "Sett på nøytral maske (eller lukk øynene og forestill deg det). Gå inn i rommet som om du ser det for første gang. Ingen følelser, ingen karakter. Bare tilstedeværelse og oppdagelse.", "id": "ex-lecoq-2", "url": "skuespill.html#ex-lecoq-2", "file": "skuespill.html"}, {"title": "Biomekanikk", "text": "Skuespilleren som presis fysisk kunstner", "id": "meyerhold", "url": "skuespill.html#meyerhold", "file": "skuespill.html"}, {"title": "Øvelse 1 — Motbevegelse", "text": "Før enhver bevegelse: begynn med en liten motbevegelse. Skal du rekke frem hånden — trekk den først litt tilbake. Skal du gå fremover — lent deg litt bakover. Gjør dette med alle handlinger i en hel scene.", "id": "ex-mey-1", "url": "skuespill.html#ex-mey-1", "file": "skuespill.html"}, {"title": "Laban bevegelsesanalyse", "text": "Effort — fire kvaliteter: vekt (sterk/lett), tid (plutselig/vedvarende), rom (direkte/indirekte), flyt (bundet/fri)", "id": "laban", "url": "skuespill.html#laban", "file": "skuespill.html"}, {"title": "Øvelse 1 — Effort-kontraster", "text": "Gå gjennom rommet med sterk vekt. Bytt til lett vekt. Bytt til plutselig tid (stopp og start). Bytt til vedvarende (alt i slow motion). Kombiner: sterk + plutselig. Lett + vedvarende. Hva forteller det om en karakter?", "id": "ex-lab-1", "url": "skuespill.html#ex-lab-1", "file": "skuespill.html"}, {"title": "Michael Chekhov-teknikk", "text": "Imaginasjonsbasert — bruker fantasi og bilder fremfor personlig hukommelse", "id": "mchekhov", "url": "skuespill.html#mchekhov", "file": "skuespill.html"}, {"title": "Øvelse 1 — Psykologisk gest", "text": "Tenk på hva rollefiguren din ønsker dypest sett. Finn en enkel, stor kroppsbevegelse som uttrykker dette — strekk mot noe, lukk deg inn, skyv noe vekk. Gjør bevegelsen fullt ut flere ganger. La den bli liten, intern. Spill scenen med den interne gesten som drivkraft.", "id": "ex-mch-1", "url": "skuespill.html#ex-mch-1", "file": "skuespill.html"}, {"title": "Øvelse 2 — Atmosfære", "text": "Velg to svært ulike atmosfærer for samme scene — for eksempel «tung, stille sorg» og «skjør, lysende glede». Spill scenen fullt ut i hver atmosfære. Legg merke til hvordan karakterens valg og tempo endres av rommet de lever i.", "id": "ex-mch-2", "url": "skuespill.html#ex-mch-2", "file": "skuespill.html"}, {"title": "Øvelse 1 — Ja, og", "text": "To spillere bygger en scene bare ved å akseptere og legge til. A: «Vi er på månen.» B: «Ja, og sanden er blå her.» A: «Ja, og den lukter sjokolade.» Ingen avvisning, ingen korreksjon — bare aksept og tillegg. Kjenn hvordan scenen lever av seg selv.", "id": "ex-impro-1", "url": "skuespill.html#ex-impro-1", "file": "skuespill.html"}, {"title": "Øvelse 2 — Statusspill", "text": "To spillere, én situasjon (f.eks. jobbintervju). A spiller høy status: langsom bevegelse, direkte blikk, pauser. B spiller lav status: hurtig, unngår blikk, avbryter seg selv. Bytt. Spill deretter en scene der statusene skifter midt i — hva utløser skiftet?", "id": "ex-impro-2", "url": "skuespill.html#ex-impro-2", "file": "skuespill.html"}, {"title": "Øvelse 3 — Tilbud og blokkering", "text": "Spill en kort scene der én spiller bevisst blokkerer alle tilbud: «Vi burde dra.» — «Nei.» / «Se, det er en ku!» — «Det er ikke en ku.» Kjenn frustrasjonen. Spill deretter samme scene med full aksept. Diskuter: hva skaper energi, hva dreper den?", "id": "ex-impro-3", "url": "skuespill.html#ex-impro-3", "file": "skuespill.html"}, {"title": "Trening", "text": "En skuespiller er sitt eget instrument. Ulike teatertradisjoner stiller ulike krav til kroppen — men alle forutsetter utholdenhet, kontroll og tilstedeværelse. Regelmessig trening gjør kroppen til et mer lydhørt og presist verktøy for scenisk uttrykk.", "id": "trening", "url": "bevegelse.html#trening", "file": "bevegelse.html"}, {"title": "Kondisjon (cardio)", "text": "Utholdenhet til å opprettholde energi og nærvær gjennom hele forestillingen. Løping, sykling, svømming og dans er alle effektive. Mål: minst 150 min moderat kardio per uke.", "id": "ex-tren-kondis", "url": "bevegelse.html#ex-tren-kondis", "file": "bevegelse.html"}, {"title": "Styrke", "text": "Kjernemuskulatur, bein og overkropp. Styrke gir kontroll over kroppen som uttrykksverktøy — ikke for å se sterk ut, men for å kunne bære, løfte, falle og stå stødig under press. Pilates og kroppsvektøvelser er særlig relevante.", "id": "ex-tren-styrke", "url": "bevegelse.html#ex-tren-styrke", "file": "bevegelse.html"}, {"title": "Mobilitet", "text": "Bevegelsesutslag i ledd — ikke bare fleksibilitet (passiv), men aktiv kontroll gjennom hele bevegelsesrekkevidden. Yoga, dynamisk tøying og leddmobilisering er nyttig. Direkte knyttet til Feldenkrais og Lecoq-arbeid.", "id": "ex-tren-mobil", "url": "bevegelse.html#ex-tren-mobil", "file": "bevegelse.html"}, {"title": "Balanse", "text": "Evnen til å kontrollere kroppens tyngdepunkt. Sentralt i biomekanikk, Lecoq og kontaktimprovisasjon. Trenes gjennom énbensøvelser, ustabile underlag og langsomme bevegelser med full kontroll.", "id": "ex-tren-balanse", "url": "bevegelse.html#ex-tren-balanse", "file": "bevegelse.html"}, {"title": "Koordinasjon", "text": "Evnen til å koordinere ulike kroppsdeler presist og rytmisk. Trenes gjennom dans, slagverk og biomekanikk-etuder.", "id": "ex-tren-koord", "url": "bevegelse.html#ex-tren-koord", "file": "bevegelse.html"}, {"title": "Dissociasjon — uavhengig koordinasjon", "text": "Evnen til å bevege kroppsdeler uavhengig av hverandre — for eksempel at armene gjør forskjellige ting samtidig, eller at overkroppen beveger seg i en annen rytme enn underkroppen. Sentralt i biomekanikk og bevegelsesscore. Trenes gjennom polyrhythmiske øvelser og isolasjonsøvelser.", "id": "ex-tren-dissoc", "url": "bevegelse.html#ex-tren-dissoc", "file": "bevegelse.html"}, {"title": "Anatomi", "text": "For å bruke kroppen bevisst som uttrykksverktøy må du forstå hvordan den faktisk fungerer. Kunnskap om anatomi gjør oppvarming, avspenning og teknikk mer meningsfull.", "id": "anatomi", "url": "bevegelse.html#anatomi", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Kjenn diafragma", "text": "Legg én hånd på magen under navlen. Pust inn gjennom nesen — kjenn at hånden løftes. Pust ut — hånden senkes. Gjenta. Hvis hånden ikke beveger seg, eller brystet løfter seg i stedet, er pusten blokkert. Prøv å puste ned i hånden din.", "id": "ex-anat-1", "url": "bevegelse.html#ex-anat-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Kartlegg leddene", "text": "Stå stille. Begynn med tærne og beveg deg langsomt oppover: tær, ankel, kne, hofte, ryggrad (ledd for ledd), skulder, albue, håndledd, fingre, nakke. Beveg hvert ledd isolert — sirkulære bevegelser. Legg merke til hvor det er stivt og hvor det er fritt.", "id": "ex-anat-2", "url": "bevegelse.html#ex-anat-2", "file": "bevegelse.html"}, {"title": "Mentale teknikker", "text": "Scenisk arbeid krever ikke bare fysisk beredskap — det krever mental tilstedeværelse, konsentrasjon og evnen til å håndtere press. Mentale teknikker er verktøy for å forberede seg psykisk, bygge opp igjen etter feil og opprettholde fokus gjennom hele prosessen.", "id": "mentale", "url": "bevegelse.html#mentale", "file": "bevegelse.html"}, {"title": "Visualisering", "text": "Gå gjennom forestillingen eller scenen i hodet før du går på scenen — se deg selv utføre handlingene presist og med energi. Idrettsutøvere bruker dette systematisk. For skuespillere kan det brukes til å forberede fysiske sekvenser, overganger og krevende øyeblikk.", "id": "ex-ment-visual", "url": "bevegelse.html#ex-ment-visual", "file": "bevegelse.html"}, {"title": "Pustebasert fokus", "text": "Pust inn i 4 sekunder, hold i 4, pust ut i 8. Gjenta 4 ganger. Aktiverer det parasympatiske nervesystemet og senker stressnivået. Bruk dette rett før du går på scenen — eller når konsentrasjonen svikter i prøveprosessen.", "id": "ex-ment-pust", "url": "bevegelse.html#ex-ment-pust", "file": "bevegelse.html"}, {"title": "Pre-performance ritual", "text": "Et fast ritual før fremføring — en bestemt rekkefølge av bevegelser, pust eller fokusøvelser som signaliserer til nervesystemet at nå begynner noe annet. Ritualet trenger ikke være langt — 2–3 minutter er nok. Det viktige er at det er konsistent og ditt eget.", "id": "ex-ment-ritual", "url": "bevegelse.html#ex-ment-ritual", "file": "bevegelse.html"}, {"title": "Reset etter feil", "text": "Alle gjør feil på scenen. Det avgjørende er ikke å unngå feil — det er å komme seg tilbake til tilstedeværelse raskt. Teknikk: pust ut fully, slipp skuldrene, returner fokus til partneren eller neste handling. Øv på reset i prøvene, ikke bare i forestillingen.", "id": "ex-ment-reset", "url": "bevegelse.html#ex-ment-reset", "file": "bevegelse.html"}, {"title": "Oppvarming og avspenning", "text": "Oppvarming handler ikke om å strekke kalde muskler — det handler om å «smøre» leddene med leddvæske gjennom sirkulære bevegelser, øke blodsirkulasjonen gradvis og forberede nervesystemet på scenisk nærvær. Avspenning er like viktig: en spent kropp er en lukket kropp.", "id": "oppvarming", "url": "bevegelse.html#oppvarming", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Leddoppvarming (10 min)", "text": "Stå med føttene i hoftebredde. Sirkulær bevegelse i anklene (begge retninger) → knær → hofter → ryggrad (bølge nedenfra og opp) → skuldre (frem og tilbake) → nakke (langsomt, unngå bakover). Avslutt med å riste kroppen løs fra topp til bunn. 8 ganger per ledd, begge retninger.", "id": "ex-opp-1", "url": "bevegelse.html#ex-opp-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Gulvavspenning", "text": "Ligg på ryggen. Lukk øynene. Pust inn — spenn hele kroppen i 5 sekunder. Pust ut — slipp alt. Gjenta tre ganger. Deretter: gå gjennom kroppen fra føttene opp, bevisst slipp spenning i hvert område. Bli liggende i 2 minutter og kjenn vekten av kroppen mot gulvet.", "id": "ex-opp-2", "url": "bevegelse.html#ex-opp-2", "file": "bevegelse.html"}, {"title": "Øvelse 3 — Shakeroppvarming", "text": "Stå lett bøyd i knærne. Begynn å riste én fot raskt og lett mot gulvet. La ristingen spre seg opp gjennom legg, kne, lår, hofte, mage, bryst, armer, hender, nakke og hode. Hele kroppen rister. Hold i 60 sekunder. Stopp plutselig — stå stille og kjenn ettervirkningen.", "id": "ex-opp-3", "url": "bevegelse.html#ex-opp-3", "file": "bevegelse.html"}, {"title": "Stemme", "text": "Stemmen er et fysisk instrument — ikke bare et kommunikasjonsverktøy. Den sitter i kroppen: støttet av pusten, formet av resonansrommene og kontrollert av muskler som kan trenes. En frigjort stemme er ikke nødvendigvis en høy stemme — det er en stemme uten unødvendig spenning.", "id": "stemme", "url": "bevegelse.html#stemme", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Pust og støtte", "text": "Ligg på ryggen med én hånd på magen. Pust inn gjennom nesen — magen skal løfte hånden, ikke brystet. Pust ut på en lang «ssss». Kjenn at magen synker jevnt mens du holder spenning i kjernen. Gjenta 5 ganger. Stå opp og prøv det samme stående — magen ut ved innpust, kontrollert inn ved utpust på «ssss».", "id": "ex-stemme-pust", "url": "bevegelse.html#ex-stemme-pust", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Utforsk resonansrommene", "text": "Begynn med å nynne (mmm) med munnen lukket. Kjenn vibrasjonen i leppene og nesen — dette er «masken». Åpne munnen sakte til en «maaah» og kjenn lyden flytte seg ned i munnen og nakken. Legg hånden på brystet og synk ned til en dyp «mmmm» — kjenn vibrasjonen i brystkassen. Gå opp og ned mellom disse tre registrene. Hvilket register kjenner du minst?", "id": "ex-stemme-resonans", "url": "bevegelse.html#ex-stemme-resonans", "file": "bevegelse.html"}, {"title": "Øvelse 3 — Artikulasjon", "text": "Tunge-twisters trener presisjon under press. Start sakte — tydlighet er viktigere enn hastighet. Øk tempoet gradvis. Eksempel: «Røde biler kjører raskt forbi røde porter». Prøv med overdrevet store lepper og tungebevegelser. Kjenn hvilke muskler som faktisk jobber. Gjenta med en tekst fra en scene du jobber med.", "id": "ex-stemme-artikulasjon", "url": "bevegelse.html#ex-stemme-artikulasjon", "file": "bevegelse.html"}, {"title": "Øvelse 4 — Projeksjon uten å skrike", "text": "Stå i den ene enden av rommet. Velg et punkt på den andre veggen — ikke et menneske, men et konkret punkt. Si en setning og «send» den til det punktet. Flytt deg gradvis lenger unna. Ikke hev stemmen — tenk at du øker støtten nedenfra. Hvis du begynner å spenne nakke og kjeve, er det et tegn på at du presser heller enn projiserer. Slipp kjeven og prøv igjen.", "id": "ex-stemme-projeksjon", "url": "bevegelse.html#ex-stemme-projeksjon", "file": "bevegelse.html"}, {"title": "Øvelse 5 — Stemme og følelse", "text": "Velg tre linjer fra en monolog. Si dem tre ganger: (1) med brystresonnans — tung, sakte, lav. (2) med maskeresonnans — lett, fremover, nesten syngende. (3) med ditt naturlige register. Hva forandrer seg i karakterens tilstand? Resonans er ikke bare teknikk — det er en inngangsdør til følelse.", "id": "ex-stemme-tekst", "url": "bevegelse.html#ex-stemme-tekst", "file": "bevegelse.html"}, {"title": "Feldenkrais-metoden", "text": "Feldenkrais utviklet en metode basert på nevrologisk læring — ideen om at nervesystemet kan lære nye bevegelsesvaner gjennom langsom, leken utforskning. Metoden brukes av skuespillere, dansere og musikere for å frigjøre kronisk spenning og oppdage nye bevegelsesmuligheter.", "id": "feldenkrais", "url": "bevegelse.html#feldenkrais", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Minimal bevegelse", "text": "Sitt på en stol. Drei hodet sakte til høyre så langt det går — merk grensen. Kom tilbake til midten. Gjenta nå ti ganger, men gjør bevegelsen bare 10% av det du klarer — ekstremt lite. Etter ti ganger: drei til høyre igjen med full bevegelse. Hva har endret seg?", "id": "ex-feld-1", "url": "bevegelse.html#ex-feld-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Gulvutforskning", "text": "Ligg på ryggen. Bøy knærne, føttene flat mot gulvet. Vipp bekkenet sakte bakover (korsryggen løfter seg litt) og fremover (korsryggen presses mot gulvet). Finn den mykeste, minste versjonen av denne bevegelsen. La den bli som en pust. 2 minutter. Ingen anstrengelse.", "id": "ex-feld-2", "url": "bevegelse.html#ex-feld-2", "file": "bevegelse.html"}, {"title": "Laban bevegelsesanalyse", "text": "Laban utviklet et system for å beskrive, analysere og variere bevegelse på tvers av alle stilarter og teknikker. Det er ikke en spillestil — det er et språk og et analyseverktøy som kan brukes på alt fra biomekanikk til kontaktimprovisasjon.", "id": "laban", "url": "bevegelse.html#laban", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Effort-kontraster", "text": "Gå gjennom rommet med sterk vekt. Bytt til lett. Bytt til plutselig tid. Bytt til vedvarende. Kombiner: sterk + plutselig. Lett + vedvarende. Direkte + bundet. Indirekte + fri. Hva forteller hver kombinasjon om en karakter?", "id": "ex-lab-1", "url": "bevegelse.html#ex-lab-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Karakteranalyse med Effort", "text": "Velg en rollefigur. Gi figuren to Effort-kvaliteter — f.eks. «sterk + direkte». Improviser en kort scene der du holder disse kvalitetene konsekvent. Bytt så til det motsatte (lett + indirekte). Hva endrer seg i karakteren?", "id": "ex-lab-2", "url": "bevegelse.html#ex-lab-2", "file": "bevegelse.html"}, {"title": "Lecoq-metoder", "text": "Lecoq utviklet en pedagogikk basert på lek, observasjon og kroppslig oppdagelse. Utgangspunktet er alltid kroppen — ikke teksten. Sentralt er ideen om le jeu", "id": "lecoq", "url": "bevegelse.html#lecoq", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Nøytral maske", "text": "Lukk øynene. Forestill deg at du tar på en nøytral maske — ingen uttrykk, ingen karakter. Gå inn i rommet som om du ser det for første gang. Ingen mål, ingen karakter. Bare kroppen i rommet. Når noe fanger oppmerksomheten din — stopp. Se. Gå videre.", "id": "ex-lecoq-1", "url": "bevegelse.html#ex-lecoq-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Elementene", "text": "Velg ett element: ild, vann, jord eller luft. Begynn med å observere det i fantasien. Hvordan beveger det seg? Langsomt la kroppen begynne å adoptere elementets kvalitet — ikke illustrer det, bli", "id": "ex-lecoq-2", "url": "bevegelse.html#ex-lecoq-2", "file": "bevegelse.html"}, {"title": "Øvelse 3 — Dyranalyse", "text": "Velg et dyr. Observer det på video i 10 minutter — fokuser på rytme, vekt, hodet, tempoet. Begynn med kroppen, ikke ansiktet. Gå gradvis fra dyr mot menneskelig figur. Hvem er dette mennesket som bærer dyrets kvalitet?", "id": "ex-lecoq-3", "url": "bevegelse.html#ex-lecoq-3", "file": "bevegelse.html"}, {"title": "Sju spenningsnivåer", "text": "Nivå 1 — Utmattet", "id": "ex-lecoq-tension", "url": "bevegelse.html#ex-lecoq-tension", "file": "bevegelse.html"}, {"title": "Biomekanikk", "text": "Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Utgangspunktet var taylorisme — vitenskapelig effektivisering av bevegelse — overført til skuespillerkunsten. Bevegelsen er organisert i en syklus av fire elementer som gjentas i enhver handling.", "id": "biomekanikk", "url": "bevegelse.html#biomekanikk", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Motbevegelse", "text": "Før enhver bevegelse — begynn med en liten motbevegelse. Skal du rekke frem hånden? Trekk den først litt tilbake. Skal du gå fremover? Lent deg litt bakover. Gjør dette med alle handlinger i en hel scene. Legg merke til hvordan bevegelsen får mer energi og tydelighet.", "id": "ex-bio-1", "url": "bevegelse.html#ex-bio-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Syklusen", "text": "Velg en enkel handling: å plukke opp noe fra gulvet. Gjør den med full syklus: otkaz (liten motbevegelse opp) → posyl (beveg deg ned) → tochka (stopp presist, hold spenningen) → tormoz (kontroller avslutningen). Gjenta til det sitter i kroppen.", "id": "ex-bio-2", "url": "bevegelse.html#ex-bio-2", "file": "bevegelse.html"}, {"title": "Bevegelsesscore og abstrakt kommunikasjon", "text": "En arbeidsmetode der bevegelse og verbale instruksjoner eller abstrakte ord brukes parallelt for å skape scenisk handling. Bevegelsen er ikke illustrasjon av ordet — de eksisterer side om side og skaper mening i møtet mellom dem.", "id": "bevegelsesscore", "url": "bevegelse.html#bevegelsesscore", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Enkel Laban-score", "text": "Lærer gir en score på to Effort-kvaliteter — f.eks. «sterk · plutselig». Utøverne beveger seg gjennom rommet med disse kvalitetene i 2 minutter. Lærer bytter: «lett · vedvarende». Utøverne tilpasser seg umiddelbart. Avslutt med «direkte · bundet». Diskuter: hva «forteller» kroppen?", "id": "ex-score-1", "url": "bevegelse.html#ex-score-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Ord og bevegelse parallelt", "text": "To utøvere. A beveger seg fritt i rommet. B sier ett ord hvert 10. sekund — abstrakte ord som «tyngde», «avstand», «vente», «horisont». A lar ordene påvirke bevegelsen uten å illustrere dem direkte. Bytt roller. Diskuter: når oppstod det noe mellom ord og bevegelse?", "id": "ex-score-2", "url": "bevegelse.html#ex-score-2", "file": "bevegelse.html"}, {"title": "Øvelse 3 — Gruppe-score", "text": "Hele gruppen beveger seg. Én utøver er «dirigent» og gir scoren gjennom sin egen kropp — ikke ord. De andre observerer og tilpasser sin bevegelse til dirigentens kvalitet. Ikke kopi — respons. Dirigenten skifter langsomt. Bytt dirigent hvert 2. minutt.", "id": "ex-score-3", "url": "bevegelse.html#ex-score-3", "file": "bevegelse.html"}, {"title": "Contact Improvisation", "text": "Contact Improvisation ble utviklet av Steve Paxton i 1972 og springer ut av Judson Dance Theater i New York — den samme tradisjonen som ga oss postmoderne dans og performancekunst. Formen er basert på den fysiske kontakten mellom to kropper og den kontinuerlige dialogen om vekt, balanse og retning.", "id": "contactimprov", "url": "bevegelse.html#contactimprov", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Vektgiving (intro)", "text": "To utøvere, rygg mot rygg. Lene seg sakte mot hverandre til begge gir litt vekt. Finn balansepunktet der begge støtter og støttes. Begynn å bevege deg langsomt — oppover, nedover, til sidene — uten å miste kontaktpunktet. 3 minutter stillhet.", "id": "ex-ci-1", "url": "bevegelse.html#ex-ci-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Rullende kontaktpunkt", "text": "To utøvere. Begynn med hånd mot hånd. La kontaktpunktet langsomt «rulle» fra hånd til underarm, skulder, rygg, hofte. Følg kontaktpunktet med hele kroppen. Bevegelsen oppstår av seg selv når du fokuserer på kontakten fremfor et resultat.", "id": "ex-ci-2", "url": "bevegelse.html#ex-ci-2", "file": "bevegelse.html"}, {"title": "Viewpoints", "text": "Viewpoints er et sett med prinsipper for improvisasjon og komposisjon utviklet av Anne Bogart og Tina Landau, basert på koreograf Mary Overlie sitt arbeid. Systemet gir et felles vokabular for å snakke om og skape scenisk handling — tid, rom og bevegelse analyseres i ni separate «synsvinkler».", "id": "viewpoints", "url": "bevegelse.html#viewpoints", "file": "bevegelse.html"}, {"title": "Øvelse 1 — Viewpoints-improvisasjon", "text": "Hele gruppen beveger seg i rommet i stillhet. Lærer roper ett viewpoint om gangen: «Tempo» — alle velger ett tempo og holder det. «Romlig relasjon» — legg merke til avstand til andre, juster bevisst. «Repetisjon» — finn én bevegelse og gjenta den. «Arkitektur» — la veggen, gulvet eller taket påvirke deg. Ingen ledelse — bare respons.", "id": "ex-vp-1", "url": "bevegelse.html#ex-vp-1", "file": "bevegelse.html"}, {"title": "Øvelse 2 — Kinaestetisk respons", "text": "To utøvere. A gjør en bevegelse — B responderer instinktivt med en bevegelse (ikke tenkt, ikke logisk). A responderer på B. Ingen dialog, ingen koreografi. La responsen komme fra kroppen, ikke hodet. 5 minutter. Hva oppstår?", "id": "ex-vp-2", "url": "bevegelse.html#ex-vp-2", "file": "bevegelse.html"}, {"title": "Gest", "text": "En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen.", "id": "bv2-gest", "url": "bevegelse.html#bv2-gest", "file": "bevegelse.html"}, {"title": "Dynamikk", "text": "Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet.", "id": "bv2-dynamikk", "url": "bevegelse.html#bv2-dynamikk", "file": "bevegelse.html"}, {"title": "Komponere", "text": "Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere.", "id": "bv2-komponere", "url": "bevegelse.html#bv2-komponere", "file": "bevegelse.html"}, {"title": "Koreografi", "text": "Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi.", "id": "bv2-koreografi", "url": "bevegelse.html#bv2-koreografi", "file": "bevegelse.html"}, {"title": "Teatralsk biomekanikk", "text": "Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Biomekanikk", "id": "bv2-biomekanikk", "url": "bevegelse.html#bv2-biomekanikk", "file": "bevegelse.html"}, {"title": "Fra gest til koreografi", "text": "En bevegelsesfrase", "id": "bv2-fragest", "url": "bevegelse.html#bv2-fragest", "file": "bevegelse.html"}, {"title": "Liturgisk drama", "text": "Den tidligste formen, som vokste ut av messens ritualer på 900-tallet. Fremført av geistlige inne i kirken, på latin. Dramatiserte bibelske hendelser — særlig påske og jul. Ikke ment som underholdning, men som religiøs formidling.", "id": "bg-liturgisk", "url": "fordypning.html#bg-liturgisk", "file": "fordypning.html"}, {"title": "Farse", "text": "En kort komisk pause mellom de lengre stykkene — løs, folkelig og gjerne grov humor. Ordet kommer fra det franske farce", "id": "bg-farse", "url": "fordypning.html#bg-farse", "file": "fordypning.html"}, {"title": "Pasjonsspill", "text": "Dramatisering av Jesu lidelse, død og oppstandelse. Kunne vare flere dager og involvere hele lokalsamfunnet. Den mest kjente tradisjonen lever videre i Oberammergau i Bayern, der spillet har blitt fremført siden 1634. → Oberammergau pasjonsspill ↗", "id": "bg-pasjonspill", "url": "fordypning.html#bg-pasjonspill", "file": "fordypning.html"}, {"title": "Mirakelspill", "text": "Dramatisering av helgeners liv, mirakler og martyrium. Populære i Frankrike og England. Ofte fremført på festdager knyttet til den aktuelle helgenen.", "id": "bg-mirakelspill", "url": "fordypning.html#bg-mirakelspill", "file": "fordypning.html"}, {"title": "Mysterispill", "text": "Bibelske fortellinger fra skapelsen til dommedag, fremført på spillvogner (pageant wagons) som beveget seg gjennom byene. Lekfolk spilte rollene. Kunne involvere svært mange scener og vare over flere dager.", "id": "bg-mysterispill", "url": "fordypning.html#bg-mysterispill", "file": "fordypning.html"}, {"title": "Moraliteter", "text": "Allegoriske stykker der personifiserte abstraksjoner — som Synd, Dyd, Rikdom og Død — kjemper om menneskesjelen. Ikke bibelske historier, men moralske lærestykker. Mest kjent: Everyman", "id": "bg-moraliteter", "url": "fordypning.html#bg-moraliteter", "file": "fordypning.html"}, {"title": "Konstantin Stanislavski", "text": "Stanislavski utviklet sitt arbeid over flere tiår og endret synspunkt underveis — det finnes ingen enkel «Stanislavski-metode».", "id": "tm-stanis", "url": "fordypning.html#tm-stanis", "file": "fordypning.html"}, {"title": "Antonin Artaud — Grusomhetens teater", "text": "Publisert 1938. Artaud avviste det tekstbaserte, psykologiske teateret fullstendig. For ham var teksten teaterets fiende — en tvangstrøye som hindret scenen i å nå sitt fulle potensiale som selvstendig kunstform.", "id": "tm-artaud", "url": "fordypning.html#tm-artaud", "file": "fordypning.html"}, {"title": "Bertolt Brecht — Verfremdungsteknikker", "text": "Brechts regiteknikker for å oppnå fremmedgjøring:", "id": "tm-veffekt", "url": "fordypning.html#tm-veffekt", "file": "fordypning.html"}, {"title": "Peter Brook — The Empty Space", "text": "Publisert 1968. Brook utforsker hva teater er og hvilket formål det skal ha. Han diskuterer hvordan teateret kan forandres til en syntese mellom det hellige og det røffe.", "id": "tm-brook", "url": "fordypning.html#tm-brook", "file": "fordypning.html"}, {"title": "Vsevolod Meyerhold — Biomekanikk", "text": "Meyerhold utviklet biomekanikk som en systematisk skuespillertrening basert på presis fysisk kontroll. Bevegelsen er organisert i en syklus av fire elementer:", "id": "tm-meyerhold-bio", "url": "fordypning.html#tm-meyerhold-bio", "file": "fordypning.html"}, {"title": "Agitprop teater", "text": "Fra «agitation og propaganda». Begynte som en formell del av den kommunistiske regjeringen i tidlig Sovjet. Kjennetegn: flyttbare forestillinger, deklamatorisk og gjentagende — ofte gateteater. Arbeiderklasse, moderne, teatralsk. Populært på 1920-tallet.", "id": "tm-agitprop", "url": "fordypning.html#tm-agitprop", "file": "fordypning.html"}, {"title": "Representasjon — hvem er synlig?", "text": "Representasjon på scenen handler ikke bare om estetikk — det er et politisk spørsmål: hvem er synlig, hvem har stemme, og hvems historier blir fortalt?", "id": "tm-representasjon", "url": "fordypning.html#tm-representasjon", "file": "fordypning.html"}, {"title": "Dokumentarteater — intro og oppgave", "text": "Klikk på de tre prikkene for å velge fullskjerm.", "id": "tm-dokumentar", "url": "fordypning.html#tm-dokumentar", "file": "fordypning.html"}, {"title": "Drama og teater", "text": "Teaterets grunnelementer", "id": "tm-beg-grunn", "url": "fordypning.html#tm-beg-grunn", "file": "fordypning.html"}, {"title": "Teaterets grunnelementer", "text": "A spiller B for C — en skuespiller fremstiller en rolle for et publikum.", "id": "bg-teatergrunn", "url": "fordypning.html#bg-teatergrunn", "file": "fordypning.html"}, {"title": "Dramatiske grunnelementer", "text": "Fabel · Figur · Rom · Tid", "id": "bg-grunnelementer", "url": "fordypning.html#bg-grunnelementer", "file": "fordypning.html"}, {"title": "Drama vs. teater (Tassi)", "text": "Drama, teater og postdramatisk teater er ikke det samme — og det er viktig å skille dem fra hverandre:", "id": "bg-dramateater", "url": "fordypning.html#bg-dramateater", "file": "fordypning.html"}, {"title": "Teater og metafysikk (Tassi)", "text": "Metafysikk høres komplisert ut, men i teateret betyr det rett og slett å undersøke hva det vil si å eksistere. Professor Aldo Tassi mener at teateret er det perfekte stedet å se «virkeligheten i aksjon».", "id": "bg-metafysikk", "url": "fordypning.html#bg-metafysikk", "file": "fordypning.html"}, {"title": "Lesemåte", "text": "Lesemåte beskriver det analytiske perspektivet eller den tolkningsrammen man velger å bruke når man nærmer seg en tekst eller forestilling. Ulike lesemåter vil fremheve ulike aspekter — en feministisk lesemåte ser på kjønnsroller og maktstrukturer, en marxistisk lesemåte på klassekonflikter, en postkolonial lesemåte på kolonialismens spor. Valg av lesemåte påvirker hva man ser — og hva man overser", "id": "bg-lesemåte", "url": "fordypning.html#bg-lesemåte", "file": "fordypning.html"}, {"title": "Ensemble", "text": "En gruppering av elever hvor alle gjør det som må til (en flat organisasjonsstruktur) for å skape en teateroppsetning.", "id": "bg-ensemble", "url": "fordypning.html#bg-ensemble", "file": "fordypning.html"}, {"title": "Devising", "text": "En arbeidsprosess hvor ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd.", "id": "bg-devising", "url": "fordypning.html#bg-devising", "file": "fordypning.html"}, {"title": "Konvensjoner", "text": "Teatrale konvensjoner er de uskrevne reglene som styrer møtet mellom forestilling og publikum — gjenkjennelige spilleregler som begge parter aksepterer. Konvensjoner varierer mellom teaterformer og epoker, og kan brytes bevisst for artistisk effekt.", "id": "bg-konvensjoner", "url": "fordypning.html#bg-konvensjoner", "file": "fordypning.html"}, {"title": "Handling", "text": "Sceniske handlinger", "id": "bg-handling", "url": "fordypning.html#bg-handling", "file": "fordypning.html"}, {"title": "Deklamatorisk", "text": "En spillestil kjennetegnet av formell, høytidelig vokal fremføring med stilisert gestikk. Var normen i klassisk og neoklassisk teater før psykologisk realisme ble dominerende på slutten av 1800-tallet. Ikke det samme som overdrevet eller dårlig spill — det er en bevisst og historisk forankret stil.", "id": "bg-deklamatorisk", "url": "fordypning.html#bg-deklamatorisk", "file": "fordypning.html"}, {"title": "Stilisert", "text": "Et scenisk uttrykk der elementer er bevisst forenklet, overdrevet eller abstrahert fra naturalismens illusjon. Stilisering er ikke overdrivelse for overdrivelsens skyld — det er et kunstnerisk valg om å prioritere uttrykk over illusjon. Alle teaterformer som ikke streber etter naturalistisk virkelighet er i en viss grad stiliserte. Se også: Deklamatorisk, Gestus (Brecht).", "id": "bg-stilisert", "url": "fordypning.html#bg-stilisert", "file": "fordypning.html"}, {"title": "Mimesis", "text": "Etterligning eller fremstilling av virkeligheten gjennom kunst. Aristoteles mente at all kunst er mimesis — en imitasjon av menneskelige handlinger.", "id": "bg-mimesis", "url": "fordypning.html#bg-mimesis", "file": "fordypning.html"}, {"title": "Katarsis", "text": "Tilskuerens emosjonelle renselse gjennom medlidenhet og frykt i møte med tragedien. Et sentralt begrep i Aristoteles' Poetikk", "id": "bg-katarsis", "url": "fordypning.html#bg-katarsis", "file": "fordypning.html"}, {"title": "Hamartia", "text": "Protagonistens fatale feil eller svakhet som fører til fall. Ikke nødvendigvis en moralsk feil — det kan være uvitenhet eller feilvurdering.", "id": "bg-hamartia", "url": "fordypning.html#bg-hamartia", "file": "fordypning.html"}, {"title": "Hubris", "text": "Overmod eller stolthet som fører til fall — en vanlig form for hamartia i gresk tragedie. Protagonisten overvurderer sin egen makt eller utfordrer gudene.", "id": "bg-hubris", "url": "fordypning.html#bg-hubris", "file": "fordypning.html"}, {"title": "Peripeteia", "text": "Vendepunktet — en plutselig og uventet omvending av protagonistens situasjon, fra lykke til ulykke eller omvendt.", "id": "bg-peripeteia", "url": "fordypning.html#bg-peripeteia", "file": "fordypning.html"}, {"title": "Anagnorisis", "text": "Gjenkjennelse — protagonistens plutselige innsikt om sin egen situasjon, identitet eller en annens. Inntreffer ofte samtidig med peripeteia.", "id": "bg-anagnorisis", "url": "fordypning.html#bg-anagnorisis", "file": "fordypning.html"}, {"title": "Deus ex machina", "text": "«Gud fra maskinen» — en uventet og kunstig løsning på en konflikt, der en ekstern kraft griper inn. I gresk teater ble en gud bokstavelig talt heist ned på scenen med en kran.", "id": "bg-deus", "url": "fordypning.html#bg-deus", "file": "fordypning.html"}, {"title": "Eksposisjon", "text": "Innledningen der situasjon, karakterer og bakgrunn presenteres for publikum.", "id": "bg-eksposisjon", "url": "fordypning.html#bg-eksposisjon", "file": "fordypning.html"}, {"title": "Komplikasjon", "text": "Det som setter konflikten i gang — en hendelse eller avsløring som forstyrrer den innledende balansen og driver handlingen fremover.", "id": "bg-komplikasjon", "url": "fordypning.html#bg-komplikasjon", "file": "fordypning.html"}, {"title": "Klimaks", "text": "Spenningens høydepunkt — det avgjørende øyeblikket der konflikten når sin topp og utfallet bestemmes.", "id": "bg-klimaks", "url": "fordypning.html#bg-klimaks", "file": "fordypning.html"}, {"title": "Fallende handling", "text": "Handlingen etter klimaks, der spenningen løses opp og konsekvensene av det avgjørende øyeblikket utspiller seg.", "id": "bg-fallende", "url": "fordypning.html#bg-fallende", "file": "fordypning.html"}, {"title": "Løsning / denouement", "text": "Avslutningen der konfliktens tråder løses opp og en ny balanse etableres. Fra fransk «å løse opp en knute».", "id": "bg-losning", "url": "fordypning.html#bg-losning", "file": "fordypning.html"}, {"title": "In medias res", "text": "«Midt i tingene» — å begynne forestillingen eller teksten midt i handlingen, uten innledende eksposisjon. Bakgrunn avdekkes gradvis underveis.", "id": "bg-inmedias", "url": "fordypning.html#bg-inmedias", "file": "fordypning.html"}, {"title": "Teaterretninger", "text": "Historiske kunstneriske bevegelser — epoke, estetikk, nøkkelpersoner.", "id": "tm-beg-retninger", "url": "fordypning.html#tm-beg-retninger", "file": "fordypning.html"}, {"title": "Realisme", "text": "Psykologisk troverdige karakterer i gjenkjennelige situasjoner. Ikke nødvendigvis fotografisk nøyaktig, men emosjonelt sant. Fra 1870-tallet. Sentrale navn: Ibsen, Tsjehov.", "id": "bg-realisme", "url": "fordypning.html#bg-realisme", "file": "fordypning.html"}, {"title": "Naturalisme", "text": "Nøyaktig gjengivelse av virkeligheten på scenen — inkludert det hverdagslige og det stygge. Skuespillerne oppfører seg som om publikum ikke er til stede (den fjerde veggen). Sentrale navn: Strindberg, Antoine (1880-tallet).", "id": "bg-naturalisme", "url": "fordypning.html#bg-naturalisme", "file": "fordypning.html"}, {"title": "Ekspresjonisme", "text": "Ytre uttrykk for indre tilstand — virkeligheten forvrenses for å gjenspeile karakterenes psykologi eller samfunnskritikk. Stiliserte bevegelser, overdrevet scenografi, skjeve vinkler. Tidlig 1900-tall.", "id": "bg-ekspresjonisme", "url": "fordypning.html#bg-ekspresjonisme", "file": "fordypning.html"}, {"title": "Absurdteater", "text": "Speiler tilværelsens meningsløshet gjennom gjentakelse, stillstand og språklig sammenbrudd. Konflikten løses ikke — den bare fortsetter. NB: Begrepet ble introdusert av kritikeren Martin Esslin i 1961/62 for å beskrive en rekke ulike og ikke-relaterte dramatikere fra 1940- og 50-tallet — Beckett, Ionesco, Genet — som aldri selv brukte betegnelsen om sitt eget arbeid.", "id": "bg-absurd", "url": "fordypning.html#bg-absurd", "file": "fordypning.html"}, {"title": "Teaterformer", "text": "Konvensjoner som styrer forestillingsbegivenheten — fastslår blant annet publikumskontrakten.", "id": "tm-beg-teaterformer", "url": "fordypning.html#tm-beg-teaterformer", "file": "fordypning.html"}, {"title": "Fysisk teater", "text": "Kroppen er det primære uttrykket. Bevegelse, gestikk og romlig komposisjon bærer forestillingen like mye som eller mer enn teksten. Inspirert av Artaud, Lecoq og Grotowski.", "id": "bg-fysiskteater", "url": "fordypning.html#bg-fysiskteater", "file": "fordypning.html"}, {"title": "Dokumentarteater", "text": "Basert på virkelige hendelser, dokumenter, intervjuer eller arkivmateriale. Publikumskontrakten inkluderer en forpliktelse til faktabasert fremstilling.", "id": "bg-dokumentar2", "url": "fordypning.html#bg-dokumentar2", "file": "fordypning.html"}, {"title": "Gateteater", "text": "Fremført i offentlig rom. Publikum er ikke invitert — de er tilfeldig til stede og kan gå når de vil. Forestillingen må erobre oppmerksomheten.", "id": "bg-gateteater", "url": "fordypning.html#bg-gateteater", "file": "fordypning.html"}, {"title": "Forumteater", "text": "Publikum kan stoppe forestillingen og erstatte en skuespiller for å prøve ut alternative handlinger. Utviklet av Augusto Boal som del av «Theatre of the Oppressed».", "id": "bg-forumteater", "url": "fordypning.html#bg-forumteater", "file": "fordypning.html"}, {"title": "Commedia dell'arte", "text": "Faste masker og rolletyper (Arlecchino, Pantalone, Il Dottore), improvisasjon rundt et løst scenario (canovaccio), direkte publikumshenvendelse. Oppsto i Italia på 1500-tallet.", "id": "bg-commedia", "url": "fordypning.html#bg-commedia", "file": "fordypning.html"}, {"title": "Kabuki", "text": "Japansk teaterform med stiliserte bevegelser, mie-poser (frosne dramatiske øyeblikk), onnagata (mannlige skuespillere i kvinneroller) og spesifikk musikk og kostyme. Fra 1600-tallet.", "id": "bg-kabuki", "url": "fordypning.html#bg-kabuki", "file": "fordypning.html"}, {"title": "Sjangre", "text": "Hva slags historie? Tone, tema og publikums forventninger til utfall.", "id": "tm-beg-sjangre", "url": "fordypning.html#tm-beg-sjangre", "file": "fordypning.html"}, {"title": "Tragedie", "text": "Protagonisten faller — ofte som følge av hamartia (karakterfeil eller skjebnens vilje). Aristoteles beskrev katarsis som tragediens mål: renselse gjennom medfølelse og frykt.", "id": "bg-tragedie", "url": "fordypning.html#bg-tragedie", "file": "fordypning.html"}, {"title": "Komedie", "text": "Konflikten løses lykkelig til slutt. Ofte sosial kritikk gjennom humor — komedien tillater seg å si det tragedien ikke kan.", "id": "bg-komedie", "url": "fordypning.html#bg-komedie", "file": "fordypning.html"}, {"title": "Melodrama", "text": "Overdreven emosjonell spenning med tydelig skille mellom godt og ondt. Populær form på 1800-tallet — opprinnelig med musikk (melo = sang). Moralsk orden gjenopprettes til slutt.", "id": "bg-melodrama", "url": "fordypning.html#bg-melodrama", "file": "fordypning.html"}, {"title": "Musicalteater", "text": "Sang, dans og dialog er likestilte virkemidler som driver handlingen fremover. Utviklet i USA og Storbritannia på 1900-tallet.", "id": "bg-musical", "url": "fordypning.html#bg-musical", "file": "fordypning.html"}, {"title": "Sceniske virkemidler", "text": "Alt det scenen kommuniserer utover tekst og skuespill. Disse elementene virker sammen og skaper forestillingens estetiske uttrykk:", "id": "tm-beg-sceniske", "url": "fordypning.html#tm-beg-sceniske", "file": "fordypning.html"}, {"title": "Rekvisitter", "text": "Gjenstander brukt av skuespillerne på scenen — kan bære symbolsk mening eller støtte den fysiske handlingen.", "id": "bg-rekvisitter", "url": "fordypning.html#bg-rekvisitter", "file": "fordypning.html"}, {"title": "Kostymer", "text": "Hva skuespillerne har på seg — kommuniserer tid, sted, karakter og sosial status.", "id": "bg-kostymer", "url": "fordypning.html#bg-kostymer", "file": "fordypning.html"}, {"title": "Lyd", "text": "Musikk, lydeffekter og stillhet — setter stemning, markerer overganger og kan kommentere handlingen.", "id": "bg-lyd-virk", "url": "fordypning.html#bg-lyd-virk", "file": "fordypning.html"}, {"title": "Lys", "text": "Styrer publikums fokus, skaper atmosfære og kan markere tid og sted. Kan brukes realistisk eller symbolsk.", "id": "bg-lys-virk", "url": "fordypning.html#bg-lys-virk", "file": "fordypning.html"}, {"title": "Scenografi", "text": "Det visuelle rommet — scenebilde, møbler, baktepper og arkitektoniske elementer som definerer forestillingens verden.", "id": "bg-scenografi-virk", "url": "fordypning.html#bg-scenografi-virk", "file": "fordypning.html"}, {"title": "Sminke", "text": "Forsterker eller transformerer skuespillerens ansikt — kan understreke karakter, alder eller være del av et stilisert uttrykk.", "id": "bg-sminke-virk", "url": "fordypning.html#bg-sminke-virk", "file": "fordypning.html"}, {"title": "Dukke / Maske", "text": "Masker skjuler eller erstatter ansiktet og abstraherer karakteren. Dukker og figurer kan representere karakterer uten en skuespillerkropp.", "id": "bg-dukke-virk", "url": "fordypning.html#bg-dukke-virk", "file": "fordypning.html"}, {"title": "Spillestil", "text": "Det helhetlige ekspressive uttrykket skuespillerne skaper — realistisk, stilisert, deklamatorisk eller konvensjonell. Se Analyse", "id": "bg-spillestil-virk", "url": "fordypning.html#bg-spillestil-virk", "file": "fordypning.html"}, {"title": "Konsept og analyse", "text": "Sceniske uttrykk", "id": "tm-beg-konsept", "url": "fordypning.html#tm-beg-konsept", "file": "fordypning.html"}, {"title": "Sceniske uttrykk", "text": "Hvordan en forestilling kommuniserer gjennom kropp, stemme, scenografi, rom, lys, lyd og handling, og hvilke stemninger og assosiasjoner dette skaper hos publikum.", "id": "bg-sceniskeutr", "url": "fordypning.html#bg-sceniskeutr", "file": "fordypning.html"}, {"title": "Estetisk", "text": "Hvordan en forestilling ser ut og oppleves sanselig. Det kan handle om det vakre og harmoniske, men også om bevisste valg som skaper ubehag eller bryter med det forventede.", "id": "bg-estetisk", "url": "fordypning.html#bg-estetisk", "file": "fordypning.html"}, {"title": "Iscenesettelse", "text": "Å forberede, regissere og sette i scene et stykke — for eksempel et stykke av Henrik Ibsen.", "id": "bg-iscenesett", "url": "fordypning.html#bg-iscenesett", "file": "fordypning.html"}, {"title": "Arrangement", "text": "«Blocking» — visuelt bevegelsesmønster og handlinger på scenen (hvem gjør hva, hvor og når — ofte med bakgrunn i tekstanalyse og arbeid med rollefigurens taktikk/mål).", "id": "bg-arrangement", "url": "fordypning.html#bg-arrangement", "file": "fordypning.html"}, {"title": "Regikonsept", "text": "En idé og et styrende prinsipp for arbeidet som skal skape et samlet kunstnerisk uttrykk. Se Produksjon", "id": "bg-regikonsept", "url": "fordypning.html#bg-regikonsept", "file": "fordypning.html"}, {"title": "Dramaturgi", "text": "Hvordan spenningen bygges opp og presenteres i en forestilling. Se Dramaturgi", "id": "bg-dramaturgi", "url": "fordypning.html#bg-dramaturgi", "file": "fordypning.html"}, {"title": "Dramatisk ironi", "text": "Når publikum vet noe som en eller flere av karakterene ikke vet. Spenningen oppstår i gapet mellom det karakteren tror er sant og det publikum kan se. Se også: upålitelig forteller", "id": "bv-dramatisk-ironi", "url": "fordypning.html#bv-dramatisk-ironi", "file": "fordypning.html"}, {"title": "Gest", "text": "En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen.", "id": "bv-gest", "url": "fordypning.html#bv-gest", "file": "fordypning.html"}, {"title": "Dynamikk", "text": "Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet.", "id": "bv-dynamikk", "url": "fordypning.html#bv-dynamikk", "file": "fordypning.html"}, {"title": "Komponere", "text": "Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere.", "id": "bv-komponere", "url": "fordypning.html#bv-komponere", "file": "fordypning.html"}, {"title": "Koreografi", "text": "Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi.", "id": "bv-koreografi", "url": "fordypning.html#bv-koreografi", "file": "fordypning.html"}, {"title": "Teatralsk biomekanikk", "text": "Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Meyerhold — Biomekanikk", "id": "bv-biomekanikk", "url": "fordypning.html#bv-biomekanikk", "file": "fordypning.html"}, {"title": "Fra gest til koreografi", "text": "En bevegelsesfrase", "id": "bv-fragest", "url": "fordypning.html#bv-fragest", "file": "fordypning.html"}, {"title": "Begrep som er lette å blande", "text": "Del 1 — Seks sammenkoblede begrep", "id": "tm-beg-blande", "url": "fordypning.html#tm-beg-blande", "file": "fordypning.html"}, {"title": "Sjanger", "text": "Beskriver hva slags historie som fortelles — tone, tema og publikums forventninger til utfall. Eks: tragedie, komedie, melodrama, farse. Eigtved, 2007.", "id": "bl-sjanger", "url": "fordypning.html#bl-sjanger", "file": "fordypning.html"}, {"title": "Teaterform", "text": "Definert av konvensjonene for hvordan forestillingen lages og presenteres. Teaterformen fastslår blant annet publikumskontrakten. Eks: commedia dell'arte, forumteater, gateteater, kabuki. Gladsø et al., 2005.", "id": "bl-teaterform", "url": "fordypning.html#bl-teaterform", "file": "fordypning.html"}, {"title": "Publikumskontrakt", "text": "Den implisitte avtalen mellom forestilling og publikum som følger av teaterformen — hva forventes av publikum, og hva kan de forvente? I forumteater forventes deltakelse. I gateteater kan du gå. I titteskapsscene later vi som om den fjerde veggen er der. Gladsø et al., 2005.", "id": "bl-publikumskontrakt", "url": "fordypning.html#bl-publikumskontrakt", "file": "fordypning.html"}, {"title": "Teatermodell", "text": "Den fysiske og sosiale organiseringen av forestillingsbegivenheten — hvem møter hvem, i hvilken skala, og med hvilken grad av deltakelse. En intim forestilling for 20 i et kjøkken er en annen teatermodell enn et stadionshow for 50 000. NB: Jon Nygaard bruker «teatermodell» annerledes — som analytisk ramme (aristotelisk, episk, ekspressiv). Her følger vi Gladsø et al. Gladsø et al., 2005.", "id": "bl-teatermodell", "url": "fordypning.html#bl-teatermodell", "file": "fordypning.html"}, {"title": "Dramaturgisk modell", "text": "Beskriver hvordan fortellingen er strukturert — aristotelisk kurve, episodisk, sirkulær. Se Dramaturgi — modeller", "id": "bl-dram-modell", "url": "fordypning.html#bl-dram-modell", "file": "fordypning.html"}, {"title": "Dramaturgisk form", "text": "Det helhetlige sceniske uttrykket — den opplevelsen publikum faktisk får. Resultatet av alle de dramaturgiske valgene. Se Dramaturgi", "id": "bl-dram-form", "url": "fordypning.html#bl-dram-form", "file": "fordypning.html"}, {"title": "Representasjon / Presentasjon", "text": "Representasjonsteater", "id": "bl-repr", "url": "fordypning.html#bl-repr", "file": "fordypning.html"}, {"title": "Episk / Dramatisk / Postdramatisk teater", "text": "Dramatisk teater", "id": "bl-episk", "url": "fordypning.html#bl-episk", "file": "fordypning.html"}, {"title": "Dramaturgiske virkemidler / Sceniske virkemidler", "text": "Dramaturgiske virkemidler", "id": "bl-virkemidler", "url": "fordypning.html#bl-virkemidler", "file": "fordypning.html"}, {"title": "Scenisk handling / Dramaturgisk handling / Handlingsforløp", "text": "Sceniske handlinger", "id": "bl-handling", "url": "fordypning.html#bl-handling", "file": "fordypning.html"}, {"title": "Kunstnerisk", "text": "Brukes ofte som et vagt kompliment — «det var veldig kunstnerisk». I faglig sammenheng betyr kunstnerisk at noe tilhører kunstfeltet eller har kunstnerisk intensjon. Det er ikke en kvalitetsbetegnelse. → Hva er kunst? ↗", "id": "bl-kunstnerisk", "url": "fordypning.html#bl-kunstnerisk", "file": "fordypning.html"}, {"title": "Absurd (misbrukt)", "text": "I dagligtalen brukes «absurd» om noe morsomt, rart eller ulogisk. I teaterfaget refererer absurdteater til en spesifikk historisk kategori — Esslins begrep fra 1961/62. Ikke bruk «absurd» som synonym for «komisk» eller «surrealistisk» i faglig analyse.", "id": "bl-absurd-misbruk", "url": "fordypning.html#bl-absurd-misbruk", "file": "fordypning.html"}, {"title": "Realistisk (misbrukt)", "text": "Brukes ofte feil om teater fra før 1800-tallet — «det greske teateret var ikke realistisk». Realisme som teaterretning oppsto på 1870-tallet. Å kalle eldre teater «urealistisk» fordi det ikke ligner realismen er anakronistisk — det var klassisk, barokt eller neoklassisk.", "id": "bl-realistisk-misbruk", "url": "fordypning.html#bl-realistisk-misbruk", "file": "fordypning.html"}, {"title": "Tilstedeværelse", "text": "Tilskuerens opplevelse av at eleven er «her og nå» i den fiktive situasjonen.", "id": "bg-tilstedev", "url": "fordypning.html#bg-tilstedev", "file": "fordypning.html"}, {"title": "Scenisk oppmerksomhet", "text": "Eleven har fokus i den fiktive situasjonen og evt. medspilleren.", "id": "bg-sceniskoppm", "url": "fordypning.html#bg-sceniskoppm", "file": "fordypning.html"}, {"title": "Rolleidentifikasjon", "text": "Synlig tegn på at eleven fremstiller noe/noen annen enn seg selv.", "id": "bg-rolleident", "url": "fordypning.html#bg-rolleident", "file": "fordypning.html"}, {"title": "Karakterisering", "text": "Karaktertrekk, egenskaper og kjennetegn man tilegner rollen — ikke nødvendigvis naturlig for skuespilleren.", "id": "bg-karakteris", "url": "fordypning.html#bg-karakteris", "file": "fordypning.html"}, {"title": "Innlevelse", "text": "Eleven får publikum til å tro på rollefigurens tanker, handlinger, vilje og følelser.", "id": "bg-innlevelse", "url": "fordypning.html#bg-innlevelse", "file": "fordypning.html"}, {"title": "Fysisk uttrykk", "text": "Eleven formidler rolle/situasjon/stemning gjennom bruk av kroppen.", "id": "bg-fysuttrykk", "url": "fordypning.html#bg-fysuttrykk", "file": "fordypning.html"}, {"title": "Selvstendig uttrykk", "text": "Eleven bruker fagets teknikker for å skape et individuelt uttrykk basert på egen kreativ prosess innenfor gitte rammer — dvs. ikke kopiere/reprodusere.", "id": "bg-selvst", "url": "fordypning.html#bg-selvst", "file": "fordypning.html"}, {"title": "Ekspressivitet", "text": "Å tydeliggjøre og levendegjøre det eleven vil fortelle — enten uttrykket er forenklet eller overdrevet.", "id": "bg-ekspressiv", "url": "fordypning.html#bg-ekspressiv", "file": "fordypning.html"}, {"title": "Gi og ta impulser i samspill", "text": "Timing i dialog, «listening» og tydeliggjøring av mål/taktikk i samspill.", "id": "bg-gitatimpl", "url": "fordypning.html#bg-gitatimpl", "file": "fordypning.html"}, {"title": "Timing", "text": "Å gjøre riktig ting til riktig tid i henhold til forestillingens rytme og samspill med medspilleren og publikum.", "id": "bg-timing", "url": "fordypning.html#bg-timing", "file": "fordypning.html"}, {"title": "Utforske", "text": "En kreativ prosess hvor en bevisst ser på og prøver utvalgt materiale fra ulike innfallsvinkler. Innebærer en vurdering av hva som skal være med videre i prosessen frem mot produktet. (Grunnen til at underveisvurdering er nødvendig i dramafag.)", "id": "bg-utforske", "url": "fordypning.html#bg-utforske", "file": "fordypning.html"}, {"title": "Fra fakta til drøfting — Blooms taksonomi", "text": "Karakteren din avhenger av hvor høyt opp i pyramiden du når. Man kan ikke hoppe over et trinn — hvert nivå bygger på det under.", "id": "tm-blooms", "url": "fordypning.html#tm-blooms", "file": "fordypning.html"}, {"title": "Nivå 4 — Forklaring", "text": "Å forklare betyr å bruke egne ord for å beskrive et konsept — som om du forklarer til en utdannet person som ikke kjenner faget.", "id": "bl-forklaring", "url": "fordypning.html#bl-forklaring", "file": "fordypning.html"}, {"title": "Nivå 4/5 — Sammenligning", "text": "Presenter fakta om begge konseptene", "id": "bl-sammenligning", "url": "fordypning.html#bl-sammenligning", "file": "fordypning.html"}, {"title": "Nivå 5 — Drøfting", "text": "Drøfting forutsetter at du allerede har presentert fakta, forklart med egne ord, og sammenlignet på faglig grunnlag.", "id": "bl-drofting", "url": "fordypning.html#bl-drofting", "file": "fordypning.html"}, {"title": "Nivå 6 — Syntese", "text": "Syntese innebærer å skape noe genuint nytt ved å kombinere ideer fra ulike kilder. Vi forventer ikke syntese på videregående nivå. Karakter 6 oppnås med særdeles god drøfting.", "id": "bl-syntese", "url": "fordypning.html#bl-syntese", "file": "fordypning.html"}, {"title": "Hypotese, disposisjon og martiniglasset", "text": "Hypotese vs. problemstilling", "id": "tm-martini", "url": "fordypning.html#tm-martini", "file": "fordypning.html"}, {"title": "Hypotese vs. problemstilling", "text": "En problemstilling", "id": "ak-hypotese", "url": "fordypning.html#ak-hypotese", "file": "fordypning.html"}, {"title": "Disposisjon", "text": "Et veikart for teksten — både for deg som skriver og leseren som følger argumentet ditt.", "id": "ak-disposisjon", "url": "fordypning.html#ak-disposisjon", "file": "fordypning.html"}, {"title": "Martiniglasset — mal for oppgavestruktur", "text": "Begynn bredt og arbeid deg mot det spesifikke. Konklusjonen åpner seg ut igjen — tilbake til den brede sammenhengen.", "id": "ak-martini", "url": "fordypning.html#ak-martini", "file": "fordypning.html"}, {"title": "Å skrive monologer og dialoger", "text": "Ikke tenk på dette som en skriveoppgave. Fokuser på det talte ordet", "id": "tm-skrive-monolog", "url": "fordypning.html#tm-skrive-monolog", "file": "fordypning.html"}, {"title": "Komme i gang", "text": "Den sveitsiske dramatikeren Dürrenmatt sa: Begynn aldri med et tema", "id": "sk-begynn", "url": "fordypning.html#sk-begynn", "file": "fordypning.html"}, {"title": "Form og dramaturgi", "text": "Første utkast har ofte en form som li
