inter bygde hele dramaturgier av det som ikke ble sagt."}, {"file": "fordypning.html", "id": "sk-sceneanvisninger", "title": "Sceneanvisninger og fysisk handling", "page": "Å finne de rette ordene", "num": "09", "text": "Sceneanvisninger og fysisk handling Vis I de fleste tilfeller er ikke en regissør forpliktet til å følge dine sceneanvisninger. Det eneste unntaket er noen dramatikere — Beckett er det mest kjente — hans bo beskytter instruksjonene som en del av verket. Det betyr at du ikke kan stole på sceneanvisninger for å fortelle historien. Det fysiske må ligge i dialogen — ikke som instruksjon, men som nødvendighet. Hvis karakteren din trenger å krysse rommet, gi dem en grunn som springer ut av det de sier eller hva de trenger. En karakter som desperat trenger på toalettet beveger seg annerledes enn en som er nysgjerrig på noe i vinduet. Skriv behovet inn i teksten — la regissøren og skuespilleren finne formen. Kilde: Powell, R. (2016/2024). Å skrive monologer og dialoger . Teaterfag kompendium: till"}, {"file": "fordypning.html", "id": "tm-skrive-scene", "title": "Å skrive scener", "page": "Å finne de rette ordene", "num": "09", "text": "Å skrive scener Vis Drama = konflikt. Begge karakterene må ha motstridende mål — og begge må forvente å nå sitt. En scene skal ikke være en monolog med et nikkende hode. En scene har sin egen dramaturgi. Noe endrer seg. Karakterene er ikke i samme posisjon ved slutten som ved begynnelsen."}, {"file": "fordypning.html", "id": "sk-dialog", "title": "Dialog og subtekst", "page": "Å finne de rette ordene", "num": "09", "text": "Dialog og subtekst Vis Vi sier aldri akkurat det vi mener — men vi gjør poenget vårt. Dette er subtekst. Skriv aldri subteksten. En mor og sønn er på kjøkkenet. Sønnen tar en kake ut av kjøleskapet. Moren sier: «Broren din begynte i en løpeklubb, visste du det?» Poenget hennes er ikke løpeklubben. Skriv alltid scenariet først: hva vil karakterene? Hvordan vil de oppnå det? Emma Thompson: «Skuespillere skriver ofte subteksten — og gir seg selv ingenting å spille med.»"}, {"file": "fordypning.html", "id": "sk-ironi", "title": "Dramatisk ironi", "page": "Å finne de rette ordene", "num": "09", "text": "Dramatisk ironi Vis Dramatisk ironi oppstår når publikum vet noe en karakter ikke vet. Som dramatiker konstruerer du dette bevisst — ved å gi publikum informasjon i én scene som karakteren i neste scene ikke har tilgang til. Det skaper medfølelse, spenning, ubehag — eller komikk."}, {"file": "fordypning.html", "id": "sk-beats", "title": "Beats", "page": "Å finne de rette ordene", "num": "09", "text": "Beats Vis En scene består av flere beats — karakterene skifter taktikk for å nå målet sitt. De kan «vinne» et beat, så tape det neste. Lengden på et beat bestemmer tempoet i scenen — som i et partitur."}, {"file": "fordypning.html", "id": "sk-inmedias", "title": "In medias res", "page": "Å finne de rette ordene", "num": "09", "text": "In medias res Vis Begynn midt i noe som allerede er i gang. Nye dramatikere starter ofte for tidlig — med ankomst, hilsener, oppsett. Det publikum trenger å vite om bakgrunnen, avdekkes underveis. Se Begrep: In medias res . Kilde: Powell, R. (2016/2024). Creating Scenes for Classwork . Teaterfag kompendium: tilleggsmateriale. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-karakterdrevet", "title": "Karakterdrevet vs. handlingsdrevet", "page": "Å finne de rette ordene", "num": "09", "text": "Karakterdrevet vs. handlingsdrevet Vis Karakterdrevet — karakteren er så spesifikk som mulig. Hennes individuelle, realistiske samspill med skiftende omstendigheter driver historien fremover. Hun transformerer og tilpasser seg nye omstendigheter. Publikum identifiserer seg med karakteren og opplever tilfredsstillelse når karakteren vokser. Teksten gjenspeiler karakterens skiftende indre tilstand. Handlingsdrevet — karakteren er en «type» som ikke er i stand til å transformere seg. Vi nyter å se en kjent type reagere på skiftende omstendigheter på en måte som er true-to-type . Den komiske verdien ligger i at vi gjenkjenner karakteren og absurditeten i situasjonen. Krever kontrollert, ekspressiv bevegelse. Meyerhold mente biomekanikk var nødvendig for denne typen spill. Den upålitelige forte"}, {"file": "fordypning.html", "id": "tm-troper", "title": "Troper, klisjeer og restriksjoner", "page": "Å finne de rette ordene", "num": "09", "text": "Troper, klisjeer og restriksjoner Vis Restriksjoner Ingen selvmord på scenen Ingen skudd Ingen selvskading Ingen «dead girl trope» — en død eller voldtatt kvinne som kun er et plottgrep Dette er skolens policy og lærerens pedagogiske filosofi — ikke sensur av ytringer i samfunnet. Dramaturgisk flat skriving bør løses med kreativitet, ikke billige troper. Spør Ren hvis du vil argumentere for et unntak."}, {"file": "fordypning.html", "id": "sk-trope", "title": "Hva er en trope?", "page": "Å finne de rette ordene", "num": "09", "text": "Hva er en trope? Vis En trope er en sekvens av hendelser vi ofte ser gjentatt — i en enkelt fortelling eller i kulturens historiefortelling generelt. En trope i seg selv er ikke et problem. Problemet oppstår når tropen brukes så ofte at den glir over i en klisjé — og publikum slutter å legge merke til detaljene."}, {"file": "fordypning.html", "id": "sk-klisje", "title": "Hva er galt med en klisjé?", "page": "Å finne de rette ordene", "num": "09", "text": "Hva er galt med en klisjé? Vis Klisjeer er ofte sanne — det er derfor de oppsto. Problemet er at de er så kjente at publikum ikke lenger tenker over hva de betyr. Som dramatiker ønsker vi at karakterens stemme virkelig kommuniserer rikdommen i deres erfaring — ikke at publikum skummer over teksten fordi den er for kjent. Unntak: Du kan velge å skrive en karakter som snakker i ingenting annet enn klisjeer — det kan i seg selv være et bevisst kunstnerisk valg. Kilde: Powell, R. (2016/2024). Troper, klisjeer og restriksjoner . Teaterfag kompendium: tilleggsmateriale. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-analyser-egen", "title": "Analyser din egen tekst", "page": "Å finne de rette ordene", "num": "09", "text": "Analyser din egen tekst Vis Bruk de samme verktøyene du bruker på andres tekster på din egen. Les teksten din som om du er analytiker, ikke forfatter — før du leverer et siste utkast. Se Dramaturgi — virkemidler for verktøyene. Hvilken dramaturgisk form har teksten din? (Aristotelisk, episk, sirkulær?) Hvilke dramaturgiske virkemidler bruker du bevisst? (Spenning, kontraster, symboler, rytme?) Er teksten karakterdrevet eller handlingsdrevet — og er det et bevisst valg? Hvor er klimakset? Har teksten en løsning, eller er den bevisst åpen?"}, {"file": "fordypning.html", "id": "tm-blooms", "title": "Fra fakta til drøfting — Blooms taksonomi", "page": "Å finne de rette ordene", "num": "09", "text": "Fra fakta til drøfting — Blooms taksonomi Vis Karakteren din avhenger av hvor høyt opp i pyramiden du når. Man kan ikke hoppe over et trinn — hvert nivå bygger på det under. 6 Syntese — skaper noe genuint nytt av kunnskap 5 Drøfting — trekker egne faglige konklusjoner 4/5 Sammenligning — ser likheter og forskjeller 4 Forklaring — beskriver med egne ord 3 Fakta — gjengir pensum korrekt"}, {"file": "fordypning.html", "id": "bl-fakta", "title": "Nivå 3 — Fakta", "page": "Å finne de rette ordene", "num": "09", "text": "Nivå 3 — Fakta Vis Relevant — må knyttes til oppgaven og kompetanse-/læremålene Pensum — fagstoff presentert i timen eller i pensum, ikke egne meninger Dokumenterbart — kan og bør vises til i pensumlitteratur Uten fakta kan man ikke forklare. Uten forklaring kan man ikke sammenligne. Uten sammenligning kan man ikke drøfte."}, {"file": "fordypning.html", "id": "bl-forklaring", "title": "Nivå 4 — Forklaring", "page": "Å finne de rette ordene", "num": "09", "text": "Nivå 4 — Forklaring Vis Å forklare betyr å bruke egne ord for å beskrive et konsept — som om du forklarer til en utdannet person som ikke kjenner faget. ✗ Felle: å henvise til noe like ukjent «Artauds mål med teateret var lik den greske ideen om katarsis.» Begge konseptene er udefinerte."}, {"file": "fordypning.html", "id": "bl-sammenligning", "title": "Nivå 4/5 — Sammenligning", "page": "Å finne de rette ordene", "num": "09", "text": "Nivå 4/5 — Sammenligning Vis Presenter fakta om begge konseptene Forklar hvert konsept separat med egne ord Sammenlign på et felles, faglig grunnlag — likheter og forskjeller ✗ «Brecht var opptatt av politisk teater, mens Grotowski var mer opptatt med kroppen.» — To fakta i samme setning er ikke sammenligning. ✓ Sammenlign det samme aspektet hos to forskjellige ting."}, {"file": "fordypning.html", "id": "bl-drofting", "title": "Nivå 5 — Drøfting", "page": "Å finne de rette ordene", "num": "09", "text": "Nivå 5 — Drøfting Vis Drøfting forutsetter at du allerede har presentert fakta, forklart med egne ord, og sammenlignet på faglig grunnlag. ✓ «Basert på denne sammenligningen kan man argumentere for at [A] skiller seg fra [B] ved [faglig aspekt], fordi [faglig begrunnelse fra pensum].»"}, {"file": "fordypning.html", "id": "bl-syntese", "title": "Nivå 6 — Syntese", "page": "Å finne de rette ordene", "num": "09", "text": "Nivå 6 — Syntese Vis Syntese innebærer å skape noe genuint nytt ved å kombinere ideer fra ulike kilder. Vi forventer ikke syntese på videregående nivå. Karakter 6 oppnås med særdeles god drøfting. NB — Plagiat og ansvar for informasjon Presenterer du en idé uten kilde = plagiat Presenterer du en idé med kilde = fakta (uansett om du er enig) I begge tilfeller kan du ikke drøfte ideen videre som din egen Basert på Blooms taksonomi · UDIR sin anbefaling for vurdering · Ren Powell Skjul ↑"}, {"file": "fordypning.html", "id": "tm-martini", "title": "Hypotese, disposisjon og martiniglasset", "page": "Å finne de rette ordene", "num": "09", "text": "Hypotese, disposisjon og martiniglasset Vis"}, {"file": "fordypning.html", "id": "ak-hypotese", "title": "Hypotese vs. problemstilling", "page": "Å finne de rette ordene", "num": "09", "text": "Hypotese vs. problemstilling Vis En problemstilling er det dere kjenner fra før — et spørsmål som tar leseren med på selve læringsprosessen og utforsker svaret underveis. En hypotese er annerledes: teksten forteller leseren hva forfatteren allerede har lært — ikke hvordan de lærte det. Du legger frem påstanden i innledningen og bruker resten av teksten til å underbygge den med fakta, sammenligning og drøfting. Læringsprosessen er gjort på forhånd. Det leseren får se er konklusjonen og begrunnelsen for den. Eksempel: Hypotese: Banan er den perfekte turmat. Teksten tar med bekreftende fakta, tar opp motargumenter — og tilbyr løsninger. NB: Hvis du underveis finner ut at hypotesen var feil — skriv oppgaven om igjen slik at påstand og konklusjon stemmer."}, {"file": "fordypning.html", "id": "ak-disposisjon", "title": "Disposisjon", "page": "Å finne de rette ordene", "num": "09", "text": "Disposisjon Vis Et veikart for teksten — både for deg som skriver og leseren som følger argumentet ditt."}, {"file": "fordypning.html", "id": "ak-martini", "title": "Martiniglasset — mal for oppgavestruktur", "page": "Å finne de rette ordene", "num": "09", "text": "Martiniglasset — mal for oppgavestruktur Vis Begynn bredt og arbeid deg mot det spesifikke. Konklusjonen åpner seg ut igjen — tilbake til den brede sammenhengen. X og Y = de to elementene du sammenligner (f.eks. to fornyere, to metoder, to epoker). Kursiv = delkonklusjon. Enkel Innledning Bredt tema Smalere kontekst → Hypotese I. Fakta A. X og hennes teatersyn B. Y og hans teatersyn C. Delkonklusjon II. Sammenligning A. [aspekt 1] — X og Y B. [aspekt 2] — X og Y C. [aspekt 3] — X og Y D. Delkonklusjon III. Drøfting A. Motargument B. Din faglige posisjon C. Delkonklusjon — sterkeste sist Konklusjon <div style=\"padding-lef"}, {"file": "fordypning.html", "id": "tm-beg-grunn", "title": "Drama og teater", "page": "Å finne de rette ordene", "num": "09", "text": "Drama og teater Vis"}, {"file": "fordypning.html", "id": "bg-teatergrunn", "title": "Teaterets grunnelementer", "page": "Å finne de rette ordene", "num": "09", "text": "Teaterets grunnelementer Vis A spiller B for C — en skuespiller fremstiller en rolle for et publikum."}, {"file": "fordypning.html", "id": "bg-grunnelementer", "title": "Dramatiske grunnelementer", "page": "Å finne de rette ordene", "num": "09", "text": "Dramatiske grunnelementer Vis Fabel · Figur · Rom · Tid"}, {"file": "fordypning.html", "id": "bg-dramateater", "title": "Drama vs. teater (Tassi)", "page": "Å finne de rette ordene", "num": "09", "text": "Drama vs. teater (Tassi) Vis Drama, teater og postdramatisk teater er ikke det samme — og det er viktig å skille dem fra hverandre: Funksjon Drama (Teksten) Teater (Forestillingen) Postdramatisk teater Hva er det? Et manus eller en historie. En levende hendelse. En situasjon eller et bilde. Fokus Karakterenes utvikling. Handlingen (plot). Sanselighet og tilstedeværelse. Eksistens Karakte"}, {"file": "fordypning.html", "id": "bg-metafysikk", "title": "Teater og metafysikk (Tassi)", "page": "Å finne de rette ordene", "num": "09", "text": "Teater og metafysikk (Tassi) Vis Metafysikk høres komplisert ut, men i teateret betyr det rett og slett å undersøke hva det vil si å eksistere. Professor Aldo Tassi mener at teateret er det perfekte stedet å se «virkeligheten i aksjon». Hva er metafysikk? — Metafysikk er den delen av filosofien som spør: Hva er virkelig? og Hva vil det si å finnes? Tassi sier at alt i universet «gjør» sin egen eksistens. Et tre er ikke bare et tre; det «tre-er» aktivt ved å vokse og være til stede. Han kaller dette for «the performance of being» (værens prestasjon). Hvordan ser vi dette i teateret? — Teateret er som et laboratorium for eksistens. Når en skuespiller går ut på en tom scene, skjer det noe magisk: Nærvær (Presence) — Skuespilleren henter frem en karakter som ikke fantes før. Dette er metafysik"}, {"file": "fordypning.html", "id": "tm-beg-lage-teater", "title": "Å lage teater", "page": "Å finne de rette ordene", "num": "09", "text": "Å lage teater Vis"}, {"file": "fordypning.html", "id": "bg-ensemble", "title": "Ensemble", "page": "Å finne de rette ordene", "num": "09", "text": "Ensemble Vis En gruppering av utøvere hvor alle gjør det som må til (en flat organisasjonsstruktur) for å skape en teateroppsetning."}, {"file": "fordypning.html", "id": "bg-devising", "title": "Devising", "page": "Å finne de rette ordene", "num": "09", "text": "Devising Vis En arbeidsprosess hvor ensemble eller regissør ikke har valgt forestillingens endelige form, modell eller estetiske uttrykk på forhånd."}, {"file": "fordypning.html", "id": "bg-konvensjoner", "title": "Konvensjoner", "page": "Å finne de rette ordene", "num": "09", "text": "Konvensjoner Vis Teatrale konvensjoner er de uskrevne reglene som styrer møtet mellom forestilling og publikum — gjenkjennelige spilleregler som begge parter aksepterer. Konvensjoner varierer mellom teaterformer og epoker, og kan brytes bevisst for artistisk effekt."}, {"file": "fordypning.html", "id": "bg-handling", "title": "Handling", "page": "Å finne de rette ordene", "num": "09", "text": "Handling Vis Sceniske handlinger — alt som skjer fysisk på scenen. Dramaturgiske handlinger — handlinger som fører fram fortellingen eller forestillingens dramaturgi (kan være lysforandringer eller andre sceniske elementer). Handlingsforløp — dramaturgisk begrep, «plot», handlingen i et dramatisk verk."}, {"file": "fordypning.html", "id": "bg-iscenesett", "title": "Iscenesettelse", "page": "Å finne de rette ordene", "num": "09", "text": "Iscenesettelse Vis Å forberede, regissere og sette i scene et teaterstykke."}, {"file": "fordypning.html", "id": "bl-teatral-ytring", "title": "Teatral ytring", "page": "Å finne de rette ordene", "num": "09", "text": "Teatral ytring Vis En handling eller et uttrykk som er rammet inn for å bli sett og tolket av andre. Det teatrale ligger ikke nødvendigvis i at det skjer på en scene — men i at noen iscenesetter seg selv eller noe annet for et publikum, bevisst eller ubevisst. En politisk tale, et rituale, en motevisning og et teaterstykke er alle teatrale ytringer. Se også: Iscenesettelse av selvet . Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-gresk", "title": "Greske begreper", "page": "Å finne de rette ordene", "num": "09", "text": "Greske begreper Vis"}, {"file": "fordypning.html", "id": "bg-mimesis", "title": "Mimesis", "page": "Å finne de rette ordene", "num": "09", "text": "Mimesis Vis Etterligning eller fremstilling av virkeligheten gjennom kunst. Aristoteles mente at all kunst er mimesis — en imitasjon av menneskelige handlinger."}, {"file": "fordypning.html", "id": "bg-katarsis", "title": "Katarsis", "page": "Å finne de rette ordene", "num": "09", "text": "Katarsis Vis Tilskuerens emosjonelle renselse gjennom medlidenhet og frykt i møte med tragedien. Et sentralt begrep i Aristoteles' Poetikk ."}, {"file": "fordypning.html", "id": "bg-hamartia", "title": "Hamartia", "page": "Å finne de rette ordene", "num": "09", "text": "Hamartia Vis Protagonistens fatale feil eller svakhet som fører til fall. Ikke nødvendigvis en moralsk feil — det kan være uvitenhet eller feilvurdering."}, {"file": "fordypning.html", "id": "bg-hubris", "title": "Hubris", "page": "Å finne de rette ordene", "num": "09", "text": "Hubris Vis Overmod eller stolthet som fører til fall — en vanlig form for hamartia i gresk tragedie. Protagonisten overvurderer sin egen makt eller utfordrer gudene."}, {"file": "fordypning.html", "id": "bg-peripeteia", "title": "Peripeteia", "page": "Å finne de rette ordene", "num": "09", "text": "Peripeteia Vis Vendepunktet — en plutselig og uventet omvending av protagonistens situasjon, fra lykke til ulykke eller omvendt."}, {"file": "fordypning.html", "id": "bg-anagnorisis", "title": "Anagnorisis", "page": "Å finne de rette ordene", "num": "09", "text": "Anagnorisis Vis Gjenkjennelse — protagonistens plutselige innsikt om sin egen situasjon, identitet eller en annens. Inntreffer ofte samtidig med peripeteia."}, {"file": "fordypning.html", "id": "bg-deus", "title": "Deus ex machina", "page": "Å finne de rette ordene", "num": "09", "text": "Deus ex machina Vis «Gud fra maskinen» — en uventet og kunstig løsning på en konflikt, der en ekstern kraft griper inn. I gresk teater ble en gud bokstavelig talt heist ned på scenen med en kran. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-dramt", "title": "Dramaturgiske begreper", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgiske begreper Vis"}, {"file": "fordypning.html", "id": "bg-eksposisjon", "title": "Eksposisjon", "page": "Å finne de rette ordene", "num": "09", "text": "Eksposisjon Vis Innledningen der situasjon, karakterer og bakgrunn presenteres for publikum."}, {"file": "fordypning.html", "id": "bg-komplikasjon", "title": "Komplikasjon", "page": "Å finne de rette ordene", "num": "09", "text": "Komplikasjon Vis Det som setter konflikten i gang — en hendelse eller avsløring som forstyrrer den innledende balansen og driver handlingen fremover."}, {"file": "fordypning.html", "id": "bg-klimaks", "title": "Klimaks", "page": "Å finne de rette ordene", "num": "09", "text": "Klimaks Vis Spenningens høydepunkt — det avgjørende øyeblikket der konflikten når sin topp og utfallet bestemmes."}, {"file": "fordypning.html", "id": "bg-fallende", "title": "Fallende handling", "page": "Å finne de rette ordene", "num": "09", "text": "Fallende handling Vis Handlingen etter klimaks, der spenningen løses opp og konsekvensene av det avgjørende øyeblikket utspiller seg."}, {"file": "fordypning.html", "id": "bg-losning", "title": "Løsning / denouement", "page": "Å finne de rette ordene", "num": "09", "text": "Løsning / denouement Vis Avslutningen der konfliktens tråder løses opp og en ny balanse etableres. Fra fransk «å løse opp en knute»."}, {"file": "fordypning.html", "id": "bg-inmedias", "title": "In medias res", "page": "Å finne de rette ordene", "num": "09", "text": "In medias res Vis «Midt i tingene» — å begynne forestillingen eller teksten midt i handlingen, uten innledende eksposisjon. Bakgrunn avdekkes gradvis underveis. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-retninger", "title": "Teaterretninger", "page": "Å finne de rette ordene", "num": "09", "text": "Teaterretninger Vis Eksempler på historiske kunstneriske bevegelser — epoke, estetikk, nøkkelpersoner."}, {"file": "fordypning.html", "id": "bg-realisme", "title": "Realisme", "page": "Å finne de rette ordene", "num": "09", "text": "Realisme Vis Psykologisk troverdige karakterer i gjenkjennelige situasjoner. Ikke nødvendigvis fotografisk nøyaktig, men emosjonelt sant. Fra 1870-tallet. Sentrale navn: Ibsen, Tsjehov."}, {"file": "fordypning.html", "id": "bg-naturalisme", "title": "Naturalisme", "page": "Å finne de rette ordene", "num": "09", "text": "Naturalisme Vis Nøyaktig gjengivelse av virkeligheten på scenen — inkludert det hverdagslige og det stygge. Skuespillerne oppfører seg som om publikum ikke er til stede (den fjerde veggen). Sentrale navn: Strindberg, Antoine (1880-tallet)."}, {"file": "fordypning.html", "id": "bg-ekspresjonisme", "title": "Ekspresjonisme", "page": "Å finne de rette ordene", "num": "09", "text": "Ekspresjonisme Vis Ytre uttrykk for indre tilstand — virkeligheten forvrenses for å gjenspeile karakterenes psykologi eller samfunnskritikk. Stiliserte bevegelser, overdrevet scenografi, skjeve vinkler. Tidlig 1900-tall."}, {"file": "fordypning.html", "id": "bg-absurd", "title": "Absurdteater", "page": "Å finne de rette ordene", "num": "09", "text": "Absurdteater Vis Speiler tilværelsens meningsløshet gjennom gjentakelse, stillstand og språklig sammenbrudd. Konflikten løses ikke — den bare fortsetter. NB: Begrepet ble introdusert av kritikeren Martin Esslin i 1961/62 for å beskrive en rekke ulike og ikke-relaterte dramatikere fra 1940- og 50-tallet — Beckett, Ionesco, Genet — som aldri selv brukte betegnelsen om sitt eget arbeid."}, {"file": "fordypning.html", "id": "bg-postdramatisk", "title": "Postdramatisk teater og dramaturgi", "page": "Å finne de rette ordene", "num": "09", "text": "Postdramatisk teater og dramaturgi Vis Postdramatisk teater beskriver teater som ikke lenger setter den dramatiske teksten i sentrum. I stedet er det den sceniske tilstedeværelsen, den performative handlingen og forholdet mellom utøver og publikum som bærer forestillingen. Det var Richard Schechner som først brukte termen post-dramatic theater — om happenings og eksperimentelt teater — på slutten av 1960-tallet. Den tyske teaterteoretikeren Hans-Thies Lehmann tok begrepet videre og bygde en omfattende teori rundt det i Postdramatisches Theater (1999), som raskt ble et sentralt referansepunkt i internasjonal teaterfaglig diskurs. Noen bruker også termen postdramatisk dramaturgi for å beskrive de strategiene som kjennetegner denne typen teater: fragmentering, ikke-lineær struktur, simultanit"}, {"file": "fordypning.html", "id": "tm-beg-teaterformer", "title": "Teaterformer", "page": "Å finne de rette ordene", "num": "09", "text": "Teaterformer Vis Eksempler på konvensjoner som styrer forestillingsbegivenheten — fastslår blant annet publikumskontrakten."}, {"file": "fordypning.html", "id": "bg-fysiskteater", "title": "Fysisk teater", "page": "Å finne de rette ordene", "num": "09", "text": "Fysisk teater Vis Kroppen er det primære uttrykket. Bevegelse, gestikk og romlig komposisjon bærer forestillingen like mye som eller mer enn teksten. Inspirert av Artaud, Lecoq og Grotowski."}, {"file": "fordypning.html", "id": "bg-dokumentar2", "title": "Dokumentarteater", "page": "Å finne de rette ordene", "num": "09", "text": "Dokumentarteater Vis Basert på virkelige hendelser, dokumenter, intervjuer eller arkivmateriale. Publikumskontrakten inkluderer en forpliktelse til faktabasert fremstilling."}, {"file": "fordypning.html", "id": "bg-gateteater", "title": "Gateteater", "page": "Å finne de rette ordene", "num": "09", "text": "Gateteater Vis Fremført i offentlig rom. Publikum er ikke invitert — de er tilfeldig til stede og kan gå når de vil. Forestillingen må erobre oppmerksomheten."}, {"file": "fordypning.html", "id": "bg-forumteater", "title": "Forumteater", "page": "Å finne de rette ordene", "num": "09", "text": "Forumteater Vis Publikum kan stoppe forestillingen og erstatte en skuespiller for å prøve ut alternative handlinger. Utviklet av Augusto Boal som del av «Theatre of the Oppressed»."}, {"file": "fordypning.html", "id": "bg-commedia", "title": "Commedia dell'arte", "page": "Å finne de rette ordene", "num": "09", "text": "Commedia dell'arte Vis Faste masker og rolletyper (Arlecchino, Pantalone, Il Dottore), improvisasjon rundt et løst scenario (canovaccio), direkte publikumshenvendelse. Oppsto i Italia på 1500-tallet."}, {"file": "fordypning.html", "id": "bg-kabuki", "title": "Kabuki", "page": "Å finne de rette ordene", "num": "09", "text": "Kabuki Vis Japansk teaterform med stiliserte bevegelser, mie-poser (frosne dramatiske øyeblikk), onnagata (mannlige skuespillere i kvinneroller) og spesifikk musikk og kostyme. Fra 1600-tallet. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-konsept", "title": "Kunstnerisk uttrykk og analyse", "page": "Å finne de rette ordene", "num": "09", "text": "Kunstnerisk uttrykk og analyse Vis De samme begrepene brukes både når du skaper og når du analyserer — perspektivet skifter. For regissøren og kunstneren er de virkemidler; for analytikeren er de kilden til den opplevelsen og effekten som oppstår."}, {"file": "fordypning.html", "id": "bg-lesemåte", "title": "Lesemåte", "page": "Å finne de rette ordene", "num": "09", "text": "Lesemåte Vis Lesemåte beskriver det analytiske perspektivet eller den tolkningsrammen man velger å bruke når man nærmer seg en tekst eller forestilling. Ulike lesemåter vil fremheve ulike aspekter — en feministisk lesemåte ser på kjønnsroller og maktstrukturer, en marxistisk lesemåte på klassekonflikter, en postkolonial lesemåte på kolonialismens spor. Valg av lesemåte påvirker hva man ser — og hva man overser."}, {"file": "fordypning.html", "id": "bg-deklamatorisk", "title": "Deklamatorisk", "page": "Å finne de rette ordene", "num": "09", "text": "Deklamatorisk Vis En spillestil kjennetegnet av formell, høytidelig vokal fremføring med stilisert gestikk. Var normen i klassisk og neoklassisk teater før psykologisk realisme ble dominerende på slutten av 1800-tallet. Ikke det samme som overdrevet eller dårlig spill — det er en bevisst og historisk forankret stil."}, {"file": "fordypning.html", "id": "bg-stilisert", "title": "Stilisert", "page": "Å finne de rette ordene", "num": "09", "text": "Stilisert Vis Et scenisk uttrykk der elementer er bevisst forenklet, overdrevet eller abstrahert fra naturalismens illusjon. Stilisering er ikke overdrivelse for overdrivelsens skyld — det er et kunstnerisk valg om å prioritere uttrykk over illusjon. Alle teaterformer som ikke streber etter naturalistisk virkelighet er i en viss grad stiliserte. Se også: Deklamatorisk, Gestus (Brecht)."}, {"file": "fordypning.html", "id": "bg-tragedie", "title": "Tragedie", "page": "Å finne de rette ordene", "num": "09", "text": "Tragedie Vis Protagonisten faller — ofte som følge av hamartia (karakterfeil eller skjebnens vilje). Aristoteles beskrev katarsis som tragediens mål: renselse gjennom medfølelse og frykt."}, {"file": "fordypning.html", "id": "bg-komedie", "title": "Komedie", "page": "Å finne de rette ordene", "num": "09", "text": "Komedie Vis Konflikten løses lykkelig til slutt. Ofte sosial kritikk gjennom humor — komedien tillater seg å si det tragedien ikke kan."}, {"file": "fordypning.html", "id": "bg-melodrama", "title": "Melodrama", "page": "Å finne de rette ordene", "num": "09", "text": "Melodrama Vis Overdreven emosjonell spenning med tydelig skille mellom godt og ondt. Populær form på 1800-tallet — opprinnelig med musikk (melo = sang). Moralsk orden gjenopprettes til slutt."}, {"file": "fordypning.html", "id": "bg-farse", "title": "Farse", "page": "Å finne de rette ordene", "num": "09", "text": "Farse Vis Ekstrem, overdreven komikk basert på misforståelser, forviklinger og fysisk humor. Karakterene er ofte stereotype typer."}, {"file": "fordypning.html", "id": "bg-musical", "title": "Musicalteater", "page": "Å finne de rette ordene", "num": "09", "text": "Musicalteater Vis Sang, dans og dialog er likestilte virkemidler som driver handlingen fremover. Utviklet i USA og Storbritannia på 1900-tallet."}, {"file": "fordypning.html", "id": "bg-rekvisitter", "title": "Rekvisitter", "page": "Å finne de rette ordene", "num": "09", "text": "Rekvisitter Vis Gjenstander brukt av skuespillerne på scenen — kan bære symbolsk mening eller støtte den fysiske handlingen."}, {"file": "fordypning.html", "id": "bg-kostymer", "title": "Kostymer", "page": "Å finne de rette ordene", "num": "09", "text": "Kostymer Vis Hva skuespillerne har på seg — kommuniserer tid, sted, karakter og sosial status."}, {"file": "fordypning.html", "id": "bg-lyd-virk", "title": "Lyd", "page": "Å finne de rette ordene", "num": "09", "text": "Lyd Vis Musikk, lydeffekter og stillhet — setter stemning, markerer overganger og kan kommentere handlingen."}, {"file": "fordypning.html", "id": "bg-lys-virk", "title": "Lys", "page": "Å finne de rette ordene", "num": "09", "text": "Lys Vis Styrer publikums fokus, skaper atmosfære og kan markere tid og sted. Kan brukes realistisk eller symbolsk."}, {"file": "fordypning.html", "id": "bg-scenografi-virk", "title": "Scenografi", "page": "Å finne de rette ordene", "num": "09", "text": "Scenografi Vis Det visuelle rommet — scenebilde, møbler, baktepper og arkitektoniske elementer som definerer forestillingens verden."}, {"file": "fordypning.html", "id": "bg-sminke-virk", "title": "Sminke", "page": "Å finne de rette ordene", "num": "09", "text": "Sminke Vis Forsterker eller transformerer skuespillerens ansikt — kan understreke karakter, alder eller være del av et stilisert uttrykk."}, {"file": "fordypning.html", "id": "bg-dukke-virk", "title": "Dukke / Maske", "page": "Å finne de rette ordene", "num": "09", "text": "Dukke / Maske Vis Masker skjuler eller erstatter ansiktet og abstraherer karakteren. Dukker og figurer kan representere karakterer uten en skuespillerkropp."}, {"file": "fordypning.html", "id": "bg-spillestil-virk", "title": "Spillestil", "page": "Å finne de rette ordene", "num": "09", "text": "Spillestil Vis Det helhetlige ekspressive uttrykket skuespillerne skaper — realistisk, stilisert, deklamatorisk eller konvensjonell. Se Analyse ."}, {"file": "fordypning.html", "id": "bg-sceniskeutr", "title": "Sceniske uttrykk", "page": "Å finne de rette ordene", "num": "09", "text": "Sceniske uttrykk Vis Hvordan en forestilling kommuniserer gjennom kropp, stemme, scenografi, rom, lys, lyd og handling, og hvilke stemninger og assosiasjoner dette skaper hos publikum."}, {"file": "fordypning.html", "id": "bg-estetisk", "title": "Estetisk", "page": "Å finne de rette ordene", "num": "09", "text": "Estetisk Vis Hvordan en forestilling ser ut og oppleves sanselig. Det kan handle om det vakre og harmoniske, men også om bevisste valg som skaper ubehag eller bryter med det forventede."}, {"file": "fordypning.html", "id": "bg-arrangement", "title": "Arrangement", "page": "Å finne de rette ordene", "num": "09", "text": "Arrangement Vis «Blocking» — visuelt bevegelsesmønster og handlinger på scenen (hvem gjør hva, hvor og når — ofte med bakgrunn i tekstanalyse og arbeid med rollefigurens taktikk/mål)."}, {"file": "fordypning.html", "id": "bg-regikonsept", "title": "Regikonsept", "page": "Å finne de rette ordene", "num": "09", "text": "Regikonsept Vis Regikonsept er regissørens overordnede kunstneriske visjon for en forestilling. Det omfatter både kunstneriske valg — dramaturgiske og sceniske — og de praktiske beslutningene som former produksjonen. Regikonseptet er utgangspunktet for alle andre valg i prosessen. Se Produksjon for full oversikt."}, {"file": "fordypning.html", "id": "bg-kunstnerisk-valg", "title": "Kunstnerisk valg", "page": "Å finne de rette ordene", "num": "09", "text": "Kunstnerisk valg Vis Samlebegrepet for de bevisste beslutningene en regissør eller et ensemble tar i skapelsen av et verk — inkludert dramaturgiske valg og sceniske valg."}, {"file": "fordypning.html", "id": "bg-dramaturgi", "title": "Dramaturgi", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgi Vis Hvordan spenningen bygges opp og presenteres i en forestilling. Se Dramaturgi ."}, {"file": "fordypning.html", "id": "bg-dramaturganalyse", "title": "Dramaturgisk analyse", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgisk analyse Vis Tekstanalyse — analyse av det dramatiske tekstgrunnlaget Realisasjonsanalyse — analyse av alle steg som er nødvendige for å realisere produksjonen: framdriftsplan, regikonsept Forestillingsanalyse — analyse av publikums oppfatning av produksjonen: estetisk uttrykk, budskap osv. Szatkowski, 1989."}, {"file": "fordypning.html", "id": "bv-dramatisk-ironi", "title": "Dramatisk ironi", "page": "Å finne de rette ordene", "num": "09", "text": "Dramatisk ironi Vis Når publikum vet noe som en eller flere av karakterene ikke vet. Spenningen oppstår i gapet mellom det karakteren tror er sant og det publikum kan se. Se også: upålitelig forteller under Å skrive dramatisk tekst. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-bevegelse", "title": "Begreper i teater og bevegelse", "page": "Å finne de rette ordene", "num": "09", "text": "Begreper i teater og bevegelse Vis"}, {"file": "fordypning.html", "id": "bv-gest", "title": "Gest", "page": "Å finne de rette ordene", "num": "09", "text": "Gest Vis En ekspressiv bevegelse eller posisjonering som formidler informasjon til et publikum — om en rollefigurs karaktertrekk, status eller om handlingen."}, {"file": "fordypning.html", "id": "bv-dynamikk", "title": "Dynamikk", "page": "Å finne de rette ordene", "num": "09", "text": "Dynamikk Vis Krefter i bevegelser — varierende sammensetninger av sterk vs. svak, stor vs. liten, rask vs. langsom, og målrettet vs. ikke-målrettet."}, {"file": "fordypning.html", "id": "bv-komponere", "title": "Komponere", "page": "Å finne de rette ordene", "num": "09", "text": "Komponere Vis Fra gresk — oppbygning, det å sette sammen enkeltdeler til en helhet. Vi snakker om komposisjon når vi setter sammen enkeltdeler (f.eks. gest) til en helhet og lager det vi kaller en bevegelsesfrase. Når flere slike fraser settes sammen til en sekvens, snakker vi også om å komponere."}, {"file": "fordypning.html", "id": "bv-koreografi", "title": "Koreografi", "page": "Å finne de rette ordene", "num": "09", "text": "Koreografi Vis Fra gresk choros (kordans) og grafein (skrive) — egentlig «danseskrift». Koreografen er fortolker av bevegelse og planlegger bruken av bevegelser på scenen. Velger man ut sekvenser med en bevisst tanke i forhold til et sluttresultat eller en visning, bruker vi begrepet koreografi."}, {"file": "fordypning.html", "id": "bv-biomekanikk", "title": "Teatralsk biomekanikk", "page": "Å finne de rette ordene", "num": "09", "text": "Teatralsk biomekanikk Vis Meyerhold utviklet biomekanikk som et system av presise øvelsesetuder. Bevegelsen er organisert i fire elementer: Otkaz, Posyl, Tochka/Stoika og Tormoz. Biomekanikk er ikke en spillestil — det er en treningsmetode for full fysisk kontroll. Se Meyerhold — Biomekanikk for detaljer."}, {"file": "fordypning.html", "id": "bv-fragest", "title": "Fra gest til koreografi", "page": "Å finne de rette ordene", "num": "09", "text": "Fra gest til koreografi Vis En bevegelsesfrase kan sammenlignes med en setning i språket — kort eller lang, med egen rytme og eget budskap. Setter vi sammen flere bevegelsesfraser får vi en bevegelsessekvens . Vi komponerer bevegelsessekvenser til en koreografi . Kilde: Brustad, M. (2009). Teater og bevegelse . Oslo: Thalia Publishing, s. 128–129. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-sammenkoblet", "title": "Sammenkoblede begreper", "page": "Å finne de rette ordene", "num": "09", "text": "Sammenkoblede begreper Vis Det finnes ingen fasit på rekkefølgen når en regissør tar valg. En valgt teaterform vil ofte implisere en sjanger. En valgt sjanger vil ofte begrense valg av teaterform. Begrepene påvirker hverandre gjensidig. Eigtved (2007) · Gladsø et al. (2005) · Nygaard (1990)."}, {"file": "fordypning.html", "id": "bl-sjanger", "title": "Sjanger", "page": "Å finne de rette ordene", "num": "09", "text": "Sjanger Vis Beskriver hva slags historie som fortelles — tone, tema og publikums forventninger til utfall. Eks: tragedie, komedie, melodrama, farse. Eigtved, 2007."}, {"file": "fordypning.html", "id": "bl-publikum", "title": "Publikum", "page": "Å finne de rette ordene", "num": "09", "text": "Publikum Vis Publikum er ikke bare tilskuere — de er en aktiv del av den teatrale ytringen. Uten et publikum finnes det ikke et teater. Publikums tilstedeværelse, forventninger og fortolkning er med på å skape forestillingen. I kapittel 08 ser vi nærmere på hvordan iscenesettelsen av selvet i hverdagen også kan forstås som en form for teater — med publikum som en forutsetning for den sosiale performansen. Se også: Iscenesettelse av selvet ."}, {"file": "fordypning.html", "id": "bl-publikumskontrakt", "title": "Publikumskontrakt", "page": "Å finne de rette ordene", "num": "09", "text": "Publikumskontrakt Vis Den implisitte avtalen mellom forestilling og publikum som følger av teaterformen — hva forventes av publikum, og hva kan de forvente? I forumteater forventes deltakelse. I gateteater kan du gå. I titteskapsscene later vi som om den fjerde veggen er der. Gladsø et al., 2005."}, {"file": "fordypning.html", "id": "bl-teaterform", "title": "Teaterform", "page": "Å finne de rette ordene", "num": "09", "text": "Teaterform Vis Definert av konvensjonene for hvordan forestillingen lages og presenteres. Teaterformen fastslår blant annet publikumskontrakten. Eks: commedia dell'arte, forumteater, gateteater, kabuki. Gladsø et al., 2005. «Teaterform» er et samlebegrep for hvordan en forestilling presenteres. I dette kompendiet bruker vi også de mer detaljerte begrepene — teatermodell , sjanger og spillestil — fordi de åpner for mer spesifikke og fruktbare faglige diskusjoner."}, {"file": "fordypning.html", "id": "bl-teatermodell", "title": "Teatermodell", "page": "Å finne de rette ordene", "num": "09", "text": "Teatermodell Vis Den fysiske og sosiale organiseringen av forestillingsbegivenheten — hvem møter hvem, i hvilken skala, og med hvilken grad av deltakelse. En intim forestilling for 20 i et kjøkken er en annen teatermodell enn et stadionshow for 50 000. NB: Jon Nygaard bruker «teatermodell» annerledes — som analytisk ramme (aristotelisk, episk, ekspressiv). Her følger vi Gladsø et al. Gladsø et al., 2005."}, {"file": "fordypning.html", "id": "bl-dram-modell", "title": "Dramaturgisk modell", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgisk modell Vis Beskriver hvordan fortellingen er strukturert — aristotelisk kurve, episodisk, sirkulær. Se Dramaturgi — modeller . Nygaard, J. (1990). Om teater ."}, {"file": "fordypning.html", "id": "bl-dram-form", "title": "Dramaturgisk form", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgisk form Vis Det helhetlige sceniske uttrykket — den opplevelsen publikum faktisk får. Resultatet av alle de dramaturgiske valgene. Se Dramaturgi . Nygaard, J. (1990). Om teater . Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-blande", "title": "Begrep som er lette å blande", "page": "Å finne de rette ordene", "num": "09", "text": "Begrep som er lette å blande Vis Begrep Hva er det? Teatermodell Den fysiske og sosiale organiseringen av forestillingsbegivenheten — skala, rom, grad av deltakelse. «Teaterform» Et samlebegrep. Kan også diskuteres i detaljier som teatermodell + sjanger + spillestil. Dramaturgisk modell Den tekniske strukturen for fremdriften — aristotelisk kurve, episodisk, sirkulær. Skinnene. Dramaturgisk form Den opplevelsen publikum faktisk får — resultatet av alle de dramaturgiske valgene. Turen. Spillestil Det helhetlige ekspressive uttrykket ensemblet skaper — realistisk, stilisert, deklamatorisk. Et kunstnerisk valg. Skuespillteknikker De konkrete metodene og øvelsene den enkelte skuespiller bruker for å bygge og fremføre en rolle — Stanislavski-systemet, Me"}, {"file": "fordypning.html", "id": "bl-moderne", "title": "Moderne teater / Modernisme / -ismene", "page": "Å finne de rette ordene", "num": "09", "text": "Moderne teater / Modernisme / -ismene Vis Moderne teater er teater fra den moderne epoken — fra slutten av 1800-tallet og frem til i dag. Det er ikke en stilretning men en tidsepoke. Modernisme er den brede kulturelle og kunstneriske bevegelsen bort fra tradisjonelle former i samme periode. -Ismene (ekspresjonisme, dadaisme, surrealisme) er tette grupper av likesinnede eksperimenterende kunstnere med manifestoer og eksplisitte estetiske programmer — ofte kortlivede. En Ibsen-forestilling er moderne teater men ikke en -isme. Dada er både en -isme og del av modernismen."}, {"file": "fordypning.html", "id": "bl-repr", "title": "Representasjon / Presentasjon", "page": "Å finne de rette ordene", "num": "09", "text": "Representasjon / Presentasjon Vis Representasjonsteater later som om det er virkelighet — skuespilleren er karakteren, rommet er stedet. Den fjerde veggen opprettholdes. Presentasjonsteater viser frem — skuespilleren presenterer karakteren uten å skjule at det er teater. Brecht er det tydeligste eksemplet."}, {"file": "fordypning.html", "id": "bl-illusjon", "title": "Illusjonsteater / Realisme / Naturalisme", "page": "Å finne de rette ordene", "num": "09", "text": "Illusjonsteater / Realisme / Naturalisme Vis Illusjonsteater er det overordnede begrepet — teater som skaper illusjon av virkelighet. Realisme er en historisk teaterretning (fra 1870-tallet) — psykologisk troverdige karakterer i gjenkjennelige situasjoner. Naturalisme er en strengere variant — fotografisk nøyaktighet, inkludert det hverdagslige og det stygge. Alle tre henger sammen men er ikke synonymer."}, {"file": "fordypning.html", "id": "bl-realisme-realistisk", "title": "Realisme / realistisk / illusjonsteater", "page": "Å finne de rette ordene", "num": "09", "text": "Realisme / realistisk / illusjonsteater Vis Realisme er en historisk teaterretning fra 1870-tallet — psykologisk troverdige karakterer i gjenkjennelige situasjoner (Ibsen, Tsjehov). Det er en epoke og en estetikk. Realistisk er et adjektiv som beskriver noe som ligner virkeligheten — men det er ikke det samme som å tilhøre realismen som bevegelse. En commedia dell'arte-forestilling kan ha realistiske elementer uten å være realisme. Illusjonsteater er det overordnede begrepet for teater som opprettholder den fjerde veggen og inviterer publikum til å godta den fiktive verdenen som «virkelig» innenfor forestillingens egne premisser. Dette kalles «suspension of disbelief». En forestilling med alver og monstre kan være illusjonsteater — det handler ikke om fotografisk nøyaktighet, men om at pub"}, {"file": "fordypning.html", "id": "bl-absurd-post", "title": "Absurdteater / Postmoderne", "page": "Å finne de rette ordene", "num": "09", "text": "Absurdteater / Postmoderne Vis Absurdteater er en spesifikk historisk kategori — Esslins begrep fra 1961/62 for dramatikere fra 1940- og 50-tallet som aldri selv brukte betegnelsen. Postmoderne er et bredere kulturelt og filosofisk begrep fra 1970-tallet — skeptisk til store fortellinger, spiller med sjangre og referanser. De overlapper i tid og estetikk, men er ikke det samme."}, {"file": "fordypning.html", "id": "bl-episk", "title": "Episk / Dramatisk / Eksperimentelt / Postdramatisk teater", "page": "Å finne de rette ordene", "num": "09", "text": "Episk / Dramatisk / Eksperimentelt / Postdramatisk teater Vis Dramatisk teater = karakterdrevet, narrativt forankret teater — handlingen drives fremover av konflikt mellom karakterer mot en løsning. Episk teater (Brecht) = fremmedgjøring — tilskueren holdes på avstand for å tenke kritisk. Eksperimentelt teater = opererer bevisst utenfor etablerte teaterformer og deres konvensjoner. Postdramatisk teater (Lehmann, 1999) = går forbi begge — teksten er ikke lenger overordnet, forestillingen er ikke nødvendigvis narrativ. Se Dramaturgi ."}, {"file": "fordypning.html", "id": "bl-parateater", "title": "Teater / Parateater / Performance / Happenings / Environmental Theater", "page": "Å finne de rette ordene", "num": "09", "text": "Teater / Parateater / Performance / Happenings / Environmental Theater Vis Teater = A spiller B for C — utøvere og publikum i definerte roller. Parateater (Grotowski) = prosessen er målet, ikke forestillingen — grensen mellom utøver og deltaker viskes ut. Performance = kunstnerisk handling der kunstnerens kropp og tilstedeværelse er selve verket. Happenings (Kaprow, 1960-tallet) = spontane, ikke-repetérbare kunsthendelser uten fast manus eller publikumsrolle. Environmental Theater (Schechner) = forestillingen omgir publikum — ingen fast scene/sal-inndeling. Se teaterform og teatermodell."}, {"file": "fordypning.html", "id": "bl-immersiv", "title": "Installasjoner / Environmental Theater / Immersive Theatre", "page": "Å finne de rette ordene", "num": "09", "text": "Installasjoner / Environmental Theater / Immersive Theatre Vis Installasjoner = kunst i rom — publikum beveger seg gjennom et verk, ikke en forestilling. Ingen utøvere. Environmental Theater = forestilling der rommet omgir publikum — fortsatt utøvere og tilskuere. Immersive Theatre = publikum beveger seg gjennom forestillingen og kan velge hva de følger — utøverne er overalt. Eks: Punchdrunk. Grensene er flytende."}, {"file": "fordypning.html", "id": "bl-virkemidler", "title": "Dramaturgiske virkemidler / Sceniske virkemidler", "page": "Å finne de rette ordene", "num": "09", "text": "Dramaturgiske virkemidler / Sceniske virkemidler Vis Dramaturgiske virkemidler = verktøy for å bygge fortellingen — spenningskurve, vendepunkt, konflikt, tempo. Se Dramaturgi . Sceniske virkemidler = alt det publikum ser og hører — lys, lyd, kostyme, scenografi, bevegelse. Se Analyse . Begge påvirker hverandre men beskriver ulike lag av forestillingen."}, {"file": "fordypning.html", "id": "bl-handling", "title": "Scenisk handling / Dramaturgisk handling / Fysiske handlinger / Handlingsforløp", "page": "Å finne de rette ordene", "num": "09", "text": "Scenisk handling / Dramaturgisk handling / Fysiske handlinger / Handlingsforløp Vis Sceniske handlinger — alt som skjer fysisk på scenen: en skuespiller reiser seg, slår en dør, løper over scenen. Dramaturgiske handlinger — handlinger som fører fortellingen eller forestillingens dramaturgi fremover. Kan være fysiske handlinger, men også lysforandringer, lydeffekter eller pauser — alt som driver strukturen. Fysiske handlinger (Stanislavski) — et skuespillerfaglig begrep fra Stanislavskis sene fase. I stedet for å spørre «hva ville jeg føle?» spør skuespilleren «hva ville jeg gjøre ?» — konkrete, spillbare handlinger som forankrer karakteren. Følelsen oppstår som resultat av handlingen, ikke omvendt. Se Fordypning: Stanislavski . Handlingsforløp — det dramaturgiske begrepet for plot: den sam"}, {"file": "fordypning.html", "id": "bl-semiotikk", "title": "Semiotikk / Dramaturgiske symboler", "page": "Å finne de rette ordene", "num": "09", "text": "Semiotikk / Dramaturgiske symboler Vis Semiotikk er det overordnede teorifundamentet — læren om tegn generelt. Alt på scenen kan leses som et tegn: lys, kostyme, bevegelse, stillhet. Ikonisk (ligner det det representerer), indeksikal (peker på noe) eller symbolsk (kulturelt bestemt betydning). Se Analyse: Semiotikk . Dramaturgiske symboler er et mer spesifikt begrep: gjenstander, figurer eller handlinger som bærer gjentatt og forsterket mening innenfor ett bestemt verk — bygget opp over tid i fortellingen. Villanden i Ibsen, kirsebærhagen i Tsjekhov. Se Dramaturgi: Symboler . Alle dramaturgiske symboler er tegn — men ikke alle tegn er dramaturgiske symboler. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-misbruk", "title": "Misbrukte begrep", "page": "Å finne de rette ordene", "num": "09", "text": "Misbrukte begrep Vis"}, {"file": "fordypning.html", "id": "bl-kunstnerisk", "title": "Kunstnerisk", "page": "Å finne de rette ordene", "num": "09", "text": "Kunstnerisk Vis Brukes ofte som et vagt kompliment — «det var veldig kunstnerisk». I faglig sammenheng betyr kunstnerisk at noe tilhører kunstfeltet, har en skapende intensjon, eller er uttrykk for et kunstnerisk syn. Det er ikke en kvalitetsbetegnelse og ikke synonymt med «sært». → Hva er kunst? ↗"}, {"file": "fordypning.html", "id": "bl-absurd-misbruk", "title": "Absurd (misbrukt)", "page": "Å finne de rette ordene", "num": "09", "text": "Absurd (misbrukt) Vis I dagligtalen brukes «absurd» om noe morsomt, rart eller ulogisk. I teaterfaget refererer absurdteater til en spesifikk historisk kategori — Esslins begrep fra 1961/62. Ikke bruk «absurd» som synonym for «komisk» eller «surrealistisk» i faglig analyse."}, {"file": "fordypning.html", "id": "bl-realistisk-misbruk", "title": "Realistisk (misbrukt)", "page": "Å finne de rette ordene", "num": "09", "text": "Realistisk (misbrukt) Vis Brukes ofte feil om teater fra før 1800-tallet — «det greske teateret var ikke realistisk». Realisme som teaterretning oppsto på 1870-tallet. Å kalle eldre teater «urealistisk» fordi det ikke ligner realismen er anakronistisk — det var klassisk, barokt eller neoklassisk. Skjul ↑"}, {"file": "fordypning.html", "id": "tm-beg-vurd", "title": "Vurdering og skuespill", "page": "Å finne de rette ordene", "num": "09", "text": "Vurdering og skuespill Vis"}, {"file": "fordypning.html", "id": "bg-tilstedev", "title": "Tilstedeværelse", "page": "Å finne de rette ordene", "num": "09", "text": "Tilstedeværelse Vis Tilskuerens opplevelse av at eleven er fullstendig til stede her og nå — enten som skuespiller i rollen eller som performer."}, {"file": "fordypning.html", "id": "bg-sceniskoppm", "title": "Scenisk oppmerksomhet", "page": "Å finne de rette ordene", "num": "09", "text": "Scenisk oppmerksomhet Vis Eleven har fokus i den fiktive situasjonen og evt. medspilleren."}, {"file": "fordypning.html", "id": "bg-rolleident", "title": "Rolleidentifikasjon", "page": "Å finne de rette ordene", "num": "09", "text": "Rolleidentifikasjon Vis Synlig tegn på at eleven fremstiller noe/noen annen enn seg selv."}, {"file": "fordypning.html", "id": "bg-karakteris", "title": "Karakterisering", "page": "Å finne de rette ordene", "num": "09", "text": "Karakterisering Vis Karaktertrekk, egenskaper og kjennetegn man tilegner rollen — ikke nødvendigvis naturlig for skuespilleren."}, {"file": "fordypning.html", "id": "bg-innlevelse", "title": "Innlevelse", "page": "Å finne de rette ordene", "num": "09", "text": "Innlevelse Vis Eleven får publikum til å tro på rollefigurens tanker, handlinger, vilje og følelser."}, {"file": "fordypning.html", "id": "bg-fysuttrykk", "title": "Fysisk uttrykk", "page": "Å finne de rette ordene", "num": "09", "text": "Fysisk uttrykk Vis Eleven formidler rolle/situasjon/stemning gjennom bruk av kroppen."}, {"file": "fordypning.html", "id": "bg-selvst", "title": "Selvstendig uttrykk", "page": "Å finne de rette ordene", "num": "09", "text": "Selvstendig uttrykk Vis Eleven bruker fagets teknikker for å skape et individuelt uttrykk basert på egen kreativ prosess innenfor gitte rammer — dvs. ikke kopiere/reprodusere."}, {"file": "fordypning.html", "id": "bg-ekspressiv", "title": "Ekspressivitet", "page": "Å finne de rette ordene", "num": "09", "text": "Ekspressivitet Vis Å tydeliggjøre og levendegjøre det eleven vil fortelle — enten uttrykket er forenklet eller overdrevet."}, {"file": "fordypning.html", "id": "bg-gitatimpl", "title": "Gi og ta impulser i samspill", "page": "Å finne de rette ordene", "num": "09", "text": "Gi og ta impulser i samspill Vis Timing i dialog, «listening» og tydeliggjøring av mål/taktikk i samspill."}, {"file": "fordypning.html", "id": "bg-timing", "title": "Timing", "page": "Å finne de rette ordene", "num": "09", "text": "Timing Vis Å gjøre riktig ting til riktig tid i henhold til forestillingens rytme og samspill med medspilleren og publikum."}, {"file": "fordypning.html", "id": "bg-utforske", "title": "Utforske", "page": "Å finne de rette ordene", "num": "09", "text": "Utforske Vis En kreativ prosess hvor en bevisst ser på og prøver utvalgt materiale fra ulike innfallsvinkler. Innebærer en vurdering av hva som skal være med videre i prosessen frem mot produktet. (Grunnen til at underveisvurdering er nødvendig i dramafag.) Skjul ↑"}, {"file": "fordypning.html", "id": "tm-test-begrep", "title": "Koble kunstner til konsept", "page": "Å finne de rette ordene", "num": "09", "text": "Koble kunstner til konsept Vis Klikk på et kort for å se hvilken kunstner eller bevegelse begrepet hører til. Se Teaterfornyere for mer."}];
function normalize(s){return s.toLowerCase().replace(/[åä]/g,"a").replace(/[øö]/g,"o").replace(/æ/g,"ae").replace(/[éè]/g,"e").replace(/ü/g,"u");}
function search(q){if(!q||q.length<2)return[];var n=normalize(q);var seen={};var results=[];entries.forEach(function(e){var key=e.file+(e.id||"_page");if(seen[key])return;if(normalize(e.title).indexOf(n)!==-1||normalize(e.page).indexOf(n)!==-1||normalize(e.text||"").indexOf(n)!==-1){seen[key]=true;results.push(e);}});results.sort(function(a,b){var at=normalize(a.title).indexOf(n)!==-1?0:(normalize(a.page).indexOf(n)!==-1?1:2);var bt=normalize(b.title).indexOf(n)!==-1?0:(normalize(b.page).indexOf(n)!==-1?1:2);return at-bt;});return results;}
function render(results,query){var el=document.getElementById("sok-results");if(!query||query.length<2){el.innerHTML="";return;}if(!results.length){el.innerHTML='<p style="font-size:14px;color:var(--text3);padding:0.5rem 0;">Ingen treff.</p>';return;}el.innerHTML=results.map(function(r){return'<a href="'+r.file+'#'+r.id+'" style="display:block;padding:0.7rem 0;border-bottom:1px solid var(--border2);text-decoration:none;"><span style="font-size:14px;font-weight:700;color:var(--text);">'+r.title+'</span><span style="display:block;font-size:12px;color:var(--text3);margin-top:2px;">'+r.num+' — '+r.page+'</span></a>';}).join("");}
var input=document.getElementById("sok-input");
input.addEventListener("input",function(){render(search(input.value.trim()),input.value.trim());});
input.focus();
</script>
