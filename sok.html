      <span class="nav-title">Søk</span>
      <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Bytt fargemodus">☀︎</button>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☽' : '☀︎';
  localStorage.setItem('theme', next);
}
const saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  if (saved === 'dark') document.querySelector('.theme-toggle').textContent = '☽';
}
</script>
</body>
</html>
